とを目標にする感じにはなると思います。","c":"我想大概会变成就是尽早尽早完成、以此为目标这种感觉。","k":"ただただ ~にはなると思います 感じ"},{"p":"sqex-pm","s":"thhzMkcW3j8#18:45#0","t":"18:45","j":"なるほど承知しました。","c":"原来如此，明白了。","k":"承知しました"},{"p":"sqex-pm","s":"thhzMkcW3j8#18:46#0","t":"18:46","j":"じゃあちょっと私もそれ覗いて、記述確認はカットインさせていただこうと思います。","c":"那我也稍微看一眼那边（?），文档确认这部分就由我来插手一下吧。","k":"させていただこうと思います は"},{"p":"sqex-pm","s":"thhzMkcW3j8#18:55#0","t":"18:55","j":"他大丈夫でしょうか。","c":"其他还有什么问题吗？","k":"〜でしょうか"},{"p":"sqex-pm","s":"thhzMkcW3j8#18:58#0","t":"18:58","j":"大丈夫です。","c":"没问题。","k":"大丈夫"},{"p":"sqex-pm","s":"thhzMkcW3j8#18:59#0","t":"18:59","j":"はい、じゃあこれでチーム定例は終了したいと思います。","c":"好，那我们的团队例会就到这里结束吧。","k":"チーム定例 〜したいと思います"},{"p":"sqex-pm","s":"thhzMkcW3j8#19:09#0","t":"19:09","j":"ま、あの、遅延している部分があったりとか、あの、開発会社さんと連携しなきゃいけないところは見えてきたので、ちょっと席に戻ったら、ちょっとその辺りを早速進めたいと思います。","c":"嗯，那个，有一些进度延迟的部分，还有，看出了需要和开发公司那边协调的地方，所以等我回到座位上，就想赶紧先把那部分推进一下。","k":"なきゃいけない 見えてきた さん"},{"p":"sqex-pm","s":"thhzMkcW3j8#19:18#0","t":"19:18","j":"遅れたりするとどうなるんですか？","c":"如果进度延迟的话，会变成什么样呢？","k":"〜たりする んですか"},{"p":"sqex-pm","s":"thhzMkcW3j8#19:22#0","t":"19:22","j":"自分たちが苦しいという感じです。基本的に配信日はもう絶対ずらさないので、シンプルに皆さんの稼働時間がどんどん伸びていってしまう、時間が伸びていってしまうっていうところですね。","c":"感觉就是我们自己会很辛苦。因为基本上发布日绝对不会往后挪，所以说白了，大家的工作时间就会一直不断拉长——也就是会一直被拖长的那部分。","k":"配信日 〜ていってしまう っていうところ"},{"p":"sqex-pm","s":"thhzMkcW3j8#19:36#0","t":"19:36","j":"だから、そのなるべく深夜業務とか発生させないように早いうちから連絡と、もしかしたら向こうにも何らかの都合があるかもしれないので、ちゃんとその辺を確認してから動くようにはしたいですね。","c":"所以呢，为了尽量不让深夜加班这种事发生，尽早联系(?)，而且说不定对方那边也有各种情况，所以想先好好确认清楚那一块之后再行动。","k":"させないように 何らかの 動くようにはしたい"},{"p":"sqex-pm","s":"thhzMkcW3j8#19:54#0","t":"19:54","j":"ゲームを作っている方たちのことを、まあ、基本的に全員もう大尊敬。","c":"对做游戏的这些人，嘛，基本上全体都非常尊敬。","k":"大＋名詞（強調） まあ"},{"p":"sqex-pm","s":"thhzMkcW3j8#20:00#0","t":"20:00","j":"その人がどういう考えでそういう課題に直面しているのかとか、ちょっと感情的な部分にも共感しながら、なるべく抵抗感なくマネジメントを受け入れてもらえた方が結果的にチームの空気も良くなるしやる気も出るんじゃないかなという風に思っているので、真剣勝負という感じでもある。","c":"我会去想那个人是抱着怎样的想法在面对那样的课题，也在情感层面上多少产生一些共鸣，尽量让对方能没有抵触感地接受管理——这样一来，结果上团队的氛围也会变好、干劲也会提升，我是这么想的，所以这某种意义上也算是一场真刀真枪的较量。","k":"〜のかとか 〜ながら（同時進行） 〜てもらえる 〜んじゃないかな"},{"p":"sqex-pm","s":"thhzMkcW3j8#20:26#0","t":"20:26","j":"生岡さん(?)は結構バランス力がすごい高くて、やっぱゲームなんで期日があってそれまでに作って終わりじゃなくて、作る時に最後面白いとかつまらないとかそういう要素が入ってくるんで。","c":"生冈（？）先生的平衡能力相当强——毕竟是游戏嘛，虽然是有交付期限的，但也不是做到那个时候交出去就结束了，制作过程中到最后还会掺进“有趣”或“无聊”这样的（主观）要素。","k":"バランス力 〜なんで（＝なので） 〜じゃなくて"},{"p":"sqex-pm","s":"thhzMkcW3j8#20:42#0","t":"20:42","j":"スケジュールも遅延しそうな時に、伊東さん(?)だと「ここのスケジュールを開発が調整してくれて、じゃああと2日間とかここでもっとクオリティ上げて、ここにゴールしましょう」みたいな。","c":"在进度眼看要延误的时候，如果是伊藤（？）先生的话，〔他会说〕“这部分的排期让开发那边调整一下，那就再给两天左右，在这里把品质再往上提一提，就在这里收尾吧”——大概是这种感觉。","k":"〜てくれる 〜みたいな 名詞＋だと"},{"p":"sqex-pm","s":"thhzMkcW3j8#20:52#0","t":"20:52","j":"みんな忙しくなっちゃうんですけど、プレイヤーさんにとってもいいことがあるし、結果「やってよかったね」っていうそういう着地できるんで、そこの結果がスケジュールだけじゃなくてクオリティも担保できる。","c":"虽然大家都会因此变得忙碌，但对玩家来说也是件好事，结果能落到“做了真是太好了”这样的收尾，所以那个结果不仅是排期，连品质也能一并保住。","k":"〜ちゃう（＝てしまう） 着地（比喩） 〜んで（＝ので）"},{"p":"sqex-pm","s":"thhzMkcW3j8#21:04#0","t":"21:04","j":"ここら辺できるの三十岡さん(?)結構すごいなって思ってます。","c":"我觉得能做到这一点（把排期和品质都兼顾住）的三十冈（？）先生真的相当厉害。","k":"〜の（形式名詞） 〜って思ってます（＝と思っています）"},{"p":"sqex-pm","s":"thhzMkcW3j8#21:07#0","t":"21:07","j":"そうですね、はい、これで帰宅しようかと思います。","c":"是啊，嗯，那我想差不多该回家了。","k":"〜（よ）うかと思う これで"},{"p":"sqex-pm","s":"thhzMkcW3j8#21:17#0","t":"21:17","j":"まあ細々とまだやらなきゃいけないタスクは残ってますが","c":"嗯，还有一些琐碎的、必须要做的任务还没完成，","k":"なきゃいけない（ば形の口语缩约） が（逆接・保留の終助詞的用法）"},{"p":"sqex-pm","s":"thhzMkcW3j8#21:21#0","t":"21:21","j":"はいそれは今週残りの時間でやっていければと思います","c":"嗯，那部分我想在这周剩下的时间里争取做完。","k":"ていければと思います（て形＋ば形＋意向）"},{"p":"sqex-pm","s":"thhzMkcW3j8#21:26#0","t":"21:26","j":"今日はこの後(?)家に帰って子供が待ってるので","c":"今天这之后要回家，因为孩子在等着，","k":"ので（理由）"},{"p":"sqex-pm","s":"thhzMkcW3j8#21:28#0","t":"21:28","j":"今日この後予定あるんですか?","c":"今天这之后有什么安排吗？","k":"んですか（の+ですか、関心・確認）"},{"p":"sqex-pm","s":"thhzMkcW3j8#21:31#0","t":"21:31","j":"今日はこの後家に帰って、えっと、子供が待ってるので、宿題見たりお風呂入れたり、寝かしつけまでちょっとノンストップなんですけど","c":"今天这之后要回家，呃，因为孩子在等着，要看孩子写作业啦、给他洗澡啦，一直到哄睡为止基本上是不停歇的，不过……","k":"～たり～たりする（列挙） お風呂に入れる（他动词：给…洗澡） んですけど（説明・前置き）"},{"p":"sqex-pm","s":"thhzMkcW3j8#21:41#0","t":"21:41","j":"後半戦っていう感じでまたここから頑張ります。","c":"感觉就像是「下半场」一样，接下来还要继续加油。","k":"って（＝という、口语の引用） 後半戦（比喩表現）"},{"p":"sqex-pm","s":"thhzMkcW3j8#21:45#0","t":"21:45","j":"はい、ありがとうございました。","c":"好的，谢谢您。","k":""},{"p":"sqex-pm","s":"thhzMkcW3j8#21:49#0","t":"21:49","j":"ありがとうございました。お疲れ様です。","c":"谢谢您。辛苦了。","k":"お疲れ様です（労いの定型表現）"},{"p":"sqex-pm","s":"thhzMkcW3j8#21:51#0","t":"21:51","j":"私にとって仕事とは自分をアウトプットすることだと思ってます。","c":"对我来说，工作就是把自己「输出」出来的过程。","k":"にとって（〜から見て、〜の立場で） アウトプットする（外来语＋する動詞）"},{"p":"sqex-pm","s":"thhzMkcW3j8#22:02#0","t":"22:02","j":"だと思ってます。","c":"（我）是这么想的。","k":""},{"p":"sqex-pm","s":"thhzMkcW3j8#22:03#0","t":"22:03","j":"仕事ほどなんかその自分の能力とか性質のキャラクターとかを意図的に駆使して成果を出すというようなことって、やっぱり仕事以外にはない気がしていますし","c":"像工作这样，能有意识地充分发挥自己的能力、性格特质并做出成果的事情，我觉得果然除了工作以外是没有的，而且……","k":"ほど～ない（比較の最上級的表現） 意図的に駆使して（副詞＋複合動詞） って（＝は、口语の主題化）"},{"p":"sqex-pm","s":"thhzMkcW3j8#22:22#0","t":"22:22","j":"そういったものだからこそ、自分がこれまでの人生経験でしてきた失敗とか培った経験っていうものを、社会に対して活かしていけることが仕事だなと思ってます","c":"正因为是这样的事，我才觉得，能把自己至今人生经历中的失败、积累的经验，回馈运用于社会，这就是工作。","k":"からこそ（強調の理由） してきた（〜てくる的过去形、継続・経験） っていうもの（＝というもの、口语） 活かしていける（て形＋いく可能形）"},{"p":"sqex-pm","s":"thhzMkcW3j8#22:36#0","t":"22:36","j":"ゲームと仕事って似ている気がしてて、試行錯誤と努力を積み重ねてゴールを目指す","c":"感觉游戏和工作很相似，都是不断反复试错、积累努力，朝着目标前进。","k":"って（＝は、口语の主題化） 気がしてて（て形の重複・口语的省略） 積み重ねる（複合動詞）"},{"p":"sqex-pm","s":"thhzMkcW3j8#22:44#0","t":"22:44","j":"で、その達成感を味わう、時には仲間と競って勝ち負けを楽しむとか","c":"然后细细品味那份成就感，有时候也喜欢和伙伴一起竞争、享受胜负的乐趣","k":"て形（動詞の接続） 勝ち負け とか（例示・婉转）"},{"p":"sqex-pm","s":"thhzMkcW3j8#22:50#0","t":"22:50","j":"没入感っていうんですかね","c":"该说是沉浸感吧","k":"っていうんですかね"},{"p":"sqex-pm","s":"thhzMkcW3j8#22:52#0","t":"22:52","j":"なんかその両方味わえる楽しさみたいなのが、自分は大好きですね","c":"总觉得那种两者都能尝到的乐趣，自己是非常喜欢的","k":"可能形（〜える） みたいな（比况・婉转） なんか（口语填充词）"},{"p":"sqex-pm","s":"thhzMkcW3j8#22:58#0","t":"22:58","j":"ご視聴ありがとうございました","c":"感谢您的收看","k":"ご＋名詞（美化・敬语接头辞）"},{"p":"kachikan","s":"LYZx8n0VOWg#00:00#0","t":"00:00","j":"私、すっごい睡眠大事にしてるんで、なんか自分の睡眠妨げられるのが一番嫌なんですよね。","c":"我特别重视睡眠，所以最讨厌的就是自己的睡眠被打扰。","k":"妨げられる 〜んで 大事にする 〜のが"},{"p":"kachikan","s":"LYZx8n0VOWg#00:05#0","t":"00:05","j":"寝る時間もバラバラだときついですか?","c":"睡觉时间也乱七八糟的话会很难受吗？","k":"バラバラ きつい"},{"p":"kachikan","s":"LYZx8n0VOWg#00:07#0","t":"00:07","j":"さっきのがあって、作業するとか。","c":"就是刚才说的那个，比如（对方晚上）做点事之类的。","k":"〜とか"},{"p":"kachikan","s":"LYZx8n0VOWg#00:10#0","t":"00:10","j":"分からないように、本当に忍びの者ぐらいの感じで。","c":"为了不被察觉，真的就像忍者那样（悄无声息）。","k":"〜ないように 忍びの者"},{"p":"kachikan","s":"LYZx8n0VOWg#00:14#0","t":"00:14","j":"忍者と付き合うしかない。","c":"那只能和忍者交往了。","k":"〜しかない 〜と（付き合う）"},{"p":"kachikan","s":"LYZx8n0VOWg#00:16#0","t":"00:16","j":"いや、生活音は鳴っちゃうじゃないですか。","c":"可是，生活的声响总会发出来的嘛。","k":"鳴っちゃう 〜じゃないですか"},{"p":"kachikan","s":"LYZx8n0VOWg#00:19#0","t":"00:19","j":"すっごいエンター強く押してるじゃん、あのパソコンの。","c":"你敲回车键敲得超用力的嘛，那个电脑（键盘）的。","k":"〜じゃん エンター"},{"p":"kachikan","s":"LYZx8n0VOWg#00:24#0","t":"00:24","j":"そうだ、そういうの、もんちゃん覚えた?","c":"对了，那种做法，もんちゃん学会了吗？","k":"覚える"},{"p":"kachikan","s":"LYZx8n0VOWg#00:28#0","t":"00:28","j":"ダメ?","c":"不行吗？","k":""},{"p":"kachikan","s":"LYZx8n0VOWg#00:30#0","t":"00:30","j":"いや、無理よ。本当、無理。","c":"不行啊，真的不行。","k":"無理"},{"p":"kachikan","s":"LYZx8n0VOWg#00:32#0","t":"00:32","j":"仕事で遅く帰ってきてガチャンって開けるのがダメ。それは別にいいんだけど、「帰ってきたな」って思うんだけど。","c":"工作到很晚回来，「哐当」一声开门这点不行……不过那本身倒无所谓，只是会想「回来了啊」。","k":"ガチャン 〜のがダメ 〜んだけど"},{"p":"kachikan","s":"LYZx8n0VOWg#00:38#0","t":"00:38","j":"本当に静かにしてくれる人だったし、私もそうするし。","c":"（对方）真的是个会替我保持安静的人，我自己也会那样做。","k":"〜してくれる 〜し"},{"p":"kachikan","s":"LYZx8n0VOWg#00:42#0","t":"00:42","j":"いや、厳しいな。","c":"哎，要求真高啊。","k":"厳しい"},{"p":"kachikan","s":"LYZx8n0VOWg#00:44#0","t":"00:44","j":"たまたまいい人に出会えてただけですよ。","c":"只是碰巧遇到了好人而已啦。","k":"出会えてた 〜だけ たまたま"},{"p":"kachikan","s":"LYZx8n0VOWg#00:46#0","t":"00:46","j":"そうよ、ラッキーですよ。","c":"对呀，很幸运啦。","k":"ラッキー"},{"p":"kachikan","s":"LYZx8n0VOWg#00:48#0","t":"00:48","j":"なかなかいないんじゃない?","c":"那样的人可不多见吧？","k":"なかなか〜ない 〜んじゃない?"},{"p":"kachikan","s":"LYZx8n0VOWg#00:49#0","t":"00:49","j":"いない、いない。","c":"没有没有。","k":""},{"p":"kachikan","s":"LYZx8n0VOWg#00:50#0","t":"00:50","j":"どうしても新しい不安が今出てきちゃって。","c":"可现在又不由得冒出了新的不安。","k":"出てきちゃって どうしても"},{"p":"kachikan","s":"LYZx8n0VOWg#00:52#0","t":"00:52","j":"サイレント恋愛。","c":"「无声恋爱」。","k":"サイレント恋愛"},{"p":"kachikan","s":"LYZx8n0VOWg#00:54#0","t":"00:54","j":"私、もう怖くて恋愛できない。","c":"我已经害怕到没法谈恋爱了。","k":"怖くて 恋愛できない"},{"p":"kachikan","s":"LYZx8n0VOWg#00:56#0","t":"00:56","j":"もう職業忍び以外、無理。","c":"除了以忍者为职业的人，都不行了。","k":"〜以外 職業忍び"},{"p":"kachikan","s":"LYZx8n0VOWg#00:58#0","t":"00:58","j":"ずっとこうやってくる。","c":"一直这样（悄悄地）过来。","k":"こうやって"},{"p":"kachikan","s":"LYZx8n0VOWg#01:00#0","t":"01:00","j":"マジよ。","c":"真的哦。","k":""},{"p":"kachikan","s":"LYZx8n0VOWg#01:01#0","t":"01:01","j":"いいんじゃん。","c":"挺好的嘛。","k":"〜んじゃん"},{"p":"kachikan","s":"LYZx8n0VOWg#01:02#0","t":"01:02","j":"いや、もちろん気を使う使わないは大事ですけど。","c":"不，当然「顾不顾及对方」这一点是很重要的啦。","k":"気を使う 〜けど"},{"p":"kachikan","s":"LYZx8n0VOWg#01:04#0","t":"01:04","j":"なんだろう、なんかそこ許せないんだって思っちゃうっていうか。","c":"怎么说呢，就是会觉得那一点无法容忍，这种感觉吧。","k":"許せない 思っちゃう 〜っていうか"},{"p":"kachikan","s":"LYZx8n0VOWg#01:08#0","t":"01:08","j":"そうそう。","c":"对对。","k":""},{"p":"kachikan","s":"LYZx8n0VOWg#01:09#0","t":"01:09","j":"いや、すっごい疲れてる時とかね、年に何回かはかわいいんだけど、日常になっちゃうと本当に無理。","c":"就是啊，特别累的时候什么的，一年有那么几次还挺可爱的，可一旦变成日常就真的受不了。","k":"〜とか なっちゃうと 日常"},{"p":"kachikan","s":"LYZx8n0VOWg#01:15#0","t":"01:15","j":"結婚とかしたら、そういうの出てくるよ。","c":"一旦结婚之类的，那种问题就会冒出来哦。","k":"〜たら 出てくる"},{"p":"kachikan","s":"LYZx8n0VOWg#01:17#0","t":"01:17","j":"えっと、どうですか?","c":"那个，怎么样呢？","k":"どうですか"},{"p":"kachikan","s":"LYZx8n0VOWg#01:18#0","t":"01:18","j":"何?","c":"什么？","k":""},{"p":"kachikan","s":"LYZx8n0VOWg#01:19#0","t":"01:19","j":"やまちゃん、アラーム早いじゃないですか。全然生活スタイル違うから。","c":"山ちゃん闹钟很早不是吗，（跟别人）生活作息完全不一样嘛。","k":"全然〜違う 〜から"},{"p":"kachikan","s":"LYZx8n0VOWg#01:22#0","t":"01:22","j":"確かに。","c":"确实。","k":""},{"p":"kachikan","s":"LYZx8n0VOWg#01:23#0","t":"01:23","j":"朝早いですもんね。","c":"早上（起得）很早对吧。","k":"〜もんね"},{"p":"kachikan","s":"LYZx8n0VOWg#01:24#0","t":"01:24","j":"朝、俺早いし。","c":"我早上（起得）早嘛。","k":"〜し 俺"},{"p":"kachikan","s":"LYZx8n0VOWg#01:25#0","t":"01:25","j":"アラーム、どうしてるんですか。","c":"闹钟你都怎么设的？","k":"どうしてる(んですか)"},{"p":"kachikan","s":"LYZx8n0VOWg#01:26#0","t":"01:26","j":"アラーム仕掛けてるよ、ガンガン。","c":"闹钟设了啊，响个不停。","k":"仕掛ける ガンガン"},{"p":"kachikan","s":"LYZx8n0VOWg#01:28#0","t":"01:28","j":"えぇー。","c":"诶——","k":""},{"p":"kachikan","s":"LYZx8n0VOWg#01:29#0","t":"01:29","j":"携帯のアラーム？","c":"手机的闹钟？","k":"の"},{"p":"kachikan","s":"LYZx8n0VOWg#01:30#0","t":"01:30","j":"そう。","c":"对。","k":""},{"p":"kachikan","s":"LYZx8n0VOWg#01:31#0","t":"01:31","j":"言われないですか。","c":"不会被人说吗？","k":"言われる 〜ないですか"},{"p":"kachikan","s":"LYZx8n0VOWg#01:32#0","t":"01:32","j":"何回目ぐらいで起きるんですか。","c":"大概响到第几次才起床？","k":"〜目 で"},{"p":"kachikan","s":"LYZx8n0VOWg#01:33#0","t":"01:33","j":"俺はでも、何回か目で起こしてもらってます。","c":"不过我啊，是响了好几次之后才被叫醒的。","k":"〜てもらう 何回か目"},{"p":"kachikan","s":"LYZx8n0VOWg#01:36#0","t":"01:36","j":"『何回か目』ってどれぐらいですか。","c":"你说的『好几次』大概是几次？","k":"って"},{"p":"kachikan","s":"LYZx8n0VOWg#01:38#0","t":"01:38","j":"正直に、4、5回行くと。","c":"老实说，会响个4、5次吧。","k":"正直に(言うと) 〜回行く"},{"p":"kachikan","s":"LYZx8n0VOWg#01:40#0","t":"01:40","j":"普通よ、多分。","c":"这很正常吧，大概。","k":"よ"},{"p":"kachikan","s":"LYZx8n0VOWg#01:42#0","t":"01:42","j":"人と一緒に住むって、一緒に住むならね。","c":"跟人一起住这件事……要是一起住的话啊。","k":"と 〜なら"},{"p":"kachikan","s":"LYZx8n0VOWg#01:45#0","t":"01:45","j":"そう、なんか、二人の人間性がグッと出てるよね。","c":"对，怎么说呢，两个人的本性会一下子显露出来呢。","k":"グッと 人間性が出る よね"},{"p":"kachikan","s":"LYZx8n0VOWg#01:49#0","t":"01:49","j":"バレちゃった。","c":"被发现了。","k":"〜ちゃう(〜てしまう) バレる"},{"p":"kachikan","s":"LYZx8n0VOWg#01:50#0","t":"01:50","j":"いや、本当に幸いにして、そういう人と出会ったことがなかったから。","c":"不，真的很幸运，我以前从没遇到过那样的人。","k":"幸いにして 〜たことがない"},{"p":"kachikan","s":"LYZx8n0VOWg#01:53#0","t":"01:53","j":"そっか。","c":"这样啊。","k":""},{"p":"kachikan","s":"LYZx8n0VOWg#01:54#0","t":"01:54","j":"だから本当に『そういう人っているんだな』っていう驚きとともに。","c":"所以我是带着『原来真的有这种人啊』的惊讶（去面对的）。","k":"〜って(＝は) 〜とともに な(なあ)"},{"p":"kachikan","s":"LYZx8n0VOWg#01:58#0","t":"01:58","j":"自分が好きになった人がそんな人だったらどうしようって、恐怖の中で芽生えてきちゃって。","c":"（想到）要是自己喜欢上的人是那样的人该怎么办，这种不安就在恐惧中萌生了出来。","k":"〜たらどうしよう 〜てくる 芽生える"},{"p":"kachikan","s":"LYZx8n0VOWg#02:02#0","t":"02:02","j":"そんな人いるんだって。","c":"（没想到）真有那样的人啊。","k":"〜んだって"},{"p":"kachikan","s":"LYZx8n0VOWg#02:03#0","t":"02:03","j":"俺たち、そんな悪くないって。","c":"我们（爱赖床的人）也没那么坏啦。","k":"そんな〜ない って"},{"p":"kachikan","s":"LYZx8n0VOWg#02:05#0","t":"02:05","j":"友達と旅行した時もそうでした。今思い出したけど。","c":"跟朋友旅行的时候也是这样。我现在才想起来。","k":"〜た時 思い出す"},{"p":"kachikan","s":"LYZx8n0VOWg#02:08#0","t":"02:08","j":"そうな。","c":"是吗。","k":""},{"p":"kachikan","s":"LYZx8n0VOWg#02:10#0","t":"02:10","j":"女友達と旅行した時に、よく一緒に旅行する子がいて。","c":"跟女性朋友旅行的时候，有个常一起旅行的女生。","k":"子 〜て(いて)"},{"p":"kachikan","s":"LYZx8n0VOWg#02:12#0","t":"02:12","j":"その子が毎回スヌーズで起きないんですよ。","c":"那个女生每次都按贪睡键，怎么都起不来。","k":"スヌーズ で んですよ"},{"p":"kachikan","s":"LYZx8n0VOWg#02:15#0","t":"02:15","j":"だから、でも旅先だし、別にかけててもどっちでもいいじゃん。","c":"所以说，反正是在旅途中，闹钟设不设都无所谓嘛。","k":"〜し 〜ても どっちでもいい じゃん"},{"p":"kachikan","s":"LYZx8n0VOWg#02:20#0","t":"02:20","j":"その子が起きなくても、その子が朝ごはん食べられないだけだから。","c":"就算那女生起不来，也只是她自己吃不到早饭而已。","k":"〜なくても 食べられない 〜だけ"},{"p":"kachikan","s":"LYZx8n0VOWg#02:23#0","t":"02:23","j":"もう放置します。","c":"我就干脆不管她了。","k":"放置する もう"},{"p":"kachikan","s":"LYZx8n0VOWg#02:24#0","t":"02:24","j":"そんな、そんな厳しいんだ。","c":"那么、那么狠啊。","k":"んだ"},{"p":"kachikan","s":"LYZx8n0VOWg#02:26#0","t":"02:26","j":"友達……大丈夫かな、この後のやつ。","c":"朋友……接下来那段（能播吗），没问题吧。","k":"かな やつ"},{"p":"kachikan","s":"LYZx8n0VOWg#02:29#0","t":"02:29","j":"いや、これ今、怖いこと言おうとしてなかった？","c":"不是，你刚才是不是想说什么可怕的话？","k":"〜(よ)うとする 〜てなかった(ていなかった)"},{"p":"kachikan","s":"LYZx8n0VOWg#02:32#0","t":"02:32","j":"何？","c":"什么？","k":""},{"p":"kachikan","s":"LYZx8n0VOWg#02:33#0","t":"02:33","j":"いやいや、友達いなくなっちゃうよって。","c":"不不，（我是说）你会没朋友的哦。","k":"〜なくなる 〜ちゃう"},{"p":"kachikan","s":"LYZx8n0VOWg#02:35#0","t":"02:35","j":"え？","c":"诶？","k":""},{"p":"kachikan","s":"LYZx8n0VOWg#02:36#0","t":"02:36","j":"友達ってさ、いる？","c":"朋友这东西……你有吗？","k":"ってさ"},{"p":"kachikan","s":"LYZx8n0VOWg#02:39#0","t":"02:39","j":"その子、大丈夫ですよ。だってこっちが『その子は起きない子だ』って思ってるから。","c":"那女生没事的。因为我们这边早就认定『她就是个起不来的人』了。","k":"だって って こっち"},{"p":"kachikan","s":"LYZx8n0VOWg#02:44#0","t":"02:44","j":"彼氏もいけるじゃない、起きない人だから。","c":"那有男朋友也没问题嘛，反正她本来就是个起不来的人。","k":"いける じゃない"},{"p":"kachikan","s":"LYZx8n0VOWg#02:46#0","t":"02:46","j":"いや、日常は無理ですよ。旅行だけだから。","c":"不行不行，日常生活里可不行。只有旅行的时候才行。","k":"無理 だけ"},{"p":"kachikan","s":"LYZx8n0VOWg#02:49#0","t":"02:49","j":"友情だったらそりゃいいけど。","c":"要是友情的话那当然可以，可是……","k":"〜だったら そりゃ けど"},{"p":"kachikan","s":"LYZx8n0VOWg#02:50#0","t":"02:50","j":"恋愛は無理だね。","c":"谈恋爱是不可能的啊。","k":"は（主题） 無理（むり） だね"},{"p":"kachikan","s":"LYZx8n0VOWg#02:51#0","t":"02:51","j":"恋愛は絶対無理、絶対無理、絶対無理、絶対無理、絶対、絶対。","c":"恋爱绝对不行、绝对不行、绝对不行、绝对不行，绝对、绝对（不行）。","k":"絶対（ぜったい）"},{"p":"kachikan","s":"LYZx8n0VOWg#02:58#0","t":"02:58","j":"大事なことなので4回言いました。","c":"因为是重要的事情，所以说了4遍。","k":"大事なことなので〇回言いました なので 言いました"},{"p":"kachikan","s":"LYZx8n0VOWg#03:00#0","t":"03:00","j":"名言ですよ。","c":"这可是名言啊。","k":"名言（めいげん） です よ"},{"p":"kachikan","s":"LYZx8n0VOWg#03:01#0","t":"03:01","j":"もうあのアラームのスヌーズ機能で、アラームを何度も鳴らしたやつは浮気と一緒ね。","c":"那种把闹钟的贪睡功能开着、让闹钟响好几次的人，跟出轨是一回事啊。","k":"スヌーズ機能（きのう） 何度も（なんども） やつ と一緒（といっしょ） で（手段）"},{"p":"kachikan","s":"LYZx8n0VOWg#03:05#0","t":"03:05","j":"確かに。","c":"确实。","k":"確かに（たしかに）"},{"p":"kachikan","s":"LYZx8n0VOWg#03:07#0","t":"03:07","j":"誰を連れてくる?","c":"要带谁来？","k":"連れてくる を（省略） 〜てくる"},{"p":"kachikan","s":"LYZx8n0VOWg#03:12#0","t":"03:12","j":"連れてくる?","c":"带（人）来吗？","k":"連れてくる"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#00:12#0","t":"00:12","j":"5月の真ん中ぐらいからドンって暑くなる日が突発的に来て、そのあと5月の下旬にはもうムシムシ始まって、梅雨があって、いやなんとか10月ぐらいまでは暑いと思うんで。","c":"从5月中旬左右开始，会突然一下子变热，然后到了5月下旬就已经开始闷热，接着梅雨来了，唉，反正一直热到10月左右吧。","k":"って（拟态词+って强调） 〜んで（〜ので的口语约音） ムシムシ"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#00:31#0","t":"00:31","j":"だから1年のうち半分が暑いのよ。","c":"所以一年里有一半的时间都是热的呀。","k":"〜のよ（终助词） 〜のうち"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#00:36#0","t":"00:36","j":"5、6、7、8、9、10でしょ。","c":"5、6、7、8、9、10月吧。","k":"〜でしょ（终助词，确认/征询同意）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#00:40#0","t":"00:40","j":"1年のうち半分が東京は暑いんですよ。","c":"一年里有一半的时间，东京都是很热的呀。","k":"〜んですよ（说明语气+丁寧体）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#00:43#0","t":"00:43","j":"ちょっとびっくりだよね。","c":"有点让人吃惊呢。","k":"〜だよね（终助词组合）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#00:45#0","t":"00:45","j":"だからもうさちょっとやり過ごすには長くない?","c":"所以呢，要这么熬过去也太长了吧？","k":"やり過ごす さ（间投终助词） 〜ない?（简体否定疑问反问）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#00:48#0","t":"00:48","j":"そう。","c":"是啊。","k":""},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#00:49#0","t":"00:49","j":"で、服どうするとかさ。この間、5月の下旬ぐらいだったから、あれ?この格好っていつも8月ぐらいにしなかったっけ、みたいな格好してたりがあって。","c":"然后，衣服要怎么穿也是个问题呢。前阵子——差不多是5月下旬的时候——(我)突然想「咦，这身打扮不是平常到8月左右才穿的吗」，就这样穿着这种打扮之类的。","k":"とか（举例/口语列举） っけ（终助词，回忆确认） 〜たりが（〜たりする的口语省略变形）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#01:04#0","t":"01:04","j":"なるよね。","c":"是这样呢/会变成那样吧。","k":"～よね"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#01:04#1","t":"01:04","j":"なるよね。","c":"是啊，是这样呢。","k":""},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#01:09#0","t":"01:09","j":"これは雑談の人桜林直子とコラムニストジェーンスーの雑談番組。","c":"这是由「闲聊人」桜林直子和专栏作家珍·苏主持的闲聊节目。","k":"○○の人"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#01:18#0","t":"01:18","j":"喫茶店でたまたま隣に座った人たちの話が耳に入ってきたな、ぐらいの感じでさくちゃんとスーさんの話を聞いてみましょう。","c":"就像在咖啡店里恰好坐在旁边的人们的对话不经意传进耳朵那种感觉，一起来听听沙酱和苏桑的对话吧。","k":"終助詞「な」 ～ぐらいの感じで"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#01:42#0","t":"01:42","j":"たくさんは読めないんだけど、目を通させていただいて、いくつかご紹介したいと思います。","c":"虽然不能全部都读完，但是我会先过目一下，介绍其中几篇给大家。","k":"～させていただく 目を通す"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#02:05#0","t":"02:05","j":"私は人といつも一緒にいたいわけでもないのに、先日友達のご夫婦と食事の約束をしていたのですが、旦那さんの体調不良で当日の30分前にドタキャンをされました。","c":"我并不是那种总想和人待在一起的人，可前几天和朋友夫妇约好了一起吃饭，结果对方丈夫身体不适，在当天前30分钟临时放了鸽子。","k":"～たいわけでもない のに ドタキャン ～をされました"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#02:21#0","t":"02:21","j":"その後、夫は「向こうがドタキャンしたんだから、向こうから声をかけてくるのが筋」","c":"在那之后，我丈夫说「既然是对方放的鸽子，按道理该由对方主动联系过来」——","k":"～んだから ～のが筋 声をかける"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#02:27#0","t":"02:27","j":"と言ってリスケすることもなく、ひと月が経ちました。","c":"说了那句话之后，也没有重新约（改期），就这样过了一个月。","k":"引用の「と」 リスケ（する）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#02:30#0","t":"02:30","j":"もうすぐ相手側の旦那さんの誕生日というタイミングになり、どうする?","c":"眼看就要到对方老公的生日了，这时该怎么办呢？","k":"動詞連用形の中止用法「なり」 タイミングになる"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#02:35#0","t":"02:35","j":"と聞いても、夫は「向こうがドタキャンしたんだから、向こうから声をかけてくるのが筋」という主張を変えず、","c":"即便这样问，丈夫依然不改变「是对方临时爽约的，所以理应由对方主动联系」这个主张，","k":"～ても ドタキャン ～のが筋だ 動詞未然形＋ず"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#02:43#0","t":"02:43","j":"私は、自分たちの誕生日を祝ってもらったのに、知らん顔をするのは悪いと思い、","c":"我觉得，明明对方帮我们庆祝了生日，我们却装作不知道是不好的，","k":"～てもらう 知らん顔（をする） 動詞連用形の中止用法「思い」"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#02:49#0","t":"02:49","j":"「旦那さんの誕生日だけど、何か考えてる?」","c":"「虽说是你老公的生日，你有什么打算吗？」","k":"～だけど ～てる（＝ている）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#02:51#0","t":"02:51","j":"と奥さんに連絡をしてみました。すると、","c":"我这样试着联系了对方妻子。结果，","k":"～てみる すると"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#02:54#0","t":"02:54","j":"「誕生日はみんなで集まりたい」という返事。","c":"得到的回复是「生日的话大家想聚一聚」。","k":"願望形 ～たい ～という＋名詞"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#02:57#0","t":"02:57","j":"では、なぜ連絡をしてくれなかったのか聞いてみると、","c":"那么，当我试着问为什么没联系我们时，","k":"～てくれる（否定形） ～と（条件の「と」）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#03:00#0","t":"03:00","j":"「旦那さんが、自分がドタキャンした手前、こちらからは誘いづらい。向こうから声をかけてくれるのを待とう」と言っているとのこと。","c":"据说老公表示：「因为是自己临时取消的，所以我们这边不太好意思主动邀请，还是等对方主动联系吧。」","k":"～た手前 形容詞化「～づらい」 意志形「待とう」 ～とのこと"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#03:08#0","t":"03:08","j":"結局、会いましょうということになったのですが、なんだか義理で誘ってるみたいな気分になってしまいました。","c":"结果最终决定要见面了，但总觉得好像是出于人情世故才邀请对方，心里有点不是滋味。","k":"～ということになる 義理で～ ～てしまう"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#03:25#0","t":"03:25","j":"と言われていて、会う時にはほとんどこちらから声をかけています。","c":"因为老公一直这样说，所以每次见面时，几乎都是我们这边主动联系对方。","k":"受身形＋ている ほとんど＋対比のニュアンス"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#04:10#0","t":"04:10","j":"本当に会いたい相手タイミングだったらそんなこと気にしないだろうにとうじうじ考えています。","c":"要是真的是想见的人、对的时机，应该就不会在意这种事了吧——我就这样犹犹豫豫地想个不停。","k":"〜だろうに うじうじ(と)考える"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#04:32#0","t":"04:32","j":"誘う誘われる問題。","c":"邀请与被邀请的问题。","k":"誘われる（受身形）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#04:34#0","t":"04:34","j":"やべえ。","c":"糟了。","k":"やべえ"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#04:34#1","t":"04:34","j":"1通目から全然分かんないの来た。","c":"从第一封信开始就收到完全看不懂的（信）。","k":"分かんない←分からない の（形式名詞）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#04:39#0","t":"04:39","j":"でもこのさどっちかに別れがちみたいなことは分かる?","c":"不过啊，那种「容易倾向其中一边」之类的感觉，你能懂吗？","k":"〜がち 〜みたいな"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#04:42#0","t":"04:42","j":"分かる。","c":"懂。","k":""},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#04:43#0","t":"04:43","j":"それは分かる。","c":"那个我懂。","k":"は（対比）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#04:44#0","t":"04:44","j":"それで言うとどっち?","c":"那这么说的话，你是哪一种？","k":"それで言うと"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#04:45#0","t":"04:45","j":"うん。","c":"嗯。","k":""},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#04:46#0","t":"04:46","j":"誘わないし誘われるのも嫌だ。","c":"我不主动约人，也讨厌被约。","k":"〜し〜し 誘われる（受身形）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#04:49#0","t":"04:49","j":"アハハハハハニュータイプ確かに。","c":"啊哈哈哈哈，新型人类，确实是这样。","k":"ニュータイプ"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#04:50#0","t":"04:50","j":"そうだねずうさん(?)はねいいんだよねなくてね。","c":"是啊，ずうさん(?)那边呢，没有的话也没关系呢。","k":"〜んだよね"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#04:53#0","t":"04:53","j":"寝なくていい。","c":"不睡觉也没关系。","k":"〜なくていい"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#04:55#0","t":"04:55","j":"必須のものだけ。","c":"只要必需的东西就好。","k":"必須のものだけ"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#04:56#0","t":"04:56","j":"そう。","c":"对。","k":""},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#04:56#1","t":"04:56","j":"誘われればうれしくて出ていくってことはまずない。","c":"就算被邀请，也几乎不会高兴地跑出去。","k":"誘われれば ってことは"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#05:00#0","t":"05:00","j":"そっか。","c":"这样啊。","k":""},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#05:01#0","t":"05:01","j":"よし会うぞみんなとっていう。","c":"也不会有那种「好，去见大家吧！」的劲头。","k":"っていう"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#05:03#0","t":"05:03","j":"別に会いたくないとか気にしてほしくないんだけどそうじゃなくて出不精。","c":"倒不是不想见面，也不是希望别人别在意，不是那样，而是——就是懒得出门。","k":"出不精（でぶしょう） 〜んだけど"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#05:09#0","t":"05:09","j":"集団出不精っていうとみんな太ってるみたいだけど集団で出かけるのがただやるとなったら","c":"说「集体宅家不出门」的话，听起来好像大家都很胖，不过——如果只是变成要跟一群人一起出门这件事……","k":"っていうと 〜みたいだけど"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#05:17#0","t":"05:17","j":"この間、韓国旅行を7人で行ったけど、（私が）仕切り上げた。","c":"前阵子7个人一起去了韩国旅行，结果全程都是我一个人把张罗的事儿包办到底。","k":"仕切り上げる"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#05:22#0","t":"05:22","j":"どっちでもないパターンもあるのね。","c":"也有两者都不是的情况呢。","k":"あんの（＝あるの）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#05:24#0","t":"05:24","j":"ただ、すごい分かんないのが、30分前にドタキャンして、夫は、向こうがドタキャンしたんだか、向こうが声をかけてきたんだか、曖昧な数字を言っている(?)、と。","c":"但特别搞不懂的是，说是30分钟前才放的鸽子，然后老公说的话是「到底是对方放了鸽子、还是对方主动约的」这种含糊、前后数字都对不上的说法(?)。","k":"～んだか～んだか ドタキャンして（て形）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#05:33#0","t":"05:33","j":"ひと月経過。","c":"过了一个月。","k":"経過（名词句末，省略した）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#05:34#0","t":"05:34","j":"もうすぐ（向こうの）誕生日で、こっちも（前に）祝ってもらったからということで(?)、夫は変わらず。","c":"眼看着（对方）生日快到了，想着「我们之前也承蒙对方祝贺过生日」，于是（想联系一下）——可老公还是老样子（没反应）。","k":"ということで 祝ってもらった"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#05:40#0","t":"05:40","j":"でも、自分の誕生日も祝ってもらったからと思って、向こうの配偶者の方、パートナーの方に連絡。","c":"不过想到「自己的生日对方也帮忙庆祝过」，于是联系了对方的配偶，也就是对方的伴侣。","k":"～と思って"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#05:46#0","t":"05:46","j":"そうすると、「みんなで集まりたいけど、自分がドタキャンしてるためにこっちから誘いづらいから、向こうから声をかけるのを待とう」と夫が言っている。","c":"结果老公却说「虽然想大家聚一聚，但因为是自己放了鸽子，不好意思主动约，所以还是等对方主动开口吧」。","k":"そうすると ～づらい 待とうと（意志形+と）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#05:56#0","t":"05:56","j":"「お前らって話じゃない。」","c":"「这哪是你们（该纠结）的事啊。」","k":"～って話じゃない"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#05:59#0","t":"05:59","j":"旦那たちめ、っていう。","c":"真是的，这帮当丈夫的……（吐槽）。","k":"～め ～っていう（＝という）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#06:04#0","t":"06:04","j":"そこに意識しすぎじゃない?","c":"是不是太在意那一点了？","k":"～すぎる ～じゃない?（反问）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#06:08#0","t":"06:08","j":"まず一個一個言ってくね。","c":"我先一条一条地说啊。","k":"～ていく→～てく"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#06:09#0","t":"06:09","j":"そういうふうに聞いてほしいメールじゃないと思うんだけど、すごい気になる。","c":"我觉得写信人应该不是想听这种意见的，可我就是特别在意。","k":"～てほしい ～んだけど"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#06:14#0","t":"06:14","j":"でまあ、うちのもね、「お高い、なんか面倒くさいね、男!」とか言って、自分たちでパパッと決めて会っちゃえばいいと思うわけ。","c":"话说回来，我家那位也是，我就会吐槽「真是的，男人怎么这么麻烦」，然后觉得干脆自己俩三下五除二定好，直接见面不就完了。","k":"お高い 決めて会っちゃえばいい ～と思うわけ"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#06:24#0","t":"06:24","j":"そもそも夫がそうやって言ってても、自分の友達だったら、「ちょっとこうやって言ってんだけど、どうする?」とかって。","c":"说到底，就算老公那么说，要是自己的朋友，我大概会问一句「他是这么说的，你打算怎么办？」之类的。","k":"言ってても（＝言っていても） ～んだけど（疑问前铺垫）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#06:32#0","t":"06:32","j":"私だったら、たぶん向こうのパートナーの人に電話しちゃう。「どうしましょう、これ」って言って。","c":"要是我的话，大概会直接打电话给对方的伴侣，说一句「这可怎么办呀」。","k":"電話しちゃう ～だったら"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#06:38#0","t":"06:38","j":"「体調どう?」とか。","c":"「身体还好吗？」之类的问候。","k":"とか（列举语气）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#06:39#0","t":"06:39","j":"あともしくは、こっちの、向こうの私がパートナーの人だったら、相手側の、相方側の人がパートナーだったら…ごめん、この間。","c":"或者说，这边——如果换成我是对方的伴侣的话，如果对方那边、也就是搭档那边的人是伴侣的话……抱歉，是前几天的事。","k":"〜だったら の＋ね（間投）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#06:47#0","t":"06:47","j":"でも結局大丈夫だったみたいな。","c":"不过结果好像还是没事。","k":"〜みたいな"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#06:49#0","t":"06:49","j":"それが欲しいっていうのはなんとなく分かるけどね。","c":"想要那样（联系一下）的心情，我多少能理解啦。","k":"っていうのは けどね"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#06:51#0","t":"06:51","j":"連絡してちょっと仕切り直しをお願いしますって言う。","c":"就是联系对方，说一句『麻烦重新安排一下』这种（做法）。","k":"お願いします 仕切り直し"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#06:55#0","t":"06:55","j":"それがなかったときにさ、結局別に会わなくていいのかなってなっちゃう気持ちは分かる。","c":"如果没有那样的（联系）的话，最后就会变成『那干脆不见面也行吧』这种心情，这个我能理解。","k":"〜ちゃう 〜かな＋って"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#07:01#0","t":"07:01","j":"それは分かる。","c":"那个我懂。","k":"は（対比）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#07:02#0","t":"07:02","j":"でも気にしてるのかな、あの人たち誘われたって言ってたし、とかって言って。","c":"不过（对方）是不是还挂心呢，『那些人说自己被邀请了』之类的，会这样想。","k":"誘われた とか（って言って）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#07:06#0","t":"07:06","j":"こっちから連絡するのもできる。","c":"从这边主动联系一下也是可以的。","k":"こっちから"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#07:08#0","t":"07:08","j":"まあできるね。","c":"嗯，也是可以的呢。","k":"ね（同意確認）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#07:08#1","t":"07:08","j":"大丈夫だった?みたいな。","c":"就像是『还好吗？』这样问一句。","k":"〜みたいな（例示）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#07:10#0","t":"07:10","j":"そうそう。","c":"对对。","k":""},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#07:12#0","t":"07:12","j":"義理で誘ってるみたいな。結局自分は大して会いたくもない相手に会っちゃったのかな、一生懸命みたいなこと？これは。","c":"是不是这种感觉——出于人情邀请，结果自己拼命去见了个其实不太想见的人？就是这个意思吧？","k":"義理で 会っちゃった"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#07:18#0","t":"07:18","j":"そうだと思う、多分。","c":"我觉得是这样，大概。","k":"多分（文末）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#07:20#0","t":"07:20","j":"でも誕生日だからさ、会えてよかったね、またって言って。","c":"不过毕竟是生日嘛，就会说『能见到面真好，下次再约』之类的话。","k":"会えて から（理由）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#07:26#0","t":"07:26","j":"だからそもそもこのご夫婦、ご夫婦の4人でみんなが100パー、みんながみんなに会いたいって言うことって、多分そんなにないんだろうね。","c":"所以说到底，这两对夫妻、四个人当中，大家百分百都想见到彼此这种事，大概没那么常见吧。","k":"100パー 〜んだろうね"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#07:36#0","t":"07:36","j":"誕生日会を祝うっていうのって、自然に続く役(?)と途中でなくなるやつ、あるじゃない。","c":"庆祝生日这件事，有『自然而然一直延续下去』的和『中途就没了』的两种情况，对吧？","k":"じゃない やつ"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#07:43#0","t":"07:43","j":"自然に続くやつは自然じゃなくて、実はちゃんと毎回みんなに声をかけてくれる人がいるのよ。","c":"看起来自然而然延续下去的，其实并不是『自然』，而是真的有人每次都好好招呼大家。","k":"声をかけてくれる"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#07:50#0","t":"07:50","j":"すごい仲がいいからとか、すごく気が合うからとかじゃないのよ。","c":"并不是因为关系特别好，或者特别合得来什么的。","k":"とか〜とか 気が合う"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#07:55#0","t":"07:55","j":"ちゃんとみんなの誕生日を覚えてくれる人がいるだけなのよ。","c":"只是因为有人好好记得大家的生日而已。","k":"覚えてくれる 〜だけなのよ"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#08:01#0","t":"08:01","j":"その人たちは誘うことに対して、私ばっかりみたいなことはないんだよね。","c":"那些人对于邀请这件事，不会有『总是只有我在张罗』这种想法呢。","k":"に対して 〜ばっかり"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#08:06#0","t":"08:06","j":"私、多分どっちかというと誘う側なのね。","c":"我啊,大概算是比较偏向主动约人的那一方吧。","k":"どちらかというと のね(终助词)"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#08:11#0","t":"08:11","j":"7:3ぐらいで誘う側なのね。","c":"大概是7比3(的比例)算主动约人的一方。","k":"数字表比例(7:3) なのね"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#08:13#0","t":"08:13","j":"それってさ、むしろ私が誘わないと会わないっていう組み合わせというのは確かにあるけど。","c":"那个啊,确实也有那种如果不是我主动约、就完全不会见面的组合关系(?),这倒是真的有,不过……","k":"誘わないと(ば/と条件形) 組み合わせ"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#08:24#0","t":"08:24","j":"それってそういう組み合わせだから、向こうも「来た来た、いつもの連絡」みたいな感じで乗っかるみたいな。","c":"那是因为是这样的组合关系,所以对方也是抱着「哦,又来了,老套路的联络」这种感觉顺势接受的吧。","k":"乗っかる みたいな(句末)"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#08:33#0","t":"08:33","j":"そこに私ばっかり誘ってるってことは向こうは会いたくないのかなって思わない?","c":"这样一直都是我在约,你不觉得会让人觉得对方其实不太想见面吗?","k":"って(引用/主题化) ばっかり"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#08:42#0","t":"08:42","j":"予定出すねって言って連絡来なかったらこれ会いたくないなと思うけど。","c":"如果我说「我来提日期哦」,结果对方没回联系,那我就会觉得对方是不是不想见面了,不过……","k":"来なかったら(たら形) 予定を出す"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#08:48#0","t":"08:48","j":"あと、言う。うちばっかり誘ってるから誘って、みたいな。","c":"还有啊,(心里)会想「总是我在约,你也约一下嘛」这种话(?)。","k":"から(原因) うち(第一人称)"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#08:54#0","t":"08:54","j":"でもいるんだよな。","c":"不过啊,确实是有这种人的。","k":"んだよな"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#08:56#0","t":"08:56","j":"誘うの苦手だから誘ってねって言ってる人って本当にそのままそれでしかないから、それで誘ってくれなくなってもしょうがないじゃんね。","c":"那种因为不擅长主动约人、所以说「你要约我哦」的人啊,真的就只是那样而已,所以就算后来没人约他们了那也没办法吧。","k":"〜でしかない 誘ってくれなくなっても じゃんね"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#09:11#0","t":"09:11","j":"分かるよ、分かるけどちょっとサボってるよね。","c":"我懂,我懂,但那样也有点太偷懒了吧。","k":"けど(逆接) サボる"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#09:14#0","t":"09:14","j":"まあまあ、そうだね。","c":"嗯嗯,也是啦。","k":""},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#09:15#0","t":"09:15","j":"でも、そのリスクを負ってんじゃないの。","c":"不过,那也是他们自己承担着这个风险吧?","k":"負ってんじゃないの リスクを負う"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#09:17#0","t":"09:17","j":"それで友達いなくなってもいいっていうことなんじゃない?","c":"也就是说,即使因此没有朋友了也无所谓,是这个意思吧?","k":"いなくなってもいい ということなんじゃない?"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#09:21#0","t":"09:21","j":"分かんない。","c":"不知道啦。","k":"分かんない(音便)"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#09:22#0","t":"09:22","j":"誘ってほしいと思ってないから私は。ひどい言い方だけど誘ってほしいと思ってないから。","c":"因为我自己是不希望别人来约我的。虽然这么说有点过分,但我就是不希望被约。","k":"てほしい 私は(倒装/后置主语)"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#09:30#0","t":"09:30","j":"誘うの苦手だから誘ってねっていうのはまあ確かに相手に渡してるよ。","c":"『我不擅长主动约人，所以你要约我哦』——这么说的话，确实是把（约人的）责任交给对方了。","k":"っていうのは 苦手 てる（＝ている的口语缩约）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#09:36#0","t":"09:36","j":"そう。","c":"是啊。","k":"そう（相槌）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#09:36#1","t":"09:36","j":"だからもう会うのやめられたらいいじゃん、任意(?)ね。","c":"所以要是能干脆不再见面就好了呗，随意就好(?)。","k":"やめられたら（可能形+たら） じゃん"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#09:42#0","t":"09:42","j":"すっごい会いたい時以外は会わなきゃいいんだよね。","c":"除了特别想见的时候以外，不见也没关系吧。","k":"なきゃ（＝なければ） んだよね"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#09:44#0","t":"09:44","j":"そうそうそう。","c":"对对对。","k":"そう的重复（そうそうそう）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#09:44#1","t":"09:44","j":"誕生日はもうなしでいいんじゃない?","c":"生日什么的干脆不过也行吧？","k":"んじゃない? なしで"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#09:46#0","t":"09:46","j":"っていうのは何でかっていうと義務化した時の会合ほどつまんないものはないかな。","c":"为什么这么说呢，是因为没有比变成义务性质之后的聚会更无聊的事了吧。","k":"ほど～ない 義務化 つまんない（＝つまらない）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#09:51#0","t":"09:51","j":"ああそうだよ。","c":"啊对啊。","k":"だよ"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#09:52#0","t":"09:52","j":"4人ともつまんないなら会わなくていいよね。","c":"如果四个人都觉得无聊的话，那不见面也行吧。","k":"なくていい とも"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#09:54#0","t":"09:54","j":"スケジュールを合わせるとかいう時にえっみんな何?これ何のために集まってんのみたいになる時があるのは分かる。","c":"在协调大家日程的时候，会有『咦，大家是怎么回事？这到底是为了什么聚在一起』这种感觉的时候，这我能理解。","k":"みたいになる 集まってんの（＝集まっているの）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#10:01#0","t":"10:01","j":"そういう回は私はやめちゃってる。","c":"那种局（聚会），我已经不参加了。","k":"ちゃってる（＝てしまっている）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#10:03#0","t":"10:03","j":"まあ自然になくなるよ。","c":"嘛，自然而然就没了呀。","k":"自然に"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#10:05#0","t":"10:05","j":"でも誘いたい人は誘う。向こうが忙しくても予定を出してくださいって言って。","c":"但是想邀请的人我还是会约。就算对方很忙，也会说『请把日程给我』这样。","k":"ても（逆接） 出してください"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#10:11#0","t":"10:11","j":"会いたいっていう気持ちのお誘いと誘うじゃないお誘いって何か分かる気がするけどな。","c":"出于『想见你』这种心情的邀约，和并非真心想约的邀约，这两者的区别我好像能感觉出来。","k":"お誘い 気がする"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#10:18#0","t":"10:18","j":"でも相手のご夫婦はすごいあれだったんだよ、多分ね。","c":"不过对方那对夫妻当时应该是相当『那个』（不太好说）的状态吧，大概。","k":"あれ（曖昧指示） ご夫婦"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#10:23#0","t":"10:23","j":"おんぶにだっこだったんだよね、今までね。","c":"一直以来都完全是（我们）被依赖着、全靠着（我们）的状态呢。","k":"おんぶにだっこ"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#10:25#0","t":"10:25","j":"金曜日、きみさんがなんでやねんってなるのも分かる。","c":"星期五的时候，Kimi桑会吐槽『为什么啊』，这我也能理解。","k":"なんでやねん ってなる"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#10:31#0","t":"10:31","j":"ただそれをなんで私ばっかりだとか、相手に悪いからっていう気持ちで声をかけちゃって本当に会いたい人じゃなかったんじゃないかみたいなことは悩まなくていい。","c":"但对于『为什么总是只有我』，或者『是不是因为过意不去才叫上对方的，其实并不是真正想见的人』之类的想法，不必去烦恼。","k":"ばっかり かけちゃって（＝かけてしまって） んじゃないか"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#10:42#0","t":"10:42","j":"大丈夫、そんなこともあるよ。","c":"没事的，这种事也是有的呀。","k":"そんなこともある"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#10:46#0","t":"10:46","j":"4人とかって難しい、無理だもんな。","c":"四个人这种（组合）真的很难，根本不可能嘛。","k":"とかって もんな（＝ものだな）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#10:50#0","t":"10:50","j":"ご夫婦だからまだあれだけどばらばら4人だと結構難しいよね。","c":"因为是夫妻，还算好一点（那个），但如果是各自独立的四个人，就相当难了。","k":"だと（条件） ばらばら"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#10:54#0","t":"10:54","j":"みんなが同じ気持ちっていうのは難しいよね。","c":"大家都抱有同样的心情，这是很难的呢。","k":"っていうのは（総括）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#11:10#0","t":"11:10","j":"私は最近、この番組を知り、エピソード1から追っかけて聞いています。","c":"我最近才知道这个节目，从第1集开始一直追着听。","k":"知り（連用中止形） 追っかけて聞く"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#11:15#0","t":"11:15","j":"話は変わりますが、お聞きしたいことがあります。","c":"换个话题，我有件事想请教一下。","k":"お聞きしたい 話は変わりますが"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#11:17#0","t":"11:17","j":"お二人は爆発的な怒りを持ったとき、そしてそれを表現するとき、相手との関係が壊れないようにどんな工夫をしていますか。","c":"二位在有爆发性的怒气、以及要把它表达出来的时候，为了不破坏和对方的关系，会做什么样的调整呢？","k":"持った 壊れないように 工夫をする"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#11:27#0","t":"11:27","j":"よく言われるアンガーマネジメントでは6秒待って要点だけを伝えるのがいいとされていると思います。","c":"常听说的「愤怒管理」里说，等6秒之后只传达要点是比较好的做法，我是这么理解的。","k":"言われる ～とされている と思います"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#11:49#0","t":"11:49","j":"仕事なのか友達なのかもっと近い人なのかによるけど。","c":"得看是工作关系、朋友、还是更亲近的人而定啦。","k":"AなのかBなのか～によるけど による"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#11:55#0","t":"11:55","j":"私も昔は怒りを抑圧して我慢して、時が過ぎるのを待つというか、怒っちゃいけないとか思ってたんだよ、昔は。","c":"我以前也是压抑怒气、忍着，与其说是在等它过去，不如说是觉得「不能生气」什么的，以前是这样。","k":"怒っちゃいけない というか 思ってたんだよ"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#12:03#0","t":"12:03","j":"みっともないというか、怒ると損みたいな。","c":"觉得（生气）很丢人，或者说生气就吃亏那种感觉。","k":"～みたいな 怒ると"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#12:07#0","t":"12:07","j":"なぜなら私が怒られるのがすごい嫌いだったからなんだよね。","c":"因为我非常讨厌被别人骂（被人生气对待）这件事。","k":"怒られる からなんだよね"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#12:11#0","t":"12:11","j":"だから、あんまり怒られたくないから怒らないみたいな感じで怒ってなかったんだけど、最近はフレッシュに小出しするみたいな感じになった。","c":"所以就是因为不太想被骂，所以以前是那种不生气的感觉，不生气的状态，不过最近变成了趁情绪新鲜的时候一点点释放出来的感觉。","k":"怒られたくない 怒ってなかった フレッシュに小出しする"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#12:21#0","t":"12:21","j":"ちょっとずつ出していくってこと?","c":"就是说要一点一点地说出来吗？","k":"〜ってこと? 出していく（复合动词）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#12:22#0","t":"12:22","j":"鮮度が高いほうがいいかな、なるべく早く言えるっていう。","c":"大概是新鲜度高一点比较好吧，就是尽量能早点说出来的意思。","k":"鮮度が高い（比喻用法） 言える（可能形）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#12:28#0","t":"12:28","j":"ただ、相手との関係が壊れないようにする工夫が知りたいんだろうね。","c":"只不过，对方应该是想知道怎样才能不破坏和对方的关系吧。","k":"〜ないようにする 〜んだろうね"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#12:33#0","t":"12:33","j":"それもフレッシュなほうが、例えばさ、目の前で言われて爆発的な怒りになる前にっていう感じなんだけどね。","c":"这个也是趁新鲜比较好，比如说，是在当着面被说出来、变成爆发性愤怒之前先说的那种感觉。","k":"目の前で言われる 〜前に"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#12:43#0","t":"12:43","j":"え、ちょっと、とか、えっ、今の?","c":"「诶，等一下」啦、「诶，刚才那个？」这样的反应。","k":"感叹词+とか（列举语气）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#12:46#0","t":"12:46","j":"みたいな感じで早めに言うと、「ごめんごめん、早いじゃん」ってなるんだけど、一晩たってから「あれってどういう意味だったんだろう」とか思って、「昨日のあれってさ」みたいな感じで言うと、ちょっと怒りになるから、フレッシュに言うみたいなのが最近は気をつけてることだけど。","c":"如果用这种感觉早点说出来，就会变成「抱歉抱歉，说得太早了吧」这样；但如果隔了一晚之后才想「那句话到底是什么意思啊」，然后用「昨天那件事啊」这种感觉说出来，就会变得有点生气，所以尽量趁新鲜说出来，是我最近比较注意的事。","k":"〜じゃん 〜てから みたいな感じで"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#13:05#0","t":"13:05","j":"どうしてる?","c":"你是怎么做的？","k":"〜してる（〜している的口语略读）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#13:06#0","t":"13:06","j":"爆発的な怒りだよ。","c":"是爆发性的愤怒啊。","k":"〜だよ"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#13:08#0","t":"13:08","j":"一瞬で爆発的な怒りになることって、実は少ないと思う。","c":"其实一瞬间就变成爆发性愤怒的情况，我觉得很少。","k":"〜ってこと/って（话题提示） 実は"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#13:13#0","t":"13:13","j":"蓄積されて、気が付いたらパンパンになって、我慢できなくなった時にボーンと切れるみたいなことじゃない?","c":"是不是那种不断累积，等回过神来已经胀得满满的，等忍不下去的时候「砰」地一下爆发出来的感觉？","k":"蓄積される（受身形） 切れる（惯用表达：情绪爆发） 〜じゃない?（确认/反问）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#13:21#0","t":"13:21","j":"私の場合はまさこちゃん(?)と同じように、不快感はなるべく早めに出すっていうのをやってるんだけど。","c":"我的情况是，和まさこ小姐一样，也是尽量把不愉快的感觉早点表达出来，不过……","k":"〜と同じように 〜んだけど"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#13:27#0","t":"13:27","j":"不快感はなるべく早めに出す時に気をつけてることとしては、私はデフォルトが怖いので、大体の人に怖がられる。","c":"在尽量早点表达不愉快感时，我注意的一点是：我本身默认状态就给人一种可怕的感觉，所以大部分人都会怕我。","k":"〜としては 怖がられる（怖がる的被动形）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#13:36#0","t":"13:36","j":"普通にしてるだけでも怖がられるというのが自分の特性としてあるので、怖くならないようにするというのがまず1つ。","c":"光是普普通通地待着就会被人觉得可怕，这是我自身的一个特点，所以首先第一点就是尽量不要让自己显得可怕。","k":"〜だけでも 〜というのが〜としてある"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#13:45#0","t":"13:45","j":"そうそう。怖かったみたいになっちゃうともっとこっちが悪くなっちゃうじゃん。","c":"对对。要是变成一副『好像很凶』的样子，反而会显得我们这边更没理吧。","k":"じゃん 〜っちゃう"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#13:50#0","t":"13:50","j":"でも怒ってるんだから、怖かったはいいんじゃないの。","c":"可是既然本来就是在生气，显得凶一点不也挺正常的吗？","k":"〜んだから 〜はいいんじゃないの"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#13:54#0","t":"13:54","j":"程度問題なんだよ。すごい怖いんだよね多分私。","c":"这是个程度问题。我大概真的挺吓人的。","k":"程度問題 〜んだよね"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#13:59#0","t":"13:59","j":"だから怖くしないっていうのが1つと、あとは怒りがあった時に怒りを抑えると、何が漏れてくるかというと嫌みが漏れるんですよ。","c":"所以一是不让自己显得凶，另外呢，有怒气的时候如果把怒气压下去，会漏出什么？会漏出讽刺挖苦的话。","k":"〜っていうのが1つと 〜と 何が〜かというと"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#14:13#0","t":"14:13","j":"嫌みは絶対言わないようにしてる。","c":"讽刺挖苦的话我绝对不让自己说。","k":"〜ようにしてる"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#14:16#0","t":"14:16","j":"それは仕事関係の人でも友達でもパートナーでも家族でもそうだけど、嫌みを言って物事が好転(?)したためしがないなっていうふうに、ようやく気が付いて。","c":"不管是工作上的人、朋友、伴侣还是家人都一样，我终于意识到，说讽刺话从来没让事情变好过（这一点)。","k":"〜でも〜でも 〜たためしがない 気が付いて"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#14:32#0","t":"14:32","j":"嫌みを言わないようにしたら、「嫌みを言う人っているんだな」っていうのに、すごい気が付いて。","c":"不说讽刺话之后我才发现，原来真的有人会说讽刺挖苦的话，这一点我深有体会。","k":"〜たら 〜のに"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#14:38#0","t":"14:38","j":"そっか。","c":"是这样啊。","k":""},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#14:39#0","t":"14:39","j":"嫌みね。","c":"讽刺挖苦啊。","k":"〜ね"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#14:41#0","t":"14:41","j":"わざと私がイラッとするような言い方をしてるなとか。","c":"就是那种故意用会让我很烦躁的说法说话，之类的。","k":"〜ような言い方 とか"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#14:45#0","t":"14:45","j":"それってさ、怒りを伝えてんのかな。","c":"那个啊……那其实是在传达怒气吗？","k":"〜てんのかな"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#14:47#0","t":"14:47","j":"何かもうねじれちゃってるよね。","c":"总觉得已经变得很扭曲了呢。","k":"〜ちゃってる"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#14:49#0","t":"14:49","j":"相手は例えばもっとかまってほしいとか、もっとそこにあるのはうまくいってない自分と比較されたくないとか、何かいろいろその人が持ってるネガティブなところがあるわけでしょ。","c":"对方可能是想要更多关心，或者是不想被拿来跟自己『不顺利的那部分』作比较之类的，反正对方心里总归有各种各样的负面情绪吧。","k":"〜てほしい 〜たくない 〜わけでしょ"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#15:04#0","t":"15:04","j":"あと仕事のこととかだと、同じ間違いをまたやったみたいなこととかそれを嫌みでやると、向こうにダメージを与えられるんだけど。","c":"还有工作上的事，比如『又犯了同样的错误』这种事，如果用讽刺的方式说出来，是能给对方造成伤害的，不过……","k":"〜みたいな 〜と 与えられる"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#15:16#0","t":"15:16","j":"関係は絶対好転しないんだよね。","c":"关系是绝对不会好转的哦。","k":"んだよね"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#15:18#0","t":"15:18","j":"そこだね。この関係を割れないようにするためには、っていうのは、嫌み言わない、はそうかもね。","c":"就是那一点吧。为了不让这段关系破裂——说的应该就是「不说带刺的话」，也许是这样吧。","k":"割れないように っていうのは"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#15:23#0","t":"15:23","j":"で、我慢して後から言う時の問題って何があるかっていうと、いや、その方がいい時もあるよ。","c":"那，忍着、之后再说的话会有什么问题呢——不，那样做有时候也是好的哦。","k":"〜って何があるかっていうと 我慢して"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#15:30#0","t":"15:30","j":"一回時間置いた方がいい時もあるから。あっ、私今すごい感情にドライブされちゃってるから、一回落ち着いて感じようみたいな時もある。","c":"有时候先隔一段时间比较好。啊，因为我现在整个人被情绪牵着走，有时候就会想先冷静下来感受一下。","k":"ドライブされちゃってる 感じよう"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#15:38#0","t":"15:38","j":"だけど我慢して我慢して抑制してた先に何があるかっていうと、結局、向こうがこっちのペースにはついてこないじゃん。","c":"但是，一直忍耐、一直忍耐、压抑到最后会有什么结果呢——结果就是，对方根本跟不上我这边的节奏啊。","k":"我慢して我慢して じゃん"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#15:50#0","t":"15:50","j":"こっちはずっと我慢してるから、ものすごいブレーキを踏んでたんだけど、向こうは突然、降って割れた感じ。","c":"我这边一直在忍，死死踩着刹车，结果对方却突然像情绪爆发（崩溃）了一样(?)。","k":"踏んでたんだけど ブレーキを踏む"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#15:57#0","t":"15:57","j":"より怒らせてくるわけよ、こっちを。","c":"反而更让我这边生气了呀。","k":"怒らせて わけよ"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#15:59#0","t":"15:59","j":"「はあ?」みたいな話になって、そこでバーンといくとよくないので。","c":"变成『啊？』这种局面，这时候如果『砰』地一下爆发出来就不好了……","k":"みたいな話になって バーンといく"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#16:11#0","t":"16:11","j":"そっか。","c":"是这样啊。","k":""},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#16:11#1","t":"16:11","j":"感情をありのまま表出させるのが悪っていうよりは、私。","c":"与其说把情绪原原本本地表现出来是「坏事」，不如说我……","k":"表出させる 〜っていうよりは"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#16:15#0","t":"16:15","j":"怒られるのキライ勢だから分かるんだけど。","c":"因为我是「讨厌被骂」的那一挂人，所以能理解……","k":"怒られる 〜勢"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#16:19#0","t":"16:19","j":"感情をぶつけられるのは確かに嫌なのね。","c":"情绪被直接砸过来，这一点确实讨厌。","k":"ぶつけられる 〜のね"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#16:21#0","t":"16:21","j":"だけど何で怒ったかは知りたいのね。","c":"但是我还是想知道对方为什么生气。","k":"何で怒ったかは"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#16:24#0","t":"16:24","j":"だからそこを切り分けるっていうのは大事かもしれないですね。","c":"所以把这两点区分开来看，也许是很重要的。","k":"切り分ける かもしれないですね"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#16:29#0","t":"16:29","j":"我慢してるっていうのが、すごい短い言葉だけど伝わってくるよね。","c":"『我在忍着』这句话虽然很短，但那种感觉还是能传达过来的吧(?)。","k":"伝わってくる よね"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#16:35#0","t":"16:35","j":"ただ我慢していると何がよくないって、例えば向こうがばかにしたつもりはないのにばかにされたと思うとか、仲間外れにしたわけじゃないのにたまたま教えただけなのに仲間外れにされたと思うとか、被害意識がすごい強くなるから。","c":"只是一味忍耐的话，不好的地方在于：比如对方明明没打算嘲笑你，你却觉得被嘲笑了；明明不是故意把你排除在外，只是碰巧没告诉你，你却觉得被排挤了——这样一来，被害意识就会变得非常强烈。","k":"〜のに 〜つもりはない 〜とか（列挙）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#16:52#0","t":"16:52","j":"それでちょっとずれていくんですよね。","c":"这样一来，就会渐渐产生偏差呢。","k":"ずれていく 〜んですよね"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#16:55#0","t":"16:55","j":"でもその場でポン(?)と言うのはあまりおすすめしない。","c":"不过不太建议当场就（脱口而出般地）说出来。","k":"でも その場で〜"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#16:59#0","t":"16:59","j":"よほどだよね。","c":"那得是相当严重的情况了吧。","k":"よほど 〜だよね"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#17:01#0","t":"17:01","j":"身の危険を感じる。","c":"感觉到人身安全受到了威胁。","k":"身の危険を感じる"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#17:03#0","t":"17:03","j":"ものすごい小さいこと言われるとか。","c":"比如被说了一些鸡毛蒜皮的小事之类的。","k":"ものすごい+形容词 〜とか"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#17:05#0","t":"17:05","j":"だけど、その場でポン(?)と言うのはおすすめしないけど…","c":"不过呢，虽然不太建议当场就脱口而出，但是——","k":"だけど〜けど"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#17:09#0","t":"17:09","j":"我慢するなら伝え方かな。","c":"如果要忍耐的话，那问题大概就在于表达方式了吧。","k":"〜なら 〜かな"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#17:13#0","t":"17:13","j":"伝え方だね。","c":"是表达方式呢。","k":"〜だね"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#17:15#0","t":"17:15","j":"何を伝えたいかによるよね。","c":"这取决于你想传达什么呢。","k":"〜によるよね 何を伝えたいか"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#17:16#0","t":"17:16","j":"私は怒ったってことを伝えたいのか、それをされて嫌だったってことを伝えたいのかでも変わると思うから。","c":"我觉得，是想传达「我生气了」这件事，还是想传达「被这样对待我很不高兴」这件事，光是这个（表达方式）就会不一样。","k":"〜って 〜のか〜のか"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#17:23#0","t":"17:23","j":"難しいけどね。","c":"虽然很难呢。","k":"〜けどね"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#17:25#0","t":"17:25","j":"お二人は2人の怒りの表現について、どう思いますか？","c":"两位对于（自己）愤怒的表达方式，是怎么想的呢？","k":"〜について どう思いますか"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#17:29#0","t":"17:29","j":"でもなめられたみたいなやつにはチッてやるけど…","c":"不过要是遇到那种感觉被小看了的情况，我会「啧」一声表示不满，不过——","k":"なめられたみたいな 〜けど"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#17:33#0","t":"17:33","j":"それで失敗もするけど、近い人だったら…","c":"那样做也会有失败的时候，不过如果是关系亲近的人的话——","k":"〜だったら 〜も"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#17:38#0","t":"17:38","j":"我慢はしないかな。","c":"大概不会忍耐吧。","k":"〜かな"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#17:41#0","t":"17:41","j":"我慢って強いられるものじゃん。","c":"忍耐这种事，本来就是被迫的呀。","k":"〜って（主题提示） 強いられる 〜じゃん"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#17:44#0","t":"17:44","j":"相手によって。","c":"要看对方是谁。","k":"〜によって"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#17:45#0","t":"17:45","j":"状況に強いられるもの。","c":"是被状况所迫的（东西）。","k":"強いられる"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#17:49#0","t":"17:49","j":"だけど選択するかな、言わないんだとしたらそこは。","c":"不过如果是选择不说的话，那部分大概是可以选择的吧。","k":"〜んだとしたら 選択する"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#17:51#0","t":"17:51","j":"自分で言わないって決めて言わないと。","c":"如果自己决定了不说，那就得真的做到不说。","k":"〜って（引用） 〜ないと"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#18:13#0","t":"18:13","j":"私は大人になるにつれストレス耐性が下がっているなと感じています。","c":"我觉得自己随着长大，压力承受能力在下降。","k":"～につれ ストレス耐性が下がる ～な＋と感じる"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#18:18#0","t":"18:18","j":"自分で選べるようになってからですが、少しずつ自分の周りを心地よいもので固めていった結果、ちょっとのストレスに過敏に反応してしまうようになりました。","c":"大概是从能自己做选择开始，渐渐把周围都布置成让自己感到舒适的环境，结果变得对一点点压力都过敏地做出反应。","k":"～ようになる ～ていった 心地よい ～てしまう＋ようになる"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#18:35#0","t":"18:35","j":"プライベートはすごく伸び伸びと過ごせるけど、仕事では嫌な人でも関わらないといけない場面が多いから、転職はすれどずっと今の業種で働いてきているので視野が狭く、自分に合った仕事がどんななのか、そもそも今の業種以外でどんな仕事があるのかなどの探し方から迷子になっています。","c":"私生活可以过得很自在，但工作中即使对方是讨厌的人也不得不打交道的场面很多，虽说也换过工作，但一直都在现在这个行业里工作，视野很狭窄，不知道适合自己的工作是什么样的，甚至连现在这个行业以外还有什么工作都不知道该从何找起，感觉像迷路了一样。","k":"伸び伸び(と) ～すれど ～から（原因） 視野が狭い"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#18:58#0","t":"18:58","j":"さくちゃんとスーさんの雑談を聞いていると、私が言語化できていなかったり、もやっとしかイメージできていないことが、すっと視界が広がるみたいにふに落ちることが多くて、とても参考になります。","c":"听着小樱和小酥聊天，我那些说不清楚、只有模糊印象的想法，常常会像视野一下子豁然开朗那样“恍然大悟”，非常有参考价值。","k":"腑に落ちる もやっと ～たり（单举） ～みたいに"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#19:11#0","t":"19:11","j":"何から手をつけていいか分からないから、何からでも手をつけてみようと思います。","c":"因为不知道该从哪里下手，所以我想不管从哪里都先试着动手做做看。","k":"手をつける 疑问词＋か分からない ～てみよう"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#19:16#0","t":"19:16","j":"季節の変わり目、湿気の多い季節がやってきますね。","c":"又到了换季的时节，潮湿的季节要来了呢。","k":"季節の変わり目 ～ね（终助词）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#19:19#0","t":"19:19","j":"体調に気をつけてお過ごしください。","c":"请多注意身体，保重。","k":"お～ください 体調に気をつける"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#19:21#0","t":"19:21","j":"これからも雑談を楽しみにしています。","c":"今后也会一直期待你们的闲聊节目。","k":"～を楽しみにする ～にしています"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#19:29#0","t":"19:29","j":"心地よくするのを知った結果、ちっちゃなストレスにも過敏になってしまう。","c":"知道了怎样让自己舒服之后，结果反而对小小的压力也变得过敏了。","k":"〜てしまう にも"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#19:35#0","t":"19:35","j":"それは分かる。","c":"这个我懂。","k":""},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#19:36#0","t":"19:36","j":"まあ分かるね。","c":"嗯，还是能懂的啦。","k":"ね"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#19:37#0","t":"19:37","j":"ただすっごい分かるし本当そのとおりなんだけど、すごい我慢してるところもあるんだろうと思って今聞いてて。","c":"只是我真的超懂，而且完全就是那样，不过我刚才边听边在想，你其实也有很多在硬忍着的地方吧。","k":"〜てる（ている的口语约音） 〜んだろうと思って"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#19:47#0","t":"19:47","j":"それがたぶん仕事の場面だったんだろうなっていう。","c":"我猜那大概是在工作场合发生的事情吧，就是这种感觉。","k":"〜んだろうな 〜っていう"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#19:50#0","t":"19:50","j":"そういう心地いいこととストレスってさ、そんなさ、表裏みたいな感じじゃないよね、本当はね。","c":"那种舒适的事情和压力啊，其实本来也不是那种表里一体、非此即彼的关系吧，真的。","k":"って じゃないよね"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#20:03#0","t":"20:03","j":"だけどきっと極端に嫌なことは嫌、仕事は嫌みたいになっちゃうんだろうな。","c":"但是大概还是会变得很极端，讨厌的事就是讨厌，工作也会变成讨厌的东西吧。","k":"〜なっちゃう みたいに"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#20:10#0","t":"20:10","j":"プライベートが伸び伸びと過ごせているというのが裏目に出ない方法があったらいいのにね。","c":"要是有一种方法，能让「私生活过得很自在」这件事不会变成反效果就好了呢。","k":"裏目に出る 〜たらいいのに"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#20:16#0","t":"20:16","j":"だって、こんなに仕事できてないけどプライベートは伸び伸び過ごせるから最高！って本当は思いたいけど、でも言ってることは分からない。","c":"因为其实很想这样想：「虽然工作做得不太行，但私生活能过得很自在，所以最棒了！」可是又觉得，自己在说的这话到底是什么意思，其实自己也搞不清楚。","k":"って（引用） 〜たい（思いたい）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#20:25#0","t":"20:25","j":"自分で裁量があることが増えるじゃん、年を取ると。","c":"上了年纪之后，自己能做主的事情会变多，对吧。","k":"じゃん 〜と（恒常条件）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#20:28#0","t":"20:28","j":"全部自分で決められる。","c":"全部都能自己决定。","k":"決められる"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#20:30#0","t":"20:30","j":"なればなるほど、ちょっと気に入らないことがあったときのストレスとか、我慢してるんだか我慢できなくなっている話なんだかが混ざっちゃうな。","c":"越是这样，遇到一点不称心的事情时的压力，到底是自己在忍耐，还是已经变得没办法忍耐了，这两种感觉就会混在一起分不清了。","k":"〜ば〜ほど 〜んだか〜んだか"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#20:45#0","t":"20:45","j":"ただ、そこは意識的にやっていくしかないと思う。","c":"不过，那部分我觉得只能靠自己有意识地去做了。","k":"〜しかない 〜ていく"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#20:48#0","t":"20:48","j":"決めるってことだね。","c":"也就是说要靠自己去做决定呢。","k":"って ね"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#20:50#0","t":"20:50","j":"ここはやるとかやらないとかってこと?","c":"这里说的是要不要去做这件事吗？","k":"とか~とか~って"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#20:53#0","t":"20:53","j":"思いどおりにならないことがあることに対して。","c":"是针对「有些事无法如己所愿」这一点。","k":"に対して"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#20:59#0","t":"20:59","j":"早く決めればいいのにイライラするとか、これはこうなのにみたいなときは私、可動域が狭くなっているなと思って","c":"比如觉得「早点决定不就好了」而心浮气躁，遇到「这里明明该是这样」的时候，我就会觉得自己的（心理）可动范围变窄了。","k":"~ばいいのに 可動域が狭くなる"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#21:20#0","t":"21:20","j":"自分で決められることがすごく多くなって、自分の思いどおりになることがめちゃくちゃ増えたから、そうじゃないものに対しての怒りとかイライラを持つようになっちゃったわけだから。でも、","c":"自己能决定的事情变得多了很多，随心所愿的事也大大增加了，所以对那些不由自己的事，就容易生出怒气和烦躁——不过，","k":"~ようになっちゃった わけだから"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#21:31#0","t":"21:31","j":"世の中、自分の思いどおりにならないことなんてたくさんあるので、これは別にどうでもいいと思って、いらつかないようにはしてる。","c":"这世上本来就有很多事不会如自己的意，所以我尽量告诉自己这些无所谓，不让自己烦躁。","k":"なんて ~ようにしている"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#21:39#0","t":"21:39","j":"それでも1人暮らしだったら、家の温度なんて自分の好きなように調整できるじゃん。","c":"话虽如此，一个人住的话，家里的温度什么的，可以随自己喜欢调节吧。","k":"それでも じゃん"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#21:49#0","t":"21:49","j":"だけど2人3人って増えていけば、寒いとか暑いとか絶対出てくる。","c":"但要是变成两个人、三个人一起住，嫌冷嫌热之类的问题绝对会出现。","k":"~ていけば とか~とか"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#21:57#0","t":"21:57","j":"ストレス耐性が下がっているというよりも、わがままというか、自分の思いどおりにならないことが気に入らないというだけだから、それは愛してるかな。","c":"与其说是压力承受力下降了，不如说是任性——只是见不得事情不顺自己的意而已，这点大概也算我「爱」自己的地方吧。","k":"というよりも というか ~というだけだから"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#22:10#0","t":"22:10","j":"意識してやってるかな、私は。","c":"是有意识地这样做的吧，我是说我自己。","k":"やってる（＝やっている） かな"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#22:13#0","t":"22:13","j":"何かでも手をつけてみようと思いますという好奇心があれば","c":"如果还带着「不管怎样先试着动手看看」这种好奇心的话……","k":"〜と思います（丁寧語） ~があれば"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#22:18#0","t":"22:18","j":"大丈夫だと思います。","c":"我觉得没问题。","k":"〜だと思います"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#22:21#0","t":"22:21","j":"ありがとうございます。","c":"谢谢。","k":"ありがとうございます"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#22:24#0","t":"22:24","j":"さて、ちょっと前にきいろさんっていう結婚式の話を書いて、2025年の秋9月に配信してたんですけど、","c":"话说，不久前写过一位「きいろ」小姐的婚纱故事，是在2025年秋天9月发布的，不过……","k":"って(いう) 〜てたんですけど"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#22:38#0","t":"22:38","j":"きいろさんはイベント事が苦手だったんだけど、夫の強い希望で2026年1月に結婚式をやるということにしましょう、だったね。","c":"きいろさん本来不擅长办活动，但因为丈夫强烈希望，就定成2026年1月办婚礼了，是这样吧。","k":"〜ということにしましょう 〜だったね"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#22:49#0","t":"22:49","j":"ドレスの試着のときに、試着室の外にいる夫がきいろさんのお母さんに対して、きいろさんの日頃のだらしなさみたいなのを延々と話する。","c":"试穿婚纱的时候，站在试衣间外面的丈夫，对着きいろさん的母亲，没完没了地说きいろさん平时有多邋遢。","k":"延々と〜する 〜みたいな(の)"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#23:00#0","t":"23:00","j":"それに耐えきれなくて、その場で泣いてしまっても、夫から謝罪はなく、","c":"きいろさん受不了，当场就哭了出来，可丈夫却没有道歉，","k":"〜きれない 〜てしまっても"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#23:04#0","t":"23:04","j":"後日、自分の希望しているものよりうんと安いドレスをあえて選んじゃって、セルフネグレクトだよねみたいなのに陥っちゃったと。","c":"过后，她故意选了一件比自己真正想要的便宜得多的婚纱，陷入了那种「简直是自我忽视」的状态。","k":"〜んじゃって／〜ちゃった あえて〜 〜と（引用終助）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#23:14#0","t":"23:14","j":"夫が結婚式をしたくて結婚したっていうふうに、過去、発言していたこともあったりして、ずっともやもやしてますみたいなのが。","c":"丈夫过去还说过「自己是想办婚礼才结的婚」这种话，所以她心里一直闷闷不乐。","k":"〜っていうふうに もやもやする"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#23:23#0","t":"23:23","j":"さくちゃんと私は、自分の性格だとか、その行為がセルフネグレクトだというのを冷静に俯瞰できたのは、本当にすごいなとか。","c":"我和サクちゃん都觉得，她能冷静客观地看清自己的性格以及这种行为其实是「自我忽视」，这一点真的很了不起，之类的。","k":"〜だとか〜だとか 冷静に俯瞰する"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#23:33#0","t":"23:33","j":"親の前で妻のだめなところを話し続けて、泣かせても謝らないというのは、ちょっと危険だよ、夫っていう。","c":"在父母面前不停数落妻子的不是，把她说哭了也不道歉——这个丈夫，有点危险啊。","k":"〜せる（使役形） 複合動詞〜続ける 〜っていう（文末）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#23:40#0","t":"23:40","j":"不可解だねみたいなことはあったね。","c":"好像有过「这真让人费解啊」这样的感想呢。","k":"みたいな（引用・伝聞） だね（終助詞）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#23:43#0","t":"23:43","j":"ちょっと気をつけてほしいねみたいな。","c":"「希望对方能稍微注意一下」之类的。","k":"てほしい みたいな"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#23:47#0","t":"23:47","j":"自尊心を削ってくる相手とはできれば縁を切ったほうがいいんじゃないかなみたいな。","c":"「如果对方是那种打击你自尊心的人，最好还是趁早断绝关系」之类的。","k":"たほうがいい んじゃないかな"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#24:00#0","t":"24:00","j":"以前、結婚式のドレスについてお送りしたきいろです。","c":"我是之前寄过关于婚纱来信的「黄色（きいろ）」。","k":"お送りする（自謙語） について"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#24:03#0","t":"24:03","j":"このたび無事に結婚式を終えました。","c":"这次我已经顺利地办完了婚礼。","k":"終える（他動詞） に（副詞化）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#24:06#0","t":"24:06","j":"隣の雑談にメールを送って自分の心を整理し、お二人に取り上げていただいたことで勇気をもらいました。","c":"给『邻座的闲聊』寄信整理了自己的心情，二位还在节目里提到了我，这给了我勇气。","k":"ていただく ことで"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#24:12#0","t":"24:12","j":"頭にはよぎったけれどことばにはしなかった「離婚」というワードを最終武器に、彼には「ドレスの試着のことを本当に傷ついた私が、もう結婚式しないと言ってもおかしくないことだよ」と言うと、彼からは「あの時は言い過ぎた」とありました。","c":"我把曾经闪过脑海却没说出口的「离婚」这个词当作最后的武器，对他说「因为试穿婚纱的事真的很受伤，我就算说不办婚礼了也不奇怪吧」，结果他回说「那时候是说得过分了」。","k":"を最終武器に ても…おかしくない からは（動作の起点）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#24:27#0","t":"24:27","j":"結果として結婚式は楽しく満足のいくものとなりました、と。","c":"结果婚礼办得很开心、令人满意——（信里）是这么写的。","k":"文末の「と」（引用の省略）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#24:31#0","t":"24:31","j":"式までは、君は注意や反論で泣くからと言われながら話をし準備を進めました。","c":"直到婚礼之前，他一直说着「你一被提醒或反驳就哭」，我们就这样边说边把准备工作推进下去了。","k":"ながら 受身形（言われる）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#24:37#0","t":"24:37","j":"正直、彼は意見を出さず話し合いにもならないことが多くなり、自由に決められたといえば聞こえはいいんですが、当初の話どおり進んだとは言えない結末でした。","c":"老实说，他常常不表达意见、也没法好好商量，说是「自由决定」听起来好听，但结果并没有按最初说好的方向进行。","k":"〜ず（＝〜ないで） といえば とは言えない"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#24:47#0","t":"24:47","j":"大きな決定事は彼にお願いをしていたのですが、映像や写真プラン、お花などもほぼプランナーさんのおすすめされるがまま。","c":"重大的决定本来是拜托他来定的，但影像、照片方案、花艺之类的，也几乎全都是按照策划师的推荐来定的。","k":"お願いをする（自謙表現） されるがまま"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#24:54#0","t":"24:54","j":"プランもどんどん上乗せ状態だったため、途中から私も加勢していきました。","c":"方案也不断被加码，中途开始我也一起帮忙张罗了起来。","k":"上乗せ ていく（動作の進行・変化）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#24:59#0","t":"24:59","j":"終盤で分かったのですが、彼は式のお金を自分の親が払ってくれるだろうとたかをくくっていたのです。","c":"到了最后阶段才知道，原来他一直笃定婚礼的钱会由自己父母来付。","k":"のですが 高をくくる"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#25:05#0","t":"25:05","j":"自分のお金ならどれだけプランにしてもいいのですがあまりにも楽観的で驚きました。","c":"“如果是自己的钱，不管把方案定得多豪华都无所谓，但（他们）实在乐观到让我吃惊。”","k":"〜てもいい なら あまりにも"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#25:12#0","t":"25:12","j":"提示された最終金額を鵜呑みにし式場の見積もりミスを見落としていたりと最後の最後までトラブルが続きました。","c":"把对方给出的最终金额全盘相信、没发现婚礼场地估价单上的失误，麻烦事一直持续到了最后一刻。","k":"鵜呑みにする 〜たり〜たりする まで"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#25:19#0","t":"25:19","j":"とはいえ、終わってしまえばあとの祭り。式に向けての決め事などで予定を合わせたり話し合いをしたり買い出しをしたりなどがなくなると、会話量の減少やたわいもないすれ違いが増え始め、何らかの結婚式には(?)これまで救われていたのだろうなと思っております。","c":"话虽如此，结束了就是马后炮了——因筹备婚礼而对时间、商量、采购等事务一消失，交流量减少、无谓的小摩擦也开始增多，这才觉得原来这段时间一直是被（筹备）婚礼这件事以某种方式支撑着的吧。","k":"あとの祭り と（条件） 〜始める"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#25:34#0","t":"25:34","j":"現在は子どもに関して意見のすれ違いが起きていますがなんとか乗り越えていこうと思います。","c":"现在在孩子的问题上出现了意见分歧，但想办法克服过去。","k":"〜ていこう が（逆接）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#25:39#0","t":"25:39","j":"拙いご報告で恐縮ですが取り上げていただきました以上はご報告せねば(?)と思いメッセージをお送りしました。","c":"拙劣的报告实在惶恐，但既然被（节目）采用了，就想着必须要报告一下，于是发来了这条消息。","k":"ご+動詞連用形（ご報告） 以上は 恐縮ですが"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#25:48#0","t":"25:48","j":"楽しかったんだね。","c":"看来当时挺开心的呀。","k":"んだ"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#25:50#0","t":"25:50","j":"それはよかったね。","c":"那真是太好了。","k":"よかった"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#25:52#0","t":"25:52","j":"うまくやってね。","c":"你们要好好相处哦。","k":"〜てね うまくやる"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#25:58#0","t":"25:58","j":"結婚式までの間にパートナーとけんかをしたり意見が合わなくて大変な思いをするというのはみんなやってるからね。","c":"婚礼之前跟伴侣吵架、意见不合吃苦头，这种事大家都经历过啦。","k":"〜たり〜たり 大変な思いをする から（终助词）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#26:06#0","t":"26:06","j":"そこで相手のよく自分が知らなかった性格が出てきたりして、という(?)話もよく聞くけど、結果オーライみたいな。","c":"这时也常听说会看到对方自己以前不太了解的一面，不过结果好就一切都好，差不多这种感觉。","k":"連体修飾（知らなかった性格） 結果オーライ けど（逆接・软化）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#26:15#0","t":"26:15","j":"初めての2人のプロジェクト。","c":"（婚礼是）两个人第一次共同的“项目”嘛。","k":"名詞+の+名詞"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#26:25#0","t":"26:25","j":"自分たちで払ったのか相手が払ったのか。","c":"到底是自己出的钱，还是对方出的钱。","k":"〜のか〜のか"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#26:28#0","t":"26:28","j":"全部含めて結果オーライという感じなのと","c":"把这些全都算在内的话，总体感觉是结果好就一切都好，而且……","k":"全部含めて という感じ"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#26:32#0","t":"26:32","j":"結婚式終わっちゃったら、あんなにいろいろ話したりしてたのが、一緒に買い物行ったりああするって話してたのが、なくなっちゃって。","c":"婚礼一结束，之前那种经常聊天啊、说好要一起去买东西之类的，就都没有了。","k":"～ちゃう/ちゃった（口语缩约） ～たら（仮定条件） ～たり～たりする（列挙）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#26:46#0","t":"26:46","j":"結婚式の写真を送ってくれてるんですよ。","c":"她（一直）把结婚典礼的照片发给我看呢。","k":"～てくれる（授受表现） ～んですよ（说明語気）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#26:50#0","t":"26:50","j":"すごいすてきで、いいお式だったんだなって。","c":"特别漂亮，让人觉得『那真是一场很棒的婚礼啊』。","k":"～って（引用の省略） ～んだな（感慨）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#26:53#0","t":"26:53","j":"確かにもりもり(?)の上品な。","c":"确实，是那种很有分量感又不失优雅的（婚纱风格）。","k":"連体修飾＋体言止め"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#26:57#0","t":"26:57","j":"でもねドレスすっごく(?)してて。","c":"不过啊，婚纱打扮得特别（讲究）。","k":"～してて（ている的口语縮約+接续）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#26:59#0","t":"26:59","j":"すてきだよね。","c":"真好看啊。","k":"～よね（确认・共感）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#27:00#0","t":"27:00","j":"自分が予想してるのより安いのとかって言ってたけど。","c":"她说这个比自己预想的要便宜什么的，不过——","k":"～より（比较） ～とかって言う（引用+列挙語気） ～けど（逆接・前置き）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#27:03#0","t":"27:03","j":"すっごくすてきよ、後ろ姿だけど。めちゃめちゃ似合ってるし安物になんか全く見えない。","c":"真的超好看的哦，虽然只是背影。特别合身，完全看不出是便宜货。","k":"～よ（主张・断定） ～けど（逆接・轻微） ～てる（ている口语縮約） ～し（并列理由） ～になんか全く見えない"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#27:12#0","t":"27:12","j":"すごくすてきなドレス(?)ですよ。","c":"是件特别好看的婚纱哦。","k":"词汇截断（ASR还原）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#27:14#0","t":"27:14","j":"よかったね。","c":"太好了呢。","k":"よかった（固定口语表达） ～ね（共感終助詞）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#27:15#0","t":"27:15","j":"ただ、何だろうなちょっといろいろ気になるところもあるよね。","c":"不过呢，怎么说，也还是有些让人在意的地方的。","k":"何だろうな（自問・口语犹豫） ～よね（确认・共感） 気になる（惯用表达）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#27:24#0","t":"27:24","j":"ここからも長いし最後にも書いてあるけど、今もお子さんに関して意見のすれ違いが起きてますって言うから、そうやってすれ違いながらぶつかりながら、なんとかしたりしなかったりするんだろうね。","c":"从这儿开始（信里）还写了挺长一段，最后也提到，说现在在孩子的事情上还有意见分歧，就这样一边有分歧一边磕碰，也不知道能不能算是磨合过去吧。","k":"～し（并列理由） ～に関して（关于～） ～って言うから（引用+理由） ～ながら（同时进行）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#27:38#0","t":"27:38","j":"周りから見たらどうかなと思ったり、話を聞いてると大丈夫かなと思ったりしても、最終的には自分が選ぶことだから、選択してるわけだからね、今、彼と一緒にいるっていうこと。","c":"从周围人看来说不定会觉得『这样真的没事吗』，听着（她说的）也会担心是不是没问题，但即便这样，归根结底也是她自己选的，说到底现在和他在一起这件事，是她自己选择的。","k":"～たら（仮定） ～と思ったり（心理活动列挙） ～ても（逆接） 最終的には（惯用副词句） ～わけだから（说明・强调理由） ～っていうこと（＝ということ）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#27:54#0","t":"27:54","j":"そうだね、そうそう。","c":"是啊，没错没错。","k":"そうだね／そうそう（相槌・共感）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#27:56#0","t":"27:56","j":"ただ、我慢するのが当たり前とか人に譲るのが当たり前みたいな、前回のメールでもたぶん書いてくれてたと思うんだけど、そういう癖があるって自分で分かったって、そこにも気付けたわけだから。","c":"不过，像「忍耐是理所当然的」「让着别人是理所当然的」这种想法，上次的来信里应该也写过吧，她自己已经意识到自己有这种习惯，这点她也已经察觉到了呀。","k":"〜のが当たり前 〜てくれてた（〜てくれていた） 〜わけだから"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#28:09#0","t":"28:09","j":"そこはちょっと我慢しすぎないようにとか、相手に合わせすぎないようにとかっていうのは、全然それもちょっとずつやっていったほうがいいんだろうね。","c":"那方面呢，不要太忍耐啦、不要太迁就对方啦，这些也完全可以一点点慢慢改变过来比较好吧。","k":"動詞连用形+すぎる 〜ていく（やっていった） 〜んだろうね"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#28:19#0","t":"28:19","j":"超ありきたりだけど、お互い感謝の気持ちが持てる関係がいいよね。","c":"虽然很老套，但彼此能保持感恩之心的关系是最好的呢。","k":"持てる（持つの可能形） 終助詞よね"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#28:25#0","t":"28:25","j":"それはそう。","c":"那倒是。","k":"それはそう（だ）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#28:27#0","t":"28:27","j":"近すぎてきっと全部気に食わないみたいな感じになるのも分かる。","c":"太亲近的话，大概会变成什么都看不顺眼的感觉吧，这种感觉我也懂。","k":"形容詞+すぎて（近すぎて） 気に食わない"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#28:33#0","t":"28:33","j":"分かるけれど、譲らないとか譲らない。","c":"懂是懂，但就是不肯让步，真是不让步啊。","k":"〜けれど 譲らない（重複強調）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#28:45#0","t":"28:45","j":"番組へのメッセージ、これからも引き続き募集します。","c":"给节目的留言，我们今后也会继续征集。","k":"〜します（丁寧語） 引き続き"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#28:48#0","t":"28:48","j":"メールアドレスは、聞き耳(?)アットマークtbsドット使用(?)ドットjp、kikimi(?)アットマークtbsドット使用(?)ドットjpまで。メールが採用された方には、イラストレーター塩川泉さんが手がけた番組ロゴステッカーをプレゼントします。","c":"邮箱地址是 kikimi(?)＠tbs.co(?).jp（同一地址ASR前后识别不一致，具体拼写不确定）。来信被采用的听众，将获得插画师盐川泉设计制作的节目logo贴纸。","k":"手がけた 採用された（受身形） プレゼントします（丁寧語）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#29:10#0","t":"29:10","j":"きょうはここまで。","c":"今天就到这里。","k":"〜はここまで"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#29:12#0","t":"29:12","j":"このあとはスカルプDボーテ提供のアフタートークをお楽しみください。","c":"接下来请欣赏由スカルプDボーテ冠名播出的加场闲聊。","k":"お〜ください 〜提供の〜"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#29:19#0","t":"29:19","j":"スカルプDボーテは女性ホルモンに着目した医学発想の頭皮のケアブランド。","c":"スカルプDボーテ是一个着眼于女性荷尔蒙、以医学思维打造的头皮护理品牌。","k":"〜に着目した 名詞＋の＋名詞（連体修飾）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#29:26#0","t":"29:26","j":"今回はスカルプDボーテ推奨のフォーステップケア。","c":"这次是スカルプDボーテ推荐的四步护理法。","k":"NP1推奨のNP2"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#29:53#0","t":"29:53","j":"以前は加齢によって女性ホルモンが減少するとお顔の肌と同じように頭皮の老化も進行するなんて話がありましたけども","c":"以前有个说法：由于年龄增长女性激素减少，头皮的老化也会像脸部皮肤一样加速进行……","k":"によって 〜と（条件形） なんて けども"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#30:00#0","t":"30:00","j":"よく考えたらつながってるんだからそりゃそうだよね。","c":"仔细想想，(头皮和脸)是相连的，那当然是这样啦。","k":"〜たら（条件形） んだから そりゃ"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#30:11#0","t":"30:11","j":"すっかり忘れてたけど。","c":"完全忘了呢。","k":"〜ていた→〜てた 句末けど"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#30:15#0","t":"30:15","j":"今回もスカルプDボーテさんから女性ホルモンとスカルプケアに関する豆知識が届いています。","c":"这次也收到了スカルプDボーテ提供的关于女性激素与头皮护理的小知识。","k":"〜から〜が届く に関する 〜ている（届いています）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#30:37#0","t":"30:37","j":"年齢を重ねるごとに女性ホルモンは低下してしまいますが代わりにイソフラボンを頭皮に直接届けることで髪や頭皮に潤いを与えてサポートしてくれます。","c":"随着年龄增长，女性激素会逐渐降低，但通过将异黄酮直接送达头皮，可以为头发和头皮带来滋润并提供支持。","k":"〜ごとに 〜てしまいます が（逆接） 〜ことで 〜てくれます"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#30:49#0","t":"30:49","j":"似てるんだって。","c":"听说很像。","k":"って(伝聞)"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#30:51#0","t":"30:51","j":"これは聞いたことあったけど、頭皮とか髪に潤いを与えてサポートしてくれるというのもあるんだ。","c":"这个我听说过，说是能给头皮和头发补充水分、起到辅助作用。","k":"〜たことがある けど（逆接） てくれる"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#31:01#0","t":"31:01","j":"髪の潤いって、きょうもたまたまその話をしていたんだけど、年齢を重ねると今までの傷み(?)とは全然違う、ぱさつきとかつやのなさとか、ちょっとびっくりする変化が出てくるじゃないですか。","c":"说到头发的水分，今天刚好也聊到这个话题——上了年纪之后，会出现和以前的损伤(?)完全不同的变化，比如毛躁啊、没有光泽之类的，让人有点吃惊，对吧。","k":"って（主题提示） 〜と（恒常条件） じゃないですか"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#31:17#0","t":"31:17","j":"潤いなんですよね、多分、閉じ込められて(?)いないのは。","c":"大概就是水分吧——没能被锁住的，就是这个。","k":"受身形（られる） のは（强调/主题化）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#31:22#0","t":"31:22","j":"閉じ込めなきゃいけないのは潤いなんだけど、髪の乾燥はすごいするね。","c":"该锁住的其实是水分呢，不过头发确实很容易干燥啊。","k":"なきゃいけない ね（终助词）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#31:28#0","t":"31:28","j":"若い頃はあんまり気にした(?)ことなくて、髪の乾燥について。","c":"年轻的时候几乎没在意过头发干燥的问题。","k":"〜たことがない（否定経験） 〜について"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#31:32#0","t":"31:32","j":"どっちかっていうとべたつきをどう取るかとか。さらさらさせたいからさ、乾燥させたいっていう感じだったけど。","c":"比起那个，更多想的是怎么去除黏腻感之类的。因为想让头发变得清爽顺滑，所以感觉那时候是想让它干一点，不过……","k":"どっちかっていうと させたい（使役+希望） さ（终助词）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#31:40#0","t":"31:40","j":"私も年を重ねてから、ある一部——この顔周りとかのある一部が、何かもうカッサカサに乾燥する。全体がというよりは、ある一部がすっごい乾燥することに気が付いて。","c":"我自己上了年纪之后也发现，脸周围之类的某个部位会变得特别干巴巴的。与其说是整体，不如说是某一部分特别干燥。","k":"〜てから というよりは に気が付いて（て形中顿）"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#31:53#0","t":"31:53","j":"そこだけちょっとオイルを多めに塗ってみたりとか、何か乾かす時にちょっと気をつけたりとかしてるんだけど。","c":"只在那个部位多涂一点油之类的，吹干头发的时候也会稍微注意一下，不过……","k":"〜たり〜たりする 多めに"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#32:00#0","t":"32:00","j":"でもそれだけじゃなくて、頭皮から生えてくることを考えたら、頭皮のケアが大事って言われると当たり前っていうことが意外と分かってないっていう。","c":"不过不仅如此，一想到头发是从头皮长出来的，被人说「头皮护理很重要」的时候，就会发现这种理所当然的事，其实大家意外地并不真正明白。","k":"〜たら（条件） って言われると 当たり前"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#32:13#0","t":"32:13","j":"髪は、潤い年齢とともに乾燥ケアってことなんですけど、何か潤いケアってしてることありますか?","c":"说到头发，是说随着「滋润年龄」增长要做干燥护理，那你有在做什么滋润护理吗?","k":"とともに って(=という) 〜ことなんですけど"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#32:22#0","t":"32:22","j":"自分の髪に老いるっていうこととシャンプーとかいろいろあるじゃないですか。","c":"自己的头发也会「变老」这件事，还有洗发水之类的，讲究可多了呢。","k":"っていうこと(=ということ) とか じゃないですか"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#32:27#0","t":"32:27","j":"髪だけじゃなくて、心の潤い。日々の生活で心がサクサクサクサクはしない。もしくはカサカサ。","c":"不只是头发，还有心的滋润。在日常生活中，心不会「咔嚓咔嚓咔嚓咔嚓」……或者说，是干巴巴的。","k":"だけじゃなくて(=だけでなく) サクサク・カサカサ（拟态词） 〜はしない"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#32:40#0","t":"32:40","j":"日々の生活で心がカサカサしたときに、心に何か潤いを与えてくれるものってありますか?","c":"在日常生活中，当心变得干巴巴的时候，有没有什么能给心带来滋润的东西呢?","k":"〜を与えてくれる 〜ときに って"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#32:46#0","t":"32:46","j":"心に潤いというのもいいね。","c":"「心的滋润」这个说法也挺不错的呢。","k":"〜というのも 〜ね"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#32:50#0","t":"32:50","j":"最近は、本当直近はなぜか、最近、私、今、小説ブームで、ふだんそんなに小説って読まないんだけど、一度読んだら小説ばっかり読んでるんだけど。","c":"最近……说真的最近不知怎么，最近我现在很迷小说，平时也没那么爱看小说，可一旦看了就一本接一本地看。","k":"〜んだけど 〜って(=という) 〜ばっかり(=ばかり)"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#33:01#0","t":"33:01","j":"それが潤おうと思って読んでるわけじゃないですか。","c":"那也不是抱着「要滋润一下」的想法去看的吧。","k":"潤おう（意志形） わけじゃないですか"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#33:06#0","t":"33:06","j":"読んだらかなり潤うの。","c":"但看完之后就会觉得心里特别滋润。","k":"〜たら かなり"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#33:08#0","t":"33:08","j":"たぶん私ふだん感情の起伏とか、いろんな感情を味わってなくて結構、フラットで。","c":"大概是我平时情绪起伏不大，很多感情都没怎么体会过，挺平淡的。","k":"〜てなくて(=ていなくて) とか 結構"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#33:19#0","t":"33:19","j":"フラットにしたいんだもんね。","c":"是想让自己保持平淡吧。","k":"〜んだもんね"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#33:21#0","t":"33:21","j":"凪の状態が落ち着くからあんまり心が大暴れしないんですよ。","c":"因为「风平浪静」的状态让人安心，所以心不太会大起大落。","k":"凪（なぎ） 〜から 大暴れ(する)"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#33:25#0","t":"33:25","j":"しないように訓練してきたというか。","c":"应该说是训练自己不要那样吧。","k":"〜てきた 〜というか"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#33:28#0","t":"33:28","j":"だけど小説の中っていろんなあらゆる感情を味わえるじゃないですか。","c":"但是在小说里，却能体会到各种各样的情感呢。","k":"だけど 味わえる（可能形） じゃないですか"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#33:35#0","t":"33:35","j":"それはすばらしい。","c":"那真是太棒了。","k":"すばらしい"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#33:37#0","t":"33:37","j":"私は逆で、作ちゃんと七転八倒バッタンバッタンじゃないですか。","c":"我正好相反，我这个「作ちゃん」可是翻来覆去睡不着觉的，不是吗。","k":"～じゃないですか 七転八倒"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#33:42#0","t":"33:42","j":"よくご存じのとおり。","c":"你也很清楚吧。","k":"ご存じ ～とおり"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#33:43#0","t":"33:43","j":"なので、いろいろと実は頂き物とかもあるんだけど、ベッドにスプレーするやつってあるじゃん、アロマとか。","c":"所以呢，其实也收到过各种各样的礼物，比如有那种喷在床上用的东西，像香薰之类的。","k":"なので 頂き物"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#33:56#0","t":"33:56","j":"ピローとかね。","c":"还有枕头喷雾之类的吧。","k":"～とかね"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#33:57#0","t":"33:57","j":"ピロースプレーみたいなのあるね。","c":"对，好像是有那种枕头喷雾。","k":"～みたいな"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#33:59#0","t":"33:59","j":"あれを実はベッドサイド(?)に何種類か用意しといて。","c":"其实我在床边备了好几种。","k":"用意しといて 何種類か"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#34:03#0","t":"34:03","j":"あら何種類もあるの?いいね。","c":"哎，还有好几种呀？真不错。","k":"～の?"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#34:04#0","t":"34:04","j":"そう。","c":"对呀。","k":""},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#34:05#0","t":"34:05","j":"寝る前に今日はこれシュッとやろうっていうのと、あともう一個はそれをやんない時は、甘ったるくて外につけていくのはちょっと合わない。","c":"睡前会想着「今天就用这瓶」喷一下，另外还有一瓶是不想用那瓶时用的——那瓶甜腻腻的，带出门去用的话就不太合适。","k":"シュッと やんない 甘ったるい"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#34:18#0","t":"34:18","j":"香り自体はすごく好きっていう若い人向けの香水があるんですよ。","c":"有一款我很喜欢它香味本身的、偏年轻人风格的香水。","k":"～んですよ"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#34:24#0","t":"34:24","j":"香りがかわいくてフレッシュで若いんだけど甘いのよ。","c":"香味可爱又清新、挺年轻的，不过很甜。","k":"～んだけど"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#34:27#0","t":"34:27","j":"つけていくにはちょっとって感じなの?","c":"就是说带出门的话有点不合适的感觉？","k":"～って感じなの?"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#34:29#0","t":"34:29","j":"ちょっと私がつけたらびっくりされちゃう感じだね。","c":"是啊，我要是喷了估计会把人吓一跳的那种感觉。","k":"つけたら びっくりされちゃう"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#34:32#0","t":"34:32","j":"これを寝る前にパジャマにかけます。","c":"我会在睡前把这瓶喷在睡衣上。","k":"動詞辞書形＋前に"},{"p":"tonari-otayori-182","s":"4LDcyN1XFQI#34:35#0","t":"34:35","j":"あらおしゃ _aXJptMc#01:54#0","t":"01:54","j":"この言葉(ことば)でやってあげないといけないんですけど","c":"（我）得用这种话替他们牵线才行……","k":"「〜てあげる」 「〜ないといけない」"},{"p":"konkatsu","s":"TOu_aXJptMc#01:56#0","t":"01:56","j":"間(あいだ)に入(はい)って行(い)かなきゃいけないんです。(?)","c":"（我）得夹在中间去（帮忙）才行。(?)","k":"「〜なきゃいけない」"},{"p":"konkatsu","s":"TOu_aXJptMc#01:57#0","t":"01:57","j":"「誰々(だれだれ)です」って言(い)って、「ご挨拶(あいさつ)していただけませんか?」ってお願(ねが)いして","c":"（让他）说「我是某某」，然后拜托说「能否请您去打个招呼呢?」。","k":"「ご〜していただけませんか」 誰々(だれだれ)"},{"p":"konkatsu","s":"TOu_aXJptMc#02:01#0","t":"02:01","j":"「やっと会(あ)いました」って言(い)われて","c":"（对方）被（这么一说）就说「终于见到了」。","k":"「〜と言われる」 やっと"},{"p":"konkatsu","s":"TOu_aXJptMc#02:04#0","t":"02:04","j":"で、これまだいい方(ほう)で","c":"而且，这还算好的呢，","k":"「いい方(ほう)だ」"},{"p":"konkatsu","s":"TOu_aXJptMc#02:05#0","t":"02:05","j":"全然(ぜんぜん)違(ちが)う人同士(ひとどうし)がお見合(みあ)いしたことあるんですよ。","c":"还有过完全不相干的两个人互相相亲的事呢。","k":"「〜たことがある」 「同士(どうし)」"},{"p":"konkatsu","s":"TOu_aXJptMc#02:07#0","t":"02:07","j":"ええ?","c":"咦?","k":""},{"p":"konkatsu","s":"TOu_aXJptMc#02:09#0","t":"02:09","j":"電柱(でんちゅう)女(おんな)と電柱(でんちゅう)男(おとこ)の片割(かたわ)れ同士(どうし)がいて","c":"有被叫「电线杆女」和「电线杆男」的那两组里各自的一方在场，","k":"「片割(かたわ)れ」"},{"p":"konkatsu","s":"TOu_aXJptMc#02:11#0","t":"02:11","j":"電柱(でんちゅう)じゃない同士(どうし)が…","c":"（而）不是电线杆的那两个人……","k":""},{"p":"konkatsu","s":"TOu_aXJptMc#02:12#0","t":"02:12","j":"うん、うん、うん。","c":"嗯、嗯、嗯。","k":""},{"p":"konkatsu","s":"TOu_aXJptMc#02:13#0","t":"02:13","j":"普通(ふつう)の人間(にんげん)ですね。","c":"是普通人吧。","k":""},{"p":"konkatsu","s":"TOu_aXJptMc#02:14#0","t":"02:14","j":"うん。","c":"嗯。","k":""},{"p":"konkatsu","s":"TOu_aXJptMc#02:16#0","t":"02:16","j":"「電柱(でんちゅう)じゃない男(おとこ)」って言(い)わないでしょ。","c":"总不会说「不是电线杆的男人」吧。","k":"「〜でしょ」"},{"p":"konkatsu","s":"TOu_aXJptMc#02:21#0","t":"02:21","j":"その2人(ふたり)が全然(ぜんぜん)違(ちが)う人(ひと)とお見合(みあ)いして気(き)がつかない。","c":"那两个人跟完全不相干的人相亲，却都没察觉。","k":"「気(き)がつく」"},{"p":"konkatsu","s":"TOu_aXJptMc#02:26#0","t":"02:26","j":"ええ。","c":"诶。","k":""},{"p":"konkatsu","s":"TOu_aXJptMc#02:26#1","t":"02:26","j":"それはもうプロフィールをちゃんと読(よ)まないんですよ。","c":"那就是因为根本没好好看（对方的）资料嘛。","k":"「ちゃんと」 「〜んですよ」"},{"p":"konkatsu","s":"TOu _aXJptMc#04:52#0","t":"04:52","j":"相手の動きとかを無視していいです。","c":"对方的动作之类的，无视掉也没关系。","k":"～ていい とか"},{"p":"konkatsu","s":"TOu_aXJptMc#04:53#0","t":"04:53","j":"コントとして怒られてるってことです。","c":"意思是，作为短剧（表演）来说，正在被批评。","k":"～として 怒られてる ってことです"},{"p":"konkatsu","s":"TOu_aXJptMc#04:55#0","t":"04:55","j":"なるほど。","c":"原来如此。","k":"なるほど"},{"p":"konkatsu","s":"TOu_aXJptMc#04:58#0","t":"04:58","j":"ダメ出し。ダメ出しされてんの?","c":"挑毛病。（你）被挑毛病了?","k":"ダメ出し されてんの?"},{"p":"konkatsu","s":"TOu_aXJptMc#04:59#0","t":"04:59","j":"そのダメ出し。","c":"那个「挑毛病」…","k":""},{"p":"konkatsu","s":"TOu_aXJptMc#05:01#0","t":"05:01","j":"乗りすぎちゃってるから。","c":"因为你太投入过头了。","k":"～すぎる ～ちゃってる"},{"p":"konkatsu","s":"TOu_aXJptMc#05:03#0","t":"05:03","j":"客が入っていけないんだよ。","c":"观众就没法融入（进入状态）了啊。","k":"入っていけない ～んだよ"},{"p":"konkatsu","s":"TOu_aXJptMc#05:06#0","t":"05:06","j":"結婚相談所の方にダメ出しされてんの?","c":"是被婚介所的人挑毛病吗?","k":"方 に 結婚相談所"},{"p":"konkatsu","s":"TOu_aXJptMc#05:08#0","t":"05:08","j":"コント?","c":"短剧（表演）?","k":"コント"},{"p":"konkatsu","s":"TOu_aXJptMc#05:09#0","t":"05:09","j":"まずね、立ち姿がダメ。","c":"首先啊，站姿就不行。","k":"まず 立ち姿 が"},{"p":"konkatsu","s":"TOu_aXJptMc#05:12#0","t":"05:12","j":"もうそこからね、こうやって。","c":"从那儿就（开始不对了），像这样。","k":"から こうやって"},{"p":"konkatsu","s":"TOu_aXJptMc#05:15#0","t":"05:15","j":"足をクロスして。","c":"把脚交叉起来。","k":"クロス ～して"},{"p":"konkatsu","s":"TOu_aXJptMc#05:18#0","t":"05:18","j":"本当ですか、先生。","c":"真的吗，老师?","k":"本当ですか"},{"p":"konkatsu","s":"TOu_aXJptMc#05:19#0","t":"05:19","j":"なんで?","c":"为什么?","k":"なんで"},{"p":"konkatsu","s":"TOu_aXJptMc#05:20#0","t":"05:20","j":"そうじゃなきゃダメですよね。そうよ。","c":"得那样才行对吧。——对呀。","k":"～じゃなきゃダメ ～よね"},{"p":"konkatsu","s":"TOu_aXJptMc#05:22#0","t":"05:22","j":"ちょっと横から、このぐらいの感じで、女性らしい。","c":"从侧面看，大概这种感觉，有女人味。","k":"このぐらい ～らしい で"},{"p":"konkatsu","s":"TOu_aXJptMc#05:26#0","t":"05:26","j":"ちょっとやってみて、3人。","c":"试着做一下，三个人。","k":"～てみて"},{"p":"konkatsu","s":"TOu_aXJptMc#05:29#0","t":"05:29","j":"ちょっと立ち方、立ち方だけ。","c":"就站姿，只要站姿（这一部分）。","k":"～方 だけ"},{"p":"konkatsu","s":"TOu_aXJptMc#05:32#0","t":"05:32","j":"前出て、美しい立ち姿。","c":"往前站，优美的站姿 もないです。","c":"不,哪里的话。","k":"とんでもないです"},{"p":"konkatsu","s":"TOu_aXJptMc#06:13#0","t":"06:13","j":"急いでいらしたんですね。","c":"您是急急忙忙赶来的吧。","k":"いらした んですね"},{"p":"konkatsu","s":"TOu_aXJptMc#06:14#0","t":"06:14","j":"はい、すいません。","c":"是的,抱歉。","k":""},{"p":"konkatsu","s":"TOu_aXJptMc#06:17#0","t":"06:17","j":"でしたら、私ずっと待ってたんですけれども、もう遅れるって聞いていたので、全然気にしてないです。","c":"那样的话——我虽然一直在等,但已经听说您会晚到,所以完全不介意。","k":"でしたら けれども ～って聞いていた 気にする"},{"p":"konkatsu","s":"TOu_aXJptMc#06:24#0","t":"06:24","j":"汗が…","c":"您出汗了…","k":"が 汗"},{"p":"konkatsu","s":"TOu_aXJptMc#06:26#0","t":"06:26","j":"すいません、お気遣い。","c":"不好意思,谢谢您的关心。","k":"お気遣い 気遣い"},{"p":"konkatsu","s":"TOu_aXJptMc#06:27#0","t":"06:27","j":"とんでもないです。","c":"哪里的话。","k":""},{"p":"konkatsu","s":"TOu_aXJptMc#06:28#0","t":"06:28","j":"ありがとうございます。今日、素敵な時間を楽しみにしてました。","c":"谢谢。今天这段美好的时光,我一直都很期待。","k":"楽しみにする 素敵"},{"p":"konkatsu","s":"TOu_aXJptMc#06:31#0","t":"06:31","j":"ありがとうございます。こちらこそ、よろしくお願いいたします。","c":"谢谢您。我才要请您多多关照。","k":"お願いいたします こちらこそ"},{"p":"konkatsu","s":"TOu_aXJptMc#06:33#0","t":"06:33","j":"ありがとうございます。参りましょう。","c":"谢谢。我们走吧。","k":"参る ～ましょう"},{"p":"konkatsu","s":"TOu_aXJptMc#06:35#0","t":"06:35","j":"すいません、クリーニング出しましょうか。","c":"不好意思,要帮您送去干洗吗?","k":"クリーニングに出す ～ましょうか"},{"p":"konkatsu","s":"TOu_aXJptMc#06:37#0","t":"06:37","j":"いい感じだ。いい感じ。いい空間。","c":"感觉不错。感觉真好。氛围真棒。","k":"いい感じ 空間"},{"p":"konkatsu","s":"TOu_aXJptMc#06:42#0","t":"06:42","j":"どうでした?","c":"怎么样?","k":"でした"},{"p":"konkatsu","s":"TOu_aXJptMc#06:43#0","t":"06:43","j":"なんだよこれ。","c":"这算什么啊。","k":"なんだ(よ) よ"},{"p":"konkatsu","s":"TOu_aXJptMc#06:44#0","t":"06:44","j":"えぇ、でもすごい大胆。いや、大胆。","c":"诶,不过好大胆。真的,太大胆了。","k":"大胆 すごい"},{"p":"konkatsu","s":"TOu_aXJptMc#06:50#0","t":"06:50","j":"ま、ここまでできる人はいない。いない。いない。","c":"嘛,能做到这种地步的人是没有的。没有。没有。","k":"ここまで できる いない"},{"p":"konkatsu","s":"TOu_aXJptMc#06:54#0","t":"06:54","j":"でも、やっちゃっていいってことですよね、今ぐらい。","c":"不过,就是说可以这么做对吧,像现在这种程度。","k":"やっちゃっていい ってことですよね ～ぐらい"},{"p":"konkatsu","s":"TOu_aXJptMc#06:56#0","t":"06:56","j":"あそこは要らないですけど。","c":"不过那一处(那句)是不需要的。","k":"要らない けど"},{"p":"konkatsu","s":"TOu_aXJptMc#06:57#0","t":"06:57","j":"遅刻してくると焦ってくるじゃないですか。","c":"迟到着赶过来的话,(对方)会开始着急,对吧?","k":"～てくる ～と じゃないですか"},{"p":"konkatsu","s":"TOu_aXJptMc#06:59#0","t":"06:59","j":"焦ってくるけど「大丈夫ですよ」って、「大丈夫ですよ」って言ってあげるといいと思います。それをね、","c":"虽然(对方)会着急,但你跟他说『没关系哦』、『没关系哦』这样安慰一下就好了。就是这个啊——","k":"～てあげる ～といい って"},{"p":"konkatsu","s":"TOu_aXJptMc#07:05#0","t":"07:05","j":"カッカカッカ来て。","c":"（那女的）火冒三丈地……","k":"カッカ来る"},{"p":"konkatsu","s":"TOu_aXJptMc#07:06#0","t":"07:06","j":"「5分遅刻したんです、またしたんです」っていう人がいるんですよ。","c":"会有那种（女生）说「他迟到了5分钟、又迟到了」。","k":"っていう 〜んです 遅刻する"},{"p":"konkatsu","s":"TOu_aXJptMc#07:09#0","t":"07:09","j":"吉田さんとかが言いそう。","c":"感觉吉田小姐之类的会这么说。","k":"〜とか 〜そう（だ）"},{"p":"konkatsu","s":"TOu_aXJptMc#07:10#0","t":"07:10","j":"私は厳しいですよ。","c":"我可是很严格的哦。","k":"厳しい よ"},{"p":"konkatsu","s":"TOu_aXJptMc#07:11#0","t":"07:11","j":"1時間しかないのに、10分も遅れてくるなんて、「6分の1を無駄にしましたね、あなたは」って。","c":"明明只有1个小时，竟然还迟到10分钟——（她会说）「你把六分之一都浪费掉了呢」。","k":"〜しか〜ない 数量＋も 〜なんて 6分の1"},{"p":"konkatsu","s":"TOu_aXJptMc#07:16#0","t":"07:16","j":"取り返してくださいよ、残りの6分の5でって言っちゃいます。","c":"「用剩下的六分之五给我补回来」——（她们）会这么脱口说出来。","k":"取り返す 〜てください 〜で 〜ちゃう"},{"p":"konkatsu","s":"TOu_aXJptMc#07:19#0","t":"07:19","j":"それはね、相談所にいると、「厄介な女」ですね。","c":"这种的呀，在婚介所里就是所谓的「难缠女」。","k":"〜と（条件） 相談所 厄介"},{"p":"konkatsu","s":"TOu_aXJptMc#07:24#0","t":"07:24","j":"厄介な女","c":"难缠女","k":""},{"p":"konkatsu","s":"TOu_aXJptMc#07:26#0","t":"07:26","j":"何なん、そう、いろんな女いるんですね、相談所に。","c":"什么呀……原来如此，婚介所里真是什么样的女生都有呢。","k":"いろんな 〜に（后置）"},{"p":"konkatsu","s":"TOu_aXJptMc#07:30#0","t":"07:30","j":"厄介な女。一番シンプル。","c":"难缠女。（这是）最简单的一类。","k":"一番シンプル"},{"p":"konkatsu","s":"TOu_aXJptMc#07:33#0","t":"07:33","j":"顔合わせを済ませたら、ここからがお見合い本番。","c":"初次见面打过招呼之后，从这里开始才是相亲的正式环节。","k":"〜たら 顔合わせ 本番"},{"p":"konkatsu","s":"TOu_aXJptMc#07:41#0","t":"07:41","j":"しかしこのお見合いにこそ、婚活でしくじるポイントが……","c":"然而正是在这场相亲里，藏着婚活失败的关键点。","k":"〜こそ しくじる 婚活"},{"p":"konkatsu","s":"TOu_aXJptMc#07:48#0","t":"07:48","j":"ここからは先生が実際に遭遇した人物を教材に、解説してもらいましょう。","c":"接下来就以老师实际遇到过的人物为教材，请他来讲解吧。","k":"〜てもらう 〜を〜に（する） 遭遇する"},{"p":"konkatsu","s":"TOu_aXJptMc#07:57#0","t":"07:57","j":"いざ待ち合わせで合流できても、こんなしくじった人が現れてきます。","c":"即便顺利在约定地点会合了，也会出现这种搞砸了的人。","k":"〜ても いざ 〜てくる"},{"p":"konkatsu","s":"TOu_aXJptMc#08:02#0","t":"08:02","j":"次のページ行きましょう。","c":"我们进入下一页吧。","k":"〜ましょう"},{"p":"konkatsu","s":"TOu_aXJptMc#08:04#0","t":"08:04","j":"ただただ沈黙を貫く。何を喋っているかわからない。","c":"只是一味地保持沉默。（对方）在讲什么都听不懂。","k":"ただただ 貫く 〜かわからない"},{"p":"konkatsu","s":"TOu_aXJptMc#08:08#0","t":"08:08","j":"サイレントマン。サイレントウーマン。","c":"沉默男。沉默女。","k":"サイレントマン／サイレントウーマン"},{"p":"konkatsu","s":"TOu_aXJptMc#08:11#0","t":"08:11","j":"まだいける。いろんな女とね。","c":"还能继续啦——跟各种各样的女生（都能碰上）呢。","k":"いける 〜と"},{"p":"konkatsu","s":"TOu_aXJptMc#08:14#0","t":"08:14","j":"つまり何も会話をしないということです。","c":"也就是说，（他们）完全不进行任何对话。","k":"何も〜ない 〜ということだ つまり"},{"p":"konkatsu","s":"TOu_aXJptMc#08:16#0","t":"08:16","j":"うわ、きついな。","c":"哇，好难受啊。","k":"きつい な"},{"p":"konkatsu","s":"TOu_aXJptMc#08:17#0","t":"08:17","j":"会話が一問一答になっちゃう。","c":"对话会变成一问一答（就聊不下去了）。","k":"一問一答 〜になっちゃう"},{"p":"konkatsu","s":"TOu_aXJptMc#08:20#0","t":"08:20","j":"昨日何してたんですか?","c":"你昨天做了什么呢?","k":"〜てた 〜んですか"},{"p":"konkatsu","s":"TOu_aXJptMc#08:21#0","t":"08:21","j":"特に何もしてません。","c":"没特别做什么。","k":"特に〜ない 何も〜ない"},{"p":"konkatsu","s":"TOu_aXJptMc#08:23#0","t":"08:23","j":"会話が続かないんですよ。","c":"对话就这么接不下去了嘛。","k":"続く 〜んですよ"},{"p":"konkatsu","s":"TOu_aXJptMc#08:26#0","t":"08:26","j":"で、そうなってくると5分で終わっちゃうけど、5分で終わるとこれ違反なんですね。","c":"然后一旦变成那样，5分钟就结束了，可是5分钟就结束的话，这（在婚介所里）是违规的哦。","k":"〜と（条件） 〜ちゃう 違反"},{"p":"konkatsu","s":"TOu_aXJptMc#08:29#0","t":"08:29","j":"へえ。","c":"诶——","k":""},{"p":"konkatsu","s":"TOu_aXJptMc#08:31#0","t":"08:31","j":"で、5分で終わると これ違反なんですね。","c":"那，(相亲)如果5分钟就结束的话，这就算违规了呢。","k":"と（条件） 〜なんですね"},{"p":"konkatsu","s":"TOu_aXJptMc#08:32#0","t":"08:32","j":"あ、いいです。","c":"啊，可以了/不用了。","k":"いいです"},{"p":"konkatsu","s":"TOu_aXJptMc#08:33#0","t":"08:33","j":"30分は我慢しなきゃいけない。","c":"30分钟是必须忍耐(坚持下去)的。","k":"〜なきゃいけない は（主题/对比）"},{"p":"konkatsu","s":"TOu_aXJptMc#08:36#0","t":"08:36","j":"これはもう良くない。","c":"这样就已经不好了。","k":"良くない #02:54#0","t":"02:54","j":"あの、もう絶対芸人になるんだっていう、もう家でもちょっとモノマネしてるみたいな感じやって。","c":"那种『我绝对要当搞笑艺人』的劲头，在家里也会稍微模仿一下，就是那么个状态。","k":"んだ って（引用·连体） でも 〜てる 关西腔 やって"},{"p":"bunpou","s":"aL6hlSKKmKc#02:59#0","t":"02:59","j":"こないだ共演した時は感動したでしょ。","c":"前阵子跟她同台演出的时候，你很感动吧。","k":"こないだ 〜た時 でしょ"},{"p":"bunpou","s":"aL6hlSKKmKc#03:01#0","t":"03:01","j":"そうです。でも私よりも強烈なファンがたくさんいらっしゃったんで、ちょっとは負けてて(?)、","c":"是的。不过在场有很多比我还狂热的粉丝，我在气势上多少有点招架不住(?)，","k":"よりも いらっしゃる んで は（对比）"},{"p":"bunpou","s":"aL6hlSKKmKc#03:08#0","t":"03:08","j":"他の共演者が泣いちゃったりしたから、（私は）そこまでじゃなかったですよ。","c":"因为别的同台演员都哭了什么的，相比之下我倒没到那个地步。","k":"〜ちゃう 〜たり（する） から よ"},{"p":"bunpou","s":"aL6hlSKKmKc#03:10#0","t":"03:10","j":"ちょっとそのあれだったんですけど、本当にもうリスペクトで同じ業界に入りたいと思って、まずはそこが1個目のスタート。","c":"虽然当时有点那个（不好形容），但真的是出于敬佩，想进入同一个行业，那首先就成了我的第一步起点。","k":"その・あれ 〜んですけど 〜たいと思って 1個目"},{"p":"bunpou","s":"aL6hlSKKmKc#03:20#0","t":"03:20","j":"で、そん中でさ、お笑いの授業するわけじゃん、小学生として。ま、もちろん大人のコースとはね、やり方違うんだろうけど。","c":"那在那期间嘛，你是作为小学生去上搞笑课的对吧。当然啦，跟大人的课程肯定教法不一样。","k":"わけじゃん 〜として とは んだろうけど さ・ね"},{"p":"bunpou","s":"aL6hlSKKmKc#03:28#0","t":"03:28","j":"ほら、理想と現実の違いとかあった？やってみて意外とできたとか、逆にできなかったのか。","c":"你看，有没有那种理想和现实的落差之类的？试着做了之后，是意外地做得到，还是反过来做不到呢。","k":"〜てみて 意外と できた／できなかった とか…とか"},{"p":"bunpou","s":"aL6hlSKKmKc#03:33#0","t":"03:33","j":"うん。でも、そのネタのなんかちょっと構成の、なんか作り方とか、トークの仕方とかも学べる。","c":"嗯。不过，段子的那种结构的做法啊、聊天的方式之类的，也都能学到。","k":"ネタ 〜方（かた） 学べる（可能形） も"},{"p":"bunpou","s":"aL6hlSKKmKc#03:46#0","t":"03:46","j":"私はだからもう、ものまね(?)をずっと…","c":"所以我啊，就一直在（做）模仿……","k":"だから ずっと"},{"p":"bunpou","s":"aL6hlSKKmKc#03:50#0","t":"03:50","j":"あ、そん時から？","c":"啊，从那时候起就（开始）了？","k":"から（起点）"},{"p":"bunpou","s":"aL6hlSKKmKc#03:51#0","t":"03:51","j":"はい、やっていました。","c":"对，一直在做。","k":"〜ていました"},{"p":"bunpou","s":"aL6hlSKKmKc#03:52#0","t":"03:52","j":"言ったら、その地味な(?)モノマネ。","c":"说白了，就是那种朴素、接地气的模仿咯。","k":"言ったら 地味"},{"p":"bunpou","s":"aL6hlSKKmKc#03:54#0","t":"03:54","j":"そうですね。","c":"是啊。","k":""},{"p":"bunpou","s":"aL6hlSKKmKc#03:54#1","t":"03:54","j":"何、どういうのやってたの、そん時？","c":"什么呀，那时候你都模仿的是哪种的？","k":"どういうの の（疑问） やってた"}
