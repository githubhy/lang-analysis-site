<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'">
<title>全文检索 · 逐句</title>
<style>
  :root{
    --paper:#f5f4f0; --card:#fbfaf7; --card-2:#f0eee7;
    --ink:#1e2630; --ink-soft:#586374; --ink-faint:#8b93a0;
    --line:#e5e1d8; --line-strong:#d4cfc4;
    --shu:#c0442c;
    --katsu:#1f7a63;  --katsu-t:rgba(31,122,99,.11);
    --keigo:#8a4fa8;  --keigo-t:rgba(138,79,168,.12);
    --joshi:#c0442c;  --joshi-t:rgba(192,68,44,.10);
    --goi:#2f5fa6;    --goi-t:rgba(47,95,166,.10);
    --font-mincho:"Hiragino Mincho ProN","Yu Mincho","YuMincho","Songti SC",serif;
    --font-gothic:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",sans-serif;
    --font-cn:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    --font-latin:ui-sans-serif,-apple-system,"Helvetica Neue",Arial,sans-serif;
    --font-mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --paper:#12151a; --card:#191d24; --card-2:#20252d;
      --ink:#e9e7e1; --ink-soft:#a4adb9; --ink-faint:#727b88;
      --line:#282d36; --line-strong:#39404b;
      --shu:#e0755c;
      --katsu:#4bc0a1; --katsu-t:rgba(75,192,161,.14);
      --keigo:#c091df; --keigo-t:rgba(192,145,223,.15);
      --joshi:#e8836c; --joshi-t:rgba(232,131,108,.14);
      --goi:#7aa8e2;   --goi-t:rgba(122,168,226,.15);
    }
  }
  :root[data-theme="light"]{
    --paper:#f5f4f0; --card:#fbfaf7; --card-2:#f0eee7;
    --ink:#1e2630; --ink-soft:#586374; --ink-faint:#8b93a0;
    --line:#e5e1d8; --line-strong:#d4cfc4; --shu:#c0442c;
    --katsu:#1f7a63; --katsu-t:rgba(31,122,99,.11);
    --keigo:#8a4fa8; --keigo-t:rgba(138,79,168,.12);
    --joshi:#c0442c; --joshi-t:rgba(192,68,44,.10);
    --goi:#2f5fa6;   --goi-t:rgba(47,95,166,.10);
  }
  :root[data-theme="dark"]{
    --paper:#12151a; --card:#191d24; --card-2:#20252d;
    --ink:#e9e7e1; --ink-soft:#a4adb9; --ink-faint:#727b88;
    --line:#282d36; --line-strong:#39404b; --shu:#e0755c;
    --katsu:#4bc0a1; --katsu-t:rgba(75,192,161,.14);
    --keigo:#c091df; --keigo-t:rgba(192,145,223,.15);
    --joshi:#e8836c; --joshi-t:rgba(232,131,108,.14);
    --goi:#7aa8e2;   --goi-t:rgba(122,168,226,.15);
  }

  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:var(--font-cn);line-height:1.75;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  .wrap{max-width:46rem;margin:0 auto;padding:clamp(1.5rem,4vw,3.5rem) clamp(1.1rem,4vw,2rem) 5rem;}

  /* ---------- header ---------- */
  .eyebrow{font-family:var(--font-latin);font-size:.72rem;letter-spacing:.22em;
    text-transform:uppercase;color:var(--shu);font-weight:600;margin:0 0 .9rem;}
  h1{font-family:var(--font-mincho);font-weight:600;
    font-size:clamp(1.7rem,5.4vw,2.55rem);line-height:1.35;margin:0;
    text-wrap:balance;letter-spacing:.01em;}
  .sub{color:var(--ink-soft);font-size:1rem;margin:.9rem 0 0;max-width:38rem;}
  .meta{display:flex;flex-wrap:wrap;gap:.5rem .55rem;margin:1.4rem 0 0;}
  .tag{font-family:var(--font-gothic);font-size:.78rem;color:var(--ink-soft);
    background:var(--card);border:1px solid var(--line);border-radius:2rem;
    padding:.28rem .7rem;white-space:nowrap;}
  .tag b{color:var(--ink);font-weight:600;}

  .note{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--shu);
    border-radius:.5rem;padding:.95rem 1.15rem;margin:1.6rem 0 0;
    font-size:.9rem;color:var(--ink-soft);line-height:1.7;}
  .note b{color:var(--ink);}

  /* sticky video dock — click any timestamp to seek */
  .video-dock{position:sticky;top:0;z-index:30;margin:1.6rem 0 0;background:var(--paper);
    border:1px solid var(--line);border-radius:.7rem;overflow:hidden;
    box-shadow:0 10px 24px -16px rgba(0,0,0,.55);}
  .dock-bar{display:flex;align-items:center;gap:.6rem;
    padding:.5rem .5rem .5rem .85rem;background:var(--card);border-bottom:1px solid var(--line);}
  .dock-title{font-family:var(--font-gothic);font-weight:600;font-size:.82rem;color:var(--ink);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tri{color:var(--shu);}
  .dock-min{margin-left:auto;font-family:var(--font-gothic);font-size:.75rem;font-weight:600;
    cursor:pointer;color:var(--ink-soft);background:transparent;border:1px solid var(--line-strong);
    border-radius:2rem;padding:.24rem .75rem;white-space:nowrap;transition:color .15s,border-color .15s;}
  .dock-min:hover{color:var(--shu);border-color:var(--shu);}
  .dock-min:focus-visible{outline:2px solid var(--shu);outline-offset:2px;}
  /* play/pause — the primary transport control, built by player_auto.js into the dock bar.
     The bar is sticky and survives minimising, so this is reachable whenever the page is. */
  .dock-play{font-family:var(--font-gothic);font-size:.8rem;font-weight:600;cursor:pointer;
    color:var(--ink);background:transparent;border:1px solid var(--line-strong);border-radius:999px;
    padding:.22rem .6rem;margin-right:.4rem;line-height:1.2;min-width:2.2rem;}
  .dock-play:hover{color:var(--shu);border-color:var(--shu);}
  .dock-play:focus-visible{outline:2px solid var(--shu);outline-offset:2px;}
  .dock-play[aria-pressed="true"]{color:var(--shu);border-color:var(--shu);}
  .dock-min{margin-left:0;}
  .dock-follow{margin-left:auto;font-family:var(--font-gothic);font-size:.75rem;font-weight:600;
    cursor:pointer;color:var(--ink-soft);background:transparent;border:1px solid var(--line-strong);
    border-radius:2rem;padding:.24rem .7rem;white-space:nowrap;
    transition:color .15s,border-color .15s,background .15s;}
  .dock-follow:hover{color:var(--shu);border-color:var(--shu);}
  .dock-follow.on{color:var(--shu);border-color:var(--shu);background:var(--joshi-t);}
  .dock-follow:focus-visible{outline:2px solid var(--shu);outline-offset:2px;}
  /* The sticky video must never crowd out the sentence it exists to explain. The frame is an
     aspect-ratio box, so its HEIGHT follows its WIDTH — bounding the height therefore means bounding
     the width by the height budget (h*16/9), not slapping a max-height on a 16:9 box and letterboxing
     it. --dock-max is that budget. This cap used to live inside @media (max-width:560px), i.e. it was
     keyed on the screen being NARROW when the problem is the screen being SHORT: a landscape phone is
     844px wide and 390px tall, sailed straight past it, and gave the video 335px — 86% of the
     viewport, leaving a 31px sliver of the sentence you are supposed to be reading. */
  .dock-video{max-width:min(32rem, calc(var(--dock-max) * 16 / 9));margin:0 auto;}
  .video-frame{position:relative;aspect-ratio:16/9;background:#000;max-height:var(--dock-max);}
  .video-frame iframe,.video-frame video{position:absolute;inset:0;width:100%;height:100%;
    border:0;display:block;background:#000;object-fit:contain;}
  .video-dock.min .dock-video{display:none;}
  .play-hint{font-size:.83rem;color:var(--ink-soft);margin:.75rem 0 0;}
  .play-hint b{color:var(--ink);font-weight:600;}

  /* furigana control bar */
  .furi-bar{display:flex;align-items:center;justify-content:space-between;gap:.7rem 1rem;
    flex-wrap:wrap;margin:1.5rem 0 0;padding:.7rem .5rem .7rem 1rem;background:var(--card);
    border:1px solid var(--line);border-left:3px solid var(--goi);border-radius:.55rem;font-size:.85rem;}
  .furi-hint{color:var(--ink-soft);}
  .furi-hint b{color:var(--ink);font-weight:600;}
  #furiToggle{font-family:var(--font-gothic);font-size:.8rem;font-weight:600;cursor:pointer;
    color:var(--goi);background:transparent;border:1px solid var(--goi);border-radius:2rem;
    padding:.32rem .9rem;white-space:nowrap;transition:background .15s,color .15s;}
  #furiToggle[aria-pressed="true"]{background:var(--goi);color:var(--paper);}
  #furiToggle:focus-visible{outline:2px solid var(--goi);outline-offset:2px;}

  .rule{height:1px;background:var(--line-strong);border:0;margin:2.4rem 0;}

  /* ---------- legend ---------- */
  .legend{display:grid;grid-template-columns:repeat(auto-fit,minmax(9.2rem,1fr));
    gap:.55rem;margin:1.5rem 0 0;}
  .lg{display:flex;align-items:baseline;gap:.5rem;font-size:.83rem;color:var(--ink-soft);
    border:1px solid var(--line);border-radius:.5rem;padding:.55rem .7rem;background:var(--card);}
  .swatch{width:.72rem;height:.72rem;border-radius:.2rem;flex:none;transform:translateY(.05rem);}
  .lg b{color:var(--ink);font-weight:600;font-family:var(--font-gothic);}

  /* ---------- section label ---------- */
  .sec{font-family:var(--font-latin);font-size:.74rem;letter-spacing:.2em;
    text-transform:uppercase;color:var(--ink-faint);font-weight:600;
    margin:3.2rem 0 1.2rem;display:flex;align-items:center;gap:.8rem;}
  .sec::after{content:"";flex:1;height:1px;background:var(--line);}

  /* ---------- grammar card ---------- */
  .card{background:var(--card);border:1px solid var(--line);border-radius:.85rem;
    padding:1.35rem 1.4rem 1.5rem;margin:0 0 1.15rem;}
  .card-top{display:flex;align-items:center;gap:.7rem;margin:0 0 .95rem;flex-wrap:wrap;}
  .num{font-family:var(--font-mincho);font-size:1.05rem;color:var(--shu);font-weight:600;
    font-variant-numeric:tabular-nums;}
  .ts{font-family:var(--font-mono);font-size:.75rem;color:var(--ink-soft);
    background:var(--card-2);border:1px solid transparent;border-radius:.3rem;
    padding:.15rem .5rem .15rem .42rem;font-variant-numeric:tabular-nums;cursor:pointer;
    transition:color .12s,border-color .12s,background .12s;}
  .ts::before{content:"\25B8";color:var(--shu);margin-right:.3rem;font-size:.92em;}
  .ts:hover,.ts:focus-visible{color:var(--shu);border-color:var(--shu);outline:none;}
  .ts.flash{animation:ts-flash .9s ease;}
  @keyframes ts-flash{0%,22%{background:var(--shu);color:#fff;border-color:var(--shu);}
    100%{background:var(--card-2);color:var(--ink-soft);border-color:transparent;}}
  @media (prefers-reduced-motion:reduce){.ts.flash{animation:none;}}
  .theme{font-family:var(--font-gothic);font-size:.8rem;color:var(--ink-soft);margin-left:auto;}

  .jp{font-family:var(--font-mincho);font-size:clamp(1.24rem,3.7vw,1.5rem);
    line-height:2.35;margin:.2rem 0 .1rem;color:var(--ink);letter-spacing:.02em;}
  ruby{cursor:pointer;}
  ruby rt{font-family:var(--font-gothic);font-size:.46em;color:var(--ink-faint);
    font-weight:400;letter-spacing:0;
    visibility:hidden;opacity:0;transition:opacity .12s ease;}
  /* reveal: hover = peek · tap/click(.reveal) = pin · keyboard focus = peek · master toggle = all */
  ruby:hover rt,ruby:focus-visible rt,ruby.reveal rt,
  body.show-furi ruby rt{visibility:visible;opacity:1;}
  ruby:focus-visible{outline:2px solid var(--shu);outline-offset:1px;border-radius:.15em;}
  @media (prefers-reduced-motion:reduce){ruby rt{transition:none;}}
  .fx{padding:.02em .08em;border-radius:.15em;font-weight:600;
    border-bottom:2px solid currentColor;}
  .fx.katsu{color:var(--katsu);background:var(--katsu-t);}
  .fx.keigo{color:var(--keigo);background:var(--keigo-t);}
  .fx.joshi{color:var(--joshi);background:var(--joshi-t);}
  .fx.goi{color:var(--goi);background:var(--goi-t);}
  .fx ruby rt{color:inherit;}

  .cn{font-size:.96rem;color:var(--ink-soft);margin:.55rem 0 0;padding:.55rem 0 0;
    border-top:1px dashed var(--line);}
  .cn b{color:var(--ink);font-weight:600;}
  .cn .lbl{font-family:var(--font-latin);font-size:.68rem;letter-spacing:.14em;
    text-transform:uppercase;color:var(--ink-faint);margin-right:.5rem;}

  .points{list-style:none;margin:1.1rem 0 0;padding:0;display:flex;flex-direction:column;gap:.75rem;}
  .points li{display:grid;grid-template-columns:auto 1fr;gap:.7rem;align-items:start;
    font-size:.92rem;line-height:1.68;}
  .chip{font-family:var(--font-gothic);font-size:.72rem;font-weight:600;white-space:nowrap;
    padding:.2rem .5rem;border-radius:.35rem;border:1px solid;line-height:1.3;margin-top:.16rem;}
  .chip.katsu{color:var(--katsu);background:var(--katsu-t);border-color:var(--katsu);}
  .chip.keigo{color:var(--keigo);background:var(--keigo-t);border-color:var(--keigo);}
  .chip.joshi{color:var(--joshi);background:var(--joshi-t);border-color:var(--joshi);}
  .chip.goi{color:var(--goi);background:var(--goi-t);border-color:var(--goi);}
  .u-points .chip{cursor:pointer;}                       /* tap to save the term to the 词汇 deck (online) */
  .chip.saved{box-shadow:inset 0 0 0 2px currentColor;}
  .chip.saved::after{content:'✓';margin-left:.25em;font-weight:700;}
  .points b{color:var(--ink);font-weight:600;}
  .points .jt{font-family:var(--font-gothic);}
  .points em{font-style:normal;color:var(--ink-faint);}

  /* ---------- reference tables ---------- */
  .tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:.7rem;background:var(--card);}
  table{border-collapse:collapse;width:100%;font-size:.88rem;min-width:26rem;}
  caption{text-align:left;font-family:var(--font-gothic);font-weight:600;color:var(--ink);
    padding:.9rem 1rem .2rem;font-size:.98rem;}
  th,td{text-align:left;padding:.6rem .85rem;border-bottom:1px solid var(--line);vertical-align:top;}
  thead th{font-family:var(--font-gothic);font-size:.76rem;letter-spacing:.04em;
    color:var(--ink-faint);font-weight:600;background:var(--card-2);}
  tbody tr:last-child td{border-bottom:0;}
  td .jt{font-family:var(--font-gothic);color:var(--ink);font-weight:600;}
  td .rd{color:var(--ink-faint);font-size:.82rem;}
  .tbl-wrap+.tbl-wrap{margin-top:1.1rem;}

  footer{margin-top:3.5rem;padding-top:1.5rem;border-top:1px solid var(--line);
    font-size:.8rem;color:var(--ink-faint);line-height:1.7;}
  a{color:var(--shu);}

  @media (max-width:480px){
    .points li{grid-template-columns:1fr;gap:.3rem;}
    .chip{justify-self:start;}
    .theme{margin-left:0;width:100%;}
  }

  /* ===== per-sentence analysis ===== */
  .lead{font-size:.9rem;color:var(--ink-soft);margin:0 0 1.4rem;line-height:1.7;}
  .lead .tri{color:var(--shu);}
  .lead .ts-demo{font-family:var(--font-mono);font-size:.8rem;color:var(--shu);
    border:1px solid var(--shu);border-radius:.3rem;padding:.02rem .35rem;}
  .chapter{margin:2.4rem 0 0;}
  .chapter-h{display:flex;align-items:baseline;gap:.7rem;flex-wrap:wrap;margin:0 0 .35rem;}
  .chapter-n{font-family:var(--font-mincho);color:var(--shu);font-weight:600;font-size:1.15rem;
    font-variant-numeric:tabular-nums;}
  .chapter-t{font-family:var(--font-gothic);font-weight:600;font-size:1.02rem;color:var(--ink);}
  .chapter-c{color:var(--ink-faint);font-weight:400;font-size:.85rem;margin-left:.5rem;}
  .chapter-r{font-family:var(--font-mono);font-size:.72rem;color:var(--ink-faint);
    font-variant-numeric:tabular-nums;}
  .chapter-h::after{content:"";flex:1;height:1px;background:var(--line);min-width:1.5rem;
    align-self:center;}

  .u{display:grid;grid-template-columns:4.6rem 1fr;gap:.2rem .85rem;
    padding:.9rem 0;border-top:1px solid var(--line);scroll-margin-top:5rem;
    transition:background .25s ease;}
  .u.key{box-shadow:inset 3px 0 0 var(--shu);padding-left:.75rem;
    border-radius:0 .4rem .4rem 0;background:linear-gradient(90deg,var(--joshi-t),transparent 55%);}
  .u.active{background:var(--joshi-t);box-shadow:inset 3px 0 0 var(--shu);
    border-radius:0 .4rem .4rem 0;padding-left:.75rem;}
  .u.active .ts{background:var(--shu);color:#fff;border-color:var(--shu);}
  .u.active .ts::before{color:#fff;}
  .u.active .u-jp{color:var(--ink);}
  .u-meta{display:flex;flex-direction:column;align-items:flex-start;gap:.35rem;padding-top:.15rem;}
  .u-meta .ts{width:100%;text-align:center;}
  .spk{font-family:var(--font-gothic);font-size:.66rem;font-weight:600;line-height:1.3;
    padding:.12rem .4rem;border-radius:.3rem;white-space:nowrap;border:1px solid transparent;}
  .spk.iwata{color:var(--goi);background:var(--goi-t);}
  .spk.host{color:var(--ink-soft);background:var(--card-2);}
  .spk.nare{color:var(--katsu);background:var(--katsu-t);}
  .spk.neta{color:var(--shu);background:var(--joshi-t);}
  .key-star{color:var(--shu);font-size:.8rem;line-height:1;}

  .u-body{min-width:0;}
  .u-jp{font-family:var(--font-mincho);font-size:1.14rem;line-height:2.15;color:var(--ink);
    letter-spacing:.01em;}
  .u-cn{font-size:.9rem;color:var(--ink-soft);margin-top:.15rem;}
  .u-cn .lbl{font-family:var(--font-latin);font-size:.64rem;letter-spacing:.12em;
    text-transform:uppercase;color:var(--ink-faint);margin-right:.45rem;
    border:1px solid var(--line-strong);border-radius:.25rem;padding:.02rem .28rem;}
  .u-asr{font-size:.78rem;color:var(--ink-faint);margin-top:.4rem;line-height:1.55;}
  .tag-asr{font-family:var(--font-gothic);font-size:.64rem;font-weight:600;color:var(--shu);
    background:var(--joshi-t);border-radius:.25rem;padding:.05rem .35rem;margin-right:.4rem;
    white-space:nowrap;}
  .u-telop{font-size:.78rem;color:var(--ink-faint);margin-top:.35rem;line-height:1.55;}
  /* テロップ track hide/show (page_tools.js builds the button). Hides, never swaps —
     the chip shows spoken AND telop, and their difference is the teaching point. */
  body.no-telop .u-telop{display:none;}
  .tag-telop{font-family:var(--font-gothic);font-size:.64rem;font-weight:600;color:var(--ink);
    background:var(--goi-t);border-radius:.25rem;padding:.05rem .35rem;margin-right:.4rem;
    white-space:nowrap;}
  .u-points{list-style:none;margin:.55rem 0 0;padding:0;display:flex;flex-direction:column;gap:.4rem;}
  .u-points li{display:grid;grid-template-columns:auto 1fr;gap:.55rem;align-items:start;
    font-size:.85rem;line-height:1.6;}
  .u-points .chip{margin-top:.08rem;font-size:.68rem;}
  .u-points .star{color:var(--shu);}

  @media (max-width:520px){
    .u{grid-template-columns:1fr;gap:.45rem;}
    /* flex-wrap is NOT optional here. This rule lays the metadata out as a ROW on the narrowest
       screens, and the row's content is un-shrinkable: the ts, the 44px touch tap targets (fav +
       3 .u-act, forced by the (hover:none)+(pointer:coarse) block below), and a .spk whose width is
       set by the speaker's NAME — 36px for 「先輩」, 129px for 「スタッフ(フクロウ担当)」. Left at the
       default nowrap the row cannot fit a phone, and the overflow does not clip: the browser widens
       the LAYOUT VIEWPORT to swallow it (320 -> 387 on konkatsu, 459 on iginari-fureai), so the whole
       page slides sideways under the thumb. Wrapping .u-actions alone is NOT enough — it still left
       the widest page 43px over. Guarded by ux.sh section A, which measures against the DEVICE width. */
    .u-meta{flex-direction:row;align-items:center;gap:.5rem;flex-wrap:wrap;}
    .u-meta .ts{width:auto;}
    .u.key{background:none;}
    .u-points li{grid-template-columns:1fr;gap:.2rem;}
    /* .chip is white-space:nowrap so a grammar term never breaks mid-word — right on a desktop,
       ruinous on a phone. A chip's min-content is then its ENTIRE label, and these labels are as
       long as the grammar needs: 「～ていなきゃいけない」（～ていなければいけない の口語省略）★ measures
       357px against a ~273px column. `1fr` is minmax(AUTO,1fr), and that auto floor is min-content,
       so the column cannot shrink under the chip — it drags the row, and the page, off-screen
       (oshare-takedatsu: 386px on a 320px phone). Wrapping a long chip costs one line; not wrapping
       it costs the whole page. Short chips are unaffected — they only wrap when they cannot fit. */
    .chip{white-space:normal;}
  }

  /* ============================================================
     MOBILE / TOUCH ADAPTATION  (additive; later rules override)
     ============================================================ */
  :root{ --dock-max:42vh; }
  @supports (height:100dvh){ :root{ --dock-max:42dvh; } }

  /* narrow screens: keep the sticky video from eating the viewport, honour the notch */
  @media (max-width:560px){
    body{ overflow-x:hidden; }                 /* safety net against any stray overflow */
    .wrap{ padding-left:max(1.1rem,env(safe-area-inset-left));

s":"Heafu-fkrCI#03:49#0","t":"03:49","j":"ちょっと入れちゃいますね","c":"那我稍微倒一点吧","k":"〜ちゃいます"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#03:50#0","t":"03:50","j":"じゃあ乾杯もしましょう","c":"那我们也来干杯吧","k":"じゃあ 〜ましょう"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#03:51#0","t":"03:51","j":"はい","c":"好","k":""},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#03:53#0","t":"03:53","j":"カラカラ別品で、カラカラ別品、カラカラ別品","c":"就用「卡拉卡拉别品」（干杯）——卡拉卡拉别品，卡拉卡拉别品","k":"〜で(手段)"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#04:01#0","t":"04:01","j":"せあ本当だ、また全然違うわ、美味しいこれも","c":"（诶？）真的耶，又完全不一样了，这个也好好吃","k":"〜わ 全然+違う"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#04:06#0","t":"04:06","j":"確かに日本酒って感じ、ほんまにすごいですでも","c":"确实有种日本酒的感觉，真的很厉害，不过……","k":"〜って感じ でも(句尾)"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#04:10#0","t":"04:10","j":"これ飲み比べがまた楽しいですね、お料理に合わせて","c":"这样比较着喝也很有意思呢，配着菜一起喝","k":"複合動詞「〜比べ」 〜に合わせて"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#04:15#0","t":"04:15","j":"へー","c":"哦——","k":""},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#04:17#0","t":"04:17","j":"でもお二人のこの仲いい感じもキュンです","c":"不过两位这种感情很好的感觉，也让人小鹿乱撞呢。","k":"キュン(です) も"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#04:21#0","t":"04:21","j":"そうですか","c":"是这样吗。","k":"そうですか"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#04:22#0","t":"04:22","j":"なんかこう、お優しい方たちで良かったみたいな気持ちになります","c":"怎么说呢，就会有种「幸好你们是这么温柔的人」的感觉。","k":"お優しい方たち みたいな気持ちになります"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#04:26#0","t":"04:26","j":"お二人で同じオーラを…","c":"两位身上有种同样的气场……","k":"オーラ"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#04:28#0","t":"04:28","j":"オーラ？","c":"气场？","k":""},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#04:29#0","t":"04:29","j":"私、オーラ見えないですけど","c":"我是看不到气场的啦，不过……","k":"見えない けど"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#04:31#0","t":"04:31","j":"見えるかと思う","c":"我还以为你看得到呢。","k":"〜かと思う"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#04:32#0","t":"04:32","j":"今そんな感じに見えないんですけど、すごいなんか近い感じがします","c":"现在倒是没感觉到那种气场，不过真的有种你们很亲近的感觉。","k":"なんか"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#04:38#0","t":"04:38","j":"本当ですか","c":"真的吗？","k":"本当ですか"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#04:38#1","t":"04:38","j":"実際、アフレコに孫さん(?)毎週来ていただいてたんですけど、毎週あの楽しみだったんですよ","c":"其实呢，孫さん(?)每周都会来配音现场，每周（见到）都是一种期待呢。","k":"来ていただいてた 〜んですよ"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#04:46#0","t":"04:46","j":"本当、収録直前とかにちょっと雑談も含めて喋ったりとか、うん","c":"真的，就像录制前会稍微聊聊天之类的，嗯。","k":"〜たりとか 喋ったり"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#04:50#0","t":"04:50","j":"へー","c":"哦——","k":""},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#04:50#1","t":"04:50","j":"実際、我々はアフレコブースの向こう側の空気感が分からないんですけど、いつもどんな感じなんですか","c":"其实我们不知道配音棚玻璃另一侧的氛围是怎样的，平常都是什么感觉呢？","k":"空気感 んですか"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#04:58#0","t":"04:58","j":"なんか、お二人座ってる、並んで隣で座ってるね","c":"怎么说呢，两位是坐着的，是并排坐在旁边的呢。","k":"座ってる ね"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#05:00#0","t":"05:00","j":"並んで隣で座ってるね","c":"是并排坐在旁边呢。","k":"ね"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#05:01#0","t":"05:01","j":"へー","c":"哦——","k":""},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#05:02#0","t":"05:02","j":"すごい、仲良しじゃん","c":"哇，感情真好呀！","k":"〜じゃん"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#05:04#0","t":"05:04","j":"確かに、位置って大事だもんね","c":"确实，座位（安排）真的很重要呢。","k":"って(主题提示)"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#05:06#0","t":"05:06","j":"大事","c":"重要。","k":""},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#05:07#0","t":"05:07","j":"今日はこんな回ですね、「どうなるかね」って","c":"今天就是这样的一期呢，（当时想着）「不知道会变成怎样呢」。","k":"って(引用)"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#05:09#0","t":"05:09","j":"へー","c":"哦——","k":""},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#05:12#0","t":"05:12","j":"仲良し","c":"感情真好。","k":""},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#05:13#0","t":"05:13","j":"楽しみです","c":"很期待呢。","k":""},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#05:13#1","t":"05:13","j":"久しぶりの方もいるから、ちょっと大変なんじゃないのかなとかあ","c":"因为也有好久没见的人，我当时想着「会不会有点辛苦呢」。","k":"〜んじゃないのかな"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#05:17#0","t":"05:17","j":"そういうお話も、ちょこっとされたりするんですね","c":"那样的话题，你们也会稍微聊一聊呢。","k":"されたりする"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#05:20#0","t":"05:20","j":"いや、嬉しいです","c":"不，我很开心。","k":""},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#05:21#0","t":"05:21","j":"私たちって、その、ブースの…アフレコブースの向こう側、ガラスの向こう側に行くことって、やっぱり基本ないので","c":"我们呢，那个……录音棚……配音棚玻璃另一侧，基本上是不会过去的，所以……","k":"って(主题×2) 向こう側"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#05:30#0","t":"05:30","j":"なんか、どんな会話がなされてるかって、結構ドキドキしながら","c":"总觉得，（那边）到底在进行着怎样的对话呢，我们都是相当忐忑地……","k":"なされてる 〜かって 〜ながら"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#05:33#0","t":"05:33","j":"そうそう","c":"对对。","k":""},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#05:34#0","t":"05:34","j":"なんか、前回のね、あの番組内でもちょっとお話ししましたけど、やっぱコロナ禍だったんで、一期の頃は……","c":"话说，上次呢，在节目里也稍微聊过，毕竟当时是疫情期间，第一季那会儿……","k":"コロナ禍 〜んで(ので的口语形)"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#05:40#0","t":"05:40","j":"だからやっぱブースの向こう側と言っても、皆さんリモートで参加されてたりとかっていうこともあったんで、やっぱり人数的に少ないなっていう印象があったんですけど。","c":"所以说啊，虽说是隔着录音棚玻璃的那一侧，但当时也有不少人是远程参加的，所以总觉得人数上给人一种比较少的印象。","k":"と言っても 参加されて 〜たりとか 〜んで"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#05:48#0","t":"05:48","j":"今はね、本当に結構たくさんの方たちがね、向こう側にもいてくださってるから、なんかその辺の頼もしさだったりとか、みんなで作ってるんだっていう感じが、よりなんか感じられて、嬉しいよね、うん。","c":"现在啊，真的有相当多的人在（录音棚）那一侧陪着我们，所以那种可靠感、「这是大家一起做出来的」这种感觉，更能让人感受到了，很开心呢，嗯。","k":"いてくださってる 〜だったりとか 頼もしさ 作ってるんだ"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#06:00#0","t":"06:00","j":"嬉しいよね、うん。","c":"「开心吧？」「嗯。」","k":""},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#06:02#0","t":"06:02","j":"すごく嬉しかったし、今こうやって、なんかそういうね、なんかこう、今回は久々の登場だから「どうなるかねー」だとか、なんかそういうのをこう気にかけていただきながら、見守っていただいてたんだっていうのも嬉しいし。","c":"真的非常开心，而且像现在这样……嗯，这次算是久违的登场，大家会想着「不知道会怎么样呢」之类的，一直这样惦记着、守护着我们，这一点也让人很开心。","k":"気にかけていただきながら 見守っていただいてた 久々の登場 〜し"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#06:14#0","t":"06:14","j":"嬉しい、そう。","c":"「开心。」「对啊。」","k":""},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#06:17#0","t":"06:17","j":"なんかこうやって……でも確かに、ゆみちゃんが「家族みたい」って言ったけど、やっぱ長くなればなるほど、そういう家族みは増してきそうだね。","c":"就是像这样……不过确实，ゆみ酱刚说了「像家人一样」，果然是相处越久，那种「家人味」就会越来越浓吧。","k":"長くなればなるほど 〜み みたいって言った 増してきそう"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#06:25#0","t":"06:25","j":"そう、なんかその、この特番とかでも結構言ってるんですけど、本当に一期の時の振り返りとかで、一期の頃の映像とかやっぱ流したりとかするじゃないですか、本当にホームビデオじゃない?","c":"对啊，就是那个，这种特别节目里我其实也经常这么说，真的是像回顾第一季的时候，会放一些第一季那会儿的影像资料对吧，那真的跟家庭录像带没两样吧？","k":"〜じゃないですか 振り返り 〜とか〜とかで"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#06:38#0","t":"06:38","j":"わかる。私は本当に「こんな気持ちになることあるんだ」と思って、なんかすごい恥ずかしくなったり、「えっ、こんなちっちゃかったんだよ」みたいな。なんかもう声変わりする前じゃん、ゆみちゃんみたいなね。","c":"我懂。我自己也真的会想「原来还有这种心情啊」，会突然变得超害羞，「咦，原来那时候这么小只啊」之类的。就是「这不都还是变声之前嘛，ゆみ酱」——那种感觉呢。","k":"気持ちになることあるんだ みたいな 〜じゃん 声変わりする前"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#06:49#0","t":"06:49","j":"そうだよ。その声変わりの話、ちょっと聞いてもらいたいんですよ。","c":"对啊。那个变声的故事，我还挺想让大家听听的。","k":"聞いてもらいたい 〜んですよ"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#06:53#0","t":"06:53","j":"お酒の番組だからさ、ちょうどいいじゃん。","c":"反正是喝酒的节目嘛，正好合适吧。","k":"だからさ"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#06:56#0","t":"06:56","j":"いや、ちょうど良くないよ。お酒の使い方。","c":"不对，才不是正好呢。这算什么用酒的方式啊。","k":"お酒の使い方"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#06:59#0","t":"06:59","j":"本当にその、あの、声の……ルディの声の作り方がちょっと異常。","c":"真的就是那个……鲁迪那个声音的做法有点不正常（太厉害了）。","k":"声の作り方 ちょっと異常"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#07:05#0","t":"07:05","j":"異常。いや、だって深夜の3時にカラオケ行ってるんですよ。深夜の3時にカラオケ。","c":"太不正常了。不是啦，因为她凌晨三点还跑去唱卡拉OK呢。凌晨三点唱卡拉OK。","k":"だって 〜んですよ"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#07:12#0","t":"07:12","j":"でお酒で喉を焼き、で、歌ったり、台本(?)を持って、でセリフを叫びまくって声をからして。","c":"用酒精把喉咙灼烧一遍，接着唱歌什么的，拿着台本(?)，还拼命喊台词把嗓子都喊哑了。","k":"〜まくる 〜たり 声をからして"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#07:18#0","t":"07:18","j":"使える大丈夫?","c":"这样还能用（嗓子）吗，没事吧？","k":"〜大丈夫?"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#07:25#0","t":"07:25","j":"寝るとちょっと声って寝起きって低くなるじゃないですか。それでその後寝て、喉が起きないうちにルディをやるっていう、すごいことやってたんですよ。","c":"睡一觉起来，刚醒的时候声音会稍微变低对吧。所以呢，就先睡一觉，趁喉咙还没『醒过来』之前去配路迪的戏——她就是在做这么厉害的事情。","k":"〜じゃないですか 〜ないうちに 〜っていう ルディ"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#07:35#0","t":"07:35","j":"すごいすごい。","c":"好厉害好厉害。","k":""},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#07:36#0","t":"07:36","j":"じゃあその聞いて。頑張りすぎだよ、先生。","c":"那你听听这个。你也太拼了吧，先生。","k":"〜すぎる"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#07:41#0","t":"07:41","j":"先生の…今、いつの頑張りすぎ?生みの親としてすごい素直な…","c":"先生的……这次又是「第几次」太拼命了啊?作为角色的「生身父母」，还真是坦率……","k":"生みの親 〜として すごい+形容动词"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#07:48#0","t":"07:48","j":"いや私も聞いて。いや、なんか頑張ってるのは知ってたんですけど、そのお酒でその、焼く喉のその焼く以前にその、夜中からカラオケにっていうのは結構びっくりしちゃって。","c":"不是，我也是（刚）听说的啦。呃，她很努力这件事我是知道的，但在那个用酒精灼烧喉咙之前——大半夜跑去唱卡拉OK这件事本身，就已经让我挺吃惊的了。","k":"〜のは 〜てる 〜以前に 〜っていうのは 〜ちゃって"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#08:03#0","t":"08:03","j":"いやなんかどうしてもこう色々アフレコの時間から逆算してとかやって、考えるとやっぱそこら辺でやらないと。","c":"呃，反正不管怎样，总是要从配音的时间点倒推回去，这样那样地安排，这么一想，果然就得在那个时间段左右做才行。","k":"〜から逆算して 〜ないと アフレコ"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#08:11#0","t":"08:11","j":"でしかも寝るとやっぱ戻っちゃうから、なるべくそのギリギリまで。","c":"而且睡一觉的话声音又会恢复原样，所以要尽量拖到最后一刻。","k":"〜ちゃう ギリギリ"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#08:18#0","t":"08:18","j":"でしかもあと本当になんかこういう話ここでしていいかわからないけど、なんかさお風呂入ったりシャワー浴びたりするとさやっぱ湿気で戻っちゃうんだよね。","c":"而且还有，老实说不知道这种话能不能在这里说，不过，像是洗澡啦冲淋浴啦，水汽也会让声音又恢复原状，你懂的。","k":"〜けど 〜さ 〜んだよね"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#08:26#0","t":"08:26","j":"喉が強すぎるんですね。","c":"喉咙也太强韧了吧。","k":"〜すぎる"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#08:28#0","t":"08:28","j":"強いですね。いやだからなんかもうシャワーの時間とかも本当に最小限にして。","c":"是很强呢。所以说啊，连淋浴的时间之类的也真的是控制到最短。","k":"〜にして"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#08:33#0","t":"08:33","j":"バーって出て、回復しないように努めて。","c":"「唰」地一下子出来，然后努力不让（声音）恢复原样。","k":"〜ないように努める バーって"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#08:36#0","t":"08:36","j":"一番辛かったのは、本当に今でこそ言える話ですけど、アフレコ現場で皆さんと——本当は本当にね、皆さん仲良しだから——こうたわいない会話とかしたいんですけど。","c":"最辛苦的一点——这真的是现在才敢说的话——是在配音现场，说真的，因为大家关系真的很好，所以其实很想跟大家闲聊几句。","k":"〜のは〜 今でこそ 〜んですけど たわいない会話"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#08:47#0","t":"08:47","j":"そうすると、どんどん戻っていっちゃうんですよ。","c":"可是一（跟大家聊天），（声音）就会一点点地恢复原样。","k":"〜ていっちゃう どんどん"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#08:49#0","t":"08:49","j":"だからもう、皆さんがこう日常の会話してる中もずっと、頑張ってなきゃいけなかったのが、しんどくって。","c":"所以啊，就算大家在旁边闲话家常的时候，我也得一直绷着劲硬撑下去（维持角色的声线），这一点真的太累了。","k":"〜てなきゃいけない（＝〜ていなければいけない） 〜なきゃいけなかった 〜てる中も しんどくって"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#08:57#0","t":"08:57","j":"もっともっと、いろいろね、話したかったなーとかって思いつつ。","c":"心里也想着「真希望能多聊聊、聊各种各样的事情啊」。","k":"〜たかった 〜とかって 〜つつ"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#09:01#0","t":"09:01","j":"そうそう、でまた、そうねテストやって本番やってってやっていくと、テストテイクで本番テイクくると、また戻ってきちゃってて、声が——そこがすごく、自分的にはもうなかなかコントロールできない部分だったんで。","c":"对对，然后呢，就这样一路做测试（Take）、正式（Take）录下去，等测试Take过后到了正式Take，声音又会不由自主地恢复原样——这一点对我自己来说，真的怎么也控制不了。","k":"〜ていくと 戻ってきちゃってて なかなか〜ない"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#09:15#0","t":"09:15","j":"クーってなりながらも、でも、その辺も全てもう分かっていただいた上でだったんで。","c":"虽然心里各种「唔——」(?)地纠结，但好在这些大家都已经完全理解、体谅了，才有后来的一切。","k":"クーってなる 〜ながらも 〜ていただいた上で"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#09:21#0","t":"09:21","j":"本当に支えていただいた結果です。","c":"真的是承蒙大家一路支持才有的结果。","k":"〜ていただいた"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#09:24#0","t":"09:24","j":"本当にありがとうございます。","c":"真的非常感谢大家。","k":"ありがとうございます"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#09:26#0","t":"09:26","j":"僕は今から聞いたんで、そのうちの声を作ってから、ベースを低くしてから来てるとは聞いてたんですけど。","c":"我是刚才(?)才听说的，之前倒是听说过，你是先把声音调好、把音调压低之后才过来的。","k":"〜んで 〜てから ベースを低くする"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#09:33#0","t":"09:33","j":"ちょうどその撮ってたのが、土曜日に撮ってたんで。","c":"而且刚好那次录音，是星期六录的。","k":"の 〜てたんで"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#09:37#0","t":"09:37","j":"金曜の夜の、なんかこう、イエーイみたいな学生たちがいるカラオケ屋さんに、一人で声を作るために。","c":"（跑去）星期五晚上那种，怎么说呢，一堆学生「耶——」地喧闹着的卡拉OK店，一个人去练声音。","k":"〜みたいな 〜ために"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#09:45#0","t":"09:45","j":"深夜の3時に、カラオケ屋さんに通うって、どんな気持ちで行ってたんだろうと思って。","c":"「大半夜三点还要往卡拉OK店一趟趟地跑」——我就在想，他当时到底是抱着什么样的心情去的呢(?)。","k":"〜って 〜んだろうと思って 通う"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#09:52#0","t":"09:52","j":"もうやっぱ3時だからさ、もうみんな、さ、そういうことよね、だからもう帰れませんみたいな人たちがいて。","c":"嗯，毕竟都凌晨三点了嘛，大家也都是那种情况啦，就是有不少「已经回不了家了」的人在那儿。","k":"さ よね そういうことよね"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#09:59#0","t":"09:59","j":"でウェーイってやってるところに「あ、いらっしゃいませ」って言われて、「一人です」って言って。金曜の……そうだ、土曜だけども、深夜3時に「一人です」って言って行くって。","c":"我正赶上那边有人在『Wei~』地闹腾，柜台『啊，欢迎光临』地招呼我，我说『我一个人』——星期五……啊不对，是星期六啦，凌晨三点说着『我一个人』就这么去了。","k":"〜って（口语引用） 受身形（言われる） 〜だけども（自我更正）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#10:12#0","t":"10:12","j":"毎回同じとこ行ってたんでしょ？","c":"所以你每次都去同一家吗？","k":"〜んでしょ（＝んでしょう）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#10:14#0","t":"10:14","j":"でしかもさ、カラオケボックスってさ、歌入れないとさ、ずっと同じ動画が流れるじゃない。","c":"而且啊，KTV这种地方，你要是不点歌，就会一直放同一段画面对吧。","k":"〜と、ずっと〜（恒常条件） 〜じゃない（反问确认）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#10:21#0","t":"10:21","j":"どんどん気がおかしくなってきて、今私はなんだみたいな。","c":"整个人越来越不对劲，会觉得『我现在到底是谁』。","k":"気がおかしくなる 〜みたいな（句尾省略）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#10:26#0","t":"10:26","j":"でもなんかそれで黙ってたらもう、どんどん戻っちゃうんじゃないかって思うから。","c":"但要是就这么一直沉默着，感觉就会渐渐又变回原样，所以……","k":"〜てたら（＝〜ていたら） 〜んじゃないか 戻っちゃう（＝戻ってしまう）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#10:31#0","t":"10:31","j":"とにかくあの、お酒を頼んで(?)、歌って(?)、歌もなんか絶対普段だったら歌わないような曲とかもやから、もうキーがとっても高い曲とかをもうガーって裏声使わずにガーって歌うぞみたいな感じでやって。","c":"总之先点酒、开口唱，唱的也都是些平时绝对不会唱的歌，所以就豁出去，飙那种调门特别高、不用假声硬吼出来的歌。","k":"やから（关西腔＝だから） 〜ず（に） 裏声を使わず"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#10:44#0","t":"10:44","j":"なんでなんでって、いやっていうもう経緯があって、土曜のアフレコに臨んでたって聞いて私は……","c":"『为什么为什么』——不过，听说是有这么一段来龙去脉，才去面对星期六的配音的，我听了……","k":"〜って（引用+省略） 経緯（いきさつ） 臨んでた（＝臨んでいた）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#10:51#0","t":"10:51","j":"いや待って、でもあの3人があるんだよ。","c":"不对等等，可是那『三个人』的事在啊。","k":"あるんだよ（＝あるのだよ）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#10:55#0","t":"10:55","j":"この話したらもうみんなそういう風に受け止めちゃうかもしれないよ。","c":"这话说出去，大家可能都会往那个方向想的。","k":"そういう風に受け止める 受け止めちゃう（＝受け止めてしまう）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#10:58#0","t":"10:58","j":"私もじゃあ一緒に行って、一緒に行って、私も一緒に行くからだったら。","c":"那我也一起去吧、一起去吧、我要是也一起去的话……","k":"〜からだったら"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#11:03#0","t":"11:03","j":"シルフィ(?)は可愛い人じゃって欲しいからやだ。","c":"希望希尔菲(?)一直是那种可爱的人，所以不要。","k":"〜であって欲しい（口语＝〜じゃって欲しい）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#11:06#0","t":"11:06","j":"酒焼けしないで、シルフィ(?)は。","c":"希尔菲(?)不要被酒喝糙了声音。","k":"酒焼け"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#11:09#0","t":"11:09","j":"酒焼けは私だけでいいの。","c":"声音变糙这种事我一个人承担就好。","k":"〜だけでいいの"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#11:12#0","t":"11:12","j":"嫁は酒焼けしないで。","c":"『老婆』可不能被酒喝糙了声音。","k":"嫁"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#11:13#0","t":"11:13","j":"そうよ。","c":"就是说啊。","k":""},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#11:15#0","t":"11:15","j":"できればね、付き合ってあげたいなって気持ちにはなったんだけど。","c":"如果可以的话，也是有点想陪她去的心情啦，不过……","k":"〜てあげたい"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#11:17#0","t":"11:17","j":"しかも一番変わらなそうだしね、言うて。","c":"而且她感觉是最不会被影响的那种啦，话是这么说。","k":"〜し、〜言うて（关西腔）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#11:20#0","t":"11:20","j":"お酒でってこと?","c":"是靠喝酒来改变的意思吗？","k":"～ってこと?"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#11:21#0","t":"11:21","j":"そう。","c":"嗯，是啊。","k":""},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#11:22#0","t":"11:22","j":"どうだろう?声は分からんけど、テンションは変わらなそうじゃん。","c":"不好说吧？声音倒不清楚，但整体状态感觉不会变吧。","k":"～そう（样态） じゃん"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#11:27#0","t":"11:27","j":"分かんないよ。","c":"不知道啦！","k":"～かんない（口语音变）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#11:28#0","t":"11:28","j":"シルフィーもなんか全然違う。","c":"希露菲那边好像也完全不一样了。","k":"全然＋肯定"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#11:30#0","t":"11:30","j":"やめて、そんなの見たくない。","c":"别啊，我不想看到那样。","k":"～たくない"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#11:31#0","t":"11:31","j":"やめて、シルフィーはずっとあのままでいて。","c":"别啊，希望希露菲一直保持那个样子。","k":"～のままでいて"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#11:35#0","t":"11:35","j":"びっくりしません?","c":"不觉得很惊讶吗？","k":"～ません?"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#11:37#0","t":"11:37","j":"私、そんな作り方してる役者さん見たことなくて、びっくりしちゃいました。","c":"我从没见过用那种方式来塑造声音的演员，吓了一跳。","k":"～たことがない（口语省略が） ～ちゃいました"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#11:43#0","t":"11:43","j":"実写の方の役者さんでは、たまにね、そういう方いらっしゃるのは知ってますけど。","c":"真人演员当中，偶尔确实有这样的人，这我是知道的，不过……","k":"いらっしゃる 句末～けど"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#11:49#0","t":"11:49","j":"あのー、白海さん(?)ぐらいかな、話聞いたことあるのは。","c":"呃……大概只有白海(?)老师吧，我听说过的就这一位。","k":"～ぐらい 倒装＋の"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#11:52#0","t":"11:52","j":"男役さん(?)はやっぱり少年やるときに、すごいやっぱり強いお酒でっていう話は伺ったことあるけど。","c":"演男角的演员在演少年角色的时候，果然会喝很烈的酒——这种说法我倒是听说过。","k":"伺う ～でっていう話"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#11:59#0","t":"11:59","j":"ユミちゃんは自分から言わないんで、私が言ってこうと思って。","c":"由美酱自己不会主动说，所以我想替她说出来。","k":"～んで ～ていこう→ってこう"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#12:02#0","t":"12:02","j":"なるほど。","c":"原来如此。","k":"なるほど"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#12:03#0","t":"12:03","j":"めっちゃ嫁じゃん。","c":"也太像贤妻了吧！","k":"めっちゃ"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#12:04#0","t":"12:04","j":"めっちゃ大変なんですよ。なんか他の仕事に影響出るけど、それでもやっぱルディを全うしたいっていう気持ちが。","c":"真的很辛苦的。多少会影响到其他工作，但即便如此，还是想把露迪这个角色演到底——就是这种心情……","k":"～を全うする 句末～が（欲言又止）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#12:12#0","t":"12:12","j":"だから、もうちょっとお願いしますね、事務所も。","c":"所以还请再多担待一下啦，经纪公司也是。","k":"～ね（软化语气）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#12:16#0","t":"12:16","j":"この奥さんすごすぎない?","c":"这位「贤妻」也太厉害了吧？","k":"～すぎない?"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#12:19#0","t":"12:19","j":"はい。","c":"是啊。","k":""},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#12:19#1","t":"12:19","j":"うちの子(?)っていうか、なんか最大限(?)お願いします。","c":"说是自家人也不为过啦，总之还请大家尽量多多关照。","k":"～っていうか"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#12:23#0","t":"12:23","j":"いや、でもなんか、そう確かに、その誰かにね、言われたわけでは決してないわけですよ。","c":"不过呢，说真的，倒不是被谁特意这么要求过的啦。","k":"言われた（被动形） 決して～ない ～わけです"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#12:28#0","t":"12:28","j":"声をからせて(?)ほしいとか、もっと低くしてほしいとかって、別に誰にも言われたわけじゃないから。","c":"什么「希望你把嗓子喊哑」啦、「希望再压低一点」啦之类的，其实根本没有谁这么跟我说过。","k":"～てほしい 声をからす とか～とかって"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#12:34#0","t":"12:34","j":"決してそのスタッフさんたち監督たちが、そういうふうなことを言ってきたとかは全くなくて、私が単純に、今後のその成長したルディを演じるにあたって……","c":"绝对不是工作人员或导演们跟我说过这样的话，完全没有这回事——单纯是我自己，在今后要演绎那个已经成长了的露迪之际……","k":"～てきた ～にあたって"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#12:45#0","t":"12:45","j":"やっぱり見た目もしっかりね、やっぱり本当にさ、アニメーターさんたちもすごい方たちばかりだからさ。","c":"果然外形上也做得很扎实呢,真的是因为动画师们个个都太厉害了。","k":"さ 〜ばかり"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#12:51#0","t":"12:51","j":"なんかこう、いきなり成長するとかじゃなくて、こう地続きで、徐々に徐々に顔つきが変わっていく感じとかも、アニメーションでやっぱ表現していただいてるっていう分。","c":"总感觉不是那种突然一下子就长大的感觉,而是那种连贯的、一点点一点点地面容渐渐变化的感觉,动画也把这部分很好地表现出来了。","k":"〜ていただく 〜ていく とか"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#13:00#0","t":"13:00","j":"なんか私もちゃんとそこに乗っからねばみたいな気持ちがやっぱあったから。","c":"总觉得我自己也得好好地跟上这份努力才行——心里一直有这样的想法。","k":"〜ねば みたいな から"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#13:05#0","t":"13:05","j":"共同作業だもんね。","c":"毕竟是共同创作嘛。","k":"もんね"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#13:06#0","t":"13:06","j":"そうで、しかもね、そういう再オーディション——続投するかどうかっていうところでのオーディションをしていただいたっていうこともあったんで。","c":"是啊,而且啊,还有过那种重新试镜——就是「是否能继续演下去」那种试镜,也经历过呢。","k":"〜していただく というところで んで"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#13:13#0","t":"13:13","j":"何か自分の中で低くできる何かないかなって思った時に、そういう手段を選ぶことしかできなくてっていう感じだったんですよ。","c":"当我在想「有没有什么办法能让自己(的声音)更低沉一些」的时候,感觉就只能选择那样的手段了。","k":"って 〜しかできない"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#13:25#0","t":"13:25","j":"びっくりしますよね。","c":"会吓一跳吧。","k":"よね"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#13:26#0","t":"13:26","j":"びっくりしました。","c":"是吓了一跳。","k":"〜ました"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#13:27#0","t":"13:27","j":"最初の中で16(?)をお話しした時とか。","c":"最初的时候聊到那个「16」(?)的时候之类的。","k":"とか"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#13:30#0","t":"13:30","j":"お悩みも含めて、そうやって、そうめちゃくちゃ監督がお話ししやすい方すぎて。","c":"连烦恼之类的也都说了,就那样,因为导演真的是个超级容易讲话的人。","k":"〜すぎる 〜やすい"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#13:37#0","t":"13:37","j":"全部もう暴露しちゃって、私がもう耐えられなかったの。","c":"结果我全都一股脑说出来了——因为我实在是撑不住了。","k":"〜ちゃう 〜て(接续・倒装) 〜られない(可能形) の"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#13:41#0","t":"13:41","j":"重圧に……重圧っていうか、私がもう理想としているこういう声を出したいって思ってるのに、そこに行き着けない自分がすごい悔しくて。","c":"是重压……不如说与其说是重压,不如说是明明自己心里想要发出理想中的那种声音,却怎么也达不到,这样的自己让我非常不甘心。","k":"っていうか のに"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#13:50#0","t":"13:50","j":"そうだね、その話数によってはどうしてもやっぱムラができてしまって、なんか自分が思い描いてた低さというかが出せなかった時に。","c":"是啊,根据话数不同,难免还是会出现参差不齐的情况——就是没能表现出自己心里所想象的那种低沉感的时候。","k":"〜てしまう によっては というか"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#14:00#0","t":"14:00","j":"特にもう今だからこそ言っちゃいますけど。","c":"尤其是,因为是现在了才敢说啦。","k":"からこそ 〜ちゃう"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#14:03#0","t":"14:03","j":"やっぱシルフィーとの新婚したばかりの頃、結婚した時って本当にやっぱ幸せなところをいっぱい出さなきゃいけなかったんですよ。","c":"果然是和希尔菲刚新婚的那段时期——结婚的时候真的是必须要把幸福感好好表现出来才行呢。","k":"〜たばかり 〜なきゃいけない"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#14:10#0","t":"14:10","j":"でもそっちを優先すると結果的に声のトーンが上がっちゃうっていうところで、そうなるとちょっとやっぱ幼くなっちゃうから、それがすごく辛くて。","c":"但如果优先考虑那个，结果就是嗓音的音调会不由自主地变高，这样一来又会显得有点幼稚，这一点让我非常痛苦。","k":"〜ちゃう(てしまう) っていう(という) から(非句末的接续)"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#14:20#0","t":"14:20","j":"でも私がその声を低くしたいからっていうところをやると、逆に今度はその幸せ度が薄まっちゃうというか、高揚感みたいなそういうものが……","c":"但如果按照『我想把声音压低』这个方向去做，反而这次又会让那种幸福感变淡，或者说……那种高扬感之类的东西……","k":"辞書形+と(恒常条件) というか 薄まる/薄める"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#14:29#0","t":"14:29","j":"確かに","c":"确实（是这样）。","k":""},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#14:30#0","t":"14:30","j":"そう、どうしてもやっぱりこう冷たく聞こえちゃったりとかっていう部分で、すごく葛藤があって。","c":"对，毕竟怎么弄都还是会显得冷淡生硬，这一点真的很让我纠结。","k":"〜く聞こえる 〜たり(とか) 葛藤"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#14:35#0","t":"14:35","j":"でもそんな時に多分私がそうやって悩んでることを知ってくださってたからこそ、「もう声は気にしないでください」「今大事なのはその感情だから」っていうところと。","c":"但那个时候，大概是因为（对方）知道我一直这样烦恼，才对我说了『不用再在意声音了』『现在重要的是那份感情』这些话——","k":"〜てくださる からこそ 〜ないでください"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#14:46#0","t":"14:46","j":"あとは言っていただいたのが、千山さんがそういう風にやればそれがルーデウスなのでっていうようなことを、なんか言っていただいた時にもうなんか涙が……","c":"还有就是，（对方）对我说了这样一番话——『只要千山さん照那样去演，那就是鲁迪乌斯』——听到这句话的时候，眼泪一下子就……","k":"〜ていただく ば形(仮定条件) 言いさし(话说到一半)"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#14:56#0","t":"14:56","j":"恥ずかしい……いやもうほんとそういう風に言っていただいたのがもうすごくありがたくて。","c":"……真难为情。不，真的，能被这样对我说，让我非常感激。","k":"〜ていただいた"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#15:05#0","t":"15:05","j":"珍しくない?でもなんかゆみちゃんそういうのあんまり話さないイメージだから。","c":"是不是挺少见的？总感觉由美酱平时不太会聊这种事。","k":"〜ない?(疑問終助詞) 〜イメージだから"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#15:09#0","t":"15:09","j":"もうね、勝手に自分で自分のことを追い詰めすぎて、もうどうしようもなくなって、人に話すしかなかった。","c":"我啊，自己把自己逼得太紧，已经到了没办法的地步，结果只能找人倾诉了。","k":"〜すぎる 〜しかない 自分で自分を〜"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#15:16#0","t":"15:16","j":"もう「どうしよう」じゃないけど……","c":"虽然也没到『该怎么办』那种地步啦，不过……","k":"〜じゃないけど"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#15:19#0","t":"15:19","j":"そう、だからその求められてることは分かってたんだよね。","c":"对，所以其实我一直都明白大家对我的期待是什么。","k":"受身形(られる) 〜んだよね"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#15:22#0","t":"15:22","j":"私もできるならそうしたい。","c":"如果可以的话，我也想那样做。","k":"なら(仮定)"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#15:24#0","t":"15:24","j":"だけどそうすると声が可愛くなっちゃうみたいなので、そこがすごく自分の中で葛藤してたから。","c":"但如果那样做，声音好像就会变得可爱，这一点在我心里非常纠结。","k":"〜みたいなので 自分の中で葛藤する"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#15:33#0","t":"15:33","j":"でもなんかそれは多分ここまでやらせていただいてたからこそ……","c":"不过那大概也是因为一直做到了这个地步，才有的（体会）……","k":"〜させていただく からこそ"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#15:36#0","t":"15:36","j":"多分その弱音みたいなものも、そう、どうなるか分からないにせよ話しても大丈夫かなみたいな、多分そういうものがあったんだと思う。","c":"大概那种像是在示弱的话，嗯，就是那种不管结果会怎样、说出来应该也没关系吧的感觉，我想大概是有过这样的念头的。","k":"にせよ 〜みたいな（婉转収尾） 話しても（て形+も）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#15:49#0","t":"15:49","j":"すごい、それはもう渋谷監督の、なんかこう「いつでもどうぞ」みたいな懐の広さみたいなね。","c":"真的很厉害，那完全就是涩谷导演那种随时都欢迎一样的宽广胸怀呢。","k":"懐の広さ 〜みたいな＋ね"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#15:56#0","t":"15:56","j":"でもすごく、そう、言葉にせずとも、なんかこう、させてくださってたところがすごくたくさんあって。","c":"但是真的，即使不用言语明说，也有很多让我们（自由发挥）的地方。","k":"〜させてくださる 〜ずとも"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#16:02#0","t":"16:02","j":"なんかありそうだなーってときは、立ち会いの場所とかロビーとかでいてみたりとかして。","c":"（导演）总觉得好像会有什么（问题）的时候，就会待在旁听席或者大厅之类的地方（等着）。","k":"〜てみたりとかして ありそうだ"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#16:08#0","t":"16:08","j":"いや、でも本当そうなんですよ。","c":"不过，真的是这样的。","k":"〜んですよ"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#16:10#0","t":"16:10","j":"もうだから、そう、1回あったんですよね、そのときもね。","c":"所以说啊，真的有过一次那样的事，那时候也是。","k":"〜んですよね"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#16:14#0","t":"16:14","j":"ちょっと原作、やっぱ尺の都合だったりとかで、ちょっと原作と違う表現になってるところとかも。","c":"原作里，毕竟因为篇幅之类的关系，也有些地方变成了跟原作不同的表现方式。","k":"尺の都合 〜だったりとかで"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#16:20#0","t":"16:20","j":"やっぱ家でどんだけ練習しても、なんか「これでいいのかなー、大丈夫かなー」みたいなのが、やっぱこう、なかなかこう自分の中でこれって決めきれなくって。","c":"毕竟不管在家练习多少次，总会有这样真的可以吗、没问题吧这种感觉，果然很难在自己心里真正下定决心。","k":"どんだけ〜ても 〜きれない（決めきれない）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#16:28#0","t":"16:28","j":"そんなときに、そう、ロビーにずっといてくださったから。","c":"那种时候，因为（导演）一直待在大厅里……","k":"〜てくださる 〜から（原因・句末省略）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#16:32#0","t":"16:32","j":"「あのー」って言ったら、そこに今度は先生も「どうしました」って言って。","c":"一说「那个……」，这次老师也（在旁边）说「怎么了」。","k":"〜って言ったら"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#16:38#0","t":"16:38","j":"「さあ、実はここなんですけど」って言ったら、「あー、そこはね、ちょっと原作とはちょっと違うやり方にしたんですよねー」みたいな感じで。","c":"说「呃，其实是这里……」，（对方）就是「啊～那里的话，是用了跟原作不太一样的处理方式呢～」这种感觉。","k":"〜んですけど（前置き） 〜みたいな感じで"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#16:45#0","t":"16:45","j":"でももう、先生と監督が、もう密に、そうやって言ってくださるから。","c":"但是，因为老师和导演都那样紧密地（跟我们）沟通说明……","k":"密に 〜てくださるから"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#16:49#0","t":"16:49","j":"私2人で、なんかこう、悩んでますかね。","c":"我们两个人，大概就是这样一起烦恼着吧。","k":"〜てますかね"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#16:53#0","t":"16:53","j":"そう、もう、そのフォローというか、もう支えが本当に助けられて。","c":"对，那种照应也好、支持也罢，真的帮了我们大忙。","k":"〜というか 助けられて"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#16:58#0","t":"16:58","j":"「難しいだろうな」って書いてるのが分かるので。","c":"能感觉到（剧本里）写着「这应该很难吧」这样的意图。","k":"書いてる（い抜き言葉） 〜のが分かる"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#17:02#0","t":"17:02","j":"質問があってもいいようにとか。","c":"就好像是为了让人随时都能提问一样。","k":"〜ようにとか"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#17:03#0","t":"17:03","j":"いやもうめっちゃありがたい、本当にありがたい。","c":"不是，真的超级感激，真的非常感激。","k":"めっちゃ"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#17:06#0","t":"17:06","j":"言うべきことは何かないかなって常に思ってましたね。","c":"总是在想『有没有什么该说的话呢』这种事呢。","k":"動詞辞書形+べき 〜かなって(〜かなと)"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#17:09#0","t":"17:09","j":"そこもなんかバディ感がある2人のね。","c":"那一点上，你们两个也很有种『搭档』的感觉呢。","k":"〜感がある"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#17:12#0","t":"17:12","j":"そうだから監督はそういう方で言ってくださったりとか。","c":"对啊，所以导演就是那种会特地为我们说这些话的人。","k":"〜てくださる 〜たりとか"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#17:15#0","t":"17:15","j":"あとはもう私がその弱音を吐露してからは、監督、あがね先生がアフレコ終わってお帰りになるときに「内山さん、今日もかっこよかったです」って言い残して帰っていかれるのがもう何よりまたさらにありがたいなと思って。","c":"而且，自从我吐露了那些没自信的话之后，导演——あがね老师每次配音结束要回去的时候，都会留下一句『内山，你今天也很帅』才走——这一点比什么都更让我觉得，真的很感激。","k":"お帰りになる 〜てからは 言い残す"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#17:33#0","t":"17:33","j":"ファミリーだ。","c":"简直就是一家人啊。","k":""},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#17:34#0","t":"17:34","j":"そうなんです、本当に皆さんがいてくださったおかげで、もう乗り越えられたというか。","c":"是这样的，真的是多亏了大家一直陪在我身边，我才算是……熬过来了吧，算是这么说。","k":"いてくださる おかげで"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#17:39#0","t":"17:39","j":"そう、もう茅野もこうやってね、私が言えないことを全部言ってくれたりとか。","c":"对啊，而且茅野也是这样，把我说不出口的话全都替我说了出来，类似这样。","k":"可能形否定+こと 〜てくれる"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#17:46#0","t":"17:46","j":"そう、本当に支えてもらって。","c":"是啊，真的是一直被大家支撑着。","k":"〜てもらう"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#17:48#0","t":"17:48","j":"でももっと自信持ってみたいなね、みんなに言われてるもんね。","c":"不过『要更有自信一点』之类的，毕竟大家一直都这么跟你说吧。","k":"〜みたいな(な体言止め) 〜もんね"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#17:52#0","t":"17:52","j":"本当に言われます。","c":"真的常常被这么说。","k":"受身形(られる)"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#17:54#0","t":"17:54","j":"今も思ってるし。","c":"现在也这么想着呢。","k":"〜し"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#17:55#0","t":"17:55","j":"でも、それこそ、そのちょうどねちょっと前に、ここちゃんとくまちゃんと会ったときに、「かやのみ次あるんだ、収録」って話した中で、なんかちょうどそんな話が来てたよね。","c":"不过说起来，就正好在不久前，我和ここちゃん、くまちゃん见面的时候，聊到『かやのみ又要有下一次录制了』这些话题当中，好像刚好就聊到了类似的话呢。","k":"それこそ 〜たときに"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#18:08#0","t":"18:08","j":"そうそうそう、ここちゃんはここちゃんで。","c":"对对对，我ここ呢，也是有我自己的（想法）。","k":"名詞は名詞で"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#18:10#0","t":"18:10","j":"やっぱりロキシーっていうキャラクターを演じるにあたって。","c":"毕竟在扮演ロキシー这个角色的时候。","k":"〜にあたって"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#18:15#0","t":"18:15","j":"すごくプレッシャーというか。","c":"真的压力很大，或者说。","k":"というか"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#18:18#0","t":"18:18","j":"自分がすごく好きだからこそ、皆さんからも愛されてるからこそ。","c":"正因为自己非常喜欢这个角色，也正因为她也被大家所喜爱。","k":"からこそ 受身形+てる"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#18:23#0","t":"18:23","j":"自分が演じたロキシー像っていうものが……","c":"自己所诠释出来的那个ロキシー的形象……","k":"っていうもの"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#18:27#0","t":"18:27","j":"先生や監督にとってイメージとしてちゃんと合ってたかどうかっていうのが、やっぱりこう、私も「私、ルーデウスって役をやってます」って名乗るのにちょっと勇気がいるのと同じくらい、彼女もそうだったみたいで。","c":"对原作老师和监督来说，（自己演的角色）在形象上是否真的贴合——她非常在意这一点。就跟我要坦然说出「我在演鲁迪乌斯这个角色」也需要鼓起一点勇气一样，她好像也是同样的心情。","k":"〜っていうのが 名乗るのに勇気がいる 〜のと同じくらい"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#18:44#0","t":"18:44","j":"なので、その辺のお話を聞けたらなって。「私、大丈夫でしたでしょうか」っていうのをすごく気にしてました。","c":"所以就想着如果能听听这方面的话就好了。她好像一直很介意「我这样演真的没问题吧」这件事。","k":"聞けたらなって 〜でしょうか 〜っていうのを気にする"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#18:51#0","t":"18:51","j":"完璧だったと思うんですよね。理想のロキシー。","c":"我觉得真的很完美。是理想中的洛琪希。","k":"〜と思うんですよね 理想の〜"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#18:54#0","t":"18:54","j":"ここちゃん、完璧だって！","c":"ここ酱，真的很完美啦！","k":"文末〜だって（断定强调）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#18:57#0","t":"18:57","j":"よかったです。","c":"那就太好了。","k":"よかったです"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#18:59#0","t":"18:59","j":"次、3期も発表されましたから、嬉しいですね、本当に。","c":"而且第三季也宣布了，真的很开心呢。","k":"〜される（受身形） 〜から（原因）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#19:04#0","t":"19:04","j":"その話を僕、お酒飲みながら聞いてたいですね。画面の向こう側ぐらいで決めたいですね。","c":"那个消息，我想一边喝着酒一边听呢。大概想在屏幕的另一边（以观众的身份）知道结果就好了。","k":"〜ながら 聞いてたい"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#19:12#0","t":"19:12","j":"いやでも、だから、みんなが孫の手先生のファンなんだっていうのは、打ち上げですごい感じた。","c":"不过话说回来，大家果然都是孫の手老师的粉丝——这一点，我在庆功宴上真切地感受到了。","k":"〜なんだっていうのは 孫の手先生"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#19:22#0","t":"19:22","j":"なんかみんなやっぱ無職先生が好きだし、やっぱ孫の手先生のこう生み出したものをみんなこう愛してるからこそ、どう表現するか私たちは声で芝居でだけど、絵の方の芝居含めて演出含めて、なんかみんなが愛をもって作ってる現場だなって思ったので、思いました。","c":"总觉得，大家果然都喜欢「无职老师」（指原作），正因为大家都深爱着孫の手老师所创造出的这些东西——虽然我们是通过声音、通过演技去表现的，但包括画面那边的演技、包括导演演出在内，我觉得这真是一个大家怀着爱在制作的现场，我这么想。","k":"〜からこそ 生み出したもの 愛をもって"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#19:43#0","t":"19:43","j":"すごいいい打ち上げだったよね。","c":"真的是一场很棒的庆功宴呢。","k":"文末〜よね"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#19:44#0","t":"19:44","j":"じゃあそんな愛……祝い酒、14代。","c":"那么，带着这样的爱……（接下来就是）庆功酒，十四代。","k":"じゃあそんな〜（话题过渡） 祝い酒"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#19:50#0","t":"19:50","j":"やばい、また社長が…社長!","c":"糟了，社长又…社长!","k":"やばい"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#19:55#0","t":"19:55","j":"社長そこにいるから、社長は霊じゃない。そこにいる、そこにいらっしゃる。","c":"社长就在那儿嘛，所以社长不是幽灵。他在那儿，他确实就在那儿呢。","k":"から いらっしゃる"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#19:59#0","t":"19:59","j":"え、本当にいるの?","c":"诶，真的在吗?","k":"の?"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#20:01#0","t":"20:01","j":"「飲んでいいよ」って言ってくれたから、飲みます。うわー、ありがとうございます。","c":"他说「你可以喝哦」，所以我要喝了。哇，谢谢!","k":"って 〜てくれる 飲んでいい"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#20:05#0","t":"20:05","j":"いただきます。","c":"我开动了。","k":"いただきます"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#20:07#0","t":"20:07","j":"はい、じゃあ、ありがとうございました。","c":"好，那，谢谢了。","k":"じゃあ"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#20:21#0","t":"20:21","j":"声にならない声が出てましたね。","c":"（刚才）发出了不成声的声音呢。","k":"〜にならない"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#20:23#0","t":"20:23","j":"あのー、孫の手先生の顔を映せないのが、ほんとにもったいない。","c":"呃……不能拍到孙の手老师的脸，真是太可惜了。","k":"映せない 〜のが もったいない"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#20:27#0","t":"20:27","j":"めっちゃいい顔してる。","c":"表情超好的。","k":"〜してる"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#20:28#0","t":"20:28","j":"いや、皆さんいいリアクションされてます。","c":"不，大家的反应都很棒。","k":"されてます"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#20:30#0","t":"20:30","j":"これ超美味しいです。おいしいー。すごい。","c":"这个超好吃的。好好吃——太厉害了。","k":"超〜"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#20:36#0","t":"20:36","j":"なんか、唸るって感じだよね。","c":"感觉就像会不禁「嗯～」地呻吟出声一样呢。","k":"って"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#20:37#0","t":"20:37","j":"しかも、大将がまた新たなメニューも持ってきてくれましたけど。","c":"而且，大厨又给我们带来了新的菜品。","k":"持ってきてくれました けど"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#20:41#0","t":"20:41","j":"大将、これは何ですか?","c":"大厨，这是什么?","k":"は"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#20:43#0","t":"20:43","j":"あ、えー、もう最後、豚しゃぶですけど、今日は平正(?)の三元豚のロースの方で、さっぱりとシソとおろしと、あとはポン酢の方でやらせていただいてます。","c":"啊，呃——这是最后一道了，是猪肉涮锅，今天用的是「平正」(?)的三元猪里脊，用紫苏、萝卜泥，再加上柚子醋做得比较清爽。","k":"やらせていただいてます 〜の方で"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#20:55#0","t":"20:55","j":"ちょうど、14代出すことになったんで。","c":"刚好这次也要上「十四代」（清酒），所以……","k":"〜ことになった"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#20:59#0","t":"20:59","j":"あの、油と14代の噛み合わせがいいかもしれません。","c":"嗯，这道菜的油脂和「十四代」搭配起来说不定很不错。","k":"〜かもしれません"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#21:01#0","t":"21:01","j":"めちゃくちゃいいです。うん。","c":"真的超好。嗯。","k":"めちゃくちゃ"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#21:04#0","t":"21:04","j":"やっぱり、横になりたい。","c":"果然还是好想躺下啊。","k":"〜たい"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#21:07#0","t":"21:07","j":"そのぐらいのね、幸せ度がね。","c":"幸福度大概就是这种程度呢。","k":"ね"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#21:09#0","t":"21:09","j":"うん、すごいね。","c":"嗯，真厉害呢。","k":""},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#21:11#0","t":"21:11","j":"いやー、ほんとに美味しい。","c":"哎呀——真的好好吃。","k":"いやー"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#21:14#0","t":"21:14","j":"こうやって、みんなで打ち上げられたことが、もう今日、何より嬉しい。","c":"能像这样和大家一起办庆功宴，今天这件事比什么都让我开心。","k":"打ち上げられた 何より"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#21:19#0","t":"21:19","j":"うん","c":"嗯。","k":""},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#21:20#0","t":"21:20","j":"あとまたほら、嫁をちゃんと呼んであげないと、修羅場が加速しないように、次の修羅場を……","c":"还有你看，得好好把老婆们叫来才行，免得修罗场愈演愈烈……下一场修罗场……","k":"〜ないと(否定条件) 〜ないように(目的・避免) 〜てあげる(施恩)"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#21:28#0","t":"21:28","j":"そう言って『修羅場大好き』って言ってた人じゃない(?)。","c":"然后你不是还这么说过、说自己『最喜欢修罗场』的人吗(?)。","k":"〜じゃない?(反问确认)"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#21:31#0","t":"21:31","j":"修羅場楽しい。修羅場って言葉が好きだから。","c":"修罗场很好玩嘛。因为我就是喜欢『修罗场』这个词。","k":"って(=という/引用)"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#21:33#0","t":"21:33","j":"怖い怖い怖い怖い怖い、怖い怖い怖い。","c":"好可怕好可怕好可怕……好可怕好可怕好可怕。","k":"形容詞の繰り返し(重复强调)"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#21:35#0","t":"21:35","j":"いやーほんとですよ。","c":"不，真的啦。","k":""},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#21:36#0","t":"21:36","j":"でもシルフィー(?)はやっぱもう懐がね……。いやもうほんと女神でした。","c":"不过希尔菲(?)果然还是心胸（很宽广）呢……不，真的，她就是女神。","k":"懐が深い(省略形)"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#21:40#0","t":"21:40","j":"ト書きに『女神』って書いてある。","c":"剧本的舞台提示里就写着『女神』。","k":"ト書き 〜てある(状态残留)"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#21:43#0","t":"21:43","j":"あれだって、渋谷家族(?)がト書きに書いてある。","c":"那个也是，渋谷家族(?)在剧本提示里明明白白写着的。","k":"だって(=も/even)"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#21:46#0","t":"21:46","j":"そうですよね。","c":"确实是这样呢。","k":""},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#21:47#0","t":"21:47","j":"あれだね、ロキシー(?)受け入れる時のね。","c":"对啊，就是接纳洛琪希(?)的时候那段呢。","k":"受け入れる"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#21:49#0","t":"21:49","j":"うん、すごかった。","c":"嗯，真的很厉害。","k":""},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#21:51#0","t":"21:51","j":"これもう何か書かないと。何か書かないと。演じ……演じるの難しいんじゃとか、こう伝えなきゃと思って。この言葉が『女神』って。","c":"这个真的得写点什么才行。得写点什么才行。『扮演……扮演起来是不是很难』之类的，就想着得把这个传达出去。这句话就是『女神』。","k":"〜なきゃ(なければ) 言いさし(话说一半重说)"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#22:02#0","t":"22:02","j":"でもユミちゃんと話してたんですけど、やっぱりやるべくしてやってるメンバーで私たち、なんかすごいなって思ったよね。","c":"不过我之前跟由美酱聊过，说我们真的是『注定要做才做』的成员，总觉得挺厉害的呢。","k":"やるべくしてやる んですけど(说明前置)"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#22:10#0","t":"22:10","j":"その価値観にしても、別に私が何人も奥さんがいていいっていう、別にタイプってわけじゃないんです。","c":"就算是那种价值观，也不是说『我觉得有好几个老婆也没关系』是我自己认同的那种类型。","k":"にしても わけじゃない"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#22:16#0","t":"22:16","j":"だいぶ語弊があるからね。","c":"这样说真的挺容易引起误会的呢。","k":"語弊がある"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#22:17#0","t":"22:17","j":"そうそうそう、語弊があるけど、なかなかいないから。","c":"对对对，是有点容易被误会没错，不过毕竟这样的人也不多嘛。","k":"なかなか〜ない"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#22:20#0","t":"22:20","j":"でもすごいあの、なんかしっくりくるなって思うことが多くて。","c":"不过真的，总觉得有很多时候会觉得『啊，就是这种感觉』。","k":"しっくりくる"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#22:24#0","t":"22:24","j":"そのシルフィー(?)の言ってることも、なんか分からないことはなかったってことだよね。","c":"希尔菲(?)说的那些话，也没有什么是我完全无法理解的，就是这个意思吧。","k":"二重否定(分からないことはなかった)"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#22:29#0","t":"22:29","j":"うんうんうん、そうなの、だからやっぱ……","c":"嗯嗯嗯，就是这样，所以说啊……","k":""},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#22:31#0","t":"22:31","j":"ルディの一番の味方なんで。","c":"（希尔菲）毕竟是路迪最坚定的伙伴嘛。","k":"なんで(=なので)"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#22:34#0","t":"22:34","j":"なんか何……なんか何でも受け入れられるっていう。","c":"总觉得……不管什么都能包容接纳的那种（感觉）。","k":"受け入れられる(可能形)"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#22:40#0","t":"22:40","j":"心の広さと、なんか受け止める勇気があるのが一番、ある意味こう女の子らしく見えるけど","c":"心胸的宽广,还有那种能包容一切的勇气,从某种意义上说,是让她看起来最有女孩子样的地方,不过——","k":"〜けど（逆接・委婉） 〜らしく見える"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#22:49#0","t":"22:49","j":"こう…男性…まあ男性とか女性とかっていうよりは、人としての器がでかいんだなっていうのをすごい感じて","c":"这个……男性……嗯,与其说是男性还是女性,不如说我特别感受到,她作为一个人的胸怀有多大,","k":"〜というよりは 器がでかい"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#22:58#0","t":"22:58","j":"そうでありたいっていう風に思ってるので、なんかすごい共感できた","c":"我觉得自己也想成为那样的人,所以特别有共鸣。","k":"〜である+たい 〜ので（原因・理由）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#23:02#0","t":"23:02","j":"うんうん","c":"嗯嗯。","k":""},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#23:03#0","t":"23:03","j":"私としてはね、世の女性に言うと、えぇーって言われちゃうかもしれないけど、こういう方が多いですもんね、実際のところ","c":"对我来说呢,要是跟一般女性这么说,可能会被回一句「啊?!」,不过其实这样想的人还挺多的,实际上。","k":"〜としては 言われちゃう（受身+ちゃう） 〜もんね（终助词）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#23:10#0","t":"23:10","j":"でも私は割とすんなり入れて","c":"不过我倒是相当顺利地就代入进去了。","k":"入（はい）れる（「入る」的可能形） すんなり"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#23:14#0","t":"23:14","j":"でその監督が書いてくれた女神っていうのが、確かに","c":"然后导演给写出来的那位女神啊,确实——","k":"書いてくれた（授受表现） 〜っていうのが"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#23:19#0","t":"23:19","j":"でもこういう人でありたい","c":"但我也想成为这样的人。","k":"〜である+たい"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#23:21#0","t":"23:21","j":"なんかその…愛する人を受け入れるっていう懐の深さは、やっぱり愛そのものだから、愛の大きさそのものだから","c":"就是那种……接纳所爱之人的那份胸怀的深度,终究就是爱本身,就是爱的大小本身。","k":"懐の深さ 名词+そのもの 〜から（重复强调理由）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#23:30#0","t":"23:30","j":"そこはなんか、あんまりこう…大きさ?そこをこう…決めたくないというか","c":"那部分我总觉得……不太想刻意去定出「多大」,这么说吧……","k":"決めたくない 〜というか"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#23:36#0","t":"23:36","j":"ルディ思う気持ちは、もう…なんかこう…これぐらいなんだって言えないぐらい深いんだろうなっていう風に、そう…思って","c":"她对鲁迪的那份心意啊，已经……深到没办法说「大概就是这么多」的程度了吧，我是这么想的。","k":"〜を思う（口语中省略助词） 〜ぐらい（程度） 〜んだろうな"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#23:44#0","t":"23:44","j":"それはすごい…なんかしっくりきちゃって、そう…","c":"那种感觉真的……让我一下子就觉得特别贴切，是啊……","k":"しっくりくる きちゃって（「〜てしまう」的缩约）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#23:48#0","t":"23:48","j":"あの話数は本当に、私とか…ココちゃんとかは、なんかもう…心ここにあらずじゃないけど、うん…すごかったね","c":"那一集真的,像我和ココちゃん这些人啊,当时整个人都……虽说不到魂不守舍的地步,不过……真的很厉害。","k":"心ここにあらず 〜とか（列挙・委婉）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#23:56#0","t":"23:56","j":"なんかね、このシーンをやるの、どうしようみたいな感じだったのに、すごい涼しげな感じで、まぁ…なんとかなるよね、みたいな感じで、いてくれたのが","c":"明明之前还是一副「这场戏该怎么演才好」的样子,结果她却表现得特别从容,一副「总会有办法的啦」的感觉,一直是那样的状态。","k":"〜のに（逆接） みたいな感じで いてくれた（授受表现）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#24:05#0","t":"24:05","j":"もうなんか、本当にその作品のまんまというか、なんかね、すごく引っ張ってもらった感じもあるし","c":"怎么说呢，（她）真的就跟那部作品里一模一样，该怎么讲，也有种被狠狠带着往前走的感觉","k":"まんま（まま） というか 〜てもらう"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#24:12#0","t":"24:12","j":"で、何よりやっぱあのシーンが、久しぶりにあの家に帰ってきた時に、もう、完全にママなんだなっていうのが、もう、絵からもだし、お芝居からもすごく伝わって、嬉しい","c":"而且最重要的是，那个场景——久违地回到那个家的时候，「啊，真的完全就是妈妈了呢」这种感觉，从画面上、从演技上都非常深切地传达出来了，真的很欣慰","k":"〜んだな からも"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#24:26#0","t":"24:26","j":"そこにやっぱ感動したよね","c":"在那一点上真的很感动呢","k":"〜よね やっぱ（やっぱり）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#24:29#0","t":"24:29","j":"逆にだいぶ私たちも引っ張られてる感があると思うなぁ、っていうのはありました","c":"反过来说，我们自己好像也相当有种被带动着走的感觉——确实有过这样的感受","k":"〜てる（ている的口语缩约） 〜なぁ"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#24:36#0","t":"24:36","j":"4人で年末にね、1回ココちゃん家でご飯食べたんですけど","c":"年末的时候啊，我们四个人，有一次在小可可（ココちゃん）家一起吃了饭","k":"〜んですけど ちゃん（昵称后缀）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#24:40#0","t":"24:40","j":"その時に無職転生談義をいっぱいしたんですけど","c":"那个时候聊了好多关于《无职转生》的话题","k":"〜談義 いっぱい"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#24:44#0","t":"24:44","j":"やっぱやっぱやるべくして、私たちはね、やっぱ選ばれる側だから、自分たちがやりたいといってできる役ではないし、作品に参加できるわけでもないので、あれなんですけど","c":"果然……该说是命中注定要做这个的吧，我们呢，毕竟是被挑选的一方，并不是自己说想演就能演的角色，也不是说想参加就能参加得了作品的，所以……那个，不过……","k":"〜べくして 受身形（選ばれる） 〜わけでもない"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#24:54#0","t":"24:54","j":"やっぱりこう、自分にやっぱ近く…役と近くなっていくっていうのは、すごいなんか嬉しいことだし、めちゃくちゃ嬉しい","c":"该怎么说呢……自己渐渐贴近角色……角色也渐渐贴近自己，这种感觉真的很让人开心，超级开心","k":"〜ていく なんか"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#25:03#0","t":"25:03","j":"だから、4人とも、すごいですね","c":"所以啊，我们四个人真的都很了不起呢","k":"〜とも 〜ですね"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#25:05#0","t":"25:05","j":"作品への思いとか、そういうのを語り合って、より絆が深まった感じがしたよね","c":"把对作品的感情之类的都聊了聊，感觉彼此之间的羁绊变得更深了呢","k":"への 〜感じがする"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#25:12#0","t":"25:12","j":"それこそ、なんか、うまく伝えられるか分からないですけど","c":"说真的，怎么说呢，虽然不知道能不能好好表达出来，不过……","k":"それこそ 可能形＋か分からない"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#25:15#0","t":"25:15","j":"その、打ち上げがあった時に、ちょっとね、調子崩してたんですよ、私、その時、調子崩してたから","c":"就是那个，在庆功宴的时候啊，我当时有点状态不好，因为那时候状态不好……","k":"調子を崩す 〜んですよ"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#25:23#0","t":"25:23","j":"で、抽選をするにあたって、割とこう、メインの演者さんたちが壇上で、じゃあ何番の方…","c":"然后呢，在要抽奖的时候，主要的几位演员就站在台上，说「那么，几号的哪位……」","k":"〜にあたって たち（复数接尾）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#25:30#0","t":"25:30","j":"とかってやることが多いんですけど、それをこう、私が言うよりも先に、もう先に、いや多分…","c":"……之类的事情有很多，那个啊，在我开口说之前，已经先……不，可能是……","k":"んですけど 〜より(も)先に"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#25:36#0","t":"25:36","j":"ゆみちゃんはちょっと今調子が悪いから、無理はさせない方がいいと思うんです、っていうのを…","c":"「小由美现在身体状况不太好，还是别让她太勉强比较好」——（她就把）这样的话……","k":"〜させない 〜から っていうのを"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#25:41#0","t":"25:41","j":"もう私がいないところで先に、先方さんとやりとりしてくれて、じゃないけど、やってくれて…","c":"已经在我不在场的地方，就抢先跟对方那边打点好了——也不是说「帮我」啦，总之就是替我做了……","k":"〜てくれる 〜じゃないけど やりとりする"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#25:46#0","t":"25:46","j":"それで、実際会場に行ったら、もう、かやののそういう支えがあって…","c":"然后呢，实际到了现场之后，就是有かやの（茅野）那样的支持在……","k":"〜たら 支えがある"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#25:51#0","t":"25:51","j":"なおかつ、今度ココちゃんは…","c":"而且呢，这次小ココ她啊……","k":"なおかつ"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#25:52#0","t":"25:52","j":"あの、「よかったらこれ、のど飴なんですけど…","c":"那个，「如果不嫌弃的话，这个……是润喉糖啦……","k":"よかったら 〜んですけど"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#25:54#0","t":"25:54","j":"あの、あの、こういうのがあるんで…」","c":"那个，那个，我这里有这样的东西哦……」","k":"〜んで"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#25:58#0","t":"25:58","j":"とかって言って、なんかもう、すごい…みたいな…","c":"她就这么说，我就觉得，哇，好厉害……什么的……","k":"とか(って) みたいな"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#26:02#0","t":"26:02","j":"お願いされたら絶対断らないんで…","c":"只要有人拜托她，她绝对不会拒绝……","k":"〜されたら 断らない"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#26:04#0","t":"26:04","j":"だから、いや、今はやめときなよ…","c":"所以说啊，唉，现在还是先别这样了啦……","k":"〜ときなよ"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#26:08#0","t":"26:08","j":"だから、もう本当にこの作品で、こういう間柄の役をやってから…","c":"所以说啊，真的是自从在这部作品里演了这种关系的角色之后……","k":"〜てから 間柄"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#26:13#0","t":"26:13","j":"本当にそういうことが多くて…","c":"真的这种事变得很多……","k":"形容词て形〜くて"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#26:15#0","t":"26:15","j":"私が何か言う前に、もう「言っといたから大丈夫だよ」とか、「もう話ししといたよ」とか…","c":"在我开口说什么之前，（对方）就已经说「我先说好了，没问题的」啦，「已经先跟他们说过了哦」之类的……","k":"〜前に 〜ておいた→〜といた"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#26:20#0","t":"26:20","j":"え？おせっかいかなぁ…と思うけど…","c":"咦？我会想，这样是不是有点多管闲事啊……不过……","k":"〜かなぁ おせっかい"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#26:24#0","t":"26:24","j":"多分、言えないから、言うんですけど…みたいな…","c":"大概是因为（她）说不出口，所以（我）才替她说的……差不多是这种感觉……","k":"可能形〜えない 〜から"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#26:28#0","t":"26:28","j":"なぜか私が交渉する…「嫁じゃんそれ」みたいな…","c":"不知道为什么最后变成我去交涉……「那不就是老婆嘛」之类的（被这么调侃）……","k":"〜じゃん なぜか"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#26:31#0","t":"26:31","j":"家族…家族ですね…","c":"一家人啊……真的是一家人呢……","k":"〜ですね"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#26:33#0","t":"26:33","j":"いや、でも、本当そうなんですよ…","c":"不，不过，真的就是这样啦……","k":"〜なんですよ"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#26:35#0","t":"26:35","j":"そこに対しての、くまちゃんが、「ユーミンは(?)大丈夫、絶対に大丈夫」って…","c":"对于这一点，小熊（くまちゃん）就说「ユーミン（?）没事的、绝对没事的」……","k":"〜に対して 絶対に"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#26:42#0","t":"26:42","j":"すごいんだよ、みたいなのを…","c":"「真的很厉害哦」，（她）就是这样说的……","k":"〜んだよ"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#26:44#0","t":"26:44","j":"キャラまんまだから、マジでまんま…","c":"简直跟角色一模一样，真的是一模一样……","k":"まんま マジで"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#26:46#0","t":"26:46","j":"くまちゃんの…今回2人に聞きたかったことが…","c":"小熊她啊……她这次想问这两位的问题……","k":"〜たかった 主格の"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#26:49#0","t":"26:49","j":"面白くて、そう、普通は…","c":"很有意思，对，一般来说的话……","k":"普通は"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#26:51#0","t":"26:51","j":"さっきのココちゃんみたいに、私は、ロキシーとして、大丈夫でしたかな…","c":"就像刚才小ココ那样，（问一句）「我演洛琪希这个角色，还okay吗」……","k":"〜として 〜かな"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#26:55#0","t":"26:55","j":"とか、そういう感じなのに、くまちゃんが「わかった、私も質問を送るね」って言って送ってくれたのが、「ルーデウスと、それを演じた内山夕実ちゃんの、すごいところってどこだと思いますか」みたいな。","c":"……之类的，本来是那种感觉，结果小熊酱说『好，那我也发个问题过去』，然后她发来的是『鲁迪乌斯，还有饰演他的内山夕実酱，你们觉得厉害的地方在哪』这种感觉。","k":"って（引用） 〜てくれる V＋のが"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#27:08#0","t":"27:08","j":"いや、愛が溢れすぎて、自分のこと聞かないで、私のことを聞こうとしてるのがね。","c":"不是啦，是因为爱意太满溢了，都不问自己的事，一心想问我的事呢。","k":"V＋すぎる 〜ないで"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#27:16#0","t":"27:16","j":"ここちゃんは、もちろんそれも聞きたいけど、あった上でのね、そう、なんかその、ロキシーを演じた上での不安があったから、2人に、もし聞きたいなっていう流れだったけど、","c":"ここ酱当然也想问那个，不过在那基础之上呢——对，就是说，因为在演绎罗琪希这个角色上有过不安，所以想着方便的话想问问那两位，本来是这样一个流程，不过……","k":"V（た）＋上で 〜けど"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#27:27#0","t":"27:27","j":"その、ここちゃんからも聞いたから、そう、くまちゃんに聞いたら、「よかったら」って聞いたら、「なんでルーデウスの…」","c":"就是说，因为也从ここ酱那里听说了，对，然后问小熊酱『方便的话（能说说吗）』，结果（她说）『为什么鲁迪乌斯的……』","k":"〜たら（条件） よかったら"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#27:33#0","t":"27:33","j":"そうなんだよ、そうなんだよ。私も、エリスを演じるにあたって、こうだったんですけど、とかいうのが来ると思ってたから。","c":"对对对，就是这样。我还以为会问到『我在演绎艾莉丝的时候是这样的』之类的问题呢。","k":"〜にあたって とか（引用/列挙）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#27:39#0","t":"27:39","j":"そしたら、内山夕実ちゃんの、すごいと思うとこ…","c":"结果（发来的却是）『内山夕実酱身上，你觉得厉害的地方』……","k":"そしたら（そうしたら の縮約） とこ（ところ の口語形）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#27:42#0","t":"27:42","j":"でも、ルーデウスと美ちゃん一緒なんだろうね。でもそれぐらいに、でも、それは自分が感じますね。","c":"不过，鲁迪乌斯和小夕（角色和演员）大概是融为一体的吧。差不多就是那种程度，不过，那个我自己也感觉得到呢。","k":"〜んだろうね"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#27:48#0","t":"27:48","j":"一緒だな。そうなのかな。","c":"是一体呢。是这样吗。","k":"〜かな"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#27:51#0","t":"27:51","j":"もう、それがもう全部そのね、現れててさ、その文章に。","c":"已经，全都体现在那段文字里了呢。","k":"V＋ていて（継続） さ（终助词）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#27:55#0","t":"27:55","j":"はいだね。大好きなメンバーだよ。","c":"嗯，是呢。是我超喜欢的成员哦。","k":"〜だね／〜だよ"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#28:00#0","t":"28:00","j":"本当に、本当に思いました。","c":"真的，真的这么想。","k":"本当に（副词强调）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#28:03#0","t":"28:03","j":"そんな、我々役者陣のお話でした。","c":"以上就是我们这些演员们的故事了。","k":"〜でした（丁寧体过去形）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#28:07#0","t":"28:07","j":"聞けてよかったですね。本当にね。","c":"能听到真是太好了呢。真的呢。","k":"V可能形＋てよかった"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#28:10#0","t":"28:10","j":"なので、3期もみんなで全力で頑張ります。","c":"所以呢，第三季我们大家也会全力以赴。","k":"なので 〜も（追加）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#28:12#0","t":"28:12","j":"もうエリスがめっちゃ肩回してました。","c":"艾莉丝（的演员）已经在使劲转肩膀热身了。","k":"めっちゃ"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#28:15#0","t":"28:15","j":"「GET READYって感じですよね」。","c":"『感觉就像GET READY（准备就绪）一样呢』。","k":"〜って感じ"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#28:16#0","t":"28:16","j":"くまちゃんムキムキになって、帰ってくるじゃない。","c":"小熊酱不是会练得一身肌肉再回来嘛。","k":"V＋てくる（帰ってくる） 〜じゃない（确认/反问）"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#28:19#0","t":"28:19","j":"大丈夫かなぁ。","c":"没问题吧（有点担心）。","k":"〜かなぁ"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#28:21#0","t":"28:21","j":"そうですよ、ちょっとパッと出てますね。","c":"是啊，稍微有露出来一点呢。","k":"パッと"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#28:25#0","t":"28:25","j":"3期もね、一応、原作通りに行くんだったら、いっぱい出てきますからね。","c":"第3季呢，如果大体按原作走的话，会出来很多（角色）哦。","k":"〜んだったら 一応"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#28:29#0","t":"28:29","j":"そう、いやー、3期ほんと楽しみで。","c":"嗯，哎呀，真的很期待第3季呢。","k":"楽しみで"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#28:33#0","t":"28:33","j":"山中さんの目を見ちゃった、お隣さんの。ワクワクが止まらないですけど。","c":"不小心和坐在旁边的山中先生对上眼了。真是兴奋得停不下来呢。","k":"見ちゃった 〜ですけど"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#28:40#0","t":"28:40","j":"まだここで言えることは何もないんですよね、発表しただけですからね。","c":"现在这里还没有什么能说的呢，因为才刚发表而已。","k":"〜んですよね 言えること"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#28:46#0","t":"28:46","j":"でも本当は何かあるんですよね。","c":"不过其实是有些内情的呢。","k":"本当は"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#28:48#0","t":"28:48","j":"きっといろんなことが動いてるんですよね、裏では一応。","c":"肯定有很多事情在推进呢，私底下多少是这样。","k":"裏では"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#28:51#0","t":"28:51","j":"そうですね。","c":"是啊。","k":""},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#28:52#0","t":"28:52","j":"これからも、かやのみとしてもまた、みんなでこうやっておしゃべりできる機会があると嬉しいです。","c":"今后也是，作为「かやのみ」这个节目来说，如果还能有机会像这样大家一起聊天就太开心了。","k":"としても 〜と嬉しいです"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#28:57#0","t":"28:57","j":"かやのみと無職先生のコラボ、これ何回まで行けるかっていうところも、ちょっと楽しみですね。","c":"「かやのみ」和「无职转生老师」的联动，这个能做到第几次，这一点也让人有点期待呢。","k":"〜っていうところ 何回まで行けるか"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#29:03#0","t":"29:03","j":"今シーズン3。","c":"现在是第3季了呢。","k":"シーズン3"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#29:05#0","t":"29:05","j":"そうですね。","c":"是啊。","k":""},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#29:09#0","t":"29:09","j":"第2期でも3回やって(?)。","c":"（在）第2期期间也做了3次呢。","k":"でも"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#29:14#0","t":"29:14","j":"そうですね。","c":"是啊。","k":""},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#29:15#0","t":"29:15","j":"修羅場(?)じゃないかもしれないけど、まあ分かりませんけどね。","c":"可能算不上是修羅場(?)吧，不过嘛，也说不准呢。","k":"かもしれない 〜けど"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#29:18#0","t":"29:18","j":"あとやっぱり杉田さんを、どこかでちょっとお呼びしたいなっていう気持ちもあるから。","c":"另外呢，果然还是想着找机会请杉田先生来一次，也有这种想法啦。","k":"お呼びしたい 〜もあるから"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#29:24#0","t":"29:24","j":"もう無職転生が続く限り頑張りたいね。","c":"只要《无职转生》还在继续，就想一直努力下去呢。","k":"〜限り"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#29:27#0","t":"29:27","j":"でもほんとここまで来て言えることは、本当にかやのんが言った言霊って絶対に実現していくんだなっていうのは、もういろんなところで、あの、木のジョッキー(?)も含め、そう思ってますね。","c":"不过说真的，到现在能说的是——茅野说过的话，就像言灵一样绝对会实现，这一点在很多地方，呃，包括那个「木のジョッキー」(?)在内，我都是这么觉得的。","k":"言霊 実現していく"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#29:40#0","t":"29:40","j":"ご身体(?)書いたりやつだって。","c":"写「ご身体」(?)之类的那个也是。","k":"やつ"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#29:41#0","t":"29:41","j":"そうですよ。","c":"是啊。","k":""},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#29:42#0","t":"29:42","j":"なのでね、ちょっと今後も期待して、楽しみにしていたいなと思いますね。","c":"所以呢，接下来也想稍微期待一下，一直保持期待下去呢。","k":"楽しみにしていたい"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#29:47#0","t":"29:47","j":"ぜひその時はまた遊びに来てください。","c":"那时候请一定要再来玩。","k":"〜てください（て形+ください） ぜひ〜てください"},{"p":"kayanomi-mushoku","s":"Heafu-fkrCI#29:49#0","t":"29:49","j":"まあ、呼んでいただければ。","c":"嗯，如果能被叫上的话（我就来）。","k":"〜ていただければ"},{"p":"kayanomi-mushoku",
