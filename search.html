2","j":"あんまりいそうでいないと思うの、この代(?)で。","c":"我觉得同龄这一代里，这样的人看似不少其实很少。","k":"いそうでいない"},{"p":"honne-talk","s":"SCshAvEw964#05:36#0","t":"05:36","j":"確かに。","c":"确实。","k":""},{"p":"honne-talk","s":"SCshAvEw964#05:37#0","t":"05:37","j":"なんかここまで続けてこれた原動力って何ですか?","c":"能坚持到现在的原动力是什么呢？","k":"って てこれた"},{"p":"honne-talk","s":"SCshAvEw964#05:44#0","t":"05:44","j":"原動力、そうですね。","c":"原动力，是这样的。","k":"ですね（同意・確認の終助詞）"},{"p":"honne-talk","s":"SCshAvEw964#05:46#0","t":"05:46","j":"でもやっぱ一回、私も大学生ぐらいの時に、なんかこのままでいいのかなって思ったんですよね。","c":"不过果然有一次，我在差不多大学生的时候，也曾想过「这样下去真的好吗」。","k":"って（引用の格助詞） んですよね（説明・同意求め）"},{"p":"honne-talk","s":"SCshAvEw964#05:54#0","t":"05:54","j":"進学で？","c":"是因为升学（的事）吗？","k":"名詞＋で（原因・場面の提示）"},{"p":"honne-talk","s":"SCshAvEw964#05:56#0","t":"05:56","j":"そうなんです。","c":"是的（就是这样）。","k":"んです（説明の断定）"},{"p":"honne-talk","s":"SCshAvEw964#05:58#0","t":"05:58","j":"結構自信もなかったので、その時自分に…。","c":"当时自己相当没有自信……","k":"ので（原因・理由）"},{"p":"honne-talk","s":"SCshAvEw964#06:01#0","t":"06:01","j":"へえ。","c":"哦～","k":""},{"p":"honne-talk","s":"SCshAvEw964#06:02#0","t":"06:02","j":"キラキラしてたよ。","c":"（可当时的你）明明很闪耀啊。","k":"〜てた（〜ていたの縮約） よ（気づき・伝達の終助詞）"},{"p":"honne-talk","s":"SCshAvEw964#06:04#0","t":"06:04","j":"お仕事は頑張ってたんですけど、結構大変なことも多いじゃないですか、この業界にいると。","c":"工作方面一直很努力，但待在这个圈子里，也有很多相当辛苦的事情，对吧。","k":"じゃないですか（同意を求める反語） けど（逆接の接続助詞）"},{"p":"honne-talk","s":"SCshAvEw964#06:10#0","t":"06:10","j":"結構迷っていて、なんか一般の職の道とかも、ちょっと考えるために大学にも進学して。","c":"相当迷茫，想着也稍微考虑一下走普通职业道路之类的，于是也升学去了大学。","k":"て形の中止法（〜ていて） ために（目的）"},{"p":"honne-talk","s":"SCshAvEw964#06:16#0","t":"06:16","j":"なるほど。","c":"原来如此。","k":""},{"p":"honne-talk","s":"SCshAvEw964#06:20#0","t":"06:20","j":"就職活動も一応できるように入れながら。","c":"也顺便把（能进行）求职活动这条路也留了进去。","k":"ように（目的・可能にする） ながら（同時進行）"},{"p":"honne-talk","s":"SCshAvEw964#06:22#0","t":"06:22","j":"でも逆に、大学に行ったことによって、同年代の一般の女の子たちと初めて触れ合ったんですよ。","c":"不过反倒因为上了大学，我才第一次和同龄的普通女孩子们有了接触。","k":"〜ことによって（原因・手段） んですよ（説明・強調）"},{"p":"honne-talk","s":"SCshAvEw964#06:30#0","t":"06:30","j":"それまでは結構芸能をやってる友達とかが多かったので。","c":"因为在那之前，在做演艺（工作）的朋友相当多。","k":"ので（理由）"},{"p":"honne-talk","s":"SCshAvEw964#06:33#0","t":"06:33","j":"出会わないもんね、そこでしか。","c":"确实啊，不去那种地方就不会遇到呢。","k":"もんね（理由・納得の終助詞） しか＋否定"},{"p":"honne-talk","s":"SCshAvEw964#06:34#0","t":"06:34","j":"そうなんですよ。","c":"就是说啊。","k":""},{"p":"honne-talk","s":"SCshAvEw964#06:35#0","t":"06:35","j":"なので、そこで逆に一般の友達に出会って、なんかある種普通の価値観だったりとかに触れた時に。","c":"所以在那里，反而遇到了普通的朋友，接触到了某种普通的价值观的时候……","k":"〜たり（例示の列挙） なので（順接の接続語）"},{"p":"honne-talk","s":"SCshAvEw964#06:42#0","t":"06:42","j":"自分の今のこの環境とか、やってることって、なんかやっぱ普通じゃないことができてるし。","c":"自己现在的这个环境啊、正在做的事情啊，果然是能做到不普通的事情，而且……","k":"って（主題化の格助詞） し（並列・理由の列挙）"},{"p":"honne-talk","s":"SCshAvEw964#06:50#0","t":"06:50","j":"なんかそれで、もう少し頑張ろうって思って。","c":"于是就想着，要再稍微加把劲。","k":"意志形＋って思う"},{"p":"honne-talk","s":"SCshAvEw964#06:54#0","t":"06:54","j":"大学卒業後もお仕事一つ頑張ろうっていうきっかけにはなりましたね。","c":"这也成了让我觉得大学毕业后也要在这份工作上再努力一把的契机呢。","k":"きっかけになる（契機となる）"},{"p":"honne-talk","s":"SCshAvEw964#07:00#0","t":"07:00","j":"そっか。","c":"是这样啊。","k":""},{"p":"honne-talk","s":"SCshAvEw964#07:01#0","t":"07:01","j":"大学、本当はそこでもし気付けなかったとしたら…。","c":"大学……说真的，如果当时没能意识到的话……","k":"としたら（仮定の複合表現） 可能形の否定（気付けなかった）"},{"p":"honne-talk","s":"SCshAvEw964#07:05#0","t":"07:05","j":"大学に行って、就職どうしようかなって思って、心理カウンセラーとかを目指してたんですよ。","c":"上了大学以后就在想「以后要做什么工作呢」，当时是以心理咨询师之类为目标的。","k":"って(引用・口語) ～てたんです"},{"p":"honne-talk","s":"SCshAvEw964#07:11#0","t":"07:11","j":"今知らなかったとして、心理カウンセラーですって言われたら、めっちゃそれっぽいっす。","c":"就算现在完全不知道，如果听到说「我是心理咨询师」，也会觉得超像的。","k":"～っぽい です→っす"},{"p":"honne-talk","s":"SCshAvEw964#07:16#0","t":"07:16","j":"え、本当か?あれ?そう。ってことはそういう心理系の勉強をしてたってこと?","c":"诶，真的假的？咦？这样啊。那就是说，你一直在学那种心理学方面的东西咯？","k":"ってことは ～系"},{"p":"honne-talk","s":"SCshAvEw964#07:21#0","t":"07:21","j":"そうで、心理学科に行って、その心理の勉強をしてて。","c":"对，我上的是心理学科，一直在学那方面的东西。","k":"～て形の連続"},{"p":"honne-talk","s":"SCshAvEw964#07:25#0","t":"07:25","j":"へー、意外。","c":"哦～真意外。","k":"へー"},{"p":"honne-talk","s":"SCshAvEw964#07:27#0","t":"07:27","j":"私は心理学ではないんだけど、認知科学っていう、その脳みその方、脳波の方の研究で大学に入ってるから、なんか近いのかなと思ってて。","c":"我不是学心理学的，是那种叫「认知科学」的东西，算是脑方面、脑电波方面的研究才考上大学的，所以我就在想是不是也算相近呢。","k":"～んだけど ～っていう"},{"p":"honne-talk","s":"SCshAvEw964#07:38#0","t":"07:38","j":"確かに、認知心理学とかめっちゃ近いかもしれないです。","c":"确实，认知心理学之类的说不定超相近的。","k":"～かもしれない"},{"p":"honne-talk","s":"SCshAvEw964#07:40#0","t":"07:40","j":"なんか、あの時に学んだその脳波の感覚とかが、結構音楽とイコールにして考えると、すごい我々の活動に活かせることいっぱいあるかなと思ってて。","c":"感觉那时候学到的脑电波方面的感觉，如果把它和音乐画上等号来想的话，其实有很多都能活用在我们的活动上。","k":"～に活かせる 学んだ"},{"p":"honne-talk","s":"SCshAvEw964#07:51#0","t":"07:51","j":"確かに。","c":"确实。","k":""},{"p":"honne-talk","s":"SCshAvEw964#07:52#0","t":"07:52","j":"なんかそういうの。えでもそれで言うと、なんか自分の仕事も、自分の仕事もある意味、私の声とかパフォーマンスで、なんか人々の心を潤せてるって思えるようになって、ある意味こう心理カウンセラー的に近いことができてるのかなって。","c":"感觉那种事……啊不过这么说的话，自己的工作，某种意义上也是靠我的声音或表演，让我渐渐觉得自己能滋润大家的心，某种意义上感觉也在做着接近心理咨询师的事情呢。","k":"潤せてる 思えるようになって"},{"p":"honne-talk","s":"SCshAvEw964#08:10#0","t":"08:10","j":"そうだよね、自分がカウンセラー側みたいな感じだもんね。","c":"对啊对啊，感觉自己就像是站在咨询师那一边呢。","k":"～みたいな感じ もんね"},{"p":"honne-talk","s":"SCshAvEw964#08:13#0","t":"08:13","j":"なんかちょっとそういうみんなの人生が潤うお手伝いじゃないですけど、なんかそういうことが結果的にできたのかなとは思って。","c":"虽然算不上是什么帮大家的人生变得滋润的忙，但感觉结果上好像也算做到了那样的事情。","k":"お手伝い ～じゃないですけど"},{"p":"honne-talk","s":"SCshAvEw964#08:22#0","t":"08:22","j":"なんかずっとやってて、あんまり辞めたいなとか思ったことありますか?","c":"一直做到现在，有没有过想过「有点想辞职」之类的念头呢？","k":"やってて 辞めたい"},{"p":"honne-talk","s":"SCshAvEw964#08:27#0","t":"08:27","j":"めっちゃあります。","c":"超级有。","k":""},{"p":"honne-talk","s":"SCshAvEw964#08:28#0","t":"08:28","j":"めちゃくちゃあります。","c":"非常有。","k":""},{"p":"honne-talk","s":"SCshAvEw964#08:30#0","t":"08:30","j":"しんどくなること、めちゃくちゃありますやっぱり。","c":"变得很累、没干劲的时候，真的常常有啊。","k":"形容詞+なる（状態の変化）"},{"p":"honne-talk","s":"SCshAvEw964#08:39#0","t":"08:39","j":"それがどういう時で、どういう切けで起きやすいですか？","c":"那是在什么样的时机、什么样的契机下比较容易发生呢？","k":"で（原因・手段を表す） ～やすい"},{"p":"honne-talk","s":"SCshAvEw964#08:43#0","t":"08:43","j":"えー、どういう切けかな……でも、ずっともうこの世界にいるので、ちょっと麻痺してるとかもあるんですけど。","c":"呃……是什么样的契机呢……不过因为我一直待在这个圈子里，所以可能也有点麻痺了。","k":"ので（原因・理由） 麻痺してる（比喩表現）"},{"p":"honne-talk","s":"SCshAvEw964#08:49#0","t":"08:49","j":"なんかもう、唯でいるためには、なんか舞台に立たなきゃいけないみたいな感覚。","c":"总觉得，为了能保持「做自己（唯）」的状态，就有种必须站上舞台不可的感觉。","k":"～なきゃいけない みたいな（比喩・婉曲の連体修飾）"},{"p":"honne-talk","s":"SCshAvEw964#08:56#0","t":"08:56","j":"めちゃくちゃありますやっぱり。","c":"真的常常有这种感觉呢。","k":"やっぱり（強調・再確認）"},{"p":"honne-talk","s":"SCshAvEw964#08:58#0","t":"08:58","j":"ちょっと待って、それってどういうこと？(?)","c":"等一下，那是什么意思？","k":"って（取り立て・引用の口語形）"},{"p":"honne-talk","s":"SCshAvEw964#08:59#0","t":"08:59","j":"私、これあんまり共感できる人いないんじゃないかなって思ってて。","c":"我总觉得，这件事应该没什么人能懂吧。","k":"んじゃないかな（婉曲な推測）"},{"p":"honne-talk","s":"SCshAvEw964#09:01#0","t":"09:01","j":"その感じ。","c":"就是那种感觉。","k":""},{"p":"honne-talk","s":"SCshAvEw964#09:02#0","t":"09:02","j":"無理してるねって言われて、","c":"被人说「你太勉强自己了」，","k":"って言われて（引用）"},{"p":"honne-talk","s":"SCshAvEw964#09:03#0","t":"09:03","j":"ああ、なんか舞台に立って、マイクを持ったりとか、歌ったりとかそういうことをすることで、","c":"啊，就是像站上舞台、拿着麦克风、唱歌之类的，通过做这些事情，","k":"～たり～たりする"},{"p":"honne-talk","s":"SCshAvEw964#09:10#0","t":"09:10","j":"苦しくなることもあるし、悔しくなることもあるし、","c":"有时候会觉得痛苦，也有时候会觉得不甘心，","k":"形容詞＋くなる（変化） し（並列・列挙）"},{"p":"honne-talk","s":"SCshAvEw964#09:13#0","t":"09:13","j":"でも、その倍ぐらい楽しいことだったり、やれることがあるから、","c":"不过，也有大概双倍那么多开心的事情、能做到的事情，所以，","k":"倍ぐらい（程度の比喩表現） 楽しい（送り仮名と注音）"},{"p":"honne-talk","s":"SCshAvEw964#09:15#0","t":"09:15","j":"そうですね。","c":"是啊。","k":""},{"p":"honne-talk","s":"SCshAvEw964#09:17#0","t":"09:17","j":"それがなくなったら、私、鈴木愛理として……だから本当の自分はどれだろうって、すごい思うことがあって。","c":"如果这些没有了，作为「铃木爱理」的我……所以会非常纠结「真正的自己到底是哪一个」。","k":"名前＋として（立場・資格） って（引用・心の中の疑問）"},{"p":"honne-talk","s":"SCshAvEw964#09:20#0","t":"09:20","j":"めっちゃわかります。","c":"超懂这种感觉。","k":""},{"p":"honne-talk","s":"SCshAvEw964#09:24#0","t":"09:24","j":"そう、特になんかこの30代に入ってきて、より（強く感じる）、","c":"对，尤其是进入30岁之后，更加（这样感觉），","k":"～に入ってくる（時期・段階への到達）"},{"p":"honne-talk","s":"SCshAvEw964#09:30#0","t":"09:30","j":"わかる。","c":"懂。","k":""},{"p":"honne-talk","s":"SCshAvEw964#09:31#0","t":"09:31","j":"なんか、どれも本当なんだよね、私的には。","c":"总觉得，哪一个都是真实的自己，对我来说的话。","k":"んだよね（説明・共感を求める終助詞）"},{"p":"honne-talk","s":"SCshAvEw964#09:33#0","t":"09:33","j":"そうなんです。","c":"就是这样的。","k":""},{"p":"honne-talk","s":"SCshAvEw964#09:34#0","t":"09:34","j":"めちゃくちゃわかります。","c":"超级懂。","k":""},{"p":"honne-talk","s":"SCshAvEw964#09:35#0","t":"09:35","j":"どれも本当だけど、私はなんか、やめたいとなるよりかは、なんかしんどいってなることが結構あったの。","c":"虽然哪个都是真的，但比起变成「想要放弃」，我更常是变成「好累啊」这种感觉。","k":"～よりかは（比較） ～となる（そういう状態になる）"},{"p":"honne-talk","s":"SCshAvEw964#09:41#0","t":"09:41","j":"なんか、その自分がこう、がむしゃらに働いてるとかやってるって思って、","c":"就是觉得自己好像在拼命地工作、拼命地在做着什么，","k":"がむしゃらに（無我夢中で）"},{"p":"honne-talk","s":"SCshAvEw964#09:48#0","t":"09:48","j":"足元見たら、想像より前に進んでなかったとか、","c":"结果低头一看，发现并没有像想象中那样往前走，","k":"足元を見る（比喩：現状を確認する）"},{"p":"honne-talk","s":"SCshAvEw964#09:51#0","t":"09:51","j":"なんか、その頑張ってる量と現実がこう……","c":"总觉得，自己努力的程度和现实之间就这样……","k":"量と現実（対比表現）"},{"p":"honne-talk","s":"SCshAvEw964#09:55#0","t":"09:55","j":"なんだろう、釣り合うっていうか","c":"该怎么说呢，就是「相称」这种感觉吧","k":"って（＝という）"},{"p":"honne-talk","s":"SCshAvEw964#09:57#0","t":"09:57","j":"釣り合ってない時とかに結構外の世界パッて見ちゃって、なんか私って結構あれだったのかなって思っちゃうとかは、結構いまだにある癖みたいな感じであるけど","c":"不相称的时候，就会不由自主地瞥一眼外面的世界，然后会想「我是不是其实挺那个（不般配）的啊」，这种感觉到现在还是有点像习惯一样残留着","k":"～ちゃって（～てしまって）の口語形 パッと＋動詞 って（引用・主题の口語化）"},{"p":"honne-talk","s":"SCshAvEw964#10:10#0","t":"10:10","j":"でも私はなんか本当にこれ綺麗事(?)じゃなくて、あの応援してくれる人がいないと多分やってられてなくて","c":"但我真的不是在说漂亮话，是如果没有支持我的人，大概根本撑不下去","k":"～じゃなくて（否定＋理由への転換） 応援してくれる人 やってられない（可能形の否定＋ぼやき）"},{"p":"honne-talk","s":"SCshAvEw964#10:17#0","t":"10:17","j":"本当にそれはそうです","c":"真的，那话说得没错","k":"それはそう（相槌の定型句）"},{"p":"honne-talk","s":"SCshAvEw964#10:18#0","t":"10:18","j":"これ本当さ難しいんだよね","c":"这个真的很难说清楚呢","k":"さ（間投助詞） んだよね（説明＋念押し）"},{"p":"honne-talk","s":"SCshAvEw964#10:19#0","t":"10:19","j":"本当にそうです","c":"真的是这样","k":""},{"p":"honne-talk","s":"SCshAvEw964#10:20#0","t":"10:20","j":"なんかさ綺麗事じゃないって伝えるのすごい難しくない?","c":"就是说，要传达「这不是漂亮话」这件事真的很难，不是吗？","k":"のって伝える／伝えるの（形式名詞「の」の名詞化） ～くない?（否定疑問での同意誘導）"},{"p":"honne-talk","s":"SCshAvEw964#10:23#0","t":"10:23","j":"なんかガチじゃない(?)?","c":"感觉挺认真（真心）的吧？","k":"ガチ（俗語）"},{"p":"honne-talk","s":"SCshAvEw964#10:24#0","t":"10:24","j":"そうなんです","c":"就是这样","k":""},{"p":"honne-talk","s":"SCshAvEw964#10:25#0","t":"10:25","j":"だから私も大学生の時に辞められなかった理由は、今ここで私が辞めたら困る人がたくさんいるって思っちゃって","c":"所以我大学时代没能辞掉（工作）的理由是，我一想到现在这里如果我辞掉会有很多人为难，就……","k":"辞められなかった（可能形の过去否定） ～たら（条件形）"},{"p":"honne-talk","s":"SCshAvEw964#10:34#0","t":"10:34","j":"ハイちゃんのおかげで、明日も頑張って生きてみますって言ってくれた人とかの言葉が残ってて、なんかそういう人のためにステージに立とうって思って","c":"多亏了小唯（ハイちゃん），有人对我说过「我明天也会努力活下去」，这样的话一直留在我心里，我就想要为了这样的人站上舞台","k":"おかげで 生きてみます（て形＋みる） 立とう（意志形）"},{"p":"honne-talk","s":"SCshAvEw964#10:43#0","t":"10:43","j":"今私は残ってるのね","c":"所以我现在还留在这里呢","k":"のね（説明の终助词）"},{"p":"honne-talk","s":"SCshAvEw964#10:45#0","t":"10:45","j":"同じですね","c":"我也一样呢","k":""},{"p":"honne-talk","s":"SCshAvEw964#10:46#0","t":"10:46","j":"ねえちょっとさ、ありがとう、ねえ、握手、ありがとう、こんにちはみたいな","c":"哎等一下——谢谢、哎、握手、谢谢、就像「你好」一样","k":""},{"p":"honne-talk","s":"SCshAvEw964#10:53#0","t":"10:53","j":"もうLINE交換しちゃえよ","c":"干脆交换LINE算了啦","k":"～ちゃえ（命令的な～てしまえ）"},{"p":"honne-talk","s":"SCshAvEw964#10:56#0","t":"10:56","j":"いいから、もうここはQRコード出せ","c":"好了好了，这时候就该拿出QR码来啦","k":"出せ（命令形）"},{"p":"honne-talk","s":"SCshAvEw964#11:01#0","t":"11:01","j":"なんか自分がしたいことなんですかって聞かれるの得意ですか?","c":"就是那种被问「你自己想做的事是什么」，你擅长回答这种问题吗？","k":"聞かれる（受身形） 聞かれるの得意ですか（形式名詞「の」の名詞化）"},{"p":"honne-talk","s":"SCshAvEw964#11:04#0","t":"11:04","j":"自分…わかんないよ","c":"自己……不知道啦","k":"わかんない（わからないの縮约）"},{"p":"honne-talk","s":"SCshAvEw964#11:06#0","t":"11:06","j":"私もだったの","c":"我以前也是这样的","k":"の（説明の终助词）"},{"p":"honne-talk","s":"SCshAvEw964#11:08#0","t":"11:08","j":"QRコード出せた時に23歳で解散だったんだけど","c":"能拿出QR码的时候，正好是我23岁那年（我们组合）解散了","k":"んだけど（説明＋前置き）"},{"p":"honne-talk","s":"SCshAvEw964#11:11#0","t":"11:11","j":"なんか小っちゃい頃からやりすぎてて","c":"因为从小时候就一直做得太多了","k":"やりすぎる（複合動詞：動詞連用形＋すぎる）"},{"p":"honne-talk","s":"SCshAvEw964#11:14#0","t":"11:14","j":"人にこれをやってくださいって言われて、QRコードの鈴木愛理として(?)、ボーノの鈴木愛理として(?)って","c":"被别人要求「请你做这个」，就以「QR码的铃木爱理」「Buono!的铃木爱理」这样的身份……","k":"やってください（依頼の敬语） 言われて（受身形） として（資格・立场を表す）"},{"p":"honne-talk","s":"SCshAvEw964#11:20#0","t":"11:20","j":"消化して作品を出していくっていう、この動きになりすぎちゃって。なんかこう自分のアイディアを1にするっていう作業が、わがままだと思っちゃったの。自分の意見を言うことが。","c":"变成了一直「消化任务、产出作品」的节奏，会觉得把自己的想法从零做到一这件事、还有说出自己的意见，都是一种任性。","k":"複合動詞「〜すぎる」 「〜っていう」の引用・言い換え 終助詞「の」"},{"p":"honne-talk","s":"SCshAvEw964#11:33#0","t":"11:33","j":"確かにアイドルさんのやり方とアーティストさんのやり方って全く別ですよね。","c":"确实，偶像的做法和艺人（音乐人）的做法完全不一样呢。","k":"「って」＝主题の「は」 終助詞「よね」"},{"p":"honne-talk","s":"SCshAvEw964#11:37#0","t":"11:37","j":"全然違う。","c":"完全不一样。","k":"「全然」＋肯定表現"},{"p":"honne-talk","s":"SCshAvEw964#11:38#0","t":"11:38","j":"だからそれがなくて、急に解散決まった時に「鈴木は何がしたいの」って言われて、なんもなかったの、やりたいことが。","c":"所以我完全没有那种（自己的想法），突然决定要解散的时候，被人问「铃木你想做什么」，结果发现自己根本没有想做的事。","k":"受身形「言われて」 倒装（述語先出し）"},{"p":"honne-talk","s":"SCshAvEw964#11:45#0","t":"11:45","j":"その時にすごい残念、自分ってすごい空っぽなんだみたいな気持ちに一回なっちゃったのね。","c":"那个时候觉得特别遗憾，一度陷入一种「自己好像很空虚」的心情。","k":"「〜みたいな」＋名詞 「〜になっちゃった」"},{"p":"honne-talk","s":"SCshAvEw964#11:57#0","t":"11:57","j":"でも一周回って今私は、人が求めてくれることに答えることが自分のやりたいことってことに、そういう性格なんだって気付けて。","c":"但是绕了一大圈，我现在意识到，回应别人对我的期待就是我自己想做的事——原来我就是这种性格。","k":"慣用句「一周回って」 授受表現「〜てくれる」 可能形「気付けて」"},{"p":"honne-talk","s":"SCshAvEw964#12:08#0","t":"12:08","j":"なんかそれがすごい無理がないってとこに落ち着いてるんだけど、どう思う?","c":"而且这样完全不勉强，最后就落在了这样的心境上，你怎么看？","k":"「落ち着いてる」＝ 落ち着いている 「〜んだけど」"},{"p":"honne-talk","s":"SCshAvEw964#12:14#0","t":"12:14","j":"めちゃくちゃ近いです。","c":"我特别有共鸣（跟你的想法非常接近）。","k":"程度副詞「めちゃくちゃ」"},{"p":"honne-talk","s":"SCshAvEw964#12:15#0","t":"12:15","j":"え、本当に?","c":"诶，真的吗？","k":""},{"p":"honne-talk","s":"SCshAvEw964#12:16#0","t":"12:16","j":"はい。私もアーティスト活動とか、まさにそんな感じで。","c":"是的。我做音乐活动之类的时候，也正是那种感觉。","k":"並列の「とか」"},{"p":"honne-talk","s":"SCshAvEw964#12:20#0","t":"12:20","j":"やっぱ好きなものとか、もちろん自分でこういうこと表現したいなってものがあれば取り入れてはいくんですけど。","c":"当然，如果有自己喜欢的东西，或是想表达「就是想这样表现」的想法，我也会把它加进去。","k":"複合動詞「取り入れていく」 「〜ってものがあれば」"},{"p":"honne-talk","s":"SCshAvEw964#12:27#0","t":"12:27","j":"大前提やっぱり、皆さんのためっていうところが、モチベーションですね。","c":"但大前提还是「为了大家」，这才是我的动力。","k":"「〜ため」＋「っていうところ」"},{"p":"honne-talk","s":"SCshAvEw964#12:31#0","t":"12:31","j":"そうだよね。なんか支え合おうね。","c":"就是说啊。感觉我们要互相支持呢。","k":"複合動詞の意志形「支え合おう」"},{"p":"honne-talk","s":"SCshAvEw964#12:36#0","t":"12:36","j":"ぜひ。","c":"一定要（这样）。","k":""},{"p":"honne-talk","s":"SCshAvEw964#12:37#0","t":"12:37","j":"分かち合えることいっぱいありそう。","c":"感觉有很多可以彼此分享的事情。","k":"可能形「分かち合える」 様態「〜そう」"},{"p":"honne-talk","s":"SCshAvEw964#12:39#0","t":"12:39","j":"ぜひお話を。ちょっともうちょっと待ってもらっていいですか、次の患者さん呼んでくるので。","c":"请一定跟我们多聊聊。稍等我一下，我去把下一位「患者」请进来。","k":"「〜てもらっていいですか」 「〜てくる」の移動・往復"},{"p":"honne-talk","s":"SCshAvEw964#12:44#0","t":"12:44","j":"患者さん?","c":"「患者」？","k":""},{"p":"honne-talk","s":"SCshAvEw964#12:45#0","t":"12:45","j":"ありがとうございます。ありがとうございました。ありがとうございます。","c":"谢谢。非常感谢。谢谢。","k":"ございます"},{"p":"honne-talk","s":"SCshAvEw964#12:51#0","t":"12:51","j":"よろしくお願いします。","c":"请多关照。","k":"お願いします"},{"p":"honne-talk","s":"SCshAvEw964#12:52#0","t":"12:52","j":"次は、オーイシさんです(?)。","c":"下一位是大石先生(?)。","k":"は"},{"p":"honne-talk","s":"SCshAvEw964#12:57#0","t":"12:57","j":"あ、（ありがとう）ございます。よろしくお願いします。","c":"啊，谢谢。请多关照。","k":""},{"p":"honne-talk","s":"SCshAvEw964#13:03#0","t":"13:03","j":"なんか、凄腕の心理カウンセラーがここにいると聞きまして、そんなことになっちゃいました。","c":"就是听说这里有位很厉害的心理咨询师，于是就变成这样（跑来了）了。","k":"凄腕 聞きまして 〜ちゃう（〜てしまう）"},{"p":"honne-talk","s":"SCshAvEw964#13:09#0","t":"13:09","j":"小倉さんとも結構お会いしてるんですよね、僕ね。","c":"我跟小仓（唯）你其实也见过挺多次面的呢，我。","k":"お会いする よね"},{"p":"honne-talk","s":"SCshAvEw964#13:11#0","t":"13:11","j":"そうなんですよ。","c":"对呀，就是这样。","k":"んですよ"},{"p":"honne-talk","s":"SCshAvEw964#13:12#0","t":"13:12","j":"アニソンイベントだったりとか、あと作品でも実はご一緒させていただいてまして。","c":"像是动漫歌曲的活动啊，另外其实在作品里也一起合作过。","k":"〜だったりとか ご一緒させていただく"},{"p":"honne-talk","s":"SCshAvEw964#13:18#0","t":"13:18","j":"あの、モンスト。","c":"就是那个，《怪物弹珠》（モンスト）。","k":""},{"p":"honne-talk","s":"SCshAvEw964#13:19#0","t":"13:19","j":"はいはいはい。","c":"对对对。","k":""},{"p":"honne-talk","s":"SCshAvEw964#13:20#0","t":"13:20","j":"パンドラ役で、で、僕が歌ってて。","c":"（你配）潘多拉那个角色，然后（角色歌）是我唱的。","k":"〜役で 歌ってて"},{"p":"honne-talk","s":"SCshAvEw964#13:23#0","t":"13:23","j":"あと、ウマ娘(?)。","c":"还有，赛马娘(?)。","k":""},{"p":"honne-talk","s":"SCshAvEw964#13:24#0","t":"13:24","j":"うん、ですね。","c":"嗯，是呢。","k":""},{"p":"honne-talk","s":"SCshAvEw964#13:25#0","t":"13:25","j":"ウマ娘(?)で割と、あの、がっつりと言いますか、なんと言いますか、あの、僕が作った曲を、あの、マンハッタンカフェで歌っていただいたっていう経緯があったんで。","c":"在《赛马娘》里可以说相当深入 问）“那到底是怎么回事啊”。","k":"んですか（说明疑问） って（引用）"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#00:00#0","t":"00:00","j":"この作品でヒロインっていうとここにも映ってる3人がパって浮かぶ方多いと思うんですけど、3人が同時に出ているシーンがないっていうところも、なかなかないなっていう部分で、これからが。","c":"说到这部作品的女主角，我想很多人会立刻想到画面里的这3位吧。而3人同时出现的场面还没有过——这一点也挺难得的，接下来才是关键。","k":"っていうと けど 出ている"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#00:17#0","t":"00:17","j":"海野さんも仰ってましたけど、この時間が続いていったら3人揃うのかなとか、ワクワクする気持ちにもなりましたね。","c":"海野先生也说过，如果这样的时间线一直延续下去，说不定3人就能凑齐了——想到这个就有点小激动呢。","k":"続いていったら ワクワクする"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#00:26#0","t":"00:26","j":"キービジュみたいなことがあったりするのかな、夢の共演な感じするもんね。","c":"说不定会出关键视觉图之类的呢，感觉就像梦幻共演一样呢。","k":"夢の共演 もんね"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#00:32#0","t":"00:32","j":"我々は生きてるんですかね。","c":"我们……还活着吗？","k":"かね"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#00:35#0","t":"00:35","j":"ちょっとなんかこんな笑顔でいられるのか。","c":"总觉得……我这样真的能保持笑容吗。","k":"笑顔でいられる"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#00:35#1","t":"00:35","j":"自信を持てよ。","c":"拿出点自信来啦。","k":"持てよ"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#00:39#0","t":"00:39","j":"そうですね、すいません、笑顔でいられるかちょっと分かりません。そうですね。","c":"是啊……不好意思，我也不太确定自己能不能保持笑容。是啊。","k":"わかりません"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#00:45#0","t":"00:45","j":"5周年放送もパネルが各視聴者のもとにプレゼントされていったんですけども。","c":"5周年直播那次，也有把立牌当作礼物送给了各位观众呢。","k":"プレゼントされていった けども"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#00:51#0","t":"00:51","j":"そうだ、等身大というか、もらったって人いますか。","c":"对了，说是等身大（立牌）来着——有拿到过的人吗？","k":"というか って"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#00:55#0","t":"00:55","j":"こいつらはもらえるみたいな。","c":"感觉就是「这几个人能拿到」那种（吐槽语气）。","k":"みたいな"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#00:56#0","t":"00:56","j":"私はそうですね、やっぱシルフィ演じてる身としては、この「伝えたい」は、はい、もうやっと思いを伝えられた。","c":"我的话……果然作为出演希尔菲的人，这个「想要传达」啊——嗯，终于把这份心意传达出去了。","k":"演じてる身としては 伝えられた"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#01:05#0","t":"01:05","j":"もう長く、もう素顔を見せないフィッツ先輩としての時間が長かったので、やっとこうシルフィだよっていうことが言えた。","c":"已经很久了……不露出真面目、作为菲兹前辈存在的时间太长了，所以终于能说出「其实我是希尔菲」这件事了。","k":"見せない ので 言えた"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#01:16#0","t":"01:16","j":"この話数は思い出に残ってますね。","c":"这一话让我印象很深刻呢。","k":"残ってますね"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#01:20#0","t":"01:20","j":"なんかゆみちゃんとこう、しっとりした、本当に2人きりでこういう空間のような感じで。","c":"和小由美（ゆみ）就那种……很静谧的感觉，真的像是只有两人独处的空间那样。","k":"しっとりした ような感じで"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#01:26#0","t":"01:26","j":"アフレコ現場で収録してたので","c":"因为是在配音现场录的","k":"～てた（～ていた縮約） ので"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#01:28#0","t":"01:28","j":"そうですね","c":"是啊。","k":""},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#01:29#0","t":"01:29","j":"何でしょう、湿度が高かったです。","c":"该怎么说呢，湿度很高。","k":"何でしょう 高かったです"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#01:32#0","t":"01:32","j":"そうですね","c":"是啊。","k":""},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#01:34#0","t":"01:34","j":"確かに1人だけ、お吉さん(?)だけ言ってくれたんじゃなかったでしたっけ。","c":"确实只有一个人，是不是只有お吉さん（人名，推测）说了呢？","k":"言ってくれた ～んじゃなかったでしたっけ"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#01:38#0","t":"01:38","j":"お吉さん(?)が見守ってくれてたんだ。","c":"是お吉さん一直在守护着（我们）啊。","k":"見守ってくれてた んだ"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#01:40#0","t":"01:40","j":"そうです","c":"是的。","k":""},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#01:41#0","t":"01:41","j":"すごい、なんか居たたまれないって言ってたもんね。","c":"是啊，你之前不是说感觉特别坐立难安嘛。","k":"って もんね"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#01:44#0","t":"01:44","j":"そうだった","c":"对哦，是这样呢。","k":""},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#01:46#0","t":"01:46","j":"内山さん、内山さんがもう一回(?)、貸し出しが大変なことに(?)","c":"内山さん，内山さん又一次（?）……把借出的东西弄得很麻烦（?，此处ASR识别混乱，含义不确定）","k":""},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#01:48#0","t":"01:48","j":"もう一回やった(?)","c":"又做了一次（?）","k":""},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#01:50#0","t":"01:50","j":"なんでそこで私。","c":"为什么这时候是我啊。","k":"なんで"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#01:52#0","t":"01:52","j":"どうにか杉田さん、杉田さんが「まず行けよ」って。","c":"没办法，杉田さん说了句「你先上啊」。","k":"行けよ って"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#01:56#0","t":"01:56","j":"いや私、杉田さんの距離近いのに。","c":"不是啊我……明明和杉田さん距离那么近。","k":"のに"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#02:00#0","t":"02:00","j":"いやでもロキシーとも色々な思い出がありますから。","c":"不过话说回来，我和洛琪希也有很多回忆呢。","k":"から"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#02:04#0","t":"02:04","j":"やはり僕のことを最初に外に連れ出してくれたのは、何を隠そう師匠しかいません。","c":"第一个把我带到外面世界的人，说实话，除了「师父」（洛琪希）不作他人想。","k":"連れ出してくれた しかいません"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#02:10#0","t":"02:10","j":"そうですね","c":"是啊。","k":""},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#02:11#0","t":"02:11","j":"7位ですね。","c":"是第7名呢。","k":""},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#02:12#0","t":"02:12","j":"じゃあ大吉(?)には師匠。","c":"那么大吉(?)（第七名/环节名，推测）的答案就是「师父」。","k":""},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#02:14#0","t":"02:14","j":"杉田さん、もっとあの瞬間を覚えていてくださったんですね。","c":"杉田さん，您把那个瞬间记得更清楚呢。","k":"覚えていてくださった んですね"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#02:18#0","t":"02:18","j":"もちろんです、もちろんです、もちろん、もちろん。","c":"当然啦，当然啦，当然当然。","k":"もちろん"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#02:20#0","t":"02:20","j":"もちろんですよね。","c":"那是当然的吧。","k":"よね"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#02:22#0","t":"02:22","j":"全然わけねえだろ。","c":"怎么可能没有意义嘛！","k":"わけねえ だろ"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#02:24#0","t":"02:24","j":"ご身体だって出てきたんだから。","c":"毕竟连（本）人都亲自到场了呀（?，具体语境不明）。","k":"だって んだから"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#02:26#0","t":"02:26","j":"どんだけ大事に。","c":"得多珍惜（她）啊。","k":"どんだけ"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#02:28#0","t":"02:28","j":"お願いします。","c":"拜托了。","k":""},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#02:30#0","t":"02:30","j":"はい。","c":"好。","k":""},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#02:32#0","t":"02:32","j":"いや…","c":"不是……","k":""},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#02:34#0","t":"02:34","j":"なんだろうな、さっき杉田さんも仰ってくださったんですけど。","c":"该怎么说呢，刚才杉田さん也说过了……","k":"おっしゃってくださった んですけど"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#02:38#0","t":"02:38","j":"やっぱりこう…","c":"果然就是那种……","k":""},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#02:40#0","t":"02:40","j":"印象に残る場面で。","c":"令人印象深刻的场景嘛。","k":"印象に残る"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#02:42#0","t":"02:42","j":"全部で見たら多いと思うんですけど。","c":"全部算下来的话应该挺多的。","k":"見たら"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#02:44#0","t":"02:44","j":"やっぱりどこも欠かせないよねっていうところを、皆さん本当にチョイスしてくださっているんだなって思ったら。","c":"果然每一幕都缺一不可呢——一想到大家真的都是精心挑选出来的，就（觉得很感动）。","k":"欠かせない チョイスしてくださっている って思ったら"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#02:52#0","t":"02:52","j":"なんか本当に楽しんでいただけているんだなっていうのを感じて、","c":"感受到大家真的很享受（这部作品），","k":"〜ていただく 〜っていうの"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#02:56#0","t":"02:56","j":"嬉しいのと同時に、どの話数にも私は思い出とか言いたいことがあったりとか、","c":"在开心的同时，每一集我都有回忆、也有想说的话之类的，","k":"〜と同時に どの〜にも 〜たり〜とか"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#03:04#0","t":"03:04","j":"やっぱ1位に選ばれた親と、自分は全く出てないですけど、その親子喧嘩っていうのは、やっぱこう胸にくるものもありましたし、","c":"果然，被选为第一名的「父亲（那一段）」，虽然我自己完全没有出场，但那场亲子争吵，还是有让我心头一震的地方，","k":"選ばれた 胸にくる 〜し"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#03:14#0","t":"03:14","j":"その親に関してはやっぱ、アフレコのことをやっぱ覚えているので、忘れられないし、パッて上がるかなって。","c":"关于那位父亲（那一段），我确实还记得配音时的事，所以忘不掉，（在排名里）大概会一下子就冲上去吧。","k":"〜に関して 〜ので 忘れられない"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#03:24#0","t":"03:24","j":"あえて言うと、その伝えたいのところは出てないじゃないですか。","c":"硬要说的话，那个想传达（心意）的部分（角色）其实没出现，对吧？","k":"あえて〜と 〜じゃないですか"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#03:29#0","t":"03:29","j":"はい。","c":"是的。","k":""},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#03:30#0","t":"03:30","j":"出てないあの方も、もう一人いるじゃないですか。","c":"没出场的那位，也还有另外一个人，对吧？","k":"〜も 〜じゃないですか"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#03:32#0","t":"03:32","j":"ええええ。","c":"诶——（对对对）。","k":""},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#03:33#0","t":"03:33","j":"その時、2人の濃厚な時間を過ごしている期間、あの、我々は…「なんで早く言わないんだろうね」って。","c":"那时候，在两人共度浓情蜜意的那段期间，我们（观众）就想「怎么不早点说出来呢」。","k":"濃厚な時間を過ごす 過ごしている 〜んだろうね"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#03:42#0","t":"03:42","j":"言っちゃえば、そう、言っちゃえばなんか…","c":"只要说出来就好了嘛，对，只要说出来的话…","k":"言っちゃえば"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#03:44#0","t":"03:44","j":"なんか、ずっとこの下りを見せられてる我々も苦しいよね、みたいな。","c":"我们也是一直被迫看着这段（剧情），也挺煎熬的呀，就这种感觉。","k":"見せられてる この下り 〜みたいな"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#03:49#0","t":"03:49","j":"そういうことを言ってたり…","c":"一边说着这样的话之类的…","k":"〜ていたり"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#03:51#0","t":"03:51","j":"でも、いざ結ばれたりとか打ち解けると、やっぱルディは苦しんでいたのには間違いないですから、","c": 47#0","t":"05:47","j":"いやもう、こういう作品でみんな本気で作ってるんですみたいな","c":"就说「哎呀，这种作品大家都在拼尽全力制作」之类的话，","k":"作ってるんです(ている+んです)"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#05:51#0","t":"05:51","j":"うん","c":"嗯","k":""},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#05:52#0","t":"05:52","j":"なので頑張ってくださいねって言ったら、頑張るって","c":"所以我说了句「请加油哦」，结果对方说「我会加油的」，","k":"てください って(引用)"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#05:55#0","t":"05:55","j":"ちょっと変にプレッシャーを与えすぎたかもしれないって思ったんだけど","c":"我当时还想，是不是给他施加了奇怪的压力，","k":"与えすぎた(複合動詞「〜すぎる」) かもしれない"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#05:59#0","t":"05:59","j":"大丈夫そうだ","c":"不过看起来没问题","k":"そうだ(様態)"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#06:00#0","t":"06:00","j":"すごくその場でも、あの、休憩中に、いや、茅野さんからねそういう話を伺って","c":"其实就在现场，呃，休息的时候，就是从茅野さん那儿听到了那样的话，","k":"伺って(謙譲語)"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#06:05#0","t":"06:05","j":"より身が引き締まったよって","c":"说是「更加打起精神了」，","k":"身が引き締まる"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#06:07#0","t":"06:07","j":"すごい熱く語ってくださいました","c":"她非常热情地讲述了这些","k":"てくださいました"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#06:09#0","t":"06:09","j":"うーん","c":"唔——","k":""},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#06:10#0","t":"06:10","j":"良かった","c":"那真是太好了","k":"かった(形容詞過去)"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#06:11#0","t":"06:11","j":"現場に対して誠実な方なんで","c":"因为她是对拍摄现场很真诚的人，","k":"に対して なんで(なので口语)"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#06:12#0","t":"06:12","j":"その思いを受けて","c":"接过了这份心意，","k":"思いを受けて"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#06:13#0","t":"06:13","j":"今ではあの、頭と、頭の毛と、あの眉毛をそって","c":"现在呢，把头、头发和眉毛都剃了(?)——","k":"そって(剃る→て形)"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#06:17#0","t":"06:17","j":"え、何の話ですか?何の話ですか?","c":"诶，这是在说什么呀？说什么呢？","k":"ですか(丁寧疑問)"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#06:20#0","t":"06:20","j":"新しいアニメに出てましたよ","c":"她出演了一部新番啦","k":"てました(ている+た) よ(终助词)"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#06:21#0","t":"06:21","j":"さて","c":"那么","k":"さて"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#06:23#0","t":"06:23","j":"見たー、見たー、見たー","c":"看过啦～看过啦～看过啦～","k":"見た+長音「ー」"},{"p":"mushok ら、ぜひとも楽しんでください。","c":"(片尾音乐/画面)已经要开始播放了,所以请一定要好好欣赏。","k":"〜ちゃう から ぜひとも"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#07:18#0","t":"07:18","j":"ありがとうございました。","c":"谢谢大家。","k":"ありがとうございました"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#07:19#0","t":"07:19","j":"ありがとうございます。","c":"谢谢。","k":"ありがとうございます"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#07:21#0","t":"07:21","j":"では、小原さんお願いいたします。","c":"那么,有请小原女士。","k":"お願いいたします では"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#07:24#0","t":"07:24","j":"短めにですよね?","c":"(讲得)简短一点,对吧?","k":"〜め よね"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#07:26#0","t":"07:26","j":"そうですね。","c":"是啊。","k":"ね"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#07:27#0","t":"07:27","j":"お時間も来てますし。","c":"时间也差不多到了。","k":"〜てる(い脱落) し"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#07:28#0","t":"07:28","j":"8(?)には、とてもかっこいいエリスを見ていただけた(?)と思うんですよ。","c":"在第8(话)(?)里,应该能让大家看到非常帅气的爱丽丝了(?),我是这么觉得的。","k":"見ていただく んですよ"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#07:32#0","t":"07:32","j":"あの、おっしゃって……","c":"那个,(某位)说过……","k":"おっしゃる"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#07:33#0","t":"07:33","j":"第一夫人の——","c":"正妻的——","k":"第一夫人"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#07:34#0","t":"07:34","j":"ロキシーです。","c":"是洛琪希。","k":"固有名詞:ロキシー"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#07:35#0","t":"07:35","j":"第一夫人がおっしゃっていたようにですね、","c":"就像正妻所说过的那样,","k":"おっしゃっていた 〜ように ですね"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#07:38#0","t":"07:38","j":"キャッキャウフフ、なんかデュエヘ(?)の方がいいのかな。","c":"嬉笑打闹、卿卿我我地,总觉得那种(?)会更好呢。","k":"キャッキャウフフ 〜の方がいい のかな"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#07:42#0","t":"07:42","j":"なんか、そういうシーンがありまして。","c":"就是,有那样的一些场面。","k":"〜まして"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#07:44#0","t":"07:44","j":"あの、ただ、いい意味でこう、んー、なんか「良かったね」っていうシーンとか、","c":"那个,不过呢,往好的方面说,就是那种让人觉得『太好了』的场面之类的,","k":"いい意味で 〜とか っていう"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#07:50#0","t":"07:50","j":"ちょっとドキドキするようなシーンとかがあって、","c":"也有那种让人有点小鹿乱撞、心跳加速的场面,","k":"ドキドキする 〜ような"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#07:53#0","t":"07:53","j":"いいジェットコースターに乗ったっていうか。","c":"怎么说呢,就像坐了一趟很棒的过山车。","k":"〜っていうか ジェットコースターに乗る"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#07:56#0","t":"07:56","j":"なんか、この劇場を出る時に、「あっ、面白かったね、本当に面白かったね」って、","c":"就是,走出这家影院的时候,会想『啊,真有意思,真的太有意思了』,","k":"って 出る時に"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#08:01#0","t":"08:01","j":"「この後もこの平和なみんなを見守り続けたいね」っていう風に思ってもらえると思います。","c":"我想大家会产生『今后也想继续守护这群平和的大家啊』这样的心情。","k":"思ってもらえる 見守り続ける 〜という風に"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#08:08#0","t":"08:08","j":"あと、杉田さんの、あの、心からのあの叫びみたいなモノローグとかもちょこちょこ出てきて、スカッとします。","c":"还有,杉田先生那种发自内心的、像呐喊一样的内心独白也时不时冒出来,让人特别畅快。","k":"みたいな ちょこちょこ スカッとする 出てくる"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#08:14#0","t":"08:14","j":"え?え?え?え?","c":"诶?诶?诶?诶?","k":""},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#08:15#0","t":"08:15","j":"かっこいいです、杉田さん。ぜひ。","c":"杉田先生太帅了。请一定(去看)。","k":"ぜひ"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#08:18#0","t":"08:18","j":"あ、ロキシーは演じるの、大変恥ずかしかったです。あの、頑張ったんで見てください。","c":"啊,洛琪希这个角色,演起来真的非常害羞。那个,我很努力了,请大家一定要看。","k":"演じるの んで 〜てください"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#08:22#0","t":"08:22","j":"ありがとうございました。","c":"谢谢大家。","k":"ありがとうございました"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#08:23#0","t":"08:23","j":"ありがとうございます。","c":"谢谢。","k":""},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#08:28#0","t":"08:28","j":"では、その、杉田さんお願いします。","c":"那么,接下来有请杉田先生。","k":"お願いします では"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#08:30#0","t":"08:30","j":"何(なに)が起(お)きても過去(かこ)が変(か)えられない。まあ変(か)えられないのであれば、常(つね)に治(なお)らない病気(びょうき)と同(おな)じで、向(む)き合(あ)い続(つづ)けることが大切(たいせつ)だなって。","c":"无论发生什么，过去都无法改变。既然无法改变，那就像一直治不好的病一样，持续去面对它才是重要的。","k":"可能形+ない のであれば ～と同じで 向き合い続ける"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#08:40#0","t":"08:40","j":"演(えん)じれば演(えん)じるほどその思(おも)いが積(つ)み重(かさ)なっていきます。","c":"越是去演绎，这份想法就越是不断累积。","k":"～ば～ほど 積み重なっていく"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#08:43#0","t":"08:43","j":"無職転生(むしょくてんせい)が新(あたら)しく始(はじ)まると何(なに)が起(お)きるか、心(こころ)の声(こえ)ラジオってやるのかなって。まあやるよね。","c":"无职转生新一期开始的话会发生什么呢——「内心台词广播」是不是又要做了呢。嗯，肯定会做的吧。","k":"って のかなって やるよね"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#08:51#0","t":"08:51","j":"よろしくお願(ねが)いします。","c":"请多多关照/请多支持。","k":"お願いします"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#08:54#0","t":"08:54","j":"ありがとうございます。","c":"谢谢。","k":"ありがとうございます"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#08:55#0","t":"08:55","j":"では内山(うちやま)さんお願(ねが)いいたします。","c":"那么，接下来请内山先生说几句。","k":"お願いいたします"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#08:56#0","t":"08:56","j":"はい。","c":"好的。","k":""},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#08:57#0","t":"08:57","j":"改(あらた)めましてルーです。グレイラット役(やく)の内山昂輝(うちやまこうき)です。今日(きょう)はお越(こ)しくださって本当(ほんとう)にありがとうございました。","c":"重新自我介绍一下，我是「路」。饰演格雷拉特一角的内山昂辉。今天真的非常感谢大家的到来。","k":"改めまして お越しくださって"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#09:01#0","t":"09:01","j":"えー我々(われわれ)もあのついにこう3期(き)を迎(むか)え、えーこうやって見(み)どころなんかもねちょっとお話(はな)ししましたけれども。","c":"呃，我们这边也终于迎来了第3期，呃，就这样也稍微聊了一下看点之类的，不过——","k":"迎え けれども"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#09:08#0","t":"09:08","j":"もう見(み)どころといっても本当(ほんとう)にあの全(すべ)てが、あの見(み)ていただきたい部分(ぶぶん)でもありますので。","c":"不过说是看点的话，其实真的全部都是希望大家看到的部分，所以——","k":"といっても 見ていただきたい"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#09:13#0","t":"09:13","j":"本当(ほんとう)にまあ先(さき)ほどねかよが言(い)ってくれたように、あの身構(みがま)えずにあの皆(みな)さんが好(す)きなように。","c":"真的呢，就像刚才かよ说的那样，不要有所拘束，请大家按自己喜欢的方式——","k":"言ってくれた ～ように 身構えずに"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#09:18#0","t":"09:18","j":"受(う)け取(と)っていただくのが一番(いちばん)かなというふうにも思(おも)っております。","c":"让大家按自己的方式去接受，我想这样是最好的。","k":"受け取っていただく 思っております"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#09:21#0","t":"09:21","j":"我々(われわれ)としましてもあのここまで積(つ)み重(かさ)ねてきたものが存分(ぞんぶん)に活(い)かされているこの3期(き)だなっていうふうに思(おも)っておりまして。","c":"对我们来说，也觉得这一路积累至今的东西，在这第3期里得到了充分的发挥。","k":"としましては／としましても 積み重ねてきた 活かされている"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#09:28#0","t":"09:28","j":"あの我々(われわれ)だけじゃなく他(ほか)のキャラクターを演(えん)じてくださっている皆(みな)さんもそうですし、あの様々(さまざま)な分野(ぶんや)であの携(たずさ)わってくださっている皆(みな)さんも本当(ほんとう)にあの一期(いっき)の頃(ころ)の。","c":"不仅仅是我们，饰演其他角色的各位也是如此，还有在各个领域参与制作的各位，真的也都是从第1期时候起——","k":"演じてくださっている だけじゃなく 携わってくださっている"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#09:39#0","t":"09:39","j":"あのリスペクトを持(も)ってまたこの3期(き)でっていうふうに思(おも)ってくださったりだとか、なんか本当(ほんとう)にこう全(すべ)てこうバトンが渡(わた)されていってるなっていうふうにもすごく感(かん)じていて。","c":"怀着敬意，抱着「这次也要在第3期里（好好投入）」这样的想法（去参与），我真切地感觉到，仿佛所有的一切都在被这样传承下去。","k":"思ってくださったりだとか バトンが渡されていってる"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#09:48#0","t":"09:48","j":"愛(あい)がたっぷり詰(つ)まっておりますので。","c":"因为里面满满地充满了爱，","k":"詰まっております たっぷり"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#09:50#0","t":"09:50","j":"ぜひ皆様(みなさま)その一瞬一瞬(いっしゅんいっしゅん)を、こんな大画面(だいがめん)で見(み)られる機会(きかい)ってそうないと思(おも)いますので。","c":"真心希望各位能珍惜每一个瞬间——能像这样在大银幕上看到的机会应该不多，所以——","k":"一瞬一瞬 って 見られる"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#09:55#0","t":"09:55","j":"ぜひぜひ堪能していっていただければなと思います。","c":"还请大家一定要尽情享受、好好品味（这部作品）。","k":"〜ていただければなと思います 堪能する ぜひぜひ"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#09:58#0","t":"09:58","j":"引き続きこの第3期もよろしくお願いいたします。","c":"接下来的第3期也请大家多多支持。","k":"お願いいたします 引き続き"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#10:01#0","t":"10:01","j":"本日はありがとうございました。","c":"感谢大家今天的光临。","k":"本日"},{"p":"mushoku-sugita","s":"DIJDQQ_7LuE#10:02#0","t":"10:02","j":"よろしくありがとうございました。","c":"谢谢大家，也请多多关照。","k":"よろしく＋ありがとうございました"},{"p":"shoten-date","s":"IydOjbD9yKA#00:00#0","t":"00:00","j":"三宅がゆく。こんにちは。文芸評論家の三宅香帆です。","c":"《三宅出发》。大家好，我是文艺评论家三宅香帆。","k":"〜がゆく 文芸評論家"},{"p":"shoten-date","s":"IydOjbD9yKA#00:02#0","t":"00:02","j":"今日はですね、もうね、マジで私の庭！","c":"今天呢，真的是，简直就是我家后院！","k":"ですね・もうね（终助词填充） マジで 私の庭（比喻）"},{"p":"shoten-date","s":"IydOjbD9yKA#00:04#0","t":"00:04","j":"本当に、えー、ジュンク堂書店池袋本店にやってきました。","c":"真的是，呃，我们来到了淳久堂书店池袋总店。","k":"やってきました に（到达点）"},{"p":"shoten-date","s":"IydOjbD9yKA#00:09#0","t":"00:09","j":"東京の池袋にあるんですけれども、地下から9階まであって、10フロアは全部本か漫画っていう、もう素晴らしい書店。","c":"它位于东京池袋，不过从地下一直到9楼，一共10层全都是书或漫画，真是一家了不起的书店。","k":"んですけれども から〜まで 〜か〜（选择并列） 〜っていう"},{"p":"shoten-date","s":"IydOjbD9yKA#00:18#0","t":"00:18","j":"日本一のジュンク堂ですよ！","c":"是日本第一的淳久堂哦！","k":"日本一 よ（终助词）"},{"p":"shoten-date","s":"IydOjbD9yKA#00:22#0","t":"00:22","j":"はい。私は本当に東京にいたとき、この書店に週1で通ってましたので、もうね、マジで愛しすぎてやばい書店さんなんですけれど","c":"嗯。我以前真的住在东京的时候，每周都会来这家书店一次，所以呢，真的是喜欢到不行的书店——","k":"〜ていた（通ってました） ので 愛しすぎて やばい"},{"p":"shoten-date","s":"IydOjbD9yKA#00:32#0","t":"00:32"," j":"へえ。","c":"哦——。","k":""},{"p":"shoten-date","s":"IydOjbD9yKA#09:16#0","t":"09:16","j":"『みえないもの』はたぶん私ほっといても買うから、","c":"《看不见的东西》我大概放着不管也会去买，所以…","k":"ほっといても（＝放っておいても） から（言いさし）"},{"p":"shoten-date","s":"IydOjbD9yKA#09:19#0","t":"09:19","j":"お、じゃあ一旦、","c":"哦，那就先…","k":"一旦（いったん）"},{"p":"shoten-date","s":"IydOjbD9yKA#09:20#0","t":"09:20","j":"今日じゃなくてちっちゃいの買おうかな。ですね。","c":"今天不买那本，买这本小的吧。——是呢。","k":"意志形＋かな 准体助词 の"},{"p":"shoten-date","s":"IydOjbD9yKA#09:23#0","t":"09:23","j":"SFとか読みますか？","c":"你会看科幻之类的吗？","k":"とか（例示・缓和）"},{"p":"shoten-date","s":"IydOjbD9yKA#09:24#0","t":"09:24","j":"SF読みます、読みます。","c":"科幻我看的、我看的。","k":"重复肯定"},{"p":"shoten-date","s":"IydOjbD9yKA#09:27#0","t":"09:27","j":"これ本屋さんじゃないとたぶん買わなそうだから、","c":"这种书不在实体书店（看到）大概就不会买，所以…","k":"〜ないと（条件） 買わなそう（样态）"},{"p":"shoten-date","s":"IydOjbD9yKA#09:30#0","t":"09:30","j":"確かに、いいですね。","c":"确实，很不错呢。","k":"確かに"},{"p":"shoten-date","s":"IydOjbD9yKA#09:33#0","t":"09:33","j":"これ雑誌もね、池袋はね、すごいんですよ。これバックナンバーとかもあるんですよ。","c":"这里杂志也是，池袋（这家店）超厉害的喔。连过刊都有呢。","k":"〜んですよ 句中的 ね（间投助词）"},{"p":"shoten-date","s":"IydOjbD9yKA#09:39#0","t":"09:39","j":"すごいよ。え、私ね、普通に『新潮』が買いたい。","c":"真厉害。咦，我啊，其实就很想买《新潮》。","k":"〜たい＋が 普通に（口语用法）"},{"p":"shoten-date","s":"IydOjbD9yKA#09:43#0","t":"09:43","j":"『新潮』、忘れてた。","c":"《新潮》，我给忘了。","k":"〜ていた→〜てた"},{"p":"shoten-date","s":"IydOjbD9yKA#09:44#0","t":"09:44","j":"Casa BRUTUSとかすぐなくなっちゃうもんな。","c":"像 Casa BRUTUS 这种一下子就卖光了嘛。","k":"〜てしまう→〜ちゃう 〜もんな（＝ものな）"},{"p":"shoten-date","s":"IydOjbD9yKA#09:47#0","t":"09:47","j":"シンプルにねえ。","c":"就是单纯（想要）嘛。","k":"シンプルに"},{"p":"shoten-date","s":"IydOjbD9yKA#09:48#0","t":"09:48","j":"あ、すごい。いい並びで置いてくれてる。『立ち読みの歴史(?)』と『町の本屋は〜』と『なぜ働〜』","c":"啊，好厉害。（书店）把它们摆成很棒的一排。《立读的历史》(?)、《街上的书店…》、《为什么一工作…》","k":"〜てくれる 並び（ならび）"},{"p":"shoten-date","s":"IydOjbD9yKA#09:53#0","t":"09:53","j":"うわ、めっちゃいい。ええ、いい並びで置いてくれている。","c":"哇，太棒了。是啊，摆成了很棒的一排呢。","k":"〜てくれている"},{"p":"shoten-date","s":"IydOjbD9yKA#09:57#0","t":"09:57","j":"いい並び。","c":"排得真好。","k":"動詞連用形の名詞化（並び）"},{"p":"shoten-date","s":"IydOjbD9yKA#09:57#1","t":"09:57","j":"すごくないですか？立ち読みして、本屋潰れて、働いてるとやっぱり本読めないっていう。池袋のジュンク堂さんにしかできない。","c":"是不是很厉害？大家站着白看，书店都要撑不下去了，可是一旦上班工作了又真的没空看书——这种事，也就只有池袋的淳久堂才做得到。","k":"文末の「っていう」 動詞て形の連続（て形） 「にしかできない」"},{"p":"shoten-date","s":"IydOjbD9yKA#10:06#0","t":"10:06","j":"いい。すごい。これベストセラー棚ですね。","c":"好棒。太厉害了。这是畅销书专柜吧？","k":"終助詞「ね」"},{"p":"shoten-date","s":"IydOjbD9yKA#10:08#0","t":"10:08","j":"あ、さすがですね。いい棚ですね。","c":"啊，真不愧是这里。这个书架摆得真好。","k":"「さすが」"},{"p":"shoten-date","s":"IydOjbD9yKA#10:13#0","t":"10:13","j":"『落雷と祝福』すごいいいジャケですね。","c":"《落雷与祝福》，这封面设计得真好看。","k":"外来語の省略形（ジャケ）"},{"p":"shoten-date","s":"IydOjbD9yKA#10:17#0","t":"10:17","j":"え、本当だ。岡本真帆さんだ。","c":"咦，真的耶。是冈本真帆老师啊。","k":"「〜だ」による発見・気づき"},{"p":"shoten-date","s":"IydOjbD9yKA#10:19#0","t":"10:19","j":"はい。「好き」に生かされる短歌とエッセイ。","c":"嗯，（腰封文案）「因『喜欢』而被滋养的短歌与散文」。","k":"「生かす」の受身形「生かされる」"},{"p":"shoten-date","s":"IydOjbD9yKA#10:24#0","t":"10:24","j":"いい、いい表紙。岡本真帆さん、これエッセイと短歌なんだ。読みます？岡本真帆さんの短歌。","c":"封面真好看。冈本真帆——这本是散文加短歌啊。你会读吗？冈本真帆的短歌。","k":"「〜なんだ」による説明の気づき"},{"p":"shoten-date","s":"IydOjbD9yKA#10:31#0","t":"10:31","j":"たまーに手に取りますけど。でも…","c":"偶尔会拿起来看看啦。不过……","k":"「けど」で言い淀む"},{"p":"shoten-date","s":"IydOjbD9yKA#10:34#0","t":"10:34","j":"これかわいいな。","c":"这个好可爱啊。","k":"終助詞「な」"},{"p":"shoten-date","s":"IydOjbD9yKA#10:34#1","t":"10:34","j":"ね、表紙かわいい。","c":"对吧，封面好可爱。","k":""},{"p":"shoten-date","s":"IydOjbD9yKA#10:35#0","t":"10:35","j":"今日私水色に惹かれてる？確かに青い系ばかり。","c":"我今天是不是特别被浅蓝色吸引？确实挑的都是蓝色系的。","k":"「〜ている」→「〜てる」の縮約 「ばかり」"},{"p":"shoten-date","s":"IydOjbD9yKA#10:39#0","t":"10:39","j":"なんで？私ちなみにこれ『ヤブノナカ』読みました。","c":"为什么呀？我顺便说一下，这本《薮之中》我看过。","k":"「ちなみに」"},{"p":"shoten-date","s":"IydOjbD9yKA#10:42#0","t":"10:42","j":"あ、読みました？読みました？","c":"啊，你看过？你看过？","k":"疑問の反復による驚き"},{"p":"shoten-date","s":"IydOjbD9yKA#10:43#0","t":"10:43","j":"おもしろかったですよね。","c":"很有意思吧。","k":"「よね」の確認・共感"},{"p":"shoten-date","s":"IydOjbD9yKA#10:44#0","t":"10:44","j":"おもしろかった。すごかった。もう圧がね。なんかね。","c":"真的很有意思。太厉害了。那种压迫感……怎么说呢。","k":"「ね」で言葉を探す"},{"p":"shoten-date","s":"IydOjbD9yKA#10:47#0","t":"10:47","j":"金原節がすごかった。","c":"金原式的文风真是厉害。","k":"「〜節」＝独特の言い回し"},{"p":"shoten-date","s":"IydOjbD9yKA#10:48#0","t":"10:48","j":"圧がすごかった、圧が。","c":"那种压迫感真的很强，那种压迫感。","k":"倒置による強調"},{"p":"shoten-date","s":"IydOjbD9yKA#10:50#0","t":"10:50","j":"あの言葉の使い方がおもしろい。","c":"那种遣词造句的方式很有意思。","k":"「動詞連用形＋方」"},{"p":"shoten-date","s":"IydOjbD9yKA#10:52#0","t":"10:52","j":"ねえ。","c":"就是说啊。","k":""},{"p":"shoten-date","s":"IydOjbD9yKA#10:52#1","t":"10:52","j":"お母さん、お父さん、やっぱり僕は女性にお金を払ってご馳走することを…みたいな。なんか突然の懺悔が始まったりとかして。","c":"（书里角色说）「妈，爸，我果然还是会花钱请女生吃饭……」之类的。就这样，突然就开始忏悔了起来。","k":"「〜みたいな」で引用を結ぶ 「〜たりとかして」"},{"p":"shoten-date","s":"IydOjbD9yKA#11:01#0","t":"11:01","j":"そうなんですよ。男がやばいんですよ。金原先生の書く男はみんなやばい。","c":"对啊，就是这样。里面的男的都很离谱。金原老师笔下的男性角色个个都很离谱。","k":"「〜んですよ」の説明・強調 「やばい」の口語的用法"},{"p":"shoten-date","s":"IydOjbD9yKA#11:04#0","t":"11:04","j":"さあ、ちょっと全然進めないんだけど、これ三宅さんがね、","c":"好啦，虽然完全没在往前走，不过——这本啊，三宅你——","k":"「〜んだけど」で話題転換"},{"p":"shoten-date","s":"IydOjbD9yKA#11:08#0","t":"11:08","j":"あ、そうそうそう。","c":"啊对对对。","k":"相槌の繰り返し（そうそうそう）"},{"p":"shoten-date","s":"IydOjbD9yKA#11:09#0","t":"11:09","j":"影響を与えている。","c":"这本书受到了三宅你的影响。","k":"「〜ている」の結果・状態継続"},{"p":"shoten-date","s":"IydOjbD9yKA#11:11#0","t":"11:11","j":"実はねっていう村上信五さんの本なんですけど、私が村上さんのラジオに出させていただいたときに、「半分、論とか読みたいですよ」って言ったらほんとに書いてくれたっていう。","c":"这本叫《実はね》的书，是村上信五先生写的。我之前受邀上村上先生的电台节目时，说了句「希望有一半篇幅是像评论那样的内容」，结果他真的照这样写了。","k":"「〜させていただく」 「〜たら」の仮定・時間的前後 「〜てくれる」の恩恵表現"},{"p":"shoten-date","s":"IydOjbD9yKA#11:23#0","t":"11:23","j":"信じられないっていうことを、れなちさんのラジオで村上さんが喋られてたんですよ。びっくりした。","c":"村上老师在怜奈的电台节目里，说了『真令人难以置信』的那件事，我吓了一跳。","k":"喋られてた っていうこと"},{"p":"shoten-date","s":"IydOjbD9yKA#11:27#0","t":"11:27","j":"そう！で、あれ？なんか友達の名前が出てきたなとか思って。急に（笑）。","c":"对啊！然后我就『咦？』了一下，心想『怎么好像出现了朋友的名字』。就那么突然冒出来了（笑）。","k":"で 出てきた"},{"p":"shoten-date","s":"IydOjbD9yKA#11:32#0","t":"11:32","j":"ねえ、これも面白かったし。私、この本まだ積読中。","c":"哎，这本也挺有意思的。我这本书还在『积读』中（还没看）。","k":"積読 し"},{"p":"shoten-date","s":"IydOjbD9yKA#11:36#0","t":"11:36","j":"あ、そうなんです。松田先生の…あ、ちょっと待って。私の好きな松田青子さんが解説書いてる。宮地尚子さんの。","c":"啊，是这样的。是松田老师的……啊，等一下。是我很喜欢的松田青子写的解说。是宫地尚子（写）的（书）。","k":"書いてる 解説"},{"p":"shoten-date","s":"IydOjbD9yKA#11:43#0","t":"11:43","j":"買いますわ。それだけで買ってしまう。解説読みたいがため。","c":"那我买了。光是因为这个就会忍不住买下去。就是想读那篇解说而已。","k":"買ってしまう わ 〜がため（に）"},{"p":"shoten-date","s":"IydOjbD9yKA#11:49#0","t":"11:49","j":"あ、『傷を愛せるか』は有名な気がする。知ってます？","c":"啊，『能爱上伤口吗』这本感觉挺有名的。你知道吗？","k":"愛せる 〜気がする"},{"p":"shoten-date","s":"IydOjbD9yKA#11:50#0","t":"11:50","j":"知ってます、知ってます。『傷を愛せるか』は有名な気がする。","c":"知道知道。『能爱上伤口吗』这本确实感觉挺有名的。","k":"知ってます、知ってます"},{"p":"shoten-date","s":"IydOjbD9yKA#11:54#0","t":"11:54","j":"え、やばい。もうなんか普通にベストセラー棚だけでこんなにいけちゃうのどうしよう。やばい、あ、『カフネ』！","c":"哎，太夸张了。光是畅销书架就能这样一直聊下去，怎么办啊。夸张，啊，是『卡夫内』！","k":"いけちゃう やばい"},{"p":"shoten-date","s":"IydOjbD9yKA#11:59#0","t":"11:59","j":"あ、『カフネ』。","c":"啊，『卡夫内』。","k":""},{"p":"shoten-date","s":"IydOjbD9yKA#12:01#0","t":"12:01","j":"あ、本屋大賞！皆さん読みましたか？もうね、映像化してほしい！","c":"啊，是本屋大赏（得奖作品）！大家都看过了吗？真的是，好希望它被拍成影视作品！","k":"〜してほしい"},{"p":"shoten-date","s":"IydOjbD9yKA#12:04#0","t":"12:04","j":"これこそなんか脳内映像化捗りません？私、黒木華さんをキャスティングしました。","c":"这本尤其容易让人在脑内『自动拍成画面』吧？我已经把黑木华选进（我脑内的）演员阵容了。","k":"〜こそ 捗りません"},{"p":"shoten-date","s":"IydOjbD9yKA#12:09#0","t":"12:09","j":"ああ、わかる。『カフネ』はね、本屋大賞はこれぞって感じの本でしたね。","c":"啊，我懂。『卡夫内』这本啊，真的是那种『本屋大赏就该是这样』的书呢。","k":"これぞ"},{"p":"shoten-date","s":"IydOjbD9yKA#12:15#0","t":"12:15","j":"ね。あの家事代行の話ですよね。","c":"对呀。就是那个关于到家做家务服务的故事对吧。","k":"ですよね"},{"p":"shoten-date","s":"IydOjbD9yKA#12:17#0","t":"12:17","j":"そうそうそうそう。伊藤沙莉さんに出てほしいな。","c":"对对对对。真希望伊藤沙莉能出演呢。","k":"に〜てほしい"},{"p":"shoten-date","s":"IydOjbD9yKA#12:20#0","t":"12:20","j":"ああ、わかるな。確かに。初めてやり始めた人じゃなくて、","c":"啊，我懂。确实。不是那种刚开始做（这份工作）的新人，","k":"やり始めた"},{"p":"shoten-date","s":"IydOjbD9yKA#12:23#0","t":"12:23","j":"そうそうそう。じゃない方。あの、","c":"对对对。不是（新人）的那一个。那个，","k":"〜じゃない方"},{"p":"shoten-date","s":"IydOjbD9yKA#12:25#0","t":"12:25","j":"慣れてる方の。","c":"是已经熟练的那一位（角色）。","k":"慣れてる"},{"p":"shoten-date","s":"IydOjbD9yKA#12:26#0","t":"12:26","j":"ちょっと読んだ方だけわかる。","c":"这个只有稍微读过（原著）的人才会懂。","k":"〜だけ"},{"p":"shoten-date","s":"IydOjbD9yKA#12:28#0","t":"12:28"," ":"shoten-date","s":"IydOjbD9yKA#13:11#0","t":"13:11","j":"深海魚？","c":"深海鱼？","k":""},{"p":"shoten-date","s":"IydOjbD9yKA#13:13#0","t":"13:13","j":"これ、深海魚じゃない、熱帯魚。","c":"这个不是深海鱼，是热带鱼。","k":"～じゃない（否定）"},{"p":"shoten-date","s":"IydOjbD9yKA#13:14#0","t":"13:14","j":"私ね、告白すると動物への解像度がゼロで、本当に動物を知らないんですよ。だから魚とか全くわからない。","c":"老实说，我对动物的「解析度」根本是零，真的完全不了解动物。所以鱼类这种东西我也完全搞不懂。","k":"～と（条件） ～んですよ 全くわからない"},{"p":"shoten-date","s":"IydOjbD9yKA#13:23#0","t":"13:23","j":"あの、永明っていう、ここに書いてある、和歌山アドベンチャーワールドっていうパンダの飼育で有名なところがあるんですけど。","c":"呃，这里写的「永明」——是位于一个叫「和歌山冒险世界」、以饲养熊猫闻名的地方。","k":"書いてある ～んですけど"},{"p":"shoten-date","s":"IydOjbD9yKA#13:23#1","t":"13:23","j":"あ、あるある。","c":"啊，有有，我知道那个地方。","k":"あるある"},{"p":"shoten-date","s":"IydOjbD9yKA#13:31#0","t":"13:31","j":"あの、16頭産んだ伝説の…ほら、パンダファミリー。","c":"呃，就是那个生了16只宝宝的传说……那个，熊猫家族。","k":"産んだ（连体修饰）"},{"p":"shoten-date","s":"IydOjbD9yKA#13:35#0","t":"13:35","j":"うわー、かわいい。品格。","c":"哇——好可爱。有格调。","k":"品格"},{"p":"shoten-date","s":"IydOjbD9yKA#13:37#0","t":"13:37","j":"いや、でも動物は言葉喋ってくれないからさ。","c":"不过话说回来，动物又不会开口跟我们说话嘛。","k":"～てくれない ～からさ"},{"p":"shoten-date","s":"IydOjbD9yKA#13:41#0","t":"13:41","j":"ちなみにパンダの名前は全部公募です。","c":"顺带一提，熊猫的名字全部都是公开征集来的喔。","k":"公募"},{"p":"shoten-date","s":"IydOjbD9yKA#13:44#0","t":"13:44","j":"そうなんや！？","c":"是喔！？","k":"～なんや（方言）"},{"p":"shoten-date","s":"IydOjbD9yKA#13:46#0","t":"13:46","j":"なんで詳しいんですか、そんなにパンダに？","c":"你怎么对熊猫这么熟悉啊？","k":"倒装（そんなにパンダに）"},{"p":"shoten-date","s":"IydOjbD9yKA#13:48#0","t":"13:48","j":"パンダはね、ラジオで聞いて。安住紳一郎さんの日曜天国で。","c":"熊猫的话，是我从广播里听来的。就是安住绅一郎主持的《日曜天国》。","k":"聞いて（て形结句）"},{"p":"shoten-date","s":"IydOjbD9yKA#13:53#0","t":"13:53","j":"あのパンダ界隈がそこに集ってるんですよ。","c":"那些熊猫迷（圈子）都聚集在那个节目里喔。","k":"界隈 集ってる（集っている）"},{"p":"shoten-date","s":"IydOjbD9yKA#13:57#0","t":"13:57","j":"へえー、全く知らない世界だった。","c":"欸——完全是我不知道的世界呢。","k":""},{"p":"shoten-date","s":"IydOjbD9yKA#14:00#0","t":"14:00","j":"そうなんや。え、てかなんか普通に私の雑誌見たくなってきた。","c":"原来如此。诶，话说我突然单纯地想去看看我的杂志了。","k":"てか 見たくなってきた"},{"p":"shoten-date","s":"IydOjbD9yKA#14:04#0","t":"14:04","j":"そ ":"shoten-date","s":"IydOjbD9yKA#34:08#0","t":"34:08","j":"ホームに帰ってきた感がすごい。","c":"有种回到主场的感觉，太强烈了。","k":"～てくる（帰ってきた） ～感がすごい"},{"p":"shoten-date","s":"IydOjbD9yKA#34:10#0","t":"34:10","j":"安心があるか。","c":"是有安心感啊。","k":"～か（终助词，非疑问）"},{"p":"shoten-date","s":"IydOjbD9yKA#34:11#0","t":"34:11","j":"え、あ、でもすごい千葉さんがこれ選んだ…あ、著作で取り上げられた本がもう全部あるんだ。","c":"诶，啊，不过好厉害，这是千叶老师自己挑选的…啊，他著作里提到过的书居然全都在这儿。","k":"取り上げられた（複合動詞+受身） ～んだ（说明・发现）"},{"p":"shoten-date","s":"IydOjbD9yKA#34:18#0","t":"34:18","j":"すごい。引用的なこと。え、すごいなあ。てか、なんでこの千葉雅也さんってかっこいいんですかね？すごい。","c":"好厉害。是引用相关的东西啊。诶，好厉害。话说，为什么这位千叶雅也老师这么帅气啊？好厉害。","k":"って（引用・提示） ～ですかね（不确定推测+确认）"},{"p":"shoten-date","s":"IydOjbD9yKA#34:24#0","t":"34:24","j":"てか、なんで千葉雅也フェアやってるんですか？","c":"话说，为什么在办千叶雅也特展呢？","k":"てか（口语接续词） ～てる（～ている口语缩约）"},{"p":"shoten-date","s":"IydOjbD9yKA#34:27#0","t":"34:27","j":"なんかなんでなんだろう？","c":"是啊，为什么呢？","k":"～んだろう（自问推测）"},{"p":"shoten-date","s":"IydOjbD9yKA#34:33#0","t":"34:33","j":"現在入手できない書籍です。","c":"（架上说明写着）目前无法购得的书籍。","k":"可能形＋否定（入手できない）"},{"p":"shoten-date","s":"IydOjbD9yKA#34:35#0","t":"34:35","j":"へえー、そうなんだ。ま、やっぱあるか。","c":"哦～原来如此。嗯，那也难怪。","k":"～んだ（说明の語気） やっぱ（やはり的口语缩约）"},{"p":"shoten-date","s":"IydOjbD9yKA#34:38#0","t":"34:38","j":"あ、でもいい本。『内省と遡行』、私昔に読んで。","c":"啊，不过是本好书。『内省与溯行』，我以前读过。","k":"て形で言い切り（読んで。）"},{"p":"shoten-date","s":"IydOjbD9yKA#34:45#0","t":"34:45","j":"へえ。","c":"哦。","k":""},{"p":"shoten-date","s":"IydOjbD9yKA#34:47#0","t":"34:47","j":"それ何きっかけで読んだんですか？","c":"那是因为什么契机读的呀？","k":"～んですか（说明要求） きっかけで"},{"p":"shoten-date","s":"IydOjbD9yKA#34:49#0","t":"34:49","j":"それはね、文学部のイキってた頃に読んでた気がします。やっぱ人間誰しもイキる時代はありますからね。やっぱ柄谷行人とか読んじゃうぜみたいな気持ちで読んだんですよね。","c":"那个啊，我记得好像是在文学部里「装腔作势」的那段时期读的。毕竟人多少都会有那种爱装的年纪嘛。就是抱着「怎么也得读读柄谷行人吧」那种心态去读的。","k":"イキる ～てた（～ていた口语缩约） 読んじゃうぜ（～ちゃう+ぜ）"},{"p":"shoten-date","s":"IydOjbD9yKA#34:59#0","t":"34:59","j":"でもいまいち覚えてないっていう。","c":"不过说实话不太记得内容了。","k":"～っていう（引用+言い切り） いまいち"},{"p":"shoten-date","s":"IydOjbD9yKA#35:01#0","t":"35:01","j":"文学部いいな。","c":"文学部真好啊。","k":"な（感叹终助词）"},{"p":"shoten-date","s":"IydOjbD9yKA#35:01#1","t":"35:01","j":"文学部はね、ちょっとそういうイキり時期っていうのがありますからね。みんな人がイキっててもね、あんま怒らないようにしようねって私はいつも思いますよ。","c":"文学部啊，多少都会有那种爱装的时期呢。就算看到别人在那边装，我也总是提醒自己尽量别生气——我一直是这么想的。","k":"～ようにしよう（意志形+ように） って（引用の助词） あんま（あまり口语缩约）"},{"p":"shoten-date","s":"IydOjbD9yKA#35:09#0","t":"35:09","j":"へえ。","c":"哦。","k":""},{"p":"shoten-date","s":"IydOjbD9yKA#35:09#1","t":"35:09","j":"人はみんなイキる生き物ですから。","c":"毕竟人都是爱装的生物嘛。","k":"から（理由・言い切り）"},{"p":"shoten-date","s":"IydOjbD9yKA#35:11#0","t":"35:11","j":"そういうことですよね。","c":"就是这么回事吧。","k":"よね（确认+同意）"},{"p":"shoten-date","s":"IydOjbD9yKA#35:13#0","t":"35:13","j":"『ChatGPTの頭の中』。","c":"『ChatGPT的脑子里』。","k":""},{"p":"shoten-date","s":"IydOjbD9yKA#35:14#0","t":"35:14","j":"いや、面白いですね。","c":"唉，还挺有意思的呢。","k":"いや（口语感叹词）"},{"p":"shoten-date","s":"IydOjbD9yKA#35:16#0","t":"35:16","j":"え、読んだことありますか？気になる。","c":"诶，你读过吗？我很好奇。","k":"～たことがある（经验体） 気になる"},{"p":"shoten-date","s":"IydOjbD9yKA#35:18#0","t":"35:18","j":"ない、ないけど、今ちらっと表紙が見えて、何書いてんだろうなと思ってました。","c":"没有，没读过，不过刚才瞄了一眼封面，当时还在想里面到底写了些什么呢。","k":"けど（逆接・軽い） ～てんだろう（～ているのだろう缩约） ちらっと"},{"p":"shoten-date","s":"IydOjbD9yKA#35:23#0","t":"35:23","j":"本当だ。","c":"真的诶。","k":""},{"p":"shoten-date","s":"IydOjbD9yKA#35:24#0","t":"35:24","j":"ええー。","c":"诶——","k":""},{"p":"shoten-date","s":"IydOjbD9yKA#35:24#1","t":"35:24","j":"サム・アルトマンが絶賛してますよ。","c":"萨姆・奥特曼对这本书赞不绝口哦。","k":"～てます（～ています口语缩约） よ（新情報の提示）"},{"p":"shoten-date","s":"IydOjbD9yKA#35:26#0","t":"35:26","j":"サム・アルトマンって、OpenAIの人。","c":"萨姆·奥尔特曼，就是 OpenAI 那位吧。","k":"〜って（提示话题／＝というのは）"},{"p":"shoten-date","s":"IydOjbD9yKA#35:28#0","t":"35:28","j":"ChatGPT作ってる人。","c":"就是做 ChatGPT 的那个人。","k":"连体修饰（动词直接修饰名词） 〜ている → 〜てる（口语缩约）"},{"p":"shoten-date","s":"IydOjbD9yKA#35:30#0","t":"35:30","j":"ええ、ちょっと読もう。面白そう。","c":"哎，那我读读看吧。看着挺有意思。","k":"意志形（〜おう） 〜そう（样态）"},{"p":"shoten-date","s":"IydOjbD9yKA#35:32#0","t":"35:32","j":"面白そう。これね、安いですからね。","c":"看着挺有意思。而且这本啊，便宜嘛。","k":"〜から＋ね（提出理由并求共鸣）"},{"p":"shoten-date","s":"IydOjbD9yKA#35:35#0","t":"35:35","j":"ね。","c":"就是说啊。","k":""},{"p":"shoten-date","s":"IydOjbD9 "IydOjbD9yKA#36:29#0","t":"36:29","j":"へえ。","c":"哦——","k":""},{"p":"shoten-date","s":"IydOjbD9yKA#36:30#0","t":"36:30","j":"素敵。え、ちょっと欲しかったんですよね。しかも、かっこいい。","c":"太棒了。诶，我本来就有点想要这本。而且还这么帅气。","k":"「欲しかった」（い形容词过去形） しかも（而且，追加）"},{"p":"shoten-date","s":"IydOjbD9yKA#36:35#0","t":"36:35","j":"買うんだ。","c":"你要买啊。","k":"〜んだ（领会・确认）"},{"p":"shoten-date","s":"IydOjbD9yKA#36:36#0","t":"36:36","j":"本当だ。","c":"还真是。","k":""},{"p":"shoten-date","s":"IydOjbD9yKA#36:38#0","t":"36:38","j":"どんどん、歩けば歩くほど本買って帰ってる。","c":"越逛就买得越多、带回去的书越来越多。","k":"〜ば〜ほど（越…越…） 〜て帰る（复合表达）"},{"p":"shoten-date","s":"IydOjbD9yKA#36:42#0","t":"36:42","j":"間違いない。","c":"那是肯定的。","k":"間違いない（惯用）"},{"p":"shoten-date","s":"IydOjbD9yKA#36:43#0","t":"36:43","j":"あ、あった、あった、あった。","c":"啊，找到了找到了！","k":"发现瞬间用过去形「あった」"},{"p":"shoten-date","s":"IydOjbD9yKA#36:44#0","t":"36:44","j":"え、なんですか？なんすか？","c":"诶，是什么？什么呀？","k":"なんですか → なんすか（丁宁体缩约）"},{"p":"shoten-date","s":"IydOjbD9yKA#36:46#0","t":"36:46","j":"あの、これ、図鑑じゃないんですけど。これ……","c":"那个，这个虽然不是图鉴啦。这个……","k":"〜んですけど（铺垫・欲言又止） 名词否定「〜じゃない」"},{"p":"shoten-date","s":"IydOjbD9yKA#36:49#0","t":"36:49","j":"何すか？これ。","c":"这是什么呀？","k":"倒置（「これ」后置）"},{"p":"shoten-date","s":"IydOjbD9yKA#36:50#0","t":"36:50","j":"最近買ってめっちゃおもしろかった。","c":"最近买的，超级有意思。","k":"めっちゃ 買って"},{"p":"shoten-date","s":"IydOjbD9yKA#36:53#0","t":"36:53","j":"かっこいい表紙が。","c":"封面好帅气……","k":"が（言いさし）"},{"p":"shoten-date","s":"IydOjbD9yKA#36:55#0","t":"36:55","j":"その生物分類の話で、あとこれね、ジャケがかっこいい。","c":"是讲那个生物分类的故事，然后这个啊，封面（jacket）很帅。","k":"ジャケ で（原因・状況）"},{"p":"shoten-date","s":"IydOjbD9yKA#36:58#0","t":"36:58","j":"かっこいい。めちゃめちゃかっこいい。この、ここかっこいい。ここかっこいい。","c":"好帅！超级帅气。这里，这里很帅。这里也帅。","k":"めちゃめちゃ"},{"p":"shoten-date","s":"IydOjbD9yKA#37:03#0","t":"37:03","j":"『Why Fish Don't Exist』ですからね。","c":"毕竟书名就叫『Why Fish Don't Exist』嘛。","k":"ですからね"},{"p":"shoten-date","s":"IydOjbD9yKA#37:04#0","t":"37:04","j":"かっこいい。","c":"好帅。","k":""},{"p":"shoten-date","s":"IydOjbD9yKA#37:06#0","t":"37:06","j":"そんなかっこいいタイトル、『存在しない理由』っていいな。私もつけたいな。これすごい面白いです。","c":"那么帅气的标题，『不存在的理由』真好啊。我也想取这样的标题。这个真的很有趣。","k":"って（引用） つけたいな"},{"p":"shoten-date","s":"IydOjbD9yKA#37:12#0","t":"37:12","j":"その分類作業の話。世界秩序理解できるかな？","c":"讲的是那个分类工作的事。看了能理解世界秩序吗？","k":"秩序 できるかな"},{"p":"shoten-date","s":"IydOjbD9yKA#37:18#0","t":"37:18","j":"すごい面白い。","c":"真的很有趣。","k":"すごい（副词用法）"},{"p":"shoten-date","s":"IydOjbD9yKA#37:20#0","t":"37:20","j":"これじゃオススメですかね？","c":"那这算是（你的）推荐书吗？","k":"じゃ（では的口语音变） かね"},{"p":"shoten-date","s":"IydOjbD9yKA#37:22#0","t":"37:22","j":"これ、私の最近のオススメのうちの1つ。","c":"这是我最近的推荐书之一。","k":"～のうちの1つ"},{"p":"shoten-date","s":"IydOjbD9yKA#37:25#0","t":"37:25","j":"じゃあちょっとれなちさんからオススメされたら買おう。美しい。あと。","c":"那既然是被怜奈酱推荐了，那就买吧。真美。还有……","k":"オススメされたら 買おう"},{"p":"shoten-date","s":"IydOjbD9yKA#37:28#0","t":"37:28","j":"ええ、美しい。","c":"嗯，是很美。","k":""},{"p":"shoten-date","s":"IydOjbD9yKA#37:30#0","t":"37:30","j":"生き物興味ない勢からしたら、ここから……あ、でもそんな導入書じゃないけど。","c":"对不喜欢生物的人来说……从这里开始……啊，不过这也不算是那种入门书啦。","k":"～勢 からしたら じゃないけど"},{"p":"shoten-date","s":"IydOjbD9yKA#37:35#0","t":"37:35","j":"あ、でもなんか分類っていうのは確かにおもしろいな。なぜ人間が分類したがるのかっていう点は面白い。魚には興味ないけど魚を分類したがる人間のこと興味ある。","c":"啊，不过分类这件事确实挺有意思的呢。人为什么想要分类，这一点很有趣。我对鱼没兴趣，但对想给鱼分类的人类很感兴趣。","k":"したがる っていうのは（＝というのは） には（对比强调）"},{"p":"shoten-date","s":"IydOjbD9yKA#37:44#0","t":"37:44","j":"そう。なぜ人間は肩書きをつけたがるのかみたいなところと一緒ですよね、だいたいね。近いところある。れなちさんは肩書きつけられない職業してる感じがあるから。ね、なんかパーソナリティであり、こうタレントであり、文筆家でありみたいなね。","c":"对啊。跟人为什么想给事物取头衔差不多吧，大概。是有相近之处的。怜奈桑给人的感觉就是那种没法被单一头衔定住的职业呢。就是，又是（电台）personality，又是艺人，又是文笔家，差不多这种感觉。","k":"つけられない であり…であり…（列举） パーソナリティ"},{"p":"shoten-date","s":"IydOjbD9yKA#38:00#0","t":"38:00","j":"あ、「パンどろぼう」のガチャガチャがある！","c":"啊，有『面包小偷（パンどろぼう）』的扭蛋！","k":"ガチャガチャ"},{"p":"shoten-date","s":"IydOjbD9yKA#38:02#0","t":"38:02","j":"え、本当だ。ガチャガチャがある。","c":"诶，真的诶。真的有扭蛋。","k":""},{"p":"shoten-date","s":"IydOjbD9yKA#38:04#0","t":"38:04","j":"フィギュアだ。","c":"是手办（模型）啊。","k":""},{"p":"shoten-date","s":"IydOjbD9yKA#38:05#0","t":"38:05","j":"え、やりたい。","c":"诶，我想玩。","k":"やりたい"},{"p":"shoten-date","s":"IydOjbD9yKA#38:06#0","t":"38:06","j":"後で寄りましょう。","c":"等一下再顺路去看看吧。","k":"寄りましょう"},{"p":"shoten-date","s":"IydOjbD9yKA#38:07#0","t":"38:07","j":"やりたい。","c":"想玩。","k":""},{"p":"shoten-date","s":"IydOjbD9yKA#38:09#0","t":"38:09","j":"何？解剖図鑑。解剖図鑑。あとで。","c":"什么？解剖图鉴。解剖图鉴。等一下再看。","k":"図鑑"},{"p":"shoten-date","s":"IydOjbD9yKA#38:11#0","t":"38:11","j":"解剖図鑑。あ、でも解剖図鑑じゃないですか？","c":"解剖图鉴。啊，不过这不就是解剖图鉴吗？","k":"じゃないですか"},{"p":"shoten-date","s":"IydOjbD9yKA#38:14#0","t":"38:14","j":"お、本当だ。これですか？","c":"哦，真的诶。是这个吗？","k":""},{"p":"shoten-date","s":"IydOjbD9yKA#38:16#0","t":"38:16","j":"これこれこれ。歌舞伎の解剖図鑑。最新版。","c":"这个这个这个。《歌舞伎解剖图鉴》。最新版。","k":"これこれこれ 名词＋の＋名词（连体修饰）"},{"p":"shoten-date","s":"IydOjbD9yKA#38:18#0","t":"38:18","j":"これか。嬉しい。やったね。ちょっと買って。え、歌舞伎観たことあります？私ね、何回かしかなくて、","c":"是这个啊。好开心。太好了。买一本吧。诶，你看过歌舞伎吗？我啊，只看过几次，","k":"〜たことがあります しか〜ない て形中止（買って／なくて）"},{"p":"shoten-date","s":"IydOjbD9yKA#38:26#0","t":"38:26","j":"3〜5演目ぐらいかな。","c":"大概三到五个剧目吧。","k":"〜かな ぐらい／演目"},{"p":"shoten-date","s":"IydOjbD9yKA#38:28#0","t":"38:28","j":"結構観てらっしゃる。詳しいんですね。","c":"看得挺多的嘛。很懂行呢。","k":"〜ていらっしゃる 〜んですね"},{"p":"shoten-date","s":"IydOjbD9yKA#38:31#0","t":"38:31","j":"いや、詳しくはないんで。","c":"不不，我并不懂行。","k":"い形容词否定＋は（詳しくはない） 〜んで（＝ので）"},{"p":"shoten-date","s":"IydOjbD9yKA#38:33#0","t":"38:33","j":"これでなんか基礎をいろいろ叩き込んで。","c":"就用这本把基础好好塞进脑子里。","k":"叩き込む（复合动词） で（手段）"},{"p":"shoten-date","s":"IydOjbD9yKA#38:36#0","t":"38:36","j":"こういうのめっちゃありがたいですよね。歌舞伎って結構そのルールっていうか、あるじゃないですか。だから意外とそれ知らないと観てもって感じもあるから。ええーうれしい、めちゃめちゃ嬉しい。やっぱエクスナレッジはいい本作るな。","c":"这种书真的太让人感激了。歌舞伎不是有挺多所谓的规矩嘛。所以不知道那些的话，就算看了也…会有这种感觉。哎呀开心，超级开心。エクスナレッジ果然做的书就是好啊。","k":"〜じゃないですか って（提示话题） 〜ないと 终助词「な」"},{"p":"shoten-date","s":"IydOjbD9yKA#38:52#0","t":"38:52","j":"落語入門もある！","c":"还有《落语入门》！","k":"も（也）"},{"p":"shoten-date","s":"IydOjbD9yKA#38:53#0","t":"38:53","j":"え、落語入門もある。図解。","c":"诶，真有《落语入门》。图解版的。","k":"え（感叹词）"},{"p":"shoten-date","s":"IydOjbD9yKA#38:55#0","t":"38:55","j":"落語も知りたいんだよな。","c":"落语我也想了解一下啊。","k":"〜たい 〜んだよな"},{"p":"shoten-date","s":"IydOjbD9yKA#38:58#0","t":"38:58","j":"解剖図鑑シリーズ、バーって並べてほしい。何が知りたいかを知りたい。","c":"真希望把《解剖图鉴》系列唰地一整排摆出来。想知道 55:27#0","t":"55:27","j":"え、でも本当にここはね、なんかすごい、自分の本もたくさん置いてくださっているので、ありがたいなといつも思ってます。","c":"呃，不过这里真的……怎么说呢，一直都帮我摆了很多自己的书，我一直都很感激。","k":"て+くださっている ので"},{"p":"shoten-date","s":"IydOjbD9yKA#55:35#0","t":"55:35","j":"本屋で生まれて本屋で死ぬんじゃないですか？","c":"你该不会是要生在书店、死在书店吧？","k":"て形并列「生まれて〜死ぬ」 〜んじゃないですか"},{"p":"shoten-date","s":"IydOjbD9yKA#55:37#0","t":"55:37","j":"確かに本屋で死にたさはちょっとありますね。それは全然本望です。","c":"确实有点想死在书店呢。那样的话我完全心甘情愿。","k":"たい形+さ「死にたさ」 全然+肯定表达"},{"p":"shoten-date","s":"IydOjbD9yKA#55:43#0","t":"55:43","j":"え、でも面白かった。宝箱みたいでした。","c":"啊，不过真的很好玩。简直像个宝箱一样。","k":"〜みたいだ"},{"p":"shoten-date","s":"IydOjbD9yKA#55:46#0","t":"55:46","j":"宝箱みたいでしたね。","c":"真的很像宝箱呢。","k":"終助詞「ね」"},{"p":"shoten-date","s":"IydOjbD9yKA#55:48#0","t":"55:48","j":"ねえ。あの、いくらでもね、掘り進めることができ、","c":"对啊。就是说，可以无限地一直挖下去……","k":"複合動詞「掘り進める」 可能形「〜ことができる」"},{"p":"shoten-date","s":"IydOjbD9yKA#55:52#0","t":"55:52","j":"確かにまだまだいけそうでしたもんね、ザクザクとね。","c":"确实感觉还能继续挖下去呢，沙沙地（一直挖）。","k":"様態「そう」+可能動詞「いけそう」 終助詞「もんね」"},{"p":"shoten-date","s":"IydOjbD9yKA#55:55#0","t":"55:55","j":"ザクザクね。","c":"沙沙地呢（一直挖的感觉）。","k":""},{"p":"shoten-date","s":"IydOjbD9yKA#55:55#1","t":"55:55","j":"全然寄ってないところもあるじゃないですか。","c":"也有完全没靠近过的地方对吧。","k":"連体修飾「寄ってないところ」 〜じゃないですか"},{"p":"shoten-date","s":"IydOjbD9yKA#55:58#0","t":"55:58","j":"ダンジョン感がすごかった。","c":"地下城的感觉真的很强烈。","k":"名詞+「感」"},{"p":"shoten-date","s":"IydOjbD9yKA#55:59#0","t":"55:59","j":"確かにダンジョンでした。","c":"确实像个地下城。","k":""},{"p":"shoten-date","s":"IydOjbD9yKA#56:01#0","t":"56:01","j":"でも見やすいんだよな。なんかあんまりこう混雑してる感じがないというか。","c":"不过真的很好逛（好找）耶。就是说不太有那种拥挤的感觉，该怎么说呢。","k":"複合形容詞「見やすい」 〜というか"},{"p":"shoten-date","s":"IydOjbD9yKA#56:05#0","t":"56:05","j":"わかる。そうなんですよ。なんかね、あの、ジュンク堂さんは本いっぱいあるし、お客さんもいつもいっぱいいるのに、動線が綺麗なのか、あんまりお客さんがごった返す感じがしないっていうか。いっぱいいるんですよ、いるのにって思う。","c":"我懂。真的是这样。就是说啊，Junkudo这间店书超级多，客人也总是满满的，但不知道是不是动线设计得很好，不太会有那种人挤人、乱哄哄的感觉，该怎么说呢。明明客人一大堆，却让人觉得『咦，明明这么多人』。","k":"惯用句「ごった返す」 〜のに"},{"p":"shoten-date","s":"IydOjbD9yKA#56:20#0","t":"56:20","j":"それが不思議。いつもすごい見やすかった。","c":"这点真的很不可思议。一直以来都觉得很好逛。","k":"な形容詞「不思議」 :26","j":"まあ、多分、時期なんでしょうね。今、『ママ』ってなってて(?)。","c":"唉，大概是个阶段吧。现在啊，（女儿）正黏着妈妈呢。","k":"なってて ～なんでしょうね"},{"p":"oshare-takedatsu","s":"vH3D0Ob7rV8#00:30#0","t":"00:30","j":"あ、そっか。","c":"啊，这样啊。","k":""},{"p":"oshare-takedatsu","s":"vH3D0Ob7rV8#00:31#0","t":"00:31","j":"ちょっと寂しい。これこそ今、世間の女児たちが大好きであろうアニメに、ちょうど僕、出てるんですよ。","c":"（女儿只黏妈妈）我还有点小失落呢。不过说起来，现在世间的小女孩们最喜欢的那部动画，我自己正好就有出演。","k":"これこそ ～であろう"},{"p":"oshare-takedatsu","s":"vH3D0Ob7rV8#00:39#0","t":"00:39","j":"あ、そうですよね。","c":"啊，说得也是呢。","k":""},{"p":"oshare-takedatsu","s":"vH3D0Ob7rV8#00:41#0","t":"00:41","j":"なんですけど、あんまり見てくれなくて、必死に僕、いろんなグッズを買って、","c":"不过呢，她不太愿意看，我就拼命地买了各种各样的周边，","k":"～てくれる 買って"},{"p":"oshare-takedatsu","s":"vH3D0Ob7rV8#00:47#0","t":"00:47","j":"あのね、これが、プリキュアだよって。","c":"（我就跟她说）「诶，你看，这个就是光之美少女哦」。","k":"～って"},{"p":"oshare-takedatsu","s":"vH3D0Ob7rV8#00:51#0","t":"00:51","j":"プリキュアなんてもう、ちょうどなんですよ。","c":"光之美少女这类的（题材），（对她这年纪）现在正合适呢。","k":"～なんて"},{"p":"oshare-takedatsu","s":"vH3D0Ob7rV8#00:54#0","t":"00:54","j":"3歳半でプリキュアまみれにしてるんですけど、そこまで反応しない。","c":"（我）在她3岁半时就用光之美少女把她「团团包围」了，可她也没有太大反应。","k":"～まみれ ～んですけど"},{"p":"oshare-takedatsu","s":"vH3D0Ob7rV8#00:59#0","t":"00:59","j":"でもね、1年間あるんでちょっと今、勝負は始まったばかり。","c":"不过呢，还有一整年呢，现在这场「较量」才刚刚开始。","k":"～んで 始まったばかり"},{"p":"oshare-takedatsu","s":"vH3D0Ob7rV8#01:05#0","t":"01:05","j":"いや、もう近いですよ、それ。","c":"不是吧，那已经很接近（结局）了吧。","k":""},{"p":"oshare-takedatsu","s":"vH3D0Ob7rV8#01:06#0","t":"01:06","j":"もう気づくね。","c":"她马上就会发现的吧。","k":""},{"p":"oshare-takedatsu","s":"vH3D0Ob7rV8#01:07#0","t":"01:07","j":"ちゃんとしなきゃなって思います。本当に。","c":"（我）真觉得得好好振作一下才行。真的。","k":"～なきゃ ～って思います"},{"p":"oshare-takedatsu","s":"vH3D0Ob7rV8#01:09#0","t":"01:09","j":"歩みを止めない歌手。","c":"永不停下脚步的歌手。","k":"歩みを止めない"},{"p":"oshare-takedatsu","s":"vH3D0Ob7rV8#01:11#0","t":"01:11","j":"新たにチャレンジしたのが、テレビや舞台などの多分野への出演。","c":"她新挑战的，是电视剧、舞台剧等多领域的演出。","k":"～のが～ チャレンジする"},{"p":"oshare-takedatsu","s":"vH3D0Ob7rV8#01:17#0","t":"01:17","j":"声優としてのスケジュールもあるじゃないですか。","c":"作为声优也是有行程安排的吧？","k":"～じゃないですか ～としての"},{"p":"oshare-takedatsu","s":"vH3D0Ob t":"08:15","j":"一緒に仕事してというところでいうと2年ぐらいですが、多分ここまでいろんな業務を幅広くやって来られているかと思うので、業務に対する知識とか造詣の深さというところもあって、僕の経験のないものとかでいうと分からないところがあったりするので。","c":"要说一起共事的话大概是两年左右，但他大概到目前为止已经广泛地做过很多种业务了吧，在业务相关的知识以及造诣的深度方面也很深厚，说到我没有经验过的领域，也会有搞不懂的地方。","k":"〜というところでいうと やって来られている 〜たりする"},{"p":"sqex-pm","s":"thhzMkcW3j8#08:30#0","t":"08:30","j":"そろそろ担当に聞いてみるとか、ヒアリングしなきゃいけないところもあったりする中で、水川さんは自分のそのご経験で、どう進めればいいっていうところまで、誰に聞けばいいっていうところまで、瞬時に出てくるっていうところで。","c":"在『差不多该去问问负责人』『还有些地方得去做调研』这样的情况下，水川小姐凭借自己的经验，从『该怎么推进』到『该问谁』，都能瞬间反应出来——","k":"〜とか（列挙） 〜なきゃいけない 〜ところ（抽象化用法） 〜っていう ご＋名词（尊敬の接頭辞）"},{"p":"sqex-pm","s":"thhzMkcW3j8#08:42#0","t":"08:42","j":"縁の下の力なのか、お母さん的な存在っていうので、皆さんのことを温かく守る、水川さんの強みなのかなと思っていますね。","c":"这究竟是幕后功臣的作用，还是像妈妈一样温暖守护大家的存在呢——我觉得这大概就是水川小姐的强项吧。","k":"〜なのか 〜的な 〜のかなと思っています"},{"p":"sqex-pm","s":"thhzMkcW3j8#08:50#0","t":"08:50","j":"続いては契約管理と、今ちょうど次の制作物のスケジュールの詳細にも起こそうとしているので、それを作り上げます。","c":"接下来是合同管理，现在正打算把下一个制作物的日程安排细化到细节，所以要把它做出来。","k":"続いては〜と 〜(よ)うとしている 作り上げる"},{"p":"sqex-pm","s":"thhzMkcW3j8#09:10#0","t":"09:10","j":"あとは倫理チェック。","c":"另外还有伦理审查。","k":"あとは〜"},{"p":"sqex-pm","s":"thhzMkcW3j8#09:12#0","t":"09:12","j":"今後その世の中に出していくデータが倫理的に問題がないかという確認を日々行っているんですけど。","c":"对今后要发布到社会上的数据，是否存在伦理方面的问题，我每天都在做这项确认工作。","k":"世の中に出す 〜んですけど 確認を行う"},{"p":"sqex-pm","s":"thhzMkcW3j8#09:19#0","t":"09:19","j":"それ用の資料を作ったり、請求書の対応ですとか、結構いろいろ幅広くタスクがあるので、その辺を紹介していこうかと思います。","c":"还要制作相关资料，以及处理发票之类的工作，任务范围相当广泛，所以接下来想介绍一下这方面的内容。","k":"〜たり（列挙の一部） 〜ですとか 〜(よ)うかと思います"},{"p":"sqex-pm","s":"thhzMkcW3j8#09:29#0","t":"09:29","j":"やっぱり社歴も長いですし、いろんな部署と似た経験もあるので、まんべんなくこなせるのが得意かもしれないですね。","c":"毕竟工龄也比较长，又有跟各个部门相似的经验，所以说不定『样样都能兼顾』就是我比较擅长的地方吧。","k":"〜し（理由の列挙） まんべんなく 〜のが得意"},{"p":"sqex-pm","s":"thhzMkcW3j8#09:39#0","t":"09:39","j":"逆に実際、開発、プログラミングしてコーディングしてとか、そういったところはやったことないので、本当にお任せ。","c":"反过来说，像实际开发、写程序、编代码这些，我完全没做过，所以这块真的就全交给（专业的人）了。","k":"逆に 〜して〜して（て形の並列） お任せ"},{"p":"sqex-pm","s":"thhzMkcW3j8#09:47#0","t":"09:47","j":"それ以外の分野で頑張るみたいな。","c":"大概就是在那以外的领域里努力干活，差不多这种感觉。","k":"〜みたいな（文末）"},{"p":"sqex-pm","s":"thhzMkcW3j8#09:50#0","t" sqex-pm","s":"thhzMkcW3j8#15:42#0","t":"15:42","j":"とはいえまだまだ全然これからのプロジェクトなので、油断せずにPMとしてはサポートしていくというところかなと思っています。","c":"话虽如此，这个项目还早得很，一切才刚刚开始，所以我想作为PM还是不能掉以轻心，得继续做好支持工作。","k":"とはいえ 油断せずに というところかなと思っています"},{"p":"sqex-pm","s":"thhzMkcW3j8#15:51#0","t":"15:51","j":"次はですね、今所属している部署で、私が主催しているというか、やりたいと言い出しっぺの「プロジェクト運用共有会」という勉強会みたいなものがありまして、","c":"接下来呢，在我现在所属的部门里，有一个算是由我主办——或者说是我自己提议想做的——叫『项目运营分享会』的学习会之类的东西，","k":"ありまして 言い出しっぺ というか"},{"p":"sqex-pm","s":"thhzMkcW3j8#16:08#0","t":"16:08","j":"次に発表してもらうプロジェクトのPMさんと、どういう発表内容にするかとか、いつ実施するかみたいなのを、すり合わせるキックオフみたいな会議を次やります。","c":"接下来要和下一位来做发表的项目的PM，一起对一下要做什么样的发表内容啦、什么时候举行之类的，开一个像启动会（kickoff）性质的会议。","k":"発表してもらう とか／みたいなのを すり合わせる"},{"p":"sqex-pm","s":"thhzMkcW3j8#16:20#0","t":"16:20","j":"よいしょ","c":"嘿咻","k":""},{"p":"sqex-pm","s":"thhzMkcW3j8#16:22#0","t":"16:22","j":"あと、話すのってちょっと不安ではあるんですね。","c":"另外呢，要上台讲这件事，还是会有点不安的。","k":"のって ではあるんですね"},{"p":"sqex-pm","s":"thhzMkcW3j8#16:30#0","t":"16:30","j":"はいはいはい。","c":"嗯嗯嗯。","k":""},{"p":"sqex-pm","s":"thhzMkcW3j8#16:31#0","t":"16:31","j":"そうですね、中身ですよね。","c":"对啊，是内容（这一方面）吧。","k":"ですよね"},{"p":"sqex-pm","s":"thhzMkcW3j8#16:34#0","t":"16:34","j":"あれぐらいの情報量にして、後半はディスカッションに持ち込むみたいなパターンでも良いかなと思ってますが。","c":"把信息量控制在差不多那种程度，后半段带入讨论环节的这种模式应该也可以吧——我是这么想的，不过……","k":"情報量にして 持ち込む 思ってますが"},{"p":"sqex-pm","s":"thhzMkcW3j8#16:45#0","t":"16:45","j":"はいはい、うんうん、うんうん、うんうん、うん。","c":"嗯嗯，嗯嗯，嗯嗯，嗯嗯，嗯。","k":""},{"p":"sqex-pm","s":"thhzMkcW3j8#16:54#0","t":"16:54","j":"PMとしてどういう管理をしているかみたいなところを発表することになり、やっぱりちょっと今不安があったみたいな感じだったんですけど。","c":"最终决定要发表的是『作为PM大概做了哪些管理』这类内容，不过感觉现在确实还是有点不安的样子。","k":"することになり みたいな感じだった"},{"p":"sqex-pm","s":"thhzMkcW3j8#17:02#0","t":"17:02","j":"気負わずというのも難しいのかもしれないですが、むしろ逆にその場を使って、「今後どういう風にお仕事されていったらやりやすいか」みたいな、「あの形のプレゼンでも全然大丈夫ですよ」みたいな、話をしたところでした。","c":"「不要着急/不用太用力」这种说法可能也很难做到，所以我反而利用了那个场合，跟对方聊了『今后要怎样工作会比较顺手』『那种形式的展示也完全没问题』这样的话。","k":"動詞未然形+ず お仕事されて（尊敬語） ～みたいな（引用終助詞） ～たところでした"},{"p":"sqex-pm","s":"thhzMkcW3j8#17:19#0","t":"17:19","j":"やっぱなんか仕事ってなんか一人で頑張るものじゃないなと、私は信じてるんですよ。","c":"我还是相信，工作这种事不是一个人埋
