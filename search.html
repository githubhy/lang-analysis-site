","s":"aL6hlSKKmKc#04:55#0","t":"04:55","j":"それを見て涙を流してるお客さんがいらっしゃって、それを見た時に、","c":"有看着(我表演)而流泪的观众，看到那一幕的时候，","k":"連体修飾 いらっしゃる た+時に"},{"p":"bunpou","s":"aL6hlSKKmKc#05:00#0","t":"05:00","j":"あ、ちょっと、何というか、自分のこの、あの、演技で、感動させてるっていう。","c":"啊，有点，怎么说呢，(意识到)自己是在用这个表演打动(观众)，(是这样一种感觉)。","k":"使役させる させてる で っていう"},{"p":"bunpou","s":"aL6hlSKKmKc#05:06#0","t":"05:06","j":"うん。","c":"嗯。","k":""},{"p":"bunpou","s":"aL6hlSKKmKc#05:11#0","t":"05:11","j":"で、私の心が進むべき道は、その、女優だという風に、その時から女優に。","c":"然后，(觉得)我内心该前进的路，就是当女优这样，从那时候起就朝女优(这条路走)。","k":"〜べき 連体修飾 という風に から"},{"p":"bunpou","s":"aL6hlSKKmKc#05:19#0","t":"05:19","j":"あ、だから、笑いでも、その涙でも、自分の何かしらの作品で誰かの感情になんか訴えかけれることができたら嬉しいな、っていう。","c":"啊，所以，不管是通过搞笑还是通过眼泪，只要能用自己某种作品触动到某个人的情感，(我)就会很开心，(就是这样的想法)。","k":"ら抜き言葉 複合動詞 訴えかける 〜ことができる 〜でも〜でも 終助詞な っていう"},{"p":"bunpou","s":"aL6hlSKKmKc#05:28#0","t":"05:28","j":"そうですね。本当、あの、浅い言葉ですけど、心を動かしたいみたいなところが、","c":"是啊，虽然是很直白/浅显的说法，但“想打动人心”这样的地方，","k":"浅い言葉 〜たい みたいな けど"},{"p":"bunpou","s":"aL6hlSKKmKc#05:34#0","t":"05:34","j":"うん。","c":"嗯。","k":""},{"p":"bunpou","s":"aL6hlSKKmKc#05:34#1","t":"05:34","j":"ちょっと自分の、なんか、まあ、ポイントというか、やりたいことだったんだなっていうのは、昔から。","c":"算是我自己的一个重点，或者说是想做的事情吧，(我发觉)这从很久以前就一直是这样。","k":"というか んだな(のだな) 名词化っていうの から"},{"p":"bunpou","s":"aL6hlSKKmKc#05:39#0","t":"05:39","j":"うん。じゃ、でも、その年からずっとそういう芸事はやってきてんだね。","c":"嗯。那么，从那年起你就一直做着那类才艺表演过来的吧。","k":"から(起点) 〜てくる 〜んだね(口语てん)"},{"p":"bunpou","s":"aL6hlSKKmKc#05:43#0","t":"05:43","j":"でも、そんな中で一回、あの、止まりまして。","c":"但是在那样的过程中，（我的女优之路）中断了一次。","k":"そんな中で 〜まして"},{"p":"bunpou","s":"aL6hlSKKmKc#05:47#0","t":"05:47","j":"女優になるんだって思ってから、とりあえず自分には大きい武器が必要だと思いまして。","c":"自从下定决心「我要当女优」之后，我就觉得自己首先需要一件强大的武器。","k":"〜てから 〜って(引用) には とりあえず"},{"p":"bunpou","s":"aL6hlSKKmKc#05:53#0","t":"05:53","j":"あの、私、小学校2年生からカンフーを習っていたんですけど。","c":"那个，我从小学二年级起就一直在学功夫，","k":"から(起点) 〜ていた 〜んですけど"},{"p":"bunpou","s":"aL6hlSKKmKc#05:57#0","t":"05:57","j":"そのカンフーで一旦世界チャンピオンになってから、あの、女優になろうと思いました。","c":"我想着先靠功夫拿到世界冠军之后，再去当演员。","k":"〜てから 意志形〜(よ)うと思う 〜になる"},{"p":"bunpou","s":"aL6hlSKKmKc#06:02#0","t":"06:02","j":"ええ。それ、女優への近道だってことで。","c":"嗯。也就是说，那是通往女优（之路）的捷径咯。","k":"〜ってことで への って(=という)"},{"p":"bunpou","s":"aL6hlSKKmKc#06:04#0","t":"06:04","j":"そうだ。もう、それ、いや、アクション女優とか。","c":"对。就是那个…不，（是要当）动作女优之类的。","k":"〜とか"},{"p":"bunpou","s":"aL6hlSKKmKc#06:08#0","t":"06:08","j":"ああ、そういうこと。","c":"啊，原来是这个意思。","k":"そういうこと"},{"p":"bunpou","s":"aL6hlSKKmKc#06:11#0","t":"06:11","j":"そのアクションで、日本でいう女優さんとして、まあ昔ね、そういう状況はあったかもしれないけど、ちょっとなかなか、ラストサムライとか出るわけじゃないからね。","c":"靠那种动作（功夫）在日本当所谓的（动作）女优…嘛，以前呢或许是有过那样的机会，但（现在）挺难的，又不是（谁都）能去出演《最后的武士》那种大片嘛。","k":"〜でいう 〜かもしれない 〜わけじゃない からね"},{"p":"bunpou","s":"aL6hlSKKmKc#06:16#0","t":"06:16","j":"はい。","c":"是。","k":""},{"p":"bunpou","s":"aL6hlSKKmKc#06:23#0","t":"06:23","j":"でも、世界大会に出るまで…。","c":"但是，一直到你参加世界大赛为止（都在坚持吧）…。","k":"まで"},{"p":"bunpou","s":"aL6hlSKKmKc#06:26#0","t":"06:26","j":"そうですね。優勝まで、優勝まで頑張りまして。","c":"是啊。我一直努力到夺冠，到夺冠为止。","k":"まで 〜まして"},{"p":"bunpou","s":"aL6hlSKKmKc#06:30#0","t":"06:30","j":"結局、まあ、小学校から11年続けて、2017年のその世界大会で、あの、金メダルをいただきまして、世界チャンピオンに。","c":"结果呢，从小学起坚持了11年，在2017年的那届世界大赛上，那个，拿到了金牌，（成为了）世界冠军。","k":"いただく から(起点) 結局"},{"p":"bunpou","s":"aL6hlSKKmKc#06:38#0","t":"06:38","j":"これだからさ、武術・格闘技ってたくさんあるけど、カンフーってもちろん俺らは知ってんの? 知ってんだけど、いわゆる何なのかっていうのは知らないのよ。","c":"所以说啊，武术、格斗技有好多种，功夫嘛我们当然是知道的吧？知道是知道，但它所谓到底是个什么，我们其实并不清楚。","k":"って(话题) 〜てん(口语) いわゆる 何なのか"},{"p":"bunpou","s":"aL6hlSKKmKc#06:46#0","t":"06:46","j":"うん。あ、そうですよね。","c":"嗯。啊，是这样呢。","k":"よね"},{"p":"bunpou","s":"aL6hlSKKmKc#06:47#0","t":"06:47","j":"その映画とかは戦ってるイメージだと思うんですけど、私がやってたのは、あの、表演して型を見せて、でそれを、えっと、美しさとかしなやかさとかを評価して、順位をつけるという競技がありまして。","c":"那种电影里给人的是打斗的印象，不过我以前练的是——嗯，表演招式、把套路展示出来，然后从美感、柔韧性这些方面去评分、排名次的这样一种项目。","k":"戦ってる（ている省略） 〜んですけど 名词化さ（美しさ・しなやかさ） 〜という＋名词（順位をつけるという競技） とか ありまして"},{"p":"bunpou","s":"aL6hlSKKmKc#07:02#0","t":"07:02","j":"ちょっと見せてもらいたい。","c":"想给大家展示一下（想请大家让我演一下）。","k":"〜てもらいたい 見して→見せて"},{"p":"bunpou","s":"aL6hlSKKmKc#07:04#0","t":"07:04","j":"よろしいですか？ありがとうございます。","c":"可以吗？谢谢。","k":"よろしいですか"},{"p":"bunpou","s":"aL6hlSKKmKc#07:10#0","t":"07:10","j":"これは剣。","c":"这是剑。","k":"は（主题）"},{"p":"bunpou","s":"aL6hlSKKmKc#07:12#0","t":"07:12","j":"はい、こちらの剣でちょっとやらせていただきます。","c":"好的，请允许我用这把剑来表演一下。","k":"させていただく さ行缩约（やらせて→やらして） で（手段）"},{"p":"bunpou","s":"aL6hlSKKmKc#07:16#0","t":"07:16","j":"じゃあ、準備よろしければ、お願いします。","c":"那么，如果准备好了就拜托您了。","k":"よろしければ お願いします"},{"p":"bunpou","s":"aL6hlSKKmKc#07:21#0","t":"07:21","j":"うわ、すごいんだよね、マジ。","c":"哇，真的太厉害了。","k":"んだ（のだ口语） よね マジ"},{"p":"bunpou","s":"aL6hlSKKmKc#07:24#0","t":"07:24","j":"音やば。うわ。","c":"声音真猛。哇。","k":"やばい（やば） が省略"},{"p":"bunpou","s":"aL6hlSKKmKc#07:27#0","t":"07:27","j":"うわあ、すごい。","c":"哇，好厉害。","k":""},{"p":"bunpou","s":"aL6hlSKKmKc#07:30#0","t":"07:30","j":"ありがとうございます。","c":"谢谢。","k":""},{"p":"bunpou","s":"aL6hlSKKmKc#07:32#0","t":"07:32","j":"すごい。やっぱすごいわ。","c":"厉害。果然厉害啊。","k":"終助詞わ やっぱ"},{"p":"bunpou","s":"aL6hlSKKmKc#07:36#0","t":"07:36","j":"アルコ&amp;ピースのしくじり学園放送室。","c":"Aruko&amp;Peace的失败学园广播室。","k":"しくじり の（连体）"},{"p":"bunpou","s":"aL6hlSKKmKc#07:39#0","t":"07:39","j":"続きはABEMAプレミアムで配信中。","c":"后续正在ABEMA Premium上播出。","k":"で（媒介/平台） 配信中"},{"p":"bunpou","s":"aL6hlSKKmKc#07:41#0","t":"07:41","j":"フルバージョンを見るにはこちらをクリック。","c":"想看完整版请点击这里。","k":"〜には（目的）"},{"p":"bunpou","s":"aL6hlSKKmKc#07:44#0","t":"07:44","j":"いやらしい方式だと思うかもしれないけど、これはビジネスなんだ。","c":"也许你会觉得这种（卖关子引流的）做法有点不地道，但这就是生意嘛。","k":"〜かもしれない なんだ（なのだ口语） いやらしい"}]</script>
<script>window.__SEARCH_INDEX=JSON.parse(document.getElementById("sxData").textContent);</script>
<script>
(function(){
  var box = document.getElementById('sxBox'); if(!box) return;
  var idx = window.__SEARCH_INDEX || [];
  var list = document.getElementById('sxList'), count = document.getElementById('sxCount'),
      hint = document.getElementById('sxHint'), empty = document.getElementById('sxEmpty');
  var CAP = 100;
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
  function mark(text, q){
    var s = esc(text), lo = s.toLowerCase(), i = lo.indexOf(q);
    if (q && i >= 0) return s.slice(0,i) + '<span class="sx-hit">' + s.slice(i, i+q.length) + '</span>' + s.slice(i+q.length);
    return s;
  }
  function render(){
    var q = box.value.trim().toLowerCase();
    hint.hidden = !!q; empty.hidden = true; list.innerHTML = ''; count.textContent = '';
    if (!q) return;
    var hits = [];
    for (var i=0;i<idx.length;i++){
      var d = idx[i], hay = (d.j + ' ' + d.c + ' ' + d.k).toLowerCase();
      if (hay.indexOf(q) >= 0) hits.push(d);
    }
    if (!hits.length){ empty.hidden = false; return; }
    count.textContent = '共 ' + hits.length + ' 句' + (hits.length > CAP ? '（显示前 ' + CAP + '）' : '');
    var frag = document.createDocumentFragment();
    hits.slice(0, CAP).forEach(function(d){
      var a = document.createElement('a'); a.className = 'sx-row';
      a.href = d.p + '.html#s=' + encodeURIComponent(d.s);
      a.innerHTML = '<span class="sx-meta">' + esc(d.p) + ' · ' + esc(d.t) + '</span>' +
        '<div class="sx-jp">' + mark(d.j, q) + '</div>' +
        (d.c ? '<div class="sx-cn">' + mark(d.c, q) + '</div>' : '');
      frag.appendChild(a);
    });
    list.appendChild(frag);
  }
  box.addEventListener('input', render);
})();
</script>
