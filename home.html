<!doctype html>
<html lang="zh-Hans">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.github.com https://gist.githubusercontent.com; img-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'">
<title>今日学习 · 文法分析</title>
<style>
  :root{
    --paper:#f5f4f0; --card:#fbfaf7; --card-2:#f0eee7;
    --ink:#1e2630; --ink-soft:#586374; --ink-faint:#8b93a0;
    --line:#e5e1d8; --line-strong:#d4cfc4;
    --shu:#c0442c;
    --katsu:#1f7a63;  --katsu-t:rgba(31,122,99,.11);
    --keigo:#8a4fa8;  --keigo-t:rgba(138,79,168,.12);
    --joshi:#c0442c;  --joshi-t:rgba(192,68,44,.10);
    --goi:#2f5fa6;    --goi-t:rgba(47,95,166,.10);
    --font-mincho:"Hiragino Mincho ProN","Yu Mincho","YuMincho","Songti SC",serif;
    --font-gothic:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",sans-serif;
    --font-cn:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    --font-latin:ui-sans-serif,-apple-system,"Helvetica Neue",Arial,sans-serif;
    --font-mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --paper:#12151a; --card:#191d24; --card-2:#20252d;
      --ink:#e9e7e1; --ink-soft:#a4adb9; --ink-faint:#727b88;
      --line:#282d36; --line-strong:#39404b;
      --shu:#e0755c;
      --katsu:#4bc0a1; --katsu-t:rgba(75,192,161,.14);
      --keigo:#c091df; --keigo-t:rgba(192,145,223,.15);
      --joshi:#e8836c; --joshi-t:rgba(232,131,108,.14);
      --goi:#7aa8e2;   --goi-t:rgba(122,168,226,.15);
    }
  }
  :root[data-theme="light"]{
    --paper:#f5f4f0; --card:#fbfaf7; --card-2:#f0eee7;
    --ink:#1e2630; --ink-soft:#586374; --ink-faint:#8b93a0;
    --line:#e5e1d8; --line-strong:#d4cfc4; --shu:#c0442c;
    --katsu:#1f7a63; --katsu-t:rgba(31,122,99,.11);
    --keigo:#8a4fa8; --keigo-t:rgba(138,79,168,.12);
    --joshi:#c0442c; --joshi-t:rgba(192,68,44,.10);
    --goi:#2f5fa6;   --goi-t:rgba(47,95,166,.10);
  }
  :root[data-theme="dark"]{
    --paper:#12151a; --card:#191d24; --card-2:#20252d;
    --ink:#e9e7e1; --ink-soft:#a4adb9; --ink-faint:#727b88;
    --line:#282d36; --line-strong:#39404b; --shu:#e0755c;
    --katsu:#4bc0a1; --katsu-t:rgba(75,192,161,.14);
    --keigo:#c091df; --keigo-t:rgba(192,145,223,.15);
    --joshi:#e8836c; --joshi-t:rgba(232,131,108,.14);
    --goi:#7aa8e2;   --goi-t:rgba(122,168,226,.15);
  }

  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:var(--font-cn);line-height:1.75;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  .wrap{max-width:46rem;margin:0 auto;padding:clamp(1.5rem,4vw,3.5rem) clamp(1.1rem,4vw,2rem) 5rem;}

  /* ---------- header ---------- */
  .eyebrow{font-family:var(--font-latin);font-size:.72rem;letter-spacing:.22em;
    text-transform:uppercase;color:var(--shu);font-weight:600;margin:0 0 .9rem;}
  h1{font-family:var(--font-mincho);font-weight:600;
    font-size:clamp(1.7rem,5.4vw,2.55rem);line-height:1.35;margin:0;
    text-wrap:balance;letter-spacing:.01em;}
  .sub{color:var(--ink-soft);font-size:1rem;margin:.9rem 0 0;max-width:38rem;}
  .meta{display:flex;flex-wrap:wrap;gap:.5rem .55rem;margin:1.4rem 0 0;}
  .tag{font-family:var(--font-gothic);font-size:.78rem;color:var(--ink-soft);
    background:var(--card);border:1px solid var(--line);border-radius:2rem;
    padding:.28rem .7rem;white-space:nowrap;}
  .tag b{color:var(--ink);font-weight:600;}

  .note{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--shu);
    border-radius:.5rem;padding:.95rem 1.15rem;margin:1.6rem 0 0;
    font-size:.9rem;color:var(--ink-soft);line-height:1.7;}
  .note b{color:var(--ink);}

  /* sticky video dock — click any timestamp to seek */
  .video-dock{position:sticky;top:0;z-index:30;margin:1.6rem 0 0;background:var(--paper);
    border:1px solid var(--line);border-radius:.7rem;overflow:hidden;
    box-shadow:0 10px 24px -16px rgba(0,0,0,.55);}
  .dock-bar{display:flex;align-items:center;gap:.6rem;
    padding:.5rem .5rem .5rem .85rem;background:var(--card);border-bottom:1px solid var(--line);}
  .dock-title{font-family:var(--font-gothic);font-weight:600;font-size:.82rem;color:var(--ink);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tri{color:var(--shu);}
  .dock-min{margin-left:auto;font-family:var(--font-gothic);font-size:.75rem;font-weight:600;
    cursor:pointer;color:var(--ink-soft);background:transparent;border:1px solid var(--line-strong);
    border-radius:2rem;padding:.24rem .75rem;white-space:nowrap;transition:color .15s,border-color .15s;}
  .dock-min:hover{color:var(--shu);border-color:var(--shu);}
  .dock-min:focus-visible{outline:2px solid var(--shu);outline-offset:2px;}
  /* play/pause — the primary transport control, built by player_auto.js into the dock bar.
     The bar is sticky and survives minimising, so this is reachable whenever the page is. */
  .dock-play{font-family:var(--font-gothic);font-size:.8rem;font-weight:600;cursor:pointer;
    color:var(--ink);background:transparent;border:1px solid var(--line-strong);border-radius:999px;
    padding:.22rem .6rem;margin-right:.4rem;line-height:1.2;min-width:2.2rem;}
  .dock-play:hover{color:var(--shu);border-color:var(--shu);}
  .dock-play:focus-visible{outline:2px solid var(--shu);outline-offset:2px;}
  .dock-play[aria-pressed="true"]{color:var(--shu);border-color:var(--shu);}
  .dock-min{margin-left:0;}
  .dock-follow{margin-left:auto;font-family:var(--font-gothic);font-size:.75rem;font-weight:600;
    cursor:pointer;color:var(--ink-soft);background:transparent;border:1px solid var(--line-strong);
    border-radius:2rem;padding:.24rem .7rem;white-space:nowrap;
    transition:color .15s,border-color .15s,background .15s;}
  .dock-follow:hover{color:var(--shu);border-color:var(--shu);}
  .dock-follow.on{color:var(--shu);border-color:var(--shu);background:var(--joshi-t);}
  .dock-follow:focus-visible{outline:2px solid var(--shu);outline-offset:2px;}
  /* The sticky video must never crowd out the sentence it exists to explain. The frame is an
     aspect-ratio box, so its HEIGHT follows its WIDTH — bounding the height therefore means bounding
     the width by the height budget (h*16/9), not slapping a max-height on a 16:9 box and letterboxing
     it. --dock-max is that budget. This cap used to live inside @media (max-width:560px), i.e. it was
     keyed on the screen being NARROW when the problem is the screen being SHORT: a landscape phone is
     844px wide and 390px tall, sailed straight past it, and gave the video 335px — 86% of the
     viewport, leaving a 31px sliver of the sentence you are supposed to be reading. */
  .dock-video{max-width:min(32rem, calc(var(--dock-max) * 16 / 9));margin:0 auto;}
  .video-frame{position:relative;aspect-ratio:16/9;background:#000;max-height:var(--dock-max);}
  .video-frame iframe,.video-frame video{position:absolute;inset:0;width:100%;height:100%;
    border:0;display:block;background:#000;object-fit:contain;}
  .video-dock.min .dock-video{display:none;}
  .play-hint{font-size:.83rem;color:var(--ink-soft);margin:.75rem 0 0;}
  .play-hint b{color:var(--ink);font-weight:600;}

  /* furigana control bar */
  .furi-bar{display:flex;align-items:center;justify-content:space-between;gap:.7rem 1rem;
    flex-wrap:wrap;margin:1.5rem 0 0;padding:.7rem .5rem .7rem 1rem;background:var(--card);
    border:1px solid var(--line);border-left:3px solid var(--goi);border-radius:.55rem;font-size:.85rem;}
  .furi-hint{color:var(--ink-soft);}
  .furi-hint b{color:var(--ink);font-weight:600;}
  #furiToggle{font-family:var(--font-gothic);font-size:.8rem;font-weight:600;cursor:pointer;
    color:var(--goi);background:transparent;border:1px solid var(--goi);border-radius:2rem;
    padding:.32rem .9rem;white-space:nowrap;transition:background .15s,color .15s;}
  #furiToggle[aria-pressed="true"]{background:var(--goi);color:var(--paper);}
  #furiToggle:focus-visible{outline:2px solid var(--goi);outline-offset:2px;}

  .rule{height:1px;background:var(--line-strong);border:0;margin:2.4rem 0;}

  /* ---------- legend ---------- */
  .legend{display:grid;grid-template-columns:repeat(auto-fit,minmax(9.2rem,1fr));
    gap:.55rem;margin:1.5rem 0 0;}
  .lg{display:flex;align-items:baseline;gap:.5rem;font-size:.83rem;color:var(--ink-soft);
    border:1px solid var(--line);border-radius:.5rem;padding:.55rem .7rem;background:var(--card);}
  .swatch{width:.72rem;height:.72rem;border-radius:.2rem;flex:none;transform:translateY(.05rem);}
  .lg b{color:var(--ink);font-weight:600;font-family:var(--font-gothic);}

  /* ---------- section label ---------- */
  .sec{font-family:var(--font-latin);font-size:.74rem;letter-spacing:.2em;
    text-transform:uppercase;color:var(--ink-faint);font-weight:600;
    margin:3.2rem 0 1.2rem;display:flex;align-items:center;gap:.8rem;}
  .sec::after{content:"";flex:1;height:1px;background:var(--line);}

  /* ---------- grammar card ---------- */
  .card{background:var(--card);border:1px solid var(--line);border-radius:.85rem;
    padding:1.35rem 1.4rem 1.5rem;margin:0 0 1.15rem;}
  .card-top{display:flex;align-items:center;gap:.7rem;margin:0 0 .95rem;flex-wrap:wrap;}
  .num{font-family:var(--font-mincho);font-size:1.05rem;color:var(--shu);font-weight:600;
    font-variant-numeric:tabular-nums;}
  .ts{font-family:var(--font-mono);font-size:.75rem;color:var(--ink-soft);
    background:var(--card-2);border:1px solid transparent;border-radius:.3rem;
    padding:.15rem .5rem .15rem .42rem;font-variant-numeric:tabular-nums;cursor:pointer;
    transition:color .12s,border-color .12s,background .12s;}
  .ts::before{content:"\25B8";color:var(--shu);margin-right:.3rem;font-size:.92em;}
  .ts:hover,.ts:focus-visible{color:var(--shu);border-color:var(--shu);outline:none;}
  .ts.flash{animation:ts-flash .9s ease;}
  @keyframes ts-flash{0%,22%{background:var(--shu);color:#fff;border-color:var(--shu);}
    100%{background:var(--card-2);color:var(--ink-soft);border-color:transparent;}}
  @media (prefers-reduced-motion:reduce){.ts.flash{animation:none;}}
  .theme{font-family:var(--font-gothic);font-size:.8rem;color:var(--ink-soft);margin-left:auto;}

  .jp{font-family:var(--font-mincho);font-size:clamp(1.24rem,3.7vw,1.5rem);
    line-height:2.35;margin:.2rem 0 .1rem;color:var(--ink);letter-spacing:.02em;}
  ruby{cursor:pointer;}
  ruby rt{font-family:var(--font-gothic);font-size:.46em;color:var(--ink-faint);
    font-weight:400;letter-spacing:0;
    visibility:hidden;opacity:0;transition:opacity .12s ease;}
  /* reveal: hover = peek · tap/click(.reveal) = pin · keyboard focus = peek · master toggle = all */
  ruby:hover rt,ruby:focus-visible rt,ruby.reveal rt,
  body.show-furi ruby rt{visibility:visible;opacity:1;}
  ruby:focus-visible{outline:2px solid var(--shu);outline-offset:1px;border-radius:.15em;}
  @media (prefers-reduced-motion:reduce){ruby rt{transition:none;}}
  .fx{padding:.02em .08em;border-radius:.15em;font-weight:600;
    border-bottom:2px solid currentColor;}
  .fx.katsu{color:var(--katsu);background:var(--katsu-t);}
  .fx.keigo{color:var(--keigo);background:var(--keigo-t);}
  .fx.joshi{color:var(--joshi);background:var(--joshi-t);}
  .fx.goi{color:var(--goi);background:var(--goi-t);}
  .fx ruby rt{color:inherit;}

  .cn{font-size:.96rem;color:var(--ink-soft);margin:.55rem 0 0;padding:.55rem 0 0;
    border-top:1px dashed var(--line);}
  .cn b{color:var(--ink);font-weight:600;}
  .cn .lbl{font-family:var(--font-latin);font-size:.68rem;letter-spacing:.14em;
    text-transform:uppercase;color:var(--ink-faint);margin-right:.5rem;}

  .points{list-style:none;margin:1.1rem 0 0;padding:0;display:flex;flex-direction:column;gap:.75rem;}
  .points li{display:grid;grid-template-columns:auto 1fr;gap:.7rem;align-items:start;
    font-size:.92rem;line-height:1.68;}
  .chip{font-family:var(--font-gothic);font-size:.72rem;font-weight:600;white-space:nowrap;
    padding:.2rem .5rem;border-radius:.35rem;border:1px solid;line-height:1.3;margin-top:.16rem;}
  .chip.katsu{color:var(--katsu);background:var(--katsu-t);border-color:var(--katsu);}
  .chip.keigo{color:var(--keigo);background:var(--keigo-t);border-color:var(--keigo);}
  .chip.joshi{color:var(--joshi);background:var(--joshi-t);border-color:var(--joshi);}
  .chip.goi{color:var(--goi);background:var(--goi-t);border-color:var(--goi);}
  .u-points .chip{cursor:pointer;}                       /* tap to save the term to the 词汇 deck (online) */
  .chip.saved{box-shadow:inset 0 0 0 2px currentColor;}
  .chip.saved::after{content:'✓';margin-left:.25em;font-weight:700;}
  .points b{color:var(--ink);font-weight:600;}
  .points .jt{font-family:var(--font-gothic);}
  .points em{font-style:normal;color:var(--ink-faint);}

  /* ---------- reference tables ---------- */
  .tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:.7rem;background:var(--card);}
  table{border-collapse:collapse;width:100%;font-size:.88rem;min-width:26rem;}
  caption{text-align:left;font-family:var(--font-gothic);font-weight:600;color:var(--ink);
    padding:.9rem 1rem .2rem;font-size:.98rem;}
  th,td{text-align:left;padding:.6rem .85rem;border-bottom:1px solid var(--line);vertical-align:top;}
  thead th{font-family:var(--font-gothic);font-size:.76rem;letter-spacing:.04em;
    color:var(--ink-faint);font-weight:600;background:var(--card-2);}
  tbody tr:last-child td{border-bottom:0;}
  td .jt{font-family:var(--font-gothic);color:var(--ink);font-weight:600;}
  td .rd{color:var(--ink-faint);font-size:.82rem;}
  .tbl-wrap+.tbl-wrap{margin-top:1.1rem;}

  footer{margin-top:3.5rem;padding-top:1.5rem;border-top:1px solid var(--line);
    font-size:.8rem;color:var(--ink-faint);line-height:1.7;}
  a{color:var(--shu);}

  @media (max-width:480px){
    .points li{grid-template-columns:1fr;gap:.3rem;}
    .chip{justify-self:start;}
    .theme{margin-left:0;width:100%;}
  }

  /* ===== per-sentence analysis ===== */
  .lead{font-size:.9rem;color:var(--ink-soft);margin:0 0 1.4rem;line-height:1.7;}
  .lead .tri{color:var(--shu);}
  .lead .ts-demo{font-family:var(--font-mono);font-size:.8rem;color:var(--shu);
    border:1px solid var(--shu);border-radius:.3rem;padding:.02rem .35rem;}
  .chapter{margin:2.4rem 0 0;}
  .chapter-h{display:flex;align-items:baseline;gap:.7rem;flex-wrap:wrap;margin:0 0 .35rem;}
  .chapter-n{font-family:var(--font-mincho);color:var(--shu);font-weight:600;font-size:1.15rem;
    font-variant-numeric:tabular-nums;}
  .chapter-t{font-family:var(--font-gothic);font-weight:600;font-size:1.02rem;color:var(--ink);}
  .chapter-c{color:var(--ink-faint);font-weight:400;font-size:.85rem;margin-left:.5rem;}
  .chapter-r{font-family:var(--font-mono);font-size:.72rem;color:var(--ink-faint);
    font-variant-numeric:tabular-nums;}
  .chapter-h::after{content:"";flex:1;height:1px;background:var(--line);min-width:1.5rem;
    align-self:center;}

  .u{display:grid;grid-template-columns:4.6rem 1fr;gap:.2rem .85rem;
    padding:.9rem 0;border-top:1px solid var(--line);scroll-margin-top:5rem;
    transition:background .25s ease;}
  .u.key{box-shadow:inset 3px 0 0 var(--shu);padding-left:.75rem;
    border-radius:0 .4rem .4rem 0;background:linear-gradient(90deg,var(--joshi-t),transparent 55%);}
  .u.active{background:var(--joshi-t);box-shadow:inset 3px 0 0 var(--shu);
    border-radius:0 .4rem .4rem 0;padding-left:.75rem;}
  .u.active .ts{background:var(--shu);color:#fff;border-color:var(--shu);}
  .u.active .ts::before{color:#fff;}
  .u.active .u-jp{color:var(--ink);}
  .u-meta{display:flex;flex-direction:column;align-items:flex-start;gap:.35rem;padding-top:.15rem;}
  .u-meta .ts{width:100%;text-align:center;}
  .spk{font-family:var(--font-gothic);font-size:.66rem;font-weight:600;line-height:1.3;
    padding:.12rem .4rem;border-radius:.3rem;white-space:nowrap;border:1px solid transparent;}
  .spk.iwata{color:var(--goi);background:var(--goi-t);}
  .spk.host{color:var(--ink-soft);background:var(--card-2);}
  .spk.nare{color:var(--katsu);background:var(--katsu-t);}
  .spk.neta{color:var(--shu);background:var(--joshi-t);}
  .key-star{color:var(--shu);font-size:.8rem;line-height:1;}

  .u-body{min-width:0;}
  .u-jp{font-family:var(--font-mincho);font-size:1.14rem;line-height:2.15;color:var(--ink);
    letter-spacing:.01em;}
  .u-cn{font-size:.9rem;color:var(--ink-soft);margin-top:.15rem;}
  .u-cn .lbl{font-family:var(--font-latin);font-size:.64rem;letter-spacing:.12em;
    text-transform:uppercase;color:var(--ink-faint);margin-right:.45rem;
    border:1px solid var(--line-strong);border-radius:.25rem;padding:.02rem .28rem;}
  .u-asr{font-size:.78rem;color:var(--ink-faint);margin-top:.4rem;line-height:1.55;}
  .tag-asr{font-family:var(--font-gothic);font-size:.64rem;font-weight:600;color:var(--shu);
    background:var(--joshi-t);border-radius:.25rem;padding:.05rem .35rem;margin-right:.4rem;
    white-space:nowrap;}
  .u-telop{font-size:.78rem;color:var(--ink-faint);margin-top:.35rem;line-height:1.55;}
  /* テロップ track hide/show (page_tools.js builds the button). Hides, never swaps —
     the chip shows spoken AND telop, and their difference is the teaching point. */
  body.no-telop .u-telop{display:none;}
  .tag-telop{font-family:var(--font-gothic);font-size:.64rem;font-weight:600;color:var(--ink);
    background:var(--goi-t);border-radius:.25rem;padding:.05rem .35rem;margin-right:.4rem;
    white-space:nowrap;}
  .u-points{list-style:none;margin:.55rem 0 0;padding:0;display:flex;flex-direction:column;gap:.4rem;}
  .u-points li{display:grid;grid-template-columns:auto 1fr;gap:.55rem;align-items:start;
    font-size:.85rem;line-height:1.6;}
  .u-points .chip{margin-top:.08rem;font-size:.68rem;}
  .u-points .star{color:var(--shu);}

  @media (max-width:520px){
    .u{grid-template-columns:1fr;gap:.45rem;}
    /* flex-wrap is NOT optional here. This rule lays the metadata out as a ROW on the narrowest
       screens, and the row's content is un-shrinkable: the ts, the 44px touch tap targets (fav +
       3 .u-act, forced by the (hover:none)+(pointer:coarse) block below), and a .spk whose width is
       set by the speaker's NAME — 36px for 「先輩」, 129px for 「スタッフ(フクロウ担当)」. Left at the
       default nowrap the row cannot fit a phone, and the overflow does not clip: the browser widens
       the LAYOUT VIEWPORT to swallow it (320 -> 387 on konkatsu, 459 on iginari-fureai), so the whole
       page slides sideways under the thumb. Wrapping .u-actions alone is NOT enough — it still left
       the widest page 43px over. Guarded by ux.sh section A, which measures against the DEVICE width. */
    .u-meta{flex-direction:row;align-items:center;gap:.5rem;flex-wrap:wrap;}
    .u-meta .ts{width:auto;}
    .u.key{background:none;}
    .u-points li{grid-template-columns:1fr;gap:.2rem;}
    /* .chip is white-space:nowrap so a grammar term never breaks mid-word — right on a desktop,
       ruinous on a phone. A chip's min-content is then its ENTIRE label, and these labels are as
       long as the grammar needs: 「～ていなきゃいけない」（～ていなければいけない の口語省略）★ measures
       357px against a ~273px column. `1fr` is minmax(AUTO,1fr), and that auto floor is min-content,
       so the column cannot shrink under the chip — it drags the row, and the page, off-screen
       (oshare-takedatsu: 386px on a 320px phone). Wrapping a long chip costs one line; not wrapping
       it costs the whole page. Short chips are unaffected — they only wrap when they cannot fit. */
    .chip{white-space:normal;}
  }

  /* ============================================================
     MOBILE / TOUCH ADAPTATION  (additive; later rules override)
     ============================================================ */
  :root{ --dock-max:42vh; }
  @supports (height:100dvh){ :root{ --dock-max:42dvh; } }

  /* narrow screens: keep the sticky video from eating the viewport, honour the notch */
  @media (max-width:560px){
    body{ overflow-x:hidden; }                 /* safety net against any stray overflow */
    .wrap{ padding-left:max(1.1rem,env(safe-area-inset-left));
           padding-right:max(1.1rem,env(safe-area-inset-right)); }
    .video-dock{ top:env(safe-area-inset-top,0px); margin-top:1rem; }
    .dock-video{ max-width:none; }
    .video-frame{ max-height:var(--dock-max); }
    /* dock bar: let the long title ellipsize so 跟随 / 收起 never get pushed off-screen */
    .dock-bar{ gap:.4rem; padding-left:.75rem; }
    .dock-title{ flex:1 1 auto; min-width:0; }
    .dock-min,.dock-follow{ flex:none; }
    .tag{ white-space:normal; }                /* long 名台词 pills wrap instead of overflowing */
    .sec{ margin-top:2.4rem; }
  }
  /* Landscape phone: the video earns a slightly bigger share than portrait — but 82vh (what this used
     to grant) left 55px for the transcript. 45dvh is the largest video that still leaves a WHOLE
     sentence card readable beneath it; at 50dvh the grammar points get clipped, and the points are the
     content. Measured, not guessed: at 45dvh the room below the dock is 168px for a 164px card. */
  @media (orientation:landscape) and (max-height:480px){
    :root{ --dock-max:45vh; }
  }
  @supports (height:100dvh){
    @media (orientation:landscape) and (max-height:480px){ :root{ --dock-max:45dvh; } }
  }

  /* touch devices (no hover): >=44px hit targets. hover-peek can't fire on touch,
     so the master toggle + tap-to-pin (.reveal) are the furigana controls. */
  @media (hover:none) and (pointer:coarse){
    .ts{ min-height:44px; padding:.5rem .7rem; display:inline-flex;
         align-items:center; justify-content:center; }
    .dock-min,.dock-follow,.dock-shadow-toggle,.dock-hl-toggle,.dock-dict-toggle,.dock-pin-toggle{ min-height:44px; min-width:44px; padding:.5rem .95rem; }
    .dock-play{ min-height:44px; min-width:44px; padding:.5rem .7rem; }
    /* The play button costs width, and it squeezed the dock title to 「なぜ…」 — a truncation
       that carries no information. On a touch screen the title is already redundant: the
       page H1 sits directly above the dock. So the TITLE yields the space, not the controls.
       The ▶ marker stays, so the bar still reads as the player. */
    /* Hide the title OUTRIGHT, marker included. Keeping the ▶ marker while dropping the text
       left two triangles side by side — a red decorative one and the real play button —
       which reads as two controls, one of which does nothing. */
    .dock-title{ display:none; }
    #furiToggle{ min-height:44px; padding:.55rem 1.1rem; }
    ruby{ padding:.12em .06em; border-radius:.2em; }
    .u-points .chip{ padding:.3rem .6rem; }
  }

  /* re-follow button: the player shows it (bottom, thumb-reach) when auto-follow
     is off during playback, so re-arming is one tap even far down the page */
  #refollow{ position:fixed; z-index:40;
    right:max(1rem,env(safe-area-inset-right));
    bottom:max(1rem,env(safe-area-inset-bottom));
    display:none; align-items:center; gap:.4rem; min-height:44px;
    font-family:var(--font-gothic); font-size:.85rem; font-weight:600;
    color:#fff; background:var(--shu); border:0; border-radius:2rem;
    padding:.6rem 1.15rem; box-shadow:0 8px 22px -8px rgba(0,0,0,.55);
    cursor:pointer; opacity:0; transform:translateY(10px);
    transition:opacity .2s ease,transform .2s ease; }

  @media (prefers-reduced-motion:reduce){ #refollow{ transition:none; } }

  /* horizontally-scrollable reference tables: fade + shadow hint you can swipe */
  .tbl-wrap{ position:relative;
    background:
      linear-gradient(90deg,var(--card),transparent) 0 0,
      linear-gradient(90deg,transparent,var(--card)) 100% 0,
      radial-gradient(farthest-side at 0 50%,rgba(0,0,0,.16),transparent) 0 0,
      radial-gradient(farthest-side at 100% 50%,rgba(0,0,0,.16),transparent) 100% 0;
    background-repeat:no-repeat;
    background-size:2.4rem 100%,2.4rem 100%,1.1rem 100%,1.1rem 100%;
    background-attachment:local,local,scroll,scroll; }

  /* ============================================================
     LANG-NAV — slim cross-page nav (目录 home / prev·next / 收藏 + sync dot).
     Non-sticky: scrolls away so it never fights the sticky .video-dock.

  .ln-off{background:#9aa0a6;} .ln-err{background:#d1453b;}
  @media (max-width:560px){
    .ln-ctx{display:none;}

  /* ============================================================
     FAVORITES (收藏) — capture per sentence, filter, deep-link.

  .fav-btn{ appearance:none;-webkit-appearance:none;background:transparent;border:0;

  #favFilter{font-family:var(--font-gothic);font-size:.8rem;font-weight:600;cursor:pointer;

  .u.fav-jump{animation:fav-jump 1.5s ease;}

    border-radius:0 .4rem .4rem 0;}100%{background:transparent;}}
  @media (prefers-reduced-motion:reduce){.u.fav-jump{animation:none;}}

  /* touch: the bookmark is a >=44px target, well clear of the seeking .ts */
  @media (hover:none) and (pointer:coarse){
    .fav-btn{min-width:44px;min-height:44px;display:inline-flex;align-items:center;justify-content:center;padding:.4rem;}
    #favFilter{min-height:44px;padding:.55rem 1.1rem;}

  /* ============================================================
     IN-PAGE STUDY UX — shadow drill (跟读) · filter/search · per-row share.
     shadow.js + page_tools.js (pure cores unit-tested). plans/in-page-study-ux.md
     ============================================================ */
  /* shadow toggle in the dock bar (sits next to 跟随) */
  .dock-shadow-toggle, .dock-hl-toggle, .dock-dict-toggle, .dock-pin-toggle{font-family:var(--font-gothic);font-size:.75rem;font-weight:600;cursor:pointer;
    color:var(--ink-soft);background:transparent;border:1px solid var(--line-strong);border-radius:2rem;
    padding:.24rem .7rem;white-space:nowrap;flex:none;transition:color .15s,border-color .15s,background .15s;}
  .dock-shadow-toggle:hover, .dock-hl-toggle:hover, .dock-dict-toggle:hover, .dock-pin-toggle:hover{color:var(--keigo);border-color:var(--keigo);}
  .dock-shadow-toggle.on, .dock-hl-toggle.on, .dock-dict-toggle.on, .dock-pin-toggle.on{color:var(--keigo);border-color:var(--keigo);background:var(--keigo-t);}
  .dock-shadow-toggle:focus-visible, .dock-hl-toggle:focus-visible, .dock-dict-toggle:focus-visible, .dock-pin-toggle:focus-visible{outline:2px solid var(--keigo);outline-offset:2px;}
  .dock-shadow-toggle[disabled]{opacity:.45;cursor:progress;}
  /* 重点 (highlights) lens: hide non-key rows when active. body-scoped, container-agnostic. */
  body.highlights-only .u:not(.key){ display:none; }
  /* 听写 (dictation) lens: mask the answer body; the active revealed row shows. visibility, not
     display, so the layout does not jump; the sibling .u-meta timestamp stays visible + tappable. */
  body.dictation .u .u-body{ visibility:hidden; }
  body.dictation .u.revealed .u-body{ visibility:visible; }
  /* dictation control bar — mirrors .dock-shadow; buttons share styling via the grouped selectors below */
  .dock-dict{display:flex;align-items:center;flex-wrap:wrap;gap:.4rem .6rem;
    padding:.5rem .85rem;background:var(--card-2);border-bottom:1px solid var(--line);}
  .dock-dict[hidden]{display:none;}
  .dict-grade{display:inline-flex;gap:.3rem;}
  .dict-grade[hidden]{display:none;}
  .dict-tally{margin-left:auto;font-size:.75rem;color:var(--ink-soft);white-space:nowrap;}
  .dock-dict .d-got.on,.dock-dict .d-got:hover{color:var(--paper);background:var(--joshi);border-color:var(--joshi);}
  .dock-dict .d-miss:hover{color:var(--paper);background:var(--shu);border-color:var(--shu);}
  /* control cluster, revealed under the dock bar when shadow is on */
  .dock-shadow{display:flex;align-items:center;flex-wrap:wrap;gap:.4rem .6rem;
    padding:.5rem .85rem;background:var(--card-2);border-bottom:1px solid var(--line);}
  .dock-shadow[hidden]{display:none;}
  .dock-shadow .sh-step,.dock-shadow .sh-mode button,.dock-shadow .sh-rate,.dock-dict .d-step{
    font-family:var(--font-gothic);font-size:.74rem;font-weight:600;cursor:pointer;color:var(--ink-soft);
    background:transparent;border:1px solid var(--line-strong);border-radius:2rem;padding:.22rem .6rem;
    white-space:nowrap;transition:color .12s,border-color .12s,background .12s;}
  .dock-shadow .sh-mode{display:inline-flex;gap:.3rem;}
  .dock-shadow .sh-rates{display:inline-flex;gap:.3rem;margin-left:auto;}
  .dock-shadow button:hover,.dock-dict button:hover{color:var(--keigo);border-color:var(--keigo);}
  .dock-shadow .sh-mode button.on,.dock-shadow .sh-rate.on{color:var(--paper);background:var(--keigo);border-color:var(--keigo);}
  .dock-shadow button:focus-visible,.dock-dict button:focus-visible{outline:2px solid var(--keigo);outline-offset:2px;}
  @media (hover:none) and (pointer:coarse){
    .dock-shadow-toggle{min-height:44px;padding:.5rem .9rem;}
    .dock-shadow .sh-step,.dock-shadow .sh-mode button,.dock-shadow .sh-rate,.dock-dict .d-step{min-height:44px;padding:.5rem .8rem;}
  }

  /* Four dock buttons + the injected play button no longer fit at the 320px reflow floor.
     Reclaim width by tightening gap + horizontal padding; the 44px min-HEIGHT tap target stays.
     Placed after the .dock-shadow-toggle touch-padding rule above (same specificity, later wins
     the cascade) so this narrow override is not itself overridden back to the wider padding. */
  @media (max-width:440px){
    /* Five dock buttons + play do not fit on a phone (even the 390px iPhone), so tighten padding AND
       make the bar SCROLL horizontally. overflow-x:auto is ADAPTIVE — it shows no scrollbar where the
       tightened buttons already fit and only scrolls where they don't; flex:0 0 auto keeps each button
       full-size and un-clipped either way. Covers 320/375/390/430 phones; tablets/desktop are untouched. */
    .dock-bar{ gap:.3rem; padding-left:.5rem; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
    .dock-bar::-webkit-scrollbar{ display:none; }
    .dock-follow,.dock-shadow-toggle,.dock-hl-toggle,.dock-dict-toggle,.dock-pin-toggle,.dock-min{ padding-left:.5rem; padding-right:.5rem; flex:0 0 auto; }
    .dock-play{ padding-left:.4rem; padding-right:.4rem; flex:0 0 auto; }
  }

  /* filter / search bar (page_tools.js) */

  .filter-reset{font-family:var(--font-gothic);font-size:.76rem;font-weight:600;cursor:pointer;color:var(--ink-soft);

<script>
/* ============================================================================
   Study-state store (v2) — the shared synced substrate. Was single-purpose
   favorites; now holds FOUR namespaced maps (items / srs / notes / progress) on
   the same private-Gist backend. Store = localStorage cache; SOURCE OF TRUTH = a
   private GitHub Gist (opt-in sync). Online-only (gated on https/localhost, NOT
   file://) so offline file:// deliverables stay self-contained. The pure core
   below is unit-tested (tools/test_favorites.mjs). Exposes window.LangFav on EVERY
   page: study pages inject capture UI + notes + progress; favorites.html renders
   the pooled library + SRS review; index renders 继续学习. srs.js / notes.js /
   progress.js layer on top via getNS/setKey/delKey. Design: plans/synced-study-state.md.
   ========================================================================== */
(function(){
  /*<<fav-pure>>*/
  // Pure, DOM/Network-free core. Extracted verbatim by the unit test.
  function FAV_PURE(){
    // ---- timestamps ----
    function tsToSec(t){
      var p = (String(t).match(/\d+/g) || []).map(Number);
      var s = 0; for (var i = 0; i < p.length; i++) s = s * 60 + p[i];
      return s;
    }
    function secToMmss(s){
      s = Math.max(0, Math.floor(+s || 0));
      var m = Math.floor(s / 60), ss = s % 60;
      return (m < 10 ? '0' : '') + m + ':' + (ss < 10 ? '0' : '') + ss;
    }
    // ---- identity: <yt>#<mmss>#<n>, n = within-second ordinal in DOM order.
    function assignFavIds(yt, tsList){
      var seen = {}, out = [];
      for (var i = 0; i < tsList.length; i++){
        var mmss = secToMmss(tsToSec(tsList[i]));
        var n = (seen[mmss] == null) ? 0 : seen[mmss] + 1;
        seen[mmss] = n;
        out.push(yt + '#' + mmss + '#' + n);
      }
      return out;
    }
    // ---- furigana stripping (for the Anki FRONT: reading must not give the answer)
    function stripFuri(html){
      return String(html == null ? '' : html)
        .replace(/<rp\b[^>]*>[\s\S]*?<\/rp>/gi, '')
        .replace(/<rt\b[^>]*>[\s\S]*?<\/rt>/gi, '')
        .replace(/<[^>]+>/g, '');
    }
    function sanitizeField(s){
      return String(s == null ? '' : s).replace(/\t/g, ' ').replace(/\r?\n/g, '<br>');
    }
    // ---- Anki card: plain JP front, ruby+译+grammar back.
    function ankiCard(rec){
      var front = sanitizeField(stripFuri(rec.jp_html || ''));
      var parts = [rec.jp_html || ''];
      if (rec.cn) parts.push('【译】' + rec.cn);
      var pts = rec.points || [];
      for (var i = 0; i < pts.length; i++)
        parts.push('・' + (pts[i].term || '') + '：' + (pts[i].note || ''));
      return { front: front, back: sanitizeField(parts.join('\n')) };
    }
    // ---- v2 map-state helpers (one map per namespace) ----
    var NS = ['items', 'srs', 'notes', 'progress', 'vocab', 'activity'];
    function emptyState(){ return { items: {}, srs: {}, notes: {}, progress: {}, vocab: {}, activity: {} }; }
    function cloneState(state){
      state = state || {};
      var out = emptyState();
      for (var n = 0; n < NS.length; n++){
        var src = state[NS[n]] || {}, dst = out[NS[n]];
        for (var k in src) if (Object.prototype.hasOwnProperty.call(src, k)) dst[k] = src[k];
      }
      return out;
    }
    // v1 (or version-less) doc → map state; no favorites lost or moved. A doc from before a
    // namespace existed simply has no key for it → {} (activity is the newest such key).
    function migrate(parsed){
      parsed = parsed || {};
      return { items: parsed.items || {}, srs: parsed.srs || {}, notes: parsed.notes || {},
               progress: parsed.progress || {}, vocab: parsed.vocab || {}, activity: parsed.activity || {} };
    }
    // v2 writer: ALWAYS serialize every namespace map under {v:2, …}.
    function serialize(state){
      state = state || {};
      return { v: 2, items: state.items || {}, srs: state.srs || {}, notes: state.notes || {},
               progress: state.progress || {}, vocab: state.vocab || {}, activity: state.activity || {} };
    }
    // normalize a legacy favorite op into a v2 namespaced op.
    function normalizeOp(o){
      if (!o) return null;
      if (o.ns) return { ns: o.ns, op: o.op, key: o.key, value: o.value };
      if (o.op === 'add') return { ns: 'items', op: 'set', key: o.id, value: o.record };
      if (o.op === 'del') return { ns: 'items', op: 'del', key: o.id };
      return null;
    }
    // ---- op-replay merge across the four namespaces (pure; no wall-clock, no tombstones).
    function applyOps(state, ops){
      var out = cloneState(state);
      for (var i = 0; i < (ops || []).length; i++){
        var o = normalizeOp(ops[i]);
        if (!o || NS.indexOf(o.ns) < 0) continue;
        var map = out[o.ns];
        if (o.op === 'set') map[o.key] = o.value;
        else if (o.op === 'del') delete map[o.key];
      }
      return out;
    }
    // ---- sync engine: pull → apply pending ops → PATCH. On a CONFLICT, re-pull, re-apply, retry.
    //
    // This used to say "PATCH with If-Match(etag) … on 412 re-pull". Both halves were wrong, and
    // verified wrong against the live API:
    //
    //   * GitHub's gist API does not support If-Match. Sending one is not ignored — it is a 400.
    //     So the compare-and-swap this design was built around was never possible, and the only
    //     reason sync worked at all is that the request adapter quietly dropped the header.
    //   * GitHub signals "you based this write on a stale version" with 409 Conflict, not 412. So
    //     this retry — the entire point of the engine — NEVER FIRED. A concurrent edit surfaced to
    //     the user as 同步失败：409 with their stars stranded in the queue, when the code was fully
    //     equipped to re-pull, replay the ops, and win on the next attempt.
    //
    // The good news, also verified: because GitHub rejects the stale write, no update is ever lost.
    // The conflict is real, it is detected server-side, and it is recoverable. Recover from it.
    function makeSync(deps){
      var request = deps.request;                        // (kind, opts) -> {ok,status,etag,body}
      async function flush(ops){
        // Always read immediately before writing. A `pulled` state handed in from page-load could be
        // minutes stale, and with last-write-wins that is a licence to destroy everything another
        // device did in the meantime.
        var g = await request('GET');
        var base = g.body, baseVersion = g.version, etag = g.etag;
        for (var attempt = 0; attempt < 5; attempt++){
          var merged = applyOps(base, ops);
          var res = await request('PATCH', { body: merged });     // no If-Match — GitHub 400s on one
          if (res.ok){
            // LAST-WRITE-WINS DAMAGE CONTROL. GitHub accepted the write unconditionally. If the commit
            // we just made does not sit on top of the revision we read, another device wrote into that
            // window and we have just silently overwritten them. git still has their commit: fetch the
            // revision we landed on (our parent), replay our ops on top of THAT, and write again.
            if (baseVersion && res.parent && res.parent !== baseVersion){
              var lost = await request('GET_REV', { version: res.parent });   // what we just destroyed
              base = lost.body;                                               // rebuild on top of it
              baseVersion = res.version;                                      // we are now the head
              continue;
            }
            return { state: merged, etag: res.etag };
          }
          // 409 = two writes hitting the gist's git lock at once. Transient, not a version check —
          // never rely on it to prevent a lost update. 412 is kept for a backend that does real CAS.
          if (res.status === 409 || res.status === 412){
            var re = await request('GET'); base = re.body; baseVersion = re.version; etag = re.etag; continue;
          }
          var perr = new Error('sync PATCH failed: ' + res.status); perr.status = res.status; throw perr;
        }
        throw new Error('sync: too many conflicts');
      }
      return { flush: flush };
    }
    // ---- self-heal wrapper: a cached gist id can go stale; on 404 drop it, re-resolve, retry ONCE.
    function makeSyncEngine(deps){
      var resolve = deps.resolve;   // (force) -> Promise<gid>
      var makeReq = deps.makeReq;   // (gid) -> request(kind, opts)
      async function withHeal(run){
        var gid = await resolve(false);
        try { return await run(makeReq(gid)); }
        catch (e){
          if (!(e && e.status === 404)) throw e;
          var fresh = await resolve(true);
          return await run(makeReq(fresh));
        }
      }
      function push(ops){ return withHeal(function(req){ return makeSync({ request: req }).flush(ops); }); }
      function pull(){ return withHeal(function(req){ return req('GET'); }); }
      return { push: push, pull: pull };
    }
    // ---- optional client-side encryption (AES-GCM, PBKDF2). Unused wiring; kept as-is.
    function makeCrypto(subtle, getRandom){
      var enc = new TextEncoder(), dec = new TextDecoder();
      function b64(buf){ var b = new Uint8Array(buf), s = ''; for (var i = 0; i < b.length; i++) s += String.fromCharCode(b[i]); return btoa(s); }
      function unb64(str){ var s = atob(str), b = new Uint8Array(s.length); for (var i = 0; i < s.length; i++) b[i] = s.charCodeAt(i); return b; }
      async function keyFrom(pass, salt){
        var base = await subtle.importKey('raw', enc.encode(pass), 'PBKDF2', false, ['deriveKey']);
        return subtle.deriveKey({ name: 'PBKDF2', salt: salt, iterations: 150000, hash: 'SHA-256' },
          base, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']);
      }
      async function encrypt(pass, text){
        var salt = getRandom(16), iv = getRandom(12), key = await keyFrom(pass, salt);
        var ct = await subtle.encrypt({ name: 'AES-GCM', iv: iv }, key, enc.encode(text));
        return { v: 1, alg: 'AES-GCM', salt: b64(salt), iv: b64(iv), ct: b64(ct) };
      }
      async function decrypt(pass, blob){
        var key = await keyFrom(pass, unb64(blob.salt));
        var pt = await subtle.decrypt({ name: 'AES-GCM', iv: unb64(blob.iv) }, key, unb64(blob.ct));
        return dec.decode(pt);
      }
      return { encrypt: encrypt, decrypt: decrypt };
    }
    // ---- sync-dot state: 'off' | 'err' | 'wait' | 'ok'
    function syncStatus(s){
      s = s || {};
      if (!s.hasToken) return 'off';
      if (s.lastErr) return 'err';
      if (s.pending > 0) return 'wait';
      return 'ok';
    }
    return { tsToSec: tsToSec, secToMmss: secToMmss, assignFavIds: assignFavIds,
             stripFuri: stripFuri, sanitizeField: sanitizeField, ankiCard: ankiCard,
             migrate: migrate, serialize: serialize, applyOps: applyOps,
             makeSync: makeSync, makeSyncEngine: makeSyncEngine,
             makeCrypto: makeCrypto, syncStatus: syncStatus };
  }
  /*<</fav-pure>>*/

  // ---- online-only: https or localhost; NOT file:// (Chrome reports file:// AS secure).
  var loc = window.location || {};
  if (!(loc.protocol === 'https:' || loc.hostname === 'localhost' || loc.hostname === '127.0.0.1')) return;
  var P = FAV_PURE();

  var K = { store: 'langfav:v1', srs: 'langfav:srs', notes: 'langfav:notes',
            progress: 'langfav:progress', vocab: 'langfav:vocab', activity: 'langfav:activity',
            ops: 'langfav:ops', tok: 'langfav:tok', gid: 'langfav:gid' };
  var NS = ['items', 'srs', 'notes', 'progress', 'vocab', 'activity'];
  function readJSON(k, d){ try { var s = localStorage.getItem(k); return s ? JSON.parse(s) : d; } catch (e){ return d; } }
  function writeJSON(k, v){ try { localStorage.setItem(k, JSON.stringify(v)); } catch (e){} }

  var state = { items: readJSON(K.store, {}), srs: readJSON(K.srs, {}),
                notes: readJSON(K.notes, {}), progress: readJSON(K.progress, {}),
                vocab: readJSON(K.vocab, {}), activity: readJSON(K.activity, {}) };
  var favs = state.items;                // alias kept for the capture UI
  var ops  = readJSON(K.ops, []);        // pending, not-yet-synced ops
  var changeHooks = [];
  var lastErr = false;

  function persist(){
    writeJSON(K.store, state.items); writeJSON(K.srs, state.srs);
    writeJSON(K.notes, state.notes); writeJSON(K.progress, state.progress);
    writeJSON(K.vocab, state.vocab); writeJSON(K.activity, state.activity);
  }
  function setState(next){ state = next; favs = state.items; }
  function queueOp(op){
    if (op && op.ns && op.key != null){                  // coalesce same ns+key: a key's synced state = its last op (bounds a long session's queue)
      for (var i = ops.length - 1; i >= 0; i--) if (ops[i].ns === op.ns && ops[i].key === op.key) ops.splice(i, 1);
    }
    ops.push(op); writeJSON(K.ops, ops);
  }
  function fireChange(){ reflect(); for (var i = 0; i < changeHooks.length; i++){ try { changeHooks[i](); } catch (e){} } }
  var batching = false;
  // batch: apply many writes, then fire ONE change + ONE flush (avoids O(N) render/flush storms, e.g. srs reconcile).
  function batch(fn){ batching = true; try { fn(); } finally { batching = false; } fireChange(); scheduleFlush(); }

  function addFav(record){ state.items[record.id] = record; queueOp({ ns: 'items', op: 'set', key: record.id, value: record }); persist(); fireChange(); scheduleFlush(); }
  function removeFav(id){ if (!state.items[id]) return; delete state.items[id]; queueOp({ ns: 'items', op: 'del', key: id }); persist(); fireChange(); scheduleFlush(); }
  // generic namespace API for srs.js / notes.js / progress.js
  function getNS(ns){ return state[ns] || {}; }
  // record that the user reviewed TODAY (local date) — the streak signal for the 今日学习 home.
  // Op-replay is last-write-wins per key, but the streak only reads a day's PRESENCE, so a
  // same-day write from another device can never break the streak (the key still exists).
  function todayStr(){ var d = new Date(), p = function(n){ return (n < 10 ? '0' : '') + n; };
    return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate()); }
  function stampToday(){ var s = todayStr(); setKey('activity', s, (getNS('activity')[s] || 0) + 1); }
  function setKey(ns, key, value, opts){ if (NS.indexOf(ns) < 0) return; state[ns][key] = value; queueOp({ ns: ns, op: 'set', key: key, value: value }); persist(); if (batching) return; fireChange(); if (!(opts && opts.defer)) scheduleFlush(); }
  function delKey(ns, key, opts){ if (NS.indexOf(ns) < 0) return; if (state[ns][key] == null) return; delete state[ns][key]; queueOp({ ns: ns, op: 'del', key: key }); persist(); if (batching) return; fireChange(); if (!(opts && opts.defer)) scheduleFlush(); }

  // ---------- sync (opt-in): localStorage cache ⇄ private Gist (source of truth) ----------
  var FILE = 'lang-favorites.json';
  function token(){ try { return localStorage.getItem(K.tok) || ''; } catch (e){ return ''; } }
  async function api(method, path, body){
    return fetch('https://api.github.com' + path, {
      method: method,
      headers: { 'Authorization': 'Bearer ' + token(), 'Accept': 'application/vnd.github+json',
                 'X-GitHub-Api-Version': '2022-11-28' },
      body: body ? JSON.stringify(body) : undefined
    });
  }
  async function findGist(){
    var gid = null; try { gid = localStorage.getItem(K.gid); } catch (e){}
    if (gid) return gid;
    var r = await api('GET', '/gists?per_page=100'); if (!r.ok){ var le = new Error('gist list ' + r.status); le.status = r.status; throw le; }
    var hit = (await r.json()).filter(function(g){ return g.files && g.files[FILE]; })[0];
    if (hit){ try { localStorage.setItem(K.gid, hit.id); } catch (e){} return hit.id; }
    var files = {}; files[FILE] = { content: JSON.stringify(P.serialize({})) };
    var c = await api('POST', '/gists', { description: 'lang-analysis favorites (do not delete)', public: false, files: files });
    if (!c.ok){ var ce = new Error('gist create ' + c.status); ce.status = c.status; throw ce; }
    var g = await c.json(); try { localStorage.setItem(K.gid, g.id); } catch (e){} return g.id;
  }
  function makeRequest(gid){
    // A gist is a git repo, and that is the only concurrency primitive this API gives us. There is no
    // If-Match (sending one is a 400) and no version precondition on PATCH — writes are LAST-WRITE-WINS.
    // But every revision is a commit, and `history[0].version` is the head. So a write's PARENT tells us
    // which revision we actually landed on top of. If that is not the revision we read, another device
    // wrote in between and we just destroyed it — and we can fetch exactly what we destroyed, because
    // git kept it. See makeSync.flush.
    async function readAt(path){
      var r = await api('GET', path); if (!r.ok){ var ge = new Error('gist get ' + r.status); ge.status = r.status; throw ge; }
      var etag = r.headers.get('ETag'); var g = await r.json();
      var f = g.files && g.files[FILE]; var content = f ? f.content : '';
      if (f && f.truncated && f.raw_url) content = await (await fetch(f.raw_url)).text();
      var parsed; try { parsed = content ? JSON.parse(content) : {}; }
      catch (e){ throw new Error('refusing to overwrite: gist parse failed'); }  // never treat as empty
      var h = g.history || [];
      return { ok: true, etag: etag, version: h[0] && h[0].version, body: P.migrate(parsed) };
    }
    return async function(kind, opts){
      if (kind === 'GET') return readAt('/gists/' + gid);
      if (kind === 'GET_REV') return readAt('/gists/' + gid + '/' + opts.version);   // a past revision
      var files = {}; files[FILE] = { content: JSON.stringify(P.serialize(opts.body)) };
      var r2 = await api('PATCH', '/gists/' + gid, { files: files });
      if (!r2.ok) return { ok: false, status: r2.status };
      var g2 = await r2.json(); var h2 = g2.history || [];
      return { ok: true, status: r2.status, etag: r2.headers.get('ETag'),
               version: h2[0] && h2[0].version,      // the commit we just made
               parent:  h2[1] && h2[1].version,      // ...and what it landed on top of
               body: opts.body };
    };
  }
  function dropGid(){ try { localStorage.removeItem(K.gid); } catch (e){} }
  function resolveGid(force){ if (force) dropGid(); return findGist(); }
  function engine(){ return P.makeSyncEngine({ resolve: resolveGid, makeReq: makeRequest }); }

  var flushing = false, dirtyAgain = false, timer = null;
  async function doFlush(){
    if (!token()) return { ok: false, reason: 'no-token' };
    if (!navigator.onLine) return { ok: false, reason: 'offline' };
    if (flushing){ dirtyAgain = true; return { ok: false, reason: 'busy' }; }
    flushing = true;
    try {
      var pending = readJSON(K.ops, []);
      if (!pending.length) return { ok: true, count: favCount(), pushed: 0 };
      var out = await engine().push(pending);              // self-heals a stale gid on 404
      setState(out.state); persist(); writeJSON(K.ops, []); ops = [];
      lastErr = false; fireChange();
      return { ok: true, count: favCount(), pushed: pending.length };
    } catch (e){                                            // keep ops queued; retry on next trigger
      if (e && e.status) lastErr = true;
      fireChange();
      return { ok: false, status: e && e.status, error: String((e && e.message) || e) };
    } finally { flushing = false; if (dirtyAgain){ dirtyAgain = false; scheduleFlush(); } }
  }
  function scheduleFlush(){ if (timer) clearTimeout(timer); timer = setTimeout(doFlush, 1200); }
  async function pullOnLoad(){
    if (!token()) return { ok: false, reason: 'no-token' };
    if (!navigator.onLine) return { ok: false, reason: 'offline' };
    try {
      var r = await engine().pull();                        // self-heals a stale gid on 404
      setState(P.applyOps(r.body, readJSON(K.ops, [])));     // gist truth + our un-pushed ops
      persist(); lastErr = false; fireChange();
      if (ops.length) scheduleFlush();
      return { ok: true, count: favCount() };
    } catch (e){ if (e && e.status) lastErr = true; fireChange(); return { ok: false, status: e && e.status, error: String((e && e.message) || e) }; }
  }

  // ---------- capture UI (study pages only: where .u cards exist) ----------
  var cards = [].slice.call(document.querySelectorAll('.u'));
  var IDS = [], filterBtn = null, favEmpty = null;
  function pageYt(){
    var el = document.getElementById('clip'); if (!el) return '';
    // data-episode-id keys favourites on an AUDIO (podcast) page — its stable per-episode id, the
    // <key> in <key>#<mmss>#<n>. Additive: video pages carry data-youtube-id and never reach it.
    var y = el.getAttribute('data-youtube-id') || el.getAttribute('data-video-id') || el.getAttribute('data-episode-id'); if (y) return y;
    var m = (el.getAttribute('src') || '').match(/embed\/([\w-]+)/); return m ? m[1] : '';
  }
  function cnText(card){
    var el = card.querySelector('.u-cn'); if (!el) return '';
    var c = el.cloneNode(true); var lbl = c.querySelector('.lbl'); if (lbl) lbl.remove();
    return c.textContent.trim();
  }
  function pointsOf(card){
    return [].slice.call(card.querySelectorAll('.u-points li')).map(function(li){
      var chip = li.querySelector('.chip');
      var cat = chip ? ([].slice.call(chip.classList).filter(function(x){ return x !== 'chip' && x !== 'star'; })[0] || '') : '';
      return { cat: cat, term: chip ? chip.textContent.trim() : '', note: li.children[1] ? li.children[1].textContent.trim() : '' };
    });
  }
  function recordFor(card, id){
    var jp = card.querySelector('.u-jp'), ts = card.querySelector('.ts');
    var sec = ts ? P.tsToSec(ts.textContent) : 0;
    return { id: id, yt: pageYt(), page: (location.pathname.split('/').pop() || ''), mmss: P.secToMmss(sec), sec: sec,
             jp_html: jp ? jp.innerHTML : '', cn: cnText(card), points: pointsOf(card),
             page_title: (document.title || ''), added_at: Date.now() };
  }
  function favCount(){ return Object.keys(favs).length; }
  function reflect(){
    if (!cards.length) return;
    cards.forEach(function(card, i){
      var on = !!favs[IDS[i]], b = card.querySelector('.fav-btn');
      card.classList.toggle('faved', on); if (b) b.setAttribute('aria-pressed', on ? 'true' : 'false');
    });
    if (filterBtn) filterBtn.textContent = '只看收藏 (' + favCount() + ')';
    if (favEmpty) favEmpty.hidden = !(document.body.classList.contains('fav-only') && favCount() === 0);
  }
  if (cards.length){
    var YT = pageYt();
    var IDS0 = P.assignFavIds(YT, cards.map(function(c){ var t = c.querySelector('.ts'); return t ? t.textContent : ''; }));
    IDS = IDS0;
    var BOOKMARK = '<svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true">' +
      '<path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1z"/></svg>';
    cards.forEach(function(card, i){
      var id = IDS[i]; card.dataset.favId = id;
      var meta = card.querySelector('.u-meta') || card;
      var b = document.createElement('button');
      b.type = 'button'; b.className = 'fav-btn'; b.setAttribute('aria-label', '收藏这句'); b.title = '收藏这句';
      b.innerHTML = BOOKMARK;
      b.addEventListener('click', function(){ favs[id] ? removeFav(id) : addFav(recordFor(card, id)); });
      meta.appendChild(b);
    });
    filterBtn = document.createElement('button');
    filterBtn.id = 'favFilter'; filterBtn.type = 'button'; filterBtn.setAttribute('aria-pressed', 'false');
    filterBtn.addEventListener('click', function(){
      var on = document.body.classList.toggle('fav-only');
      filterBtn.setAttribute('aria-pressed', on ? 'true' : 'false'); reflect();
    });

    favEmpty.textContent = '还没有收藏。点句子的书签图标即可收藏，稍后在收藏页复习。';

  }

  // ---------- triggers: pull on load, push eagerly before backgrounding ----------
  window.addEventListener('online', scheduleFlush);
  document.addEventListener('visibilitychange', function(){ if (document.hidden) doFlush(); });
  window.addEventListener('pagehide', function(){ doFlush(); });
  pullOnLoad();

  // ---------- public surface ----------
  window.LangFav = {
    all: function(){ return favs; },
    count: favCount,
    status: function(){ return P.syncStatus({ hasToken: !!token(), lastErr: lastErr, pending: readJSON(K.ops, []).length }); },
    remove: removeFav,

    setToken: function(t){ try { t ? localStorage.setItem(K.tok, t) : localStorage.removeItem(K.tok); } catch (e){} lastErr = false; fireChange(); },
    hasToken: function(){ return !!token(); },
