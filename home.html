<script>
/* ============================================================================
   SRS review (间隔复习) — favorites.html only. Pure SM-2-lite scheduler
   (schedule / dueQueue / reconcile) unit-tested in tools/test_srs.mjs; the DOM
   review-session overlay + in-list due badges wire on top via window.LangFav
   (getNS/setKey/delKey). A card exists iff the sentence is a favorite (lazy
   reconcile on load). Design: plans/synced-study-state.md.
   ========================================================================== */
(function(){
  /*<<srs-pure>>*/
  // Pure, DOM/Store-free core. Extracted verbatim by the unit test.
  function SRS_PURE(){
    var DAY = 86400;                                  // seconds/day (day-granular scheduling)
    function clampEase(e){ return Math.max(1.3, Math.min(3.0, e)); }
    function newCard(now){ return { due: now, ivl: 0, ease: 2.5, reps: 0, lapses: 0 }; }
    // schedule: card + grade + now(sec) → next card. ease is updated first, then
    // the interval is computed from the post-delta ease (see plan Self-review 1).
    function schedule(card, grade, now){
      var c = card || newCard(now);
      var ease = c.ease, ivl = c.ivl, reps = c.reps, lapses = c.lapses;
      var first = (reps === 0);
      if (grade === 'again'){
        return { due: now, ivl: 0, ease: clampEase(ease - 0.20), reps: 0, lapses: lapses + 1 };
      }
      var nIvl;
      if (grade === 'hard'){
        ease = clampEase(ease - 0.15);
        nIvl = first ? 1 : Math.max(ivl + 1, Math.round(ivl * 1.2));
      } else if (grade === 'easy'){
        ease = clampEase(ease + 0.15);
        nIvl = first ? 3 : Math.round(ivl * ease * 1.3);
      } else { // 'good'
        ease = clampEase(ease);
        nIvl = first ? 1 : Math.round(ivl * ease);
      }
      return { due: now + nIvl * DAY, ivl: nIvl, ease: ease, reps: reps + 1, lapses: lapses };
    }
    // ids with due<=now, ascending by due, ties in map (insertion) order.
    function dueQueue(srs, now){
      srs = srs || {};
      var arr = [];
      for (var id in srs) if (Object.prototype.hasOwnProperty.call(srs, id)){
        var c = srs[id];
        if (c && c.due <= now) arr.push({ id: id, due: c.due, i: arr.length });
      }
      arr.sort(function(a, b){ return (a.due - b.due) || (a.i - b.i); });
      return arr.map(function(x){ return x.id; });
    }
    // ── card types: each favorite yields rec+prod, plus cloze when a term is verbatim ──────────
    // srs keys are <id>#<type>. The id itself is <yt>#<mmss>#<n> (two #), so type is the LAST
    // segment — parse via lastIndexOf('#'), NEVER split('#').
    var CARD_TYPES = ['rec', 'prod', 'cloze'];
    function typeOf(key){ var h = String(key).lastIndexOf('#'); return h < 0 ? '' : key.slice(h + 1); }
    function baseOf(key){ var h = String(key).lastIndexOf('#'); return h < 0 ? key : key.slice(0, h); }
    function isTypedKey(key){ return CARD_TYPES.indexOf(typeOf(key)) >= 0; }
    // Surface text = the sentence with furigana readings and tags removed; cloze matches on THIS.
    function surfaceOf(html){ return String(html || '').replace(/<rt>[\s\S]*?<\/rt>/g, '').replace(/<[^>]+>/g, ''); }
    // A point term reduced to its matchable core: strip the ★ prefix, then trim placeholder
    // markers (〜～~…／ + whitespace) from BOTH ends. So 〜かどうか → かどうか (a verbatim span of the
    // sentence). An interior placeholder stays put: 〜ば〜ほど → ば〜ほど, which simply won't match —
    // no invented blanks, still no morphology. This is why a grammar PATTERN can now be clozed.
    function clozeCore(term){
      return String(term || '').replace(/^★\s*/, '')
        .replace(/^[〜～~…\/\s]+/, '').replace(/[〜～~…\/\s]+$/, '').trim();
    }
    // The cloze should test the GRAMMAR being taught, not the longest incidental word. Rank the
    // grammar categories (particle/conjugation/keigo) above plain vocabulary; unknown/absent cat
    // sits between. Higher rank wins outright; ties break to the longer core, then earlier point.
    var CLOZE_RANK = { joshi: 3, katsu: 3, keigo: 3, goi: 1 };
    function clozeRank(cat){ return Object.prototype.hasOwnProperty.call(CLOZE_RANK, cat) ? CLOZE_RANK[cat] : 2; }
    // Best point core that is a VERBATIM substring of the surface sentence. Blanks that span;
    // returns { answer, blanked } or null. Clozes a real grammar point/phrase in most key notes.
    function clozePick(rec){
      if (!rec) return null;
      var sent = surfaceOf(rec.jp_html), pts = rec.points || [], best = null;
      for (var i = 0; i < pts.length; i++){
        var core = clozeCore(pts[i].term);
        if (core.length < 2 || core.length >= sent.length || sent.indexOf(core) < 0) continue;
        var cand = { answer: core, rank: clozeRank(pts[i].cat), len: core.length };
        if (!best || cand.rank > best.rank || (cand.rank === best.rank && cand.len > best.len)) best = cand;
      }
      if (!best) return null;
      var idx = sent.indexOf(best.answer);
      return { answer: best.answer, blanked: sent.slice(0, idx) + '____' + sent.slice(idx + best.answer.length) };
    }
    function cardTypes(rec){ var t = ['rec', 'prod']; if (clozePick(rec)) t.push('cloze'); return t; }
    // A card exists iff its favorite does; each favorite → its cardTypes. Pre-upgrade bare-<id>
    // schedules MIGRATE to <id>#rec (schedule preserved), never dropped.
    function reconcile(items, srs){
      items = items || {}; srs = srs || {};
      var expected = {}, add = [], remove = [], migrate = [], id, k;
      for (id in items) if (Object.prototype.hasOwnProperty.call(items, id)){
        var ts = cardTypes(items[id]); for (var j = 0; j < ts.length; j++) expected[id + '#' + ts[j]] = 1;
      }
      for (k in srs) if (Object.prototype.hasOwnProperty.call(srs, k)){
        if (!isTypedKey(k)){ if (items[k]) migrate.push(k); else remove.push(k); }
      }
      var migRec = {}; migrate.forEach(function(x){ migRec[x + '#rec'] = 1; });
      for (k in expected) if (!srs[k] && !migRec[k]) add.push(k);
      for (k in srs) if (Object.prototype.hasOwnProperty.call(srs, k)){ if (isTypedKey(k) && !expected[k]) remove.push(k); }
      return { add: add, remove: remove, migrate: migrate };
    }
    return { DAY: DAY, clampEase: clampEase, newCard: newCard, schedule: schedule,
             dueQueue: dueQueue, reconcile: reconcile,
             cardTypes: cardTypes, clozePick: clozePick, typeOf: typeOf, baseOf: baseOf, isTypedKey: isTypedKey };
  }
  /*<</srs-pure>>*/

  // ---------- DOM: review session overlay + in-list due badges (favorites.html) ----------
  if (!window.LangFav) return;                        // online-only gate (favorites.js sets LangFav)
  var LF = window.LangFav, SP = SRS_PURE();
  window.LangSRS = SP;                                 // expose the scheduler to any online page (home dashboard, vocab.js) BEFORE the favList gate — DRY, no second core
  var listEl = document.getElementById('favList');
  if (!listEl) return;                                // the review overlay + due badges run on favorites.html only
  function nowSec(){ return Math.floor(Date.now() / 1000); }
  function esc(s){ return String(s == null ? '' : s).replace(/[&<>"]/g, function(c){
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }

  // lazy reconcile: a card exists iff the sentence is a favorite. Safe every load.
  (function reconcile(){
    var r = SP.reconcile(LF.getNS('items'), LF.getNS('srs')), now = nowSec(), srs = LF.getNS('srs');
    if (!r.add.length && !r.remove.length && !r.migrate.length) return;
    LF.batch(function(){                                 // one change + one flush, not N (avoids O(N²) first-load render + flush storm)
      r.migrate.forEach(function(k){ LF.setKey('srs', k + '#rec', srs[k]); LF.delKey('srs', k); });   // pre-upgrade bare id -> #rec, schedule preserved
      r.add.forEach(function(k){ LF.setKey('srs', k, SP.newCard(now)); });
      r.remove.forEach(function(k){ LF.delKey('srs', k); });
    });
  })();

  // toolbar button + due count
  var startBtn = document.createElement('button');
  startBtn.className = 'btn'; startBtn.id = 'srsStart'; startBtn.type = 'button';
  var actions = document.querySelector('.fav-actions');
  if (actions) actions.insertBefore(startBtn, actions.firstChild);

  function dueIds(){ return SP.dueQueue(LF.getNS('srs'), nowSec()); }
  function refreshChrome(){
    var due = dueIds(), n = due.length;
    startBtn.textContent = '开始复习 (' + n + ')';
    startBtn.disabled = (n === 0);
    startBtn.title = n === 0 ? '今天没有到期的卡片' : ('今天有 ' + n + ' 张到期');
    var dueSet = {}; due.forEach(function(k){ dueSet[SP.baseOf(k)] = 1; });   // a row is due if ANY of its cards is
    [].slice.call(listEl.querySelectorAll('.frow')).forEach(function(row){
      var btn = row.querySelector('.frow-side button[data-id]');
      var id = btn ? btn.getAttribute('data-id') : '';
      var badge = row.querySelector('.srs-due');
      if (id && dueSet[id]){
        if (!badge){ badge = document.createElement('span'); badge.className = 'srs-due'; badge.textContent = '● due';
          var side = row.querySelector('.frow-side'); if (side) side.insertBefore(badge, side.firstChild); }
      } else if (badge){ badge.parentNode.removeChild(badge); }
    });
  }
  LF.onChange(refreshChrome);                         // re-decorate after each REVIEW_SCRIPT render
  refreshChrome();

  // ---------- review session overlay ----------
  var overlay = document.createElement('div');
  overlay.className = 'srs-overlay'; overlay.id = 'srsOverlay'; overlay.hidden = true;
  overlay.innerHTML =
    '<div class="srs-card" role="dialog" aria-modal="true" aria-label="复习">' +
      '<div class="srs-prog" id="srsProg"></div>' +
      '<div class="srs-front" id="srsFront"></div>' +
      '<div class="srs-back" id="srsBack" hidden></div>' +
      '<div class="srs-controls" id="srsControls"></div>' +
      '<div class="srs-summary" id="srsSummary" hidden></div>' +
      '<button class="srs-close" id="srsClose" type="button" aria-label="退出复习">✕</button>' +
    '</div>';
  document.body.appendChild(overlay);
  var elFront = overlay.querySelector('#srsFront'), elBack = overlay.querySelector('#srsBack'),
      elCtl = overlay.querySelector('#srsControls'), elProg = overlay.querySelector('#srsProg'),
      elSummary = overlay.querySelector('#srsSummary');

  var snapshot = [], pos = 0, reviewed = 0, forgot = 0, revealed = false;

  function chip(p){ var cls = ['katsu', 'keigo', 'joshi', 'goi'].indexOf(p.cat) >= 0 ? p.cat : 'goi';
    return '<span class="chip ' + cls + '">' + esc(p.term) + '</span>'; }
  function backHtml(rec, id){
    var parts = ['<div class="srs-jp">' + (rec.jp_html || '') + '</div>'];   // ruby intact → reading shows
    if (rec.cn) parts.push('<div class="srs-cn"><span class="lbl">译</span>' + esc(rec.cn) + '</div>');
    var pts = rec.points || [];
    if (pts.length) parts.push('<div class="srs-pts">' + pts.map(chip).join('') + '</div>');
    var note = LF.getNS('notes')[id];
    if (note && note.text) parts.push('<div class="srs-note">📝 ' + esc(note.text).replace(/\r?\n/g, '<br>') + '</div>');
    return parts.join('');
  }
  var TYPE_LABEL = { rec: '识别', prod: '产出', cloze: '填空' };
  function showCard(){
    revealed = false;
    if (pos >= snapshot.length) return finish();
    var key = snapshot[pos], type = SP.typeOf(key), id = SP.baseOf(key), items = LF.getNS('items'), rec = items[id];
    if (!rec){ pos++; return showCard(); }              // favorite removed mid-review → skip
    elProg.textContent = (pos + 1) + ' / ' + snapshot.length;
    var badge = '<span class="srs-badge srs-b-' + type + '">' + (TYPE_LABEL[type] || '') + '</span>';
    if (type === 'prod'){                                // 产出: 译文 → recall the JP
      elFront.innerHTML = badge + '<div class="srs-cn"><span class="lbl">译</span>' + esc(rec.cn || '') + '</div><div class="srs-prompt">用日文说出来</div>';
    } else if (type === 'cloze'){                        // 填空: blank a verbatim key word
      var cz = SP.clozePick(rec) || { blanked: '' };
      elFront.innerHTML = badge + '<div class="srs-cloze">' + esc(cz.blanked).replace('____', '<span class="srs-blank">＿＿</span>') + '</div>';
    } else {                                             // 识别: JP (furigana hidden) → recall meaning
      elFront.innerHTML = badge + '<div class="srs-jp srs-hide-furi">' + (rec.jp_html || '') + '</div>';
    }
    elFront.hidden = false; elBack.hidden = true; elBack.innerHTML = '';
    elCtl.innerHTML = '<button class="btn" id="srsReveal" type="button">显示答案</button>';
    overlay.querySelector('#srsReveal').addEventListener('click', reveal);
  }
  function reveal(){
    revealed = true;
    var id = SP.baseOf(snapshot[pos]), rec = LF.getNS('items')[id];
    if (!rec){ pos++; return showCard(); }
    elBack.innerHTML = backHtml(rec, id); elBack.hidden = false;
    elCtl.innerHTML =
      '<button class="btn srs-g" data-g="again" type="button">重来</button>' +
      '<button class="btn srs-g" data-g="hard"  type="button">困难</button>' +
      '<button class="btn srs-g" data-g="good"  type="button">良好</button>' +
      '<button class="btn srs-g" data-g="easy"  type="button">简单</button>';
    [].slice.call(elCtl.querySelectorAll('.srs-g')).forEach(function(b){
      b.addEventListener('click', function(){ grade(b.getAttribute('data-g')); });
    });
  }
  function grade(g){
    var key = snapshot[pos], id = SP.baseOf(key), srs = LF.getNS('srs'), rec = LF.getNS('items')[id];
    if (rec){ LF.setKey('srs', key, SP.schedule(srs[key] || SP.newCard(nowSec()), g, nowSec())); LF.stampToday(); }   // schedule THIS card only + log today's activity (streak)
    if (g === 'again'){ forgot++; if (rec) snapshot.push(key); }   // relearn: back of the finite snapshot
    else if (rec){ reviewed++; }
    pos++; showCard();
  }
  function finish(){
    elFront.hidden = true; elBack.hidden = true; elCtl.innerHTML = ''; elProg.textContent = '';
    elSummary.hidden = false;
    elSummary.innerHTML = '<div class="srs-done">复习了 ' + reviewed + ' · 忘了 ' + forgot + '</div>' +
      '<button class="btn" id="srsBackBtn" type="button">返回</button>';
    overlay.querySelector('#srsBackBtn').addEventListener('click', closeSession);
  }
  function openSession(){
    snapshot = dueIds(); pos = 0; reviewed = 0; forgot = 0;
    if (!snapshot.length) return;
    elSummary.hidden = true; elSummary.innerHTML = '';
    overlay.hidden = false; document.body.classList.add('srs-open');
    showCard();
  }
  function closeSession(){ overlay.hidden = true; document.body.classList.remove('srs-open'); refreshChrome(); }
  startBtn.addEventListener('click', openSession);
  overlay.querySelector('#srsClose').addEventListener('click', closeSession);
  overlay.addEventListener('keydown', function(e){ if (e.key === 'Escape') closeSession(); });
})();
</script>
<script>
/* ============================================================================
   词汇 (saved-terms deck) — tap any analysis chip on a study page to save it as
   its own SM-2-lite card; the review page (favorites.html) grows a 词汇 deck +
   review. Online-only (window.LangFav). Reuses the scheduler via window.LangSRS
   (set by srs.js) — no second scheduler core. Design: plans/…-vocab-deck-design.md
   ========================================================================== */
(function(){
  /*<<vocab-pure>>*/
  function VOCAB_PURE(){
    // Stable id from the term text — deduped globally (one card per unique term).
    function termId(term){ return 'v:' + String(term == null ? '' : term).replace(/^★\s*/, '').trim(); }
    // Vocab ids with .srs.due <= now, ascending by due, ties in insertion order.
    function vdueQueue(vocab, now){
      vocab = vocab || {}; var arr = [];
      for (var id in vocab) if (Object.prototype.hasOwnProperty.call(vocab, id)){
        var c = vocab[id], s = c && c.srs;
        if (s && s.due <= now) arr.push({ id: id, due: s.due, i: arr.length });
      }
      arr.sort(function(a, b){ return (a.due - b.due) || (a.i - b.i); });
      return arr.map(function(x){ return x.id; });
    }
    return { termId: termId, vdueQueue: vdueQueue };
  }
  /*<</vocab-pure>>*/

  var LF = window.LangFav;
  if (!LF) return;                                     // online-only gate (no LangFav on file://)
  var VP = VOCAB_PURE();
  window.LangVocab = VP;                               // expose the vocab core to the 今日学习 home (due count) — before the page-specific gates
  function nowSec(){ return Math.floor(Date.now() / 1000); }
  function esc(s){ return String(s == null ? '' : s).replace(/[&<>"]/g, function(c){
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }
  function newSrs(){ return window.LangSRS ? window.LangSRS.newCard(nowSec()) : { due: nowSec(), ivl: 0, ease: 2.5, reps: 0, lapses: 0 }; }
  var CATS = ['katsu', 'keigo', 'joshi', 'goi'];
  function catOf(chip){ for (var i = 0; i < CATS.length; i++) if (chip.classList.contains(CATS[i])) return CATS[i]; return 'goi'; }

  // ---------- STUDY PAGE: tap a .u-points chip to save/unsave the term ----------
  var chips = [].slice.call(document.querySelectorAll('.u-points .chip'));
  if (chips.length){
    chips.forEach(function(chip){
      var term = (chip.textContent || '').replace(/^★\s*/, '').trim();
      if (!term) return;
      var id = VP.termId(term);
      chip.setAttribute('role', 'button'); chip.setAttribute('tabindex', '0'); chip.title = '收藏该词条';
      chip.classList.toggle('saved', !!LF.getNS('vocab')[id]);
      function toggle(){
        var cur = LF.getNS('vocab');
        if (cur[id]){ LF.delKey('vocab', id); chip.classList.remove('saved'); return; }
        var li = chip.closest('li'), gloss = (li && li.children[1]) ? (li.children[1].textContent || '').trim() : '';
        var row = chip.closest('.u'), ts = row ? row.querySelector('.ts') : null;
        LF.setKey('vocab', id, { term: term, cat: catOf(chip), gloss: gloss,
          page: (location.pathname.split('/').pop() || ''), mmss: ts ? (ts.textContent || '').trim() : '',
          srs: newSrs() });
        chip.classList.add('saved');
      }
      chip.addEventListener('click', toggle);
      chip.addEventListener('keydown', function(e){ if (e.key === 'Enter' || e.key === ' '){ e.preventDefault(); toggle(); } });
    });
  }

  // ---------- REVIEW PAGE (favorites.html): 词汇 deck + review ----------
  var listEl = document.getElementById('favList');
  if (!listEl) return;

  var section = document.createElement('section');
  section.className = 'vocab-deck'; section.id = 'vocabDeck';
  section.innerHTML = '<div class="vocab-head"><h2>词汇</h2>' +
    '<button class="btn" id="vocabStart" type="button"></button></div><ul class="vocab-list" id="vocabList"></ul>';
  (document.querySelector('main') || document.body).appendChild(section);
  var vList = section.querySelector('#vocabList'), vStart = section.querySelector('#vocabStart');

  function vdue(){ return VP.vdueQueue(LF.getNS('vocab'), nowSec()); }
  function renderList(){
    var vocab = LF.getNS('vocab'), ids = Object.keys(vocab), due = vdue().length;
    section.hidden = ids.length === 0;
    vStart.textContent = '词汇复习 (' + due + ')'; vStart.disabled = due === 0;
    vList.innerHTML = ids.map(function(id){
      var r = vocab[id];
      return '<li class="vrow"><span class="chip ' + esc(r.cat || 'goi') + '">' + esc(r.term) + '</span>' +
        '<span class="vgloss">' + esc(r.gloss || '') + '</span>' +
        '<a class="vsrc" href="' + esc(r.page || '#') + '">' + esc(r.mmss || '↗') + '</a>' +
        '<button class="vdel" type="button" data-id="' + esc(id) + '" aria-label="移除">✕</button></li>';
    }).join('');
    [].slice.call(vList.querySelectorAll('.vdel')).forEach(function(b){
      b.addEventListener('click', function(){ LF.delKey('vocab', b.getAttribute('data-id')); });
    });
  }
  LF.onChange(renderList); renderList();

  // review overlay
  var ov = document.createElement('div');
  ov.className = 'srs-overlay'; ov.id = 'vocabOverlay'; ov.hidden = true;
  ov.innerHTML = '<div class="srs-card" role="dialog" aria-modal="true" aria-label="词汇复习">' +
    '<div class="srs-prog" id="vProg"></div><div class="srs-front" id="vFront"></div>' +
    '<div class="srs-back" id="vBack" hidden></div><div class="srs-controls" id="vCtl"></div>' +
    '<button class="srs-close" id="vClose" type="button" aria-label="退出">✕</button></div>';
  document.body.appendChild(ov);
  var vFront = ov.querySelector('#vFront'), vBack = ov.querySelector('#vBack'),
      vCtl = ov.querySelector('#vCtl'), vProg = ov.querySelector('#vProg');
  var snap = [], pos = 0;

  function show(){
    if (pos >= snap.length){ ov.hidden = true; document.body.classList.remove('srs-open'); renderList(); return; }
    var id = snap[pos], r = LF.getNS('vocab')[id];
    if (!r){ pos++; return show(); }
    vProg.textContent = (pos + 1) + ' / ' + snap.length;
    vFront.innerHTML = '<span class="srs-badge srs-b-cloze">词汇</span><div class="vterm">' + esc(r.term) + '</div>';
    vFront.hidden = false; vBack.hidden = true; vBack.innerHTML = '';
    vCtl.innerHTML = '<button class="btn" id="vReveal" type="button">显示答案</button>';
    ov.querySelector('#vReveal').addEventListener('click', reveal);
  }
  function reveal(){
    var id = snap[pos], r = LF.getNS('vocab')[id]; if (!r){ pos++; return show(); }
    vBack.innerHTML = '<div class="srs-cn">' + esc(r.gloss || '（无释义）') + '</div>' +
      (r.page ? '<a class="vsrc" href="' + esc(r.page) + '">' + esc(r.mmss || '↗ 原句') + '</a>' : '');
    vBack.hidden = false;
    vCtl.innerHTML = '<button class="btn srs-g" data-g="again">重来</button><button class="btn srs-g" data-g="hard">困难</button>' +
      '<button class="btn srs-g" data-g="good">良好</button><button class="btn srs-g" data-g="easy">简单</button>';
    [].slice.call(vCtl.querySelectorAll('.srs-g')).forEach(function(b){
      b.addEventListener('click', function(){ grade(b.getAttribute('data-g')); });
    });
  }
  function grade(g){
    var id = snap[pos], vocab = LF.getNS('vocab'), r = vocab[id];
    if (r && window.LangSRS){ r.srs = window.LangSRS.schedule(r.srs || newSrs(), g, nowSec()); LF.setKey('vocab', id, r); }
    if (r) LF.stampToday();                             // log today's activity (streak)
    if (g === 'again' && r) snap.push(id);
    pos++; show();
  }
  vStart.addEventListener('click', function(){ snap = vdue(); pos = 0; if (!snap.length) return; ov.hidden = false; document.body.classList.add('srs-open'); show(); });
  ov.querySelector('#vClose').addEventListener('click', function(){ ov.hidden = true; document.body.classList.remove('srs-open'); renderList(); });
})();
</script>
<script>
/* ============================================================================
   今日学习 (study home) — home.html only. One surface that aggregates what the
   three review systems each track separately: 到期的语法卡 (srs.js), 到期的词汇
   (vocab.js), 继续学习 (progress), and a 连续天数 streak (the activity namespace,
   stamped by every review). Reads the pure scheduler cores exposed on window by
   srs.js (LangSRS) and vocab.js (LangVocab) — no fourth copy. Online-only
   (window.LangFav). Pure streak core unit-tested in tools/test_home.mjs.
   ========================================================================== */
(function(){
  /*<<home-pure>>*/
  // Pure, DOM/Store/clock-free core. Extracted verbatim by the unit test.
  function HOME_PURE(){
    function pad(n){ return (n < 10 ? '0' : '') + n; }
    // one day earlier, as YYYY-MM-DD. Date.UTC/new Date(ms) are pure (no "now").
    function prevDay(s){
      var p = String(s).split('-').map(Number);
      var d = new Date(Date.UTC(p[0], p[1] - 1, p[2]) - 86400000);
      return d.getUTCFullYear() + '-' + pad(d.getUTCMonth() + 1) + '-' + pad(d.getUTCDate());
    }
    // Consecutive days with activity ending TODAY (if present) or YESTERDAY (if today isn't done
    // yet) — so an unfinished today never reads as a broken streak. dates: a presence map.
    function streak(dates, today){
      dates = dates || {};
      var has = function(d){ return Object.prototype.hasOwnProperty.call(dates, d); };
      var cur = has(today) ? today : prevDay(today), n = 0;
      while (has(cur)){ n++; cur = prevDay(cur); }
      return n;
    }
    return { prevDay: prevDay, streak: streak };
  }
  /*<</home-pure>>*/

  // ---------- DOM: render the dashboard (home.html) ----------
  var LF = window.LangFav;
  if (!LF) return;                                     // online-only gate (no LangFav on file://)
  var host = document.getElementById('homeDash');
  if (!host) return;                                   // home.html only
  var HP = HOME_PURE();
  function nowSec(){ return Math.floor(Date.now() / 1000); }
  function todayStr(){ var d = new Date(), p = function(n){ return (n < 10 ? '0' : '') + n; };
    return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate()); }
  function esc(s){ return String(s == null ? '' : s).replace(/[&<>"]/g, function(c){
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }

  function render(){
    var now = nowSec(), today = todayStr();
    var SP = window.LangSRS, VP = window.LangVocab;
    var srsDue  = SP ? SP.dueQueue(LF.getNS('srs'), now).length : 0;
    var vocabDue = VP ? VP.vdueQueue(LF.getNS('vocab'), now).length : 0;
    var favN = Object.keys(LF.getNS('items')).length;
    var vocabN = Object.keys(LF.getNS('vocab')).length;
    var activity = LF.getNS('activity');
    var st = HP.streak(activity, today);
    var doneToday = Object.prototype.hasOwnProperty.call(activity, today);

    // ── resume: most-recently-touched pages first, deep-linked to the line ──
    var prog = LF.getNS('progress'), resume = [];
    for (var pg in prog) if (Object.prototype.hasOwnProperty.call(prog, pg)){
      var e = prog[pg]; if (e) resume.push({ pg: pg, at: e.at || 0, id: e.id || '', mmss: e.mmss || '' });
    }
    resume.sort(function(a, b){ return b.at - a.at; });
    resume = resume.slice(0, 3);

    var streakLine = st > 0
      ? '<div class="hm-streak"><span class="hm-fire">🔥</span><span class="hm-n">' + st + '</span> 天连续' +
        (doneToday ? ' · <span class="hm-ok">今天已复习</span>' : ' · <span class="hm-todo">今天还没复习</span>') + '</div>'
      : '<div class="hm-streak hm-cold">还没有连续记录 — 今天复习一张卡就开始了</div>';

    var dueCards =
      '<a class="hm-card hm-due" href="favorites.html">' +
        '<div class="hm-k">语法卡到期</div><div class="hm-v' + (srsDue ? ' hot' : '') + '">' + srsDue + '</div>' +
        '<div class="hm-sub">识别 · 产出 · 填空</div></a>' +
      '<a class="hm-card hm-due" href="favorites.html">' +
        '<div class="hm-k">词汇到期</div><div class="hm-v' + (vocabDue ? ' hot' : '') + '">' + vocabDue + '</div>' +
        '<div class="hm-sub">共收藏 ' + vocabN + ' 个词</div></a>' +
      '<a class="hm-card" href="favorites.html">' +
        '<div class="hm-k">收藏句子</div><div class="hm-v">' + favN + '</div>' +
        '<div class="hm-sub">去复习页 →</div></a>';

    var resumeHtml = resume.length
      ? '<div class="hm-sec">继续学习</div><div class="hm-resume">' + resume.map(function(r){
          var href = esc(r.pg) + (r.id ? '#s=' + encodeURIComponent(r.id) : '');
          return '<a class="hm-rz" href="' + href + '"><span class="hm-rz-pg">' + esc(r.pg.replace(/\.html$/, '')) +
            '</span><span class="hm-rz-at">' + (r.mmss ? esc(r.mmss) : '↗') + '</span></a>';
        }).join('') + '</div>'
      : '';

    var explore =
      '<div class="hm-sec">探索</div><div class="hm-links">' +
        '<a class="hm-link" href="search.html">🔎 全文检索 · 按词搜全部对白</a>' +
        '<a class="hm-link" href="concordance.html">📚 文法索引 · 跨视频 · 语法练习</a>' +
        '<a class="hm-link" href="index.html">🎬 全部课程</a></div>';

    host.innerHTML = streakLine + '<div class="hm-grid">' + dueCards + '</div>' + resumeHtml + explore;
  }

  LF.onChange(render);
  render();
})();
</script>
<script>
/* lang-nav live badge: 收藏 count + honest sync dot, from window.LangFav.
   No-op where LangFav is absent (offline file:// deliverables). */
(function(){
  var nav = document.querySelector('.lang-nav'); if (!nav) return;
  var nEl = nav.querySelector('.ln-fav-n'), dot = nav.querySelector('.ln-dot');
  var DOT = { ok: ['ln-ok', '已同步'], wait: ['ln-wait', '待同步'],
              off: ['ln-off', '未开启'], err: ['ln-err', '同步失败'] };
  function refresh(){
    var LF = window.LangFav; if (!LF) return;
    if (nEl) nEl.textContent = LF.count();
    if (dot){ var s = (LF.status && LF.status()) || 'off'; var d = DOT[s] || DOT.off;
      dot.className = 'ln-dot ' + d[0]; dot.title = d[1]; }
  }
  (function wait(tries){
    var LF = window.LangFav;
    if (LF){ if (LF.onChange) LF.onChange(refresh); refresh(); return; }
    if (tries < 30) setTimeout(function(){ wait(tries + 1); }, 80);
  })(0);
})();
</script>
